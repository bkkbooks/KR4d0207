body:
  text: 雜文陳伯瑜宣義行狀公諱某字伯瑜姓陳氏南劍之沙縣人髙祖諱文餘以其子祕書少監之貴贈官至尚書駕部員外郎陳氏為延平大族自少監公之後世有顯人名德震天下而公之曽祖可法皇祖大祖皇考瑄蓋三世不仕公自少時即發憤讀書欲張大其家聲刻苦不少懈宗黨多譽之尤為叔祖朝議之所信愛雖逰宦逺方未嘗不以自隨也以是公得遍歷通都大邑從良師友以學學且成其施於科舉若有餘矣然每出輒不利中年益竒蹇遂棄而家居往來田野間若無意於斯世者獨教其子升戩曰耕而穫常理也旱潦則亦有焉汝力於學以追少監之子孫無我多愧且吾先世多潛德至於今蓋久寧常晦而不彰乎二子遵其言日進不已其後數年果有貢於禮部者雖不偶而其志愈勵矣公從容謂其夫人曰吾兒類能自立者上方興太學英材輻輳學者求琢磨之益宜必於是吾將遣二子逰焉而貧無以為道路之費奈何夫人曰如不可已則唯所命公於是鬻饘粥之田資其子以行里俗或笑之公逌然不以介意又二年當元祐三年而戩舉進士中第嚮之笑者始相與驚嘆以公之不計目前為得又十年當紹聖四年而升復登科人以是大服公則又相與抃蹈為公深賀公謝客曰教子欲其才吾志也以文墨而得祿比比皆然何足賀識者謂公器度過人遠甚其子卒皆有成矣豈其教之固有道歟崇寧中戩調於吏部得虔州幕官虔於江西為大郡當江嶺之衝貴人達官常所往來與夫朝廷之有事於交廣者出入必過焉其見戩者則以虔之屬吏為得人會羣蠻擾邊克之朝廷以廣西融宜等州别為一路隸黔南自幕僚以上皆堂選重其事也由是諸公之任事於此者交辟之書奏就除融州判官戩以公老不忍逺去書來告曰必辭是公聞之即輕騎詣其子所詰之曰男子志四方事業亦欲及時汝為汝之所為毋以我故自滯儻汝有立雖行萬里之外如在吾側不然徒朝夕相依無謂也汝必往戩不得辭公因挈其婦孫以歸而使戩獨之官後果以戎功改通直郎用元圭恩封公承事郎又用郊祀恩再封公宣義郎暮年躬被寵榮人為公喜而公之辭色卒不見其有異於平日也戩居黔南日久屬以侍養乞於朝已而得請當詣闕遂亟授福州閩縣丞以歸既歸父子相見歡甚久之迎公如閩蓋期年而後返其眀年二子亦返未幾公復趣二子還任戩曰長樂佳山水遊觀休息之所為多且飲食醫藥尤便老人其必之此乎升進而言曰始戩之令於四眀之昌國也涉江逾海道逺且阻翁嘗與俱北南歸而丞於閩也又得侍翁以往今升領建之松溪邑事其去家於閩為近居處口體之奉非所憂當為升行戩不必聽公笑而從之其在松溪強健如未病時冬十月朔晨興正冠修容坐堂上子孫以次賀婦進饋就視則已奄然逝矣蓋政和四年也享年八十有四公純直樂易其於孝友蓋不待勉強而後能至平居語莊而氣平於人無貴賤戚踈視之若一宜其遇事易撓然一有不歉於義無茍從者其奉已至約而施豫無吝悅之不以其好弗屑也在昌國其子官滿奉之以歸至郡即先走會稽告其去於部使者民有聚白金三百兩伺公出羅拜庭下願以為公夀且曰前此為敝邑者蓋許之也以大夫之嚴不敢以請輒私於下執事幸不以為罪公麾而出之曰令為國牧民反於汝乎責貨何義也汝必速反吾兒知之其不汝容矣民感泣而去公晚嵗資稍裕計其所用之餘遇新陳不繼之際輒平價出之閭里之貧者賴以不困所居去城市稍逺俗不餌藥唯以巫祝為尚公為儲金石草木之可以療疾者依古方和之散以豫民當癘疫並興公前後所全活甚衆鄉人德之始戩之官於黔南也戎事有間凡嶺外珍竒之物詭異之玩儻可以娛心意快耳目者莫不畢致以獻于公又屬其族子弟築亭於居第之東宏壯偉麗大溪橫其前喬木蒼然掩映左右以為公親戚故舊燕逰之地至於觴豆之器射壺博奕之具無一不備來者樂之且以公之難老為有子也公曰吾兒念我欲以是相悅然吾豈待此而後足不遽止之亦所以慰其逺情耳公之清修恬漠蓋如此公夫人邑里鄧氏資淑慎治家嚴整而用物有度方公捐書就間不以生事攖心窶甚夫人為均節有無至婚喪祭祀賔客之所宜費者率不更其素故人以為難蓋長公一嵗前公十年而終亦以其子升朝贈孺人生三男子長曰升次堯輔而季則戩也堯輔蚤世升後公一年亦卒官止文林郎女二人適進士黃約羅世英孫男四人將以六年十二月二日辛酉葬公於縣之崇仁里故發沖之原夫人之兆宜有顯刻以傳不朽謹敘次其世系仁義如右以告當世之君子使志公之墓者得以考焉廖成伯朝請墓表公諱某字成伯姓廖氏廖氏之先蓋出於周文王之子伯廖以字為氏自東漢以來時有顯者然皆莫知其所承襲至唐或居太原之晉陽遭天寶之亂以其族避地閩中家延平山谷間號龍池唐亡龍池之族仕王氏多以軍功有聞其子孫蕃衍遂為延平著姓至公八世祖始由龍池分處順昌縣之交溪故今為交溪人曽祖諱某祖諱某父諱某皆潛德弗仕世積善以高夀終鄉人化慕焉公少力學工文詞以其母楊氏意應舉為場屋有名士母卒即棄去故習益求其所未至而養其所固有者以教其子已而其子擢進士第列官於朝遇政和六年郊祀恩始封承事郎致仕自是國有大慶必進封逮今天子即位凡十年八遷至朝請郎乃以年賜三品服以靖康元年十月庚辰終於家享年九十有四初娶謝氏再娶陳氏纍贈若封皆安人生子男三人長曰冽蚤世次曰剛朝奉郎守右正言次曰副女一人適進士吳權孫男六人軒輯遲過遂蘧孫女三人以是年十二月庚申葬於縣之溪南祖塋公天性質直簡而不偷易而不弛遇人無戚踈小大一以誠處事唯理所在未嘗幸利而薰然慈愛下逮僮僕見之者知其為篤厚君子也故其孝愛行於閨門信義著於朋友恭順達於里閭得之自然不待矯拂平居無事唯以詩酒為樂客至必飲飲或終日無醉色其為詩操筆立成宛轉清切能道人所難言不主風刺自適而已始余為太學諸生與正言公同舍遂相與為忘年交蓋久而益親間嘗察其所知所能而訊其所從來則曰某事吾父謂某如是某行之某事某如是行之而吾父以為然者也方余未識公時則已於其子知公矣其後見公於嘉興又見公於臨漳皆其子之官舍聽其言觀其行益信其為人最後見公於交溪年愈髙貌愈溫氣愈和使人即之而不能去也豈古所謂老成人其德可尊而事之者耶公之教子初不以勢利為先故自其子之始得官以至歷清要享豐祿人皆榮之而公未嘗有喜色其子在宣和初嘗除太學録辭不報俄遷監察御史即亟以公老求去比得守莆陽蓋二年然後迎公之官居無何復以侍疾乞歸方築室買田為久安計會上躬聽斷屏絶姦佞求正直士補諫官闕員遽命以右正言召還時公疾已作亦不果赴正言公尚恬退至是雖其義皆不得不然然非公素不以人之所榮者有望於其子則為之子者雖欲必行其志以終其孝養其可得乎故余以公之子知公而反復咏嘆之不已者非茍云也公歿之明年正言公欲志其平生以傳於後書來告曰先君不幸既葬未及銘身隱而迹晦懼無以傳遠今世俗多借譽於達官之文茍以榮親無益不信吾父子四海相知唯子一人宜有以表之余既深知公而其子又知余之深余雖賤且不能文其何以辭於是為論次其行實因道余所以知公者附益焉已又述於其後曰維廖氏世有德善畜既久將大發於公公靳弗施以至於老且死又寓其所積之厚於其子子且顯公為不朽矣若公者所謂假舟楫絶江河行不必以踵也吾聞有德者其後必大豈以夫載而之後世者有所附託而然歟故曰人有不為也然後可以有為吾見其兆矣請以是鑱諸石表於公之墓以俟年月日同郡陳淵述祭叔祖右司文維宣和四年十月丙戌朔二十日乙巳姪孫淵謹以清酌家饌之奠致祭於亡叔祖宫使右司之靈嗚呼叔祖當代之傑百世之師其道德之髙術智之深議論之精文章之妙無與倫比蓋夫人而能言之至其忠貫金石謀合鬼神辨屈儀秦勇抗賁育橫騖别驅而卒反於正則雖譽之善者有不能極其美而嫉之深者有不能指其疵昔者紹聖之初公臥江海之上或得其賢用之匪宜三年學省困於鹽虀而英偉之資豪邁之氣髙視縉紳之表危言極論蓋莫知其官之卑朔方一出令聞四馳逮真人之勃興任諫垣而補遺國爾忘家衆正所依故當雷霆之威而不懾任萬鈞之重而不辭審厥是以獨往禍已及而弗移淮壖謫守召不及期曽坐席之未溫復議政於都司一斥不復二紀於兹家乏宿儲無適不怡豈至誠之所存置得喪於毫釐嗚呼公之言曰金百死而不化水萬折以東流言可為也而志不可幾志可似也而其屢屈而不撓久窮而不變霜雪雨雹衆凌而並虐獨公凛然挺松柏之姿觸瘴霧以深入視囹圄其猶歸人不能堪已甘如飴此天下蒼生所以跂踵而有待而有志之士所以隱伏不耀珍其貨以須時孰謂公厭斯世而去也彀必中之矢而終不一彂斂山嶽之積而微塵弗施蓋庸人孺子樵夫販婦聞公之亡猶為之墮淚而不禁況於知舊親戚抱恨銜冤則其情可推顧惟不肖自為童稚已被誨育至於今三十餘年矣撫而憐之蓋益久而不衰報德無所公今已而將門户薄祐困躓厄窮之所招耶生民何辜哲人遽萎嗚呼公於所親不責其所未至而於其賢不窮其所不知其待我也尤為不疑蓋嘗語同志之士於公公信其人謂逺大之可期數年之間先後公而逝矣存者其誰平生坎壈公知其微公去我留欲以奚為北向長號莫知我悲祭李先之祭酒文維建炎二年嵗次戊申五月甲申朔某日某甲子迪功郎吉水永豐縣主簿陳淵謹以清酌庶羞之奠致祭於故李公祭酒舍人之靈嗚呼我宋人物之盛章明乎咸平景德之間而烜赫乎嘉祐治平之際更熙寧而一變逮元祐而復熾乘時崛起不可勝計學窺孔孟之奧文挾班楊之氣挺松筠以抗節決江河而建議公於斯時擢冠多士參夜光眀月以效珍儷芝草鳯凰而呈瑞俯青雲於咫尺日千里其必至方騁轡於修塗俄遭讒而逺棄嗟道大之不容亦名高之為纍彼小人之自絶實天命之有制儻定數之莫移奚智巧之能避自公邅回既歷一世正人凛以結舌邪説閧其如沸亂鹿鳴於邇言速寇攘於殊裔會大人之繼眀創禍根之所自誅姦惡之已盈訪忠良於久廢起德人於荒服嵗五遷而未既接鴛鷺其有期阻豺狼之尚肆遂移疾於中途遡衡門而遂志豈愛君之無已憤孤忠之未契致深憂之莫舒厭久生而遽逝嗚呼哀哉仁者宜夀德必得位何淫朋之煽凶亦龎眉而競貴謂天道之漠然彼作善者誰恃顧橫流之滔天痛箕疇之未畀庶胼胝之奏功亘萬世而無弊何斯道之遂衰困長謀於不試寧姻戚之是懷嘆含生之失庇它時江濵邂逅相值舟中之語情不豫祕憶緒誨之渠渠悵摳衣之莫繼繄死生之去來豈空花之無柢茍師傳之未泯民異時其受賜公實無憾情鍾我輩紛世慮以何極集牢愁於幽意聊緘詞以敘心寫餘哀於一涕祭龜山先生文維紹興五年嵗次乙卯十月庚子朔十八日丁巳壻具位陳淵謹以清酌庶羞之奠致祭於亡外舅致政龍圖楊公先生之靈嗚呼泰山其頽梁木其壞四海所悲而况於骨肉之愛我於公門親則子壻恩已篤矣又兼乎師資之義此所以哀慕痛切久而不能自已也自我識公建之東陽從公荆州轉於浙江久客念歸各旋故里多合鮮離前後三紀衣之食之援而撫之教之誨之誘而與之如工之造器刻雕琢磨而冀其用如農之養苗灌溉薅藝以俟其實曽厚德之未酬忽莫知其所適若嬰兒之失其母也其能不以為戚耶嗚呼先生清而不隘和而不流淡然無營心逸日休其體之於身而安也亦以是施於民其行之於畎畝而宜也亦以是達於朝廷故退不為崖異之行而進不求矯激之名蓋所謂從容而自中豈智巧果敢之足云乎公嘗謂孟子之所謂善子思之所謂誠實同名異而皆達於孔子之仁仁固無私誠不自成故能合內外通物我無分於天人也伊洛得之眀以授我我行乎中用惟其可或畔乎此辨而正之期於萬世匪我敢私公之云亡士失所恃幸聖朝之眷舊起斯文於將廢倘邪説之遂熄何異乎存而得志矧公有子惟公是似遵正塗而遄往信遺風之可繼公則無憾斯人所喟文以告哀詞不逮意祭胡寶學文維紹興八年九月戊寅朔某日某甲子左承事郎守祕書丞陳淵謹以清酌庶羞之奠致祭於故侍讀寶學文定胡公之靈嗚呼孟軻既歿聖學莫繼楊墨雖衰異端猶熾漢黜百家不鋤其根文景黃老武宣申韓權謀尚功名節輕死清虛懲之遂來釋氏晉促其祚梁遽以亡有好弗稽復張於唐韓公憤然欲火其書積習既深弊終弗除宋興百年此蠧仍在衆正彚升羣邪氷解訖於荆舒謂得其要引聃援瞿鑿經談妙末流滔天正塗孔堙帝閔其然是興二程天人靡間內外兩盡體極無始而有感應王氏未衰此道已行發其幽光元祐之仁大程所傳龜山具體小程春秋公得其髓正名定分别嫌眀微如權在衡錙銖不欺自公少年文已驚世況有此書密傳孔志孔志所在孟子擬之其闢楊墨春秋啓之蓋曰三代人倫必明無父無君周公所膺楊墨之過猶以其弊佛所從來豈容勿議公眀春秋用夷則夷是真夷者公其敢私人曰裸顛兹特其迹舍迹論心世儒之失公不徒言亦健於行君焉父母友焉弟兄仁修於家忠施於國算計見效儒者之特公之事君惟道是從退不茍去進非尚容晚節逢辰八年三起突未及黔鴻鵠千里人願公來帝降匪遲執經以待公行不歸念昔龜山於公為友相望巍然泰山北斗龜山云亡世失其師公又逝矣人將焉倚賴有遺編聖心所取至言一出異説箝口嗟我公從蹇駑附驥所不鄙者臭味相似付囑之深薦揚之力厚德未酬泉臺永隔惟公有子萬人之英氣橫八極勇冠三軍振公餘烈將必有日如鵬乘風暫兹一息生榮死哀身遠德尊後有傳焉餘何足云緘辭寓奠有淚如雨公歆我誠此酒不吐祭廖尚書文維紹興十三年嵗次癸亥十一月癸丑朔十七日己巳左宣教郎主管台州崇道觀陳淵謹以清酌庶羞之奠致祭於故致政徽學尚書廖公之靈惟公仕至八座名高當世夀逾七十祿埀後裔凡古人之所難值者公晏然而皆得而世俗之所無有者公裕然而已備遺五福而弗居謝塵緣而釋纍公固無憾人亦何喟所不足者遭時艱難餘藴未既朝廷喪其老成後學失所依庇此有志之士所以深悲與夫識與不識莫不為之揮涕也嗟乎一氣無私有種純粹率曠世而不逢未百年而遽逝其窮而在下者顧豈無人而其達而在上者又止於此造物者其果有意乎其無意乎吾不可得而知己昔我未冠唯公是比針芥相投不約而契跂龜山中庸之學慕了齋浩然之氣匪曰身謀為天下計故處則管鮑之相許出則王貢之相繼五十年間義均兄弟晚嵗同朝臺諫並峙道然而然心同迹似方抗志以輸忠忽遭讒而俱廢我既還里後公亦至幸家居之無遠庶安車之易詣曽日月之幾何遽訃音之來謂嗚呼哀哉於生知死達人細事公了此其有餘豈待言而後會顧平生之交逰盡矣雖久生其何恃歌此奠章公歆我意祭鄧南夫文維宣和二年九月丁卯朔二十八日辛丑陳淵謹以清酌庶羞之奠致祭於亡友南夫十九兄之靈嗚呼哀哉吾衰何久母逝兄亡又喪吾友吾友多矣實唯兄賢孝友忠信匪學則然謙以自牧恕以接物孚於宗黨無頑不革其待我也洞然勿疑相知之深如琴子期人亦有言趣舍殊志曽是不謀若合符契我家陋巷只尺高門曳履往來朝坐及昏三年於兹連牆莫睹炯炯此心將以誰語夢間剝琢推枕從之出户無人孰知我悲嗚呼哀哉命不可知軒昻磊落而止於斯誰謂報施疾於影響是獨何歟乃遭夭枉一昨西逰同寓京師飲食起居跬步不離情隨事遷長慟以别冀兄榮歸豈謂永訣一時同進孰與兄才竟坐敢言事故不諧得喪秋毫本不足計數極而終又焉擇地男兒結髮志在四方馬革褁尸於我何傷天地為家莫非真宅既知而歸舉世皆客彼方客逰念人旅死夢中占夢果何時已况兄易簀有友可依全櫬亟還復不愆時殆至送終咸得其禮人曰幸哉唯兄有子我觀令子汗血之駒氣吞無垠未飽以芻望燕首越萬里終去我豈私之伯樂所顧賴以不亡不在此耶富貴而夀其亦爾耶昔兄别時以是為託渠固自立我生不怍死而有知尚聞此言瀝酒陳詩淚如迸泉代翁子靜祭奉議叔祖文維宣和四年三月庚申朔十二日辛未具位翁某謹以清酌庶羞之奠致祭於致政奉議陳公之靈嗚呼我官沙陽善政蔑聞公實教我唯仁得民遵公此言百敝一新曽未半年民氣如春惟公里居有德有齒奬借贊助民以易使方須功成遽喪先子銜哀而去遺恨何已哀傷贈誄恩隆一時有德未報公今永歸禍患疾困哭不及幃奠兹一觴莫知我悲代郡守祭衢州高龍圖文嗚呼士方厄窮百不一施懷竒負能誰獨識之如公初年其數亦竒更涉險囏厥聞乃馳浙寇跳梁所過紛披蜂屯蟻結蔓蔓弗夷公在廣信位卑力微奮袂一呼羣情響隨勇如亞夫堅臥釋圍忠如張許江淮是依東南再安此功為誰帝用褒崇延閣帥麾兵火之餘金城湯池指顧所移流亡畢歸平時士夫衣輕乘肥高論怨誹曰不吾知一旦變生鳥竄莫追抗顔視公寧不忸怩謂公百年為帝龍夔不圖奄忽遽盡於斯凡我同氣莫不涕揮况在鄰壤惟公實師死生命歟詎可理推奠兹一觴孰知我悲代郡守祭江給事母夫人文莫先之福唯夀而夫人以夀終不朽之託唯子而夫人之子賢閨門之行或殁世無聞而夫人播令譽於衆口誨育之勤或不蒙其利而夫人享厚養於暮年生榮死哀又何憾焉唯其子之賢而公輔之望尚鬱於輿論故縉紳之意於夫人之夀幸其數之延嗟九原之莫作獨遺恨於終天念昔夕郎寓官建安夫人舊逰山川儼然悵綵輿之不返忽丹旐之翩翩聊陳一觴我亦涕漣又代漕使嗚呼夫人閨門之秀孝慈惠和令聞惟舊藴德不耀是生賢子寶鼎元龜邦家所倚文章器業嘗試其餘瑣闥雍容陳帝之謨帝顧槐庭虛心以向孰謂夫人遽棄榮養胡不少延慰其子心富貴夀考益昭德音我懷昔人剪髮延客或歷台躔乃其遺澤死生夢覺蓋不必傷有子實賢夫人不亡又代龎幾先運幹古者朋友視猶兄弟我於夫人蓋子之義夕郎與我同年之契參幕漕臺又嘗聮事雲天雖隔志則無異母事夫人已孤之意不見幾時翩旐俄至陳迹依然痛傷何已徙居翦髮世濟其美胡不百年以待其子我觀令子公輔之器瑣闥掖垣餘藴未既夫人之德庶鍾於此逝者有知可無憾矣祭廖成伯文維建炎元年嵗次丁未八月某朔某日具位陳淵謹以清酌庶羞之奠致祭於太原廖公朝請丈之靈惟公天資質直副以忠厚彂於自然不待矯揉深耕熟耘盡地之力豐穰報之子有賢德我友公子自其少時相知之深如琴子期寅緣識公拜公牀下謂我兒輩可與語者不見幾時遂隔生死維墓有碑我志其美公之所藴我豈盡知公子命我其何以辭校書墓旁可置萬家翠琰巍然直詞匪夸埀名萬年公則有後我附以名世傳不朽緘詩千里寄此一樽公乎不亡其尚有聞代楊丈祭翁子靜文嗚呼子靜少而力學唯善是師長也效官勇於有為氣剛大而識明用無適而不宜嘆州縣之徒勞積誠厚而薄施方崇安之扞寇實全閩之所依吏屏迹以自全已忘家而即危豈險隘之足恃抑民情之説歸變怯懦於有勇凛長城而振威彼怙勢以自賢謂爾謀之何違因抗辭而不屈乃建繫於圜扉終負疾以投荒冒炎蒸而遠馳委孤嫠於老母忽中道而告萎嗚呼哀哉昔睢上之相從掩借來而獨竒德既成而望著遽一跌而止兹則夫豫之為慟豈姻婭之是私冀皇明之逺燭亦嗣子之可期憑斯文以告幽寫老懷之獨悲祭表弟余君文代龜山嗚呼造物之於人畀付無私而人之所遇有厚有薄自爾不齊謂為善者得福常多則彼為不善者胡為尚蕃其子孫又皓首而厖眉豈非偶然耶抑亦有數存乎其間而理不可推不然以余亡舅之德固當流裔昌熾而晚得二子汝實長而早世曽後嗣之頓隳昔余得官於荆州别汝母於將溪之上視汝孝友溫恭之質謂必業余舅氏之家而侈其傳者在兹今其已矣念汝母之既老雖汝之受於天者有命唯不獲終其孝則為可悲寓詞千里道余所以痛汝之意亦以泄余渭陽之思祭楊遵道文維崇寧四年嵗次乙酉十一月乙未朔十九日癸丑延平陳淵謹以果酒之奠致祭於亡友兄遵道之靈嗚呼遵道學有師傳文以能名年甫半世遽殞其身昔我始見汴水之曲偉矣議論溫其如玉謂我朋友許我以姻使獲種德先生之門三年契闊相去萬里南來一笑寬我夢寐從以籃輿由汴如荆歌詩賡酬愈出愈新至則成昏略去苛禮婉婉淑人今則有子衝寒冒暑或此致疾今其亡矣匪報繄德秋闈較藝謬處衆先仲季三人偕試春官有懷竒才通昔拭淚臨行一觴酹此微意代龜山先生祭葉朝請文書之父折端禮尚惟靈稟性沖和操行純實斂迹丘園鄉閭之式毫髮莫施神懿其德俾昌厥後以重王國譬公喬嶽敦大靜一神秀所鍾宜生申伯祝公夀考與山無極曽未百年乘化而息念昔見公笑談密勿碧眼霜髯銀章赤紱謂公難老天所永錫今幾何時死生永隔與公情親豈緣姻戚奠此一觴涕淚橫臆祭翁評事文維政和八年六月壬子朔二十四日乙亥潁川陳淵謹以清酌庶羞之奠致祭於京兆承事翁公之靈惟公天畀忠純行如其性年逾九十終之以正生榮死哀實惟子賢正斯已矣又何憾焉我從公子交契良厚公命聮姻愛忘其醜情深義重感極痛深詞以告哀莫究我心祭先兄文維兄忠信孝友德全於天襟度坦夷與世周旋貧而無求困而寡怨自昔罕聞於今親見平生詩酒雅有真趣譏刺紛然不改其度我亦有言謂我勿恤人生百年如駒過隙吾師無功以醉為鄉一杯到手萬慮俱忘門户得汝庶幾有立幼稚滿前奚憂不給再拜此言此意良厚四十無成我則有負前年辭親求試辟雍志竟未諧扁舟遽東不謂吾母奄棄諸孤百死中途偶還敝廬號呼相持心肝隕裂適襄大事兄以毁折嗚呼哀哉兄弟二人手足之愛里閭所聞毁産教我終窶不顧未報此恩遺我而去天禍亟至積釁所延既喪吾母又喪吾兄我雖在世與死奚擇徒以愛妹尚忍餘息憂大事叢勢微力弱俯視猶子日虞衰削兄既委我我不敢欺未議婚嫁保無凍飢死生貧富兄已深達匪兄之憂我志不越天命靡常期之十年儻未就木酬兄豈難喪事即遠所不敢稽盡蠲俗禮於事為宜官塘之原宅兆惟吉從吾親逰宜無不適靈輀將駕奠此一觴以告此心誓終不忘祭翁甥文昔我建安嵗在庚寅我友翁子笑言始親同舟浙江共榻甌閩傾寫不盡唯一心真十年憂患如齒依脣居雖異鄉家事莫分我友謂我吾兒可人是猶汝子請以為姻欣然從之自忘賤貧書幣未酬俄以訃聞念子粹然甚質而文忠信孝友實光我門云何不淑奚辜於神死生夭夀孰測其因往事本空顧何足論我友聞道修之以仁默觀去來如臂屈伸會當掃除不立一塵子如知此歸安於墳將此深心報罔極恩代龜山先生祭陸太孺人文嗚呼夫人淑慎溫柔根於所性以配君子惟義之聽我聞德門靡率匪正為女擇歸俾親常行方兹傾心益資餘慶胡不少延數豈天定有子孝愛禮與誠罄夫人何憾其可以瞑祭公敘十叔文維紹興十四年嵗次甲子十月戊寅朔二十一日戊戌姪具位淵謹以清酌庶羞之奠致祭於故叔父承事之靈嗚呼我曽叔祖特進公之盛德上配尚書公勳業之富為無忝下啓諫議公名節之重為有光輝今映古無與倫擬則以負荷之於前而誘掖之於後者得其道故也故其鍾之為陂澤彂之為泉源者特進公之力為多此其後世子孫蕃衍盛大世守家法愈久而弗墜也歟惟我叔父乃特進公之嗣孫賢而有才者也特進公平生好施不倦晚無餘資而其子孫有散於異鄉而不能以自存者公獨以儉自持幻貧為富且聚其弟姪歸保桑梓若婚若嫁俾之各得其所守墳墓而不去又以其餘力進諸子於學問有以文章取科第者天之報施其不可信耶蓋公生則安逸歿以夀考凡人之所難得者在公皆可以無憾而於特進公諸孫之列獨能無愧者誠有自也淵也不肖少從公遊以至於老其戚踈無間則父子之仁也其尊卑忘分則朋友之義也其疑有質其行有導其緩急有所赴訴今其亡矣凡利害憂樂莫與同者追慕之極何可言耶念公避冦東去以為即返吾里也不果遠送及公屬纊之際又不聞付囑之音以至復土猶以衰病不能任責抑惟愛子之厚何以為報有淚如雨莫明此心聊陳薄奠侑以斯文以泄其哀公其鑒之哉默堂先生文集卷第二十一
