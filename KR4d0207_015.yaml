body:
  text: 書上楊判官為建陽丞折時龜山先生三月二十五日鄉姪陳淵謹裁書􅕥獻判官先生閣下某聞之人之性無不通亦無不備無不通者體神無不備者藏理神無方理無窮聖賢之與愚衆等具是物其所以判然二道者在充與不充耳孟子曰可欲之謂善有諸已之謂信人均有是善當其未有諸已聖賢之與愚衆何以異及其既有諸已則已自視了然如數一二夫是之謂信古之人旦暮由是而行之猶嬰兒之長而莫知其所增益也為聖為賢其或皆出于此乎孔子曰篤信好學夫好學而內無所信則盡心于非聖人之道者有之矣故子使漆雕開仕曰吾斯之未能信而子悅然則學者莫不自信始也某嘗讀論語觀孔子所以教羣弟子者皆使之求之一性之中自性之外蓋鮮及焉夫然後知古之人所以泛應萬物者曾不出吾方寸之地于是又思得古人所謂自信者而篤之斯可以深造于道而不止為口耳之賤儒今也茫然如在中流風波正起而失所以濟蓋不知方其信而行之古人何所見耶夫信者知其在我者有是也學而且能信之雖君子之細事至其進而不止可以積而入于不可知之神矣豈不大哉故某嘗竊疑孔子之門所以人人皆可畏者實自此入也若聖人之教人未能使之自信道無自得矣且以子路行行之氣屢見沮于其師終不少貶宜不足與語至孔子憚門人之不敬之也則曰由也升堂矣未入于室也其曰未者以謂孔子之室在子路非不可入也特其入有漸耳若必曰好學如顔子然後得以在寢則世亦何藉于聖人哉故夫茍有得于信雖以子路充之可以入聖人之室茍無得于信管仲之功曾西之所不為也嗟乎某今無所得于此則可矣儻他日幸而有所設施就使正如管仲仲尼之徒尚且不比數之是其所學乃聖門之罪人也某其忍為是哉此某之所以當食投箸中夜浩嘆而不能自己也昔宰豫晝寢孔子曰于豫與何誅夫晝寢非大惡得罪于聖人如彼其嚴何也蓋道之在心要在念念而不舍焉一息或忘去之逺矣晝寢其何暇乎豫也無所用其心者也無所用其心蓋初不知所以安心耳信者安心之地也方豫之欲短喪肻自安于至醜之行而不悔夫于彼而安則于此未得所以安也未得所以安則雖汩沒于至醜之行恬莫之省何足怪哉人性之善惡于豫有疑焉且懼此心終未有所安而今而後行歸于小人也于是輒有請于左右先生其亦憐而幸教之乎始某方幼年時聞之諸公長者以謂先生正容以悟物使人名利之心氷釋某時雖不識所以從師然每于平居宴處間窺之人人有不能然者于是已知先生為不可及矣其後幾冠逰太學常與友人廖用中論當今人物且為其亟見先生也遂以問之用中謂先生嘗有言曰舜之雞鳴而起孳孳為善其所孳孳者果何事耶退而反求之若有以當于吾心者然且不得所以進也于是某願見之心愈篤逮丙子嵗不利于秋官既歸膝下且欲徑奏將樂一見因循多故若有柅之者此未易言也繼又聞先生如京師去秋始還舍某時卧病冬末始平終不得踵門一摯幣謁于將命者今兹適有璧水之行取道東陽而先生偶官于此遂獲一拜道貌積年嚮慕之意亦可少償矣因念昔年所以聞先生于人者于是復修不腆之詞道此意焉且欲先生知其非茍然至前也夫舜之為善學者之所當致志也今也欲為之且不得其塗徑以入當如之何哉雖然是善也舜其獨然乎孟子曰舜聞一善言見一善行若決江河沛然莫之能禦夫聞見在外而悟之心心則所謂聞者自聞也見者自見也充其所以聞見之極人孰不可故顔子曰舜何人也豫何人也有為者亦若是是則非舜獨能也審矣故某嘗謂伊尹之所覺周公之所思孔子之所貫顔子之所樂亦是道也其與舜之所為有以異乎今先生固已充實而有餘矣願聞所以初入此道其所執持而取信者果何在若使不肖者得聞咳唾之餘願即影響而思之庶幾緣是探古聖賢至處得其萬分之一亦可以粗寄此身于霄壤間不為虛人矣某又聞之大河之源彂于崑崙其流而下者才一滴耳出積石過龍門放乎澶滑之間奔衝泰華之陽望之洶然使人心悼而股栗其本支而為南北之流以達舟航之運儲而為陂池為溝洫為田畝之浸又為荒畦野圃之所資而抱甕者有事焉其利亦博矣然河非求有利夫爾也人者利之河不得而吝故雖利之所及若大若小若多若寡咸其自取而河無所擇焉古之抱道懷德之人其胸中之所自得者默而該之其精不可辨揮而散之其大不可圍窮而為道術雖善一身而不以為狹達而為功名雖澤及于天下而不以為廣是固惟所遇焉而無所擇也故委吏乘田抱關擊柝古聖人之所不屑亦曰無所擇而已先生之所藴誠非不肖者之所能窺測至于久處卑秩固已不厭夫有識者之論而先生安為之此其存諸胸中者亦逺矣肇自一滴散為無窮無窮之中惟物自取斯道也疑自向之所謂善與信而充之也某何足以教之然區區之心正有求于先生不識所謂一滴者可以見分否逆旅紛冗言不逮意先生亦觀其心如何耳代人上梅節推僕竊嘗悲世之君子不所以得名而悅于人之見知是以覼縷語言粉澤容貌以求裕于先達者之觀聽臠卷姝濡無所不至夫無實而貴名者固不足議若自修誠篤而名之為徇其志亦不宏矣何則妙道無窮方寸之間索之而愈有為聖為賢皆由心造耳何為于未成就中而遽受人之知乎故士志之髙逺愚嘗于畏名者見之古之人如顔氏之子塊然處乎陋巷之間其胸中之所以自許自期者雖其流輩有莫能測且微孔子之言誰且知之以彼所為若求有以自表于當年後世固已絶人而乃不露纎芥深閉固藏粥粥若無能者何故蓋其所以學于孔子者有進無已要之不到聖人不畫也使彼且以今之所為不自悔于衆人後之所得蓋未可量與其速播而小吾名也孰若守吾終身之志待其充足然後大之乎故吾非惡名而逃之也亦曰所以得名而已耳然則顔子之深閉固藏宜其或出于此與昔者兒寬初授經于褚氏及褚自梁相而召也寬適為御史大夫褚意頗輕之至于議封禪于武帝前則又自以不及寬故禇之諸生也其材識之深淺固不能外其師之所鑒又何其師許可之易變耶蓋人固有一旦穎脫而自悟者有力修強記而加富者當自今觀之其故不足論也是以君子其學未成幸而有一人知之吾亦有所不屑爾也故觀兒寬非昔日之人也則顔子之心可見矣觀顔子之所以自晦于世也則士之不茍為人之所知理固然矣又何必速于必售以自纍乎孔子曰不患莫已知求為可知也夫可知而人知之君子何惡之有直嫌于內不足耳若顔子者其志果在于為聖人則其他舉非其好也名將安取哉以某之不肖無狀誠無足知亦不願人之知方求為可知而未能者然早嵗且嘗以聲病偶儷之文見取于左右矣今還視之汗顔熱中而又聞先生愛忘每以故所取者見稱也是以一再見先生道此志以自達焉夫得名之不今已不可追若自今觀之某之志自待甚未易也先生亦試揣其中如何耳若猶有取于今尚幸先生竟教之庶幾異日不為流俗所汩沒而得以力溯道德之源則先生知人不虛而其賜益厚矣雖然其志則是也而其所學亦未敢自道于人也王良秣驥子萬里之足非可以一朝期要須待其力勝縶維是必有可觀者若其無取于此某之心正自求恬默退處之不暇其誰實能辨之逆旅紙筆不莊或不以狂妄為罪幸容之代喬卿上陳令書某聞之善用法者當原其情不知人情則無以用法矣春秋之書以一字褒貶寓萬世賞罰二百四十二年之間舍迹而論心去名而誅實者皆是也而世方曰守法者不容情亦已過矣夫聖人之制法將以杜天下之私心而畏姦吏之上下其手也使人人如臯蘇則三尺無所用矣惟其不能爾也故一切格之以法然則法雖出于天子而吏則當以意而行之矣昔者某以公事適至于眀公之庭方小人之倚于疑似之間以騁其無根之辨雖某不能以口舌難也而眀公方遊刃餘地運斤成風而盤根錯節釋然以解蓋非曲盡人情不滯于法則某之銜冤負恨其或無所訴而詆欺者將得以自肆矣顧眀公之于某蓋未嘗有半面之知以某之奧滯卑凡尚獲自直則一邑之澤當如何哉此某所以僕僕然強顔執贄求見于下執事而欲復伸其喙也且某之事未易一二言也某久在京師家素無所蓄積也一切資用徒取給于先人之薄業及歸老親埀白田廬蕭然號寒啼飢之態殆不堪處而所以分朝夕饘粥之養以利同氣之夫家者豈以其有餘然後為是耶誠以手足之愛既已事人則周旋動作唯其人之聽故凡不敢辭其無厭之求者蓋將以訓其虐也而女子無知僅不得終其天年以沒于牖下則彼之為虐可見其不悛矣然則向之所與者其可以不問乎此某所以必奪之而無愧也某嘗讀史見相如完璧之事未嘗不竒之也方秦以城求璧于趙也趙安知其不以城償之乎故璧不可不與蓋以謂不與則強虎狼之秦其加我者有甚于求璧者矣及其既與之而城不可必得也故相如亦得以詐取而豪奪之自世俗觀之疑若其信不足道矣然當時所以與之者勢也無取于恩則今日之所以歸之者義也何有于信况信之不可要而復乎嗟乎得玉無厭骨肉有至于相戕受施不報鄰國有至于結怨人情所同然也若夫義重于內則物為之輕古之人蓋有挂劒以徇死友之情者某誠不難為此藉令為之亦誰察某之心而彼獨何人哉此某之所以拘囹圄被金木從吏訊每顧而不悔者也雖然凡此者眀公舉知之而懷不能默復陳于此眀公試察某之心其有愧乎其無愧乎某嘗以謂君子之施德于斯民也不擇地之廣狹而皆能與物為春夫春之于物恩亦厚矣惟其非有心于利物故物無所歸其德昔范滂被繫霍諝理之滂往候之而不謝或以責滂滂曰叔向不告祁奚之免之也今眀公治天子之民而用天子之法既已出于公無私矣而謝之之言亦安所施哉計謝與不謝眀公不復恤此而某之所以來者非謝人之利已也謝眀公之深于法而其心又將以是為一邑之被其澤者謝也伏惟眀公以其禮進退之幸甚幸甚上謝簿論盜某聞之以道致尊人莫得而卑以德致貴人莫得而賤古之君子修身于環堵之中眇然如不足于一芥之微而其自視蓋有餘于泰山之重也孟軻一布衣耳﨑嶇于齊梁滕薛之間居是國其國之君擁篲而師事之豈其過託倨傲之名以招諸侯之敬哉彼其中固自有所存矣以某之不肖固沈溺于可卑可賤之地而不自悟矣至于道之尊德之貴妄嘗以謂可學而至也是故非其義也僕僕然屑已以從人亦有所不為也今將以敝邑盜賊之事論之左右不待問而言不敢必其不輕也執事儻能容之乎僕嘗讀舊史見尹賞之治長安也鮮衣凶服少年之無賴者使吏民雜舉悉籍記之一旦收捕置之虎穴私竊以謂治盜之罪法制存焉不應如是之甚也及觀海曲之人為吕母報讐者其初乃屠酤輩耳而終成赤眉之亂夫然後知繡衣直指之使廣為誅戮不若嚴之于將然也孔子曰居上不寬吾何以觀之哉蓋殘虐之政非聖人之教也然有不得已焉義亦不可廢矣今夫攘鄰雞而不止其漸必至于探囊彂篋又其漸則椎埋鼓鑄取庫兵據城邑而後已為吏者不從其本而小懲創之及其甚也民以無禁陷于刑辟者多矣吏復忍為之此何理哉鄭子産謂子大叔曰有德者能以寬服人其次莫若猛及大叔為政不忍猛也鄭國多盜取人于萑苻之澤大叔悔不從子産之言徒兵攻之盡殺然後止夫以大叔之慈豈必欲多殺人以已亂哉蓋其事非多殺人不可救也然則吾何為忍小寬而忘大猛乎由是觀之治盜必救其漸而仁愛之心非所以施于此屬也以敝邑之民蒙前政之弛玩固已數年比方公之來稍加整齊之人于是知有官庭之可畏惟方公以此邦為欺誕之俗故每于為盜者疑人之枉之也考讞之際輒平反之更以纍及其被盜之人故群盜得計剽竊攘取于今為多聞之野老田翁牛羊不敢山棲而豚犬室處也人艱于夜行而倉庾必守禦也公猶未之知焉從微至著遂成厲階恐自今而往後之繼為政者或至深窮治之為盜者鳩集黨與而恣鈔掠矣當是之時雖欲小懲創之其可得耶夫盜不嚴其始後必難治往年廖恩初不過為私商耳至其後遂貽朝廷之憂故以蕞爾之冦役八州之師環鐵城曠嵗月而攻之不能克也嵗比不登人多遊手盜賊縱橫必為後患執事獨不念此乎夫欺誕之俗誠可惡也然萬一誠被盜反為盜之所誣而文致于法者將若之何盜憎主人自古而然彼方務巧計竒中而吾以欺誕逆論其主人傳之遠方此為號令耳執事于一邑之中與大夫同其休戚者也果埀一言之賜以慰人望此何難哉某持是説久矣欲進于方公既而自謂曰進人以言易而受人之言難况下材末技不足以動人愈取戾矣然終不能默默也故輒布于執事焉惟執事髙眀仁厚某之不肖可得而親者也今有人焉三世不入公府世以孝弟聞于鄉里適亦為盜所陷邑大夫果不見察行將論刑嵗云暮矣其人舉家卧病蕭然如不可終日斯亦足矜矣執事果以某之所言為信告于方公而出之則某言之行也實自此人始庶幾聞者知方公雖惡欺誕而非長姦也執事實有助焉如其不然某亦無所逃罪矣區區之心惟所裁亮不宣某再拜代安常上福州吳倅某聞之人莫不有所已為亦莫不有所未為觀人者不待考其所已為而知其所未為天下之真識也世稱伯樂相馬之善工也人未始知而彼獨知之是其所以難也今夫蒼驥騄耳膝齧乘旦汗血之駒銅骨蘭筋風鬃霧鬛目如夾鏡耳如批竹毛如散雲蹄如踣鐡浴之以清泉而食之以芻豆以玉勒時其進退以和鸞節其步驟表而出之曰此天下之馬觀者睥睨審其不誣矣則曰世何貴于伯樂哉此固衆人之所能識也及使天下之馬與疲駑下駟同皂齕草飲水喜而相嬉戲怒而相蹄齧初無有甚異者當是時人已不能去取于其間矣藉令能去取之至于與疲駑下駟齊驅並駕沫塗吻瘡潰膚俯首穹脊若無以自活顧誰能知之蓋其養之也非向日之物其飾之也非向日之具而其御之者又猥以庸夫也則馬之伎能愈無以自白矣是故九折之坂鹽車之下過之者日不為無人雖求哀乞憐甚矣而人莫之肻顧也一見伯樂振迅號鳴伯樂為之慘而不忍于是給善價以歸焉時其飢飽以生其氣力被之文采以作其精神造父執轡韓哀附輿跌宕乎奔風飄忽乎莫煙崑崙之虛瑤池之曲一秣萬里僅若歷塊昔之見者纍千萬輩曽不為之埀情者今乃汗顔于伯樂矣兹馬也固非移易其形于今日也棄之則如彼寶之則如此嗟夫孰信夫負鹽車之馬能若是乎此伯樂之所以為相馬之善工也蓋人之相馬也論其形伯樂之相馬也論其神毛色牝牡曽莫之辨報以千金唯恐不鬻兹豈尋常肉眼之所能到哉是其胸中必有大過人者矣夫相人者亦何以異于相馬不求之于形而求之于神然後真馬得不求之于迹而求之于心然後異人得故曰觀人不待考其所已為而知其所未為天下之真識也人皆賢禹稷未必知顔子蓋已為者易見而未為者難眀故也後世名世之士既不可多得所謂真馬又不世出而圖八駿者乃以麒麟龍鳯螳蜋為肖也夫馬一也其所以甚不同者不在于形彼惟形之論耳豈不亦誠外哉故其于觀人也亦然若今之士其求裕于權貴之門唯恐人之不我與也僂背而疾趨低眉而後言蓋亦可謂賤矣于此設有竒偉特立之人不幸適羣于衆以進紛然造庭隤然就位唯然而出乃始有過于受贄之君子矣夫受贄之君子又何過也爾其所以進者泛耳以某之不肖其所以自許自期者固未嘗敢落人後竒偉特立者固非某之所自謂然尋常闒茸之流亦非某之所願學若夫困辱憔悴無以自表于流俗之中豈真困于鹽車者之比哉而閣下文章豈弟誠亦士之伯樂也故願以貧賤之身歸之左右試此號鳴不識可以與之一顧以增其價否干冒威嚴進退唯命某再拜代陳元禮上王提舉僕嘗讀韓文至于上于襄陽書觀其言先達後進之相須所論甚美而其終篇秖欲丐一朝之享以為芻秣僕馬之資而已私竊怪之以謂君子之于人非其義不可以一介取于人是汲汲于利者固退之之短也及讀閔已賦與復李翺書觀其稱孔子之賢顔子者在隱約而平寬而以為哲人之細事且自悲其無簞食瓢飲無以取資則餓且死其事尤難于顔子僕然後知彼以利而求裕于人者不得已也蓋自井田之法既壞士之貧者至無以自養郡縣之權太輕王公大人之門始無用于士士以無用之身當未仕之際而裘葛虀鹽之費不給欲自逃于山林之下養髙完名傲睨一世而坐須好事之載酒鄰僧之送米縣令之助俸是則難矣故退之之薦侯叔起亦不以其讀書為文以干于有位者為非而發其名在十人之上然則曳裾于王門散迹于侯館今人羞之古人以為常也某東南之鄙人也家貧而求仕欲仕而不獲于科舉身遊太學十年不啻矣困厄愁苦如喪家狗如負鹽車之馬世之窮者莫己若也雖其自期未嘗敢後于人至于干于有位之君子則亦時有不得已焉者每自思天下儻有竒偉慷慨之人肻忘其一手足之勞以拯水火之急則願託之以此身然以四海之大賢人達士之多非無竒偉慷慨之人而竒偉慷慨之人卒以窮而莫之遇也自昔過濟南已聞閣下之道德文章學者爭先師之唯恐其後當時以衣食于奔走不得備掃除之役以漸咳唾之餘論瞻望風采于今幾年矣兹者又聞閣下屈使者之車出布一方之惠澤親戚故舊爭相勸勉以謂竒偉慷慨之人昔之咨嗟嘆息以為難遇者今可以一行矣某因念濟南之不及見也于是僕僕然不憚千里之逺唯閣下之歸焉其來之意閣下深計察之矣退之亦曰齪齪當世士所憂在飢寒如前所陳則退之固嘗以飢寒為憂矣蓋憂有大于飢寒者而不幸飢寒為之纍彈鋏歸來之歌雖鳴于齒頰之間君子固宜哀而取之也若取其所憂有大于飢寒者則必以衣食養其所以憂矣是又君子之所存心也然則某之來也閣下其將以其齪齪而鄙之耶其亦將哀而取之耶俯伏門下惶恐流汗之至代張積中上陳太年某嘗謂古之士也重今之士也輕古之士也貴今之士也賤其勢然也三代之賢能為善于家取賞于朝其平居里閭雖未厠于縉紳之間已隱然有公輔之望不待表飾尊崇而奧泄汙辱已逺矣漢唐之間為士者猶可用于郡縣蓋簿書獄訟之事不獨委之小夫庸吏也今則守令之權與古不同矣上之人既無取于下逺郊小邑窮居之士懷才藴竒非在仕版則厄于不試雖欲不輕且賤不可得矣故曰今之士也輕而賤其勢然也雖然士者道之所在也民之所景望而取則焉者也豈以其用與不用而遂薄之哉而或者以謂為吏而待士士必恃吏之勢以撓法陵民然則待士蓋有道焉不可不審也某在京師有來自南方者聞閣下之待士也可謂盡矣接之以禮使其上不至于撓法示之以義使其下不至于陵民優遊寬暇教誨而長育之此敝邑之陋所以不煩執事者法令之嚴而禮義之俗易成也某羈旅飄泊于今三年矣雖聞愷悌之政欲備掃除之役有未能爾者瞻望門牆惟日為嵗重念某讀書為文本非期自表于世俗也方其少時憂患侵陵薾然百駭不可堪忍苐杜門端坐屛絶人事精窮佛妙唯欲蟬蛻囂之中中耳今則不憚數千里之逺辭親遺孥客食太學固已大異其初心矣蓋念先兄以家籍堙替之故力得一第不幸早夭門户竟以未立雖饘粥菽水不至缺于奉親而庶人之役則未之能脫也與其輸將服勞奔走驅馳于公家力有不任則應舉干祿亦姑就其易者耳則以夫山林麋鹿之姿而束于規矩檢繩之內以從少年之後豈其情哉實有不得已焉者也夫爭名者于朝爭利者于市某固不可以處鄉里矣此所以企詠閣下之勤而終不獲一歸摳衣函丈以漸教誨長育之餘恩也雖然某之昆弟親戚其受閣下之賜蓋亦多矣亦何必親蒙其澤哉感激之情于是尤篤方今學校之教遍于天下惟至誠惻怛以待士為心者然後可以上副眀天子之美意其若閣下之所以厚于敝邑之士者自古未有無見效者也佇觀課最以膺君相不次之求而某也他日庶幾有成猶可以邑之子弟拜起于堂下以謝今日之德未為晚也南望寓書言不盡意惟乞順序節宣使百里之民有所怙恃下情不勝祝頌之至答廖用中某啓昔者奉書已不記憶曽出何語及領所教申以辨論乃審謬妄且感且慚某于佛祖初無入處嘗試以其書讀之隱之吾心未有合者豈遂信焉如山野之人雖未嘗覩京邑之巨麗至者告之固知其不我誣也而來書便謂某身到其地故有無著佛祖處之語此過疑耳若公以兹事非急務正沈于名利者之説僕方事科舉科豈敢以左右為非但其所謂大患不可不復者不免云云也孔孟之教莫非眀兹事者子思中庸其傳處的切故其語最可信所謂中庸者非使人人皆于之求合焉蓋學至于道則應變曲當自無過與不及中庸在其中矣孔子曰中庸之為德也其至矣乎民鮮能久矣子思亦曰中庸不可能也是故夫婦之愚可知可能者非其至也若其至雖聖人亦有所不能也然則是果何道耶舜之惟精惟一然後能允執厥中湯之懋昭大德然後能建中于民故曰極髙明而道中庸者如此而已佛氏之言道亦曰平常心是道若了此事著衣吃飯而已若其不了而止能著衣吃飯是亦癡人爾何足貴哉唯不可名以癡人而起居飲食曽與人無異者夫豈逆理失正而麗于過不及耶此則中庸之所以為中庸也非極髙明者能之乎故凡不得之髙眀而惟中庸之求者未有得于中庸者也子路欲使門人為臣孔子以為欺天其始蓋以善為之至其槩之以道乃如此然則學者當自其末而求之乎抑亦即其本而學之也所以不貴夫漸進而貴夫頓悟者以此書曰惟狂克念作聖夫狂者妄行疾趨之人耳其一念之正則初與聖人無異也故入聖為易是以曽點願學聖人所以深與之若學道者必歷階級是狂終不可以作聖耶吾聖人門户堂室之説接引中下根之辭耳歷塊越澗之馬一秣千里恐良樂不復限其步驟使之猥與駑駘同駕也孔子曰由也未入于室也又曰顔淵未見其止也二三子之逰于聖門要之不到聖人所學不止其曰未者蓋謂其必可至云爾非謂此止可以入室而彼止可以升堂也不然則人皆可以為堯舜聖人豈欺人哉若曰西方聖人不能使頓悟者之多則又不然夫頓悟固西方之教也至其悟之頓不頓則在人爾聖人安能必使之意其不能必使人之頓悟遂罪其教豈理也哉所謂釋氏撤去屛障洞見底裏望之者謂可以直造故人皆有狂心夫人之所以不至于道之室者蓋以屛障為之限也屛障所以得而限之者以其心自隔也使人人望之而見彼無陷穽之可畏何憚而不入所以難入者正以望之未見耳雖吾聖人之教固所謂循循善誘者彼有妄情以柴柵其至虛小識以狹劣其所居者其終日行住坐卧初不離于吾聖人之堂室也然其由之而不知聖人雖欲使之悟亦不可得也若無深閉固拒示之以難者豈聖人之心哉子貢曰不得其門而入不見宗廟之美百官之富得其門者或寡矣而僕所謂悟之頓與不頓則在人者此也然則撤去屏障洞見底表又豈獨佛氏為然耶惟公以儒佛合而為一而以儒者之教為非歷階級則不至故不得不異耳夫六經之説應時物而為之時異物變故其言亦不得不繁以其諄復之故便即之以求聖人而不于本然者致志焉亦恐成入海算沙磨磚作鏡徒勤無益耳古今一道聖人一心公之所言也若幸不鄙棄則僕之言似有相應者然非敢以為真是也若以為不然希再見教不可以為不足復而置之遂廢琢磨之益也與遊定夫先生淵往年在太學時先生實為博士博士于諸生師弟子也宜其朝夕請間以求咳唾之益乃獨碌碌稠人之後抑首于無以異人之眉宇而守株于可以言傳之餘論不能一通名左右豈稔聞盛德獨無向往之心乎政以學未有疑無以為請問之資不敢徒見耳其後八年先生在憲臺某又適來京師謂于是可以數候起居而卧病經時足迹復不一至門下病且愈則又有海陵倉卒之行既至海陵聞先生出守歷陽歷陽于海陵皆綿地淮南相距數舍耳舉足不必浹旬可到摳衣函丈冝若易然而某方侍長者之側勢不得以有己雖瞻望不逺又無緣如所欲而往也且今天下如先生之賢者幾人若某之有志于學亦可謂知所擇而從焉者使其幸一日拜起于堂下未必在可斥之數也而自識先生風度慕望之不已于今十二年矣要之終身所願攀附固不可一日致勤而後慊然十二年之間幾欲見而幾不獲也則其他尚可必乎人將以是為因循自棄者故某不避飾説之嫌為左右一陳之也先生能亮之否始某過建陽問道于將樂楊公公憐而教之既而許妻以女道路南北逮三年然後成昏成昏今一年矣非惟寅緣葭莩之幸實有幸于得畢其學問之素志庶幾不虛作一世人也先生與公朋友故某聞先生于公為多夫道一而已矣而所因以入者門户則衆某今于道亦未也使顔孟並出于仲尼之門安得不兩見之以究其所以學乎故淵雖受教于楊公知其與先生無異矣而猶欲一見先生不能自釋也伏惟先生以中和之德誠身以剛大之氣應變謝去才智而遊刃乎無事之境故雖一毫未舉而天下想見其必為之功此世俗所以深畏而害之而志士仁人所以嘆息其不用幸神眀之休相而庶幾斯道之將興也雖然道之行不行為有命矣若夫得天下英才而教育之付之以正論之淵源使夫子之文章不墜于地是可以力為者先生獨無意乎誠然則如淵者其亦可以辱門下士矣適病起會外舅遣人作書言不逮意然自今可以繼聞動止矣其詳當在後便也正逺教誨瞻仰益深惟冀倍加保重以慰天下士夫之望答陳了翁淵承教以疑之為道謹當佩服銘刻不敢忘也所謂楊子雲于玄可謂好之篤者不可謂不知仁淵竊有疑焉淵未嘗學玄固不知其深然觀其立名以三方九州二十七部八十一家著為定法此固與易異夫易以相錯故能變以能變故不窮既有定法則不能以相錯不能以相錯則不定變矣豈易之道哉故來教以堯夫之書為過于玄而曰雄之發于玄者死法耳為是故也使雄知易則玄必不作其作必不爾然而曰好之篤者亦恐雄不得所以好也雄之言曰好盡其心于聖人之道者君子也人亦有好盡其心矣未必聖人之道也此真自排耳淵雖不學玄然于法言十三篇則既熟讀之矣法言論聖人處無一語是于是知雄為不知聖人夫學者用心如雄然而不知聖人則其所學可知也已故北方之學所以不比數之者蓋有以辨之也夫擬人必于其倫如法言以顔子之孝為過于猗頓孟子之勇為過于荆軻仲尼之聖為過于范蔡此蓋當時流俗之所見常人足以知之何足以見于書其間辨乎其不足問問乎其不必疑與夫媚莽從亂之語尚多又不在是也至若禍福死生之際尤不足觀故淵敢以謂雄之于仁疑有未知者亦非敢妄疑也所見然爾蓋孔子門人所學莫不求有以知仁知仁則道可進矣未有不知仁而知道未有不知道而知聖人者也今雄之于孔門弟子其智曽不逮宰我子貢有若之徒而乃斷然自附于孟子不知其以孟子又為何如人也法言有曰仁以人之此雄依放前哲之語臆度人之為道而以為説也其陋蓋如此而謂知而好之毋乃太恕乎淵于左右及楊丈處每得一語必謹識之已而未盡了則必反復問難不敢不盡蓋恐先生長者故為疑似不切之説蔓衍無涯之詞以觀學者之所向而啓其所疑使其無所捕捉而于中流風波之中忽得一壺以自據也此自昔聖賢亦然安知來教不出于此乎淵讀論語見樊遲學稼圃宰我欲短喪告之者未極其説而問之者已無所疑及其退也聖人懼其終莫之悟為之悉意而申言之蓋憫其智有所不入而不能復發問也然則聖人之教人亦豈必待憤悱然後終其説哉如前所陳愚懵之見如此其是與否更望裁之毋惜諄諄埀誨為幸耳答吕君誠眀之説前此未有釋經明白如此使人可以坐進者如聞近看中庸計已有成説楊丈欲為中庸義尚未有暇也然意已定矣淵拜覆答晦之叔示近詩三篇清逺間易讀之嘆服不能自已亦欲追和自量綴白雪以巴詞恐負續貂之誚也不作此久矣自今春入學齋舍無事試勉為數章然復不佳不敢自隱輒呈左右得賜點竄為幸耳日省曆子前書謾及之不知亦見取于左右也鄉黨一篇粗妙俱融步步不離兹事聖人之極致也觀顔子為近之亦在夫視聽言動無非禮而已自老莊之學盛行于世而世之君子始猖狂妄行為達而終自棄于無方之民特未之思耳了翁書論曽子之于道以魯得之故戰戰兢兢且死而未已又言舜非行仁義而孶孳為善所謂曲頥而厲者也蓋眀此也自得此益信昔之所聞為不謬而竊喜坐進之無難矣聞之李似祖云左右自遊山歸來所得益勝遂齋居𬞞茹日造禪定想見正襟危坐心形兩寂也大學云知止而後有定定而後能靜靜而後能安安而後能慮慮而後能得此合內外之道也左右之所為豈有意于此乎世人終身役役于塵勞妄想之中醉生夢死莫覺莫悟其原在于不知止而求定耳間有自修之士乃避事而求道夫事焉可避哉無事則道亦無矣故惟止而求定者乃期于慮而得也至于慮而得則灑掃應對之際莫非妙用而天下國家蓋不足為矣而况于一身乎何時侍見話此等事瞻仰淵再覆答羅仲素淵啓比年朋友道絶自去嵗還里相與者既寡幸而得一二人往往朝夕往來惟以戲笑為樂故平居行已則有過而莫吾正讀書則有疑而莫吾適用是大懼自得吾仲素乃復有切磨論難之益而今而後知學之可進矣幸甚幸甚前日辱埀諭皆經旨之奧自顧荒淺何足以知之然既蒙問不敢不復輒布所聞以卜當否尚俟裁擇君子之出處去就不可比而同之觀其所遇如何耳如柏舟之仁人簡兮之賢者北門之忠臣所以低回而不去者非不能去也柏舟之詩曰耿耿不寐如有隱憂彼其所以深思逺慮者豈在于一身乎箕子為之奴初不與微子同也桞下惠援而止之而止初不與伯夷同也其道則一而已其不去也乃所謂仁簡兮之仕于伶官則祿仕者也道之不行而擇其所可能者以就祿雖伶官之賤猶能安之非賢者能若是乎若曰任之非其事不可不去則是委吏乘田聖人不當為也耶北門之忠非直在乎從事獨賢而不怨蓋國爾忘家者也其不見察于室人則家之不遑恤故爾夫既已任其君之事乃辭難以求退此何義也故亦莫之去也觀孟子三宿出晝之義則古之去其君者蓋皆不得已者也豈其所欲哉若乃伊尹之以天下自任然非湯則不起是其始之擇君以為去就不得不爾至湯沒而太甲興太甲初未嘗見察也伊尹其可遽去乎此不可不知也君子陽陽其事類簡兮且所欲者求免于亂世而已得其所欲奚為而不樂非如柏舟之嘗任其責者也柏舟之所憂憂其國君子陽陽之所樂樂其道各有攸趣也至于伯兮鴇羽之君子則又以君子之道而執庶人之役者也以庶人役君子役之過時使不得保其妻子養其父母則其時可知也已此其所以可刺時則可刺若君子之義庶人召之役則往役亦奚以為辱其曰下從征役非必在位之君子處君子以小人雖謂之下從可也古之不得志而在下者躬耕乃常事爾以藝黍稷稻粱為念蓋欲共為子職而不可得者此其所以呼天而嘆也撥冗作此以代面承或以為不然更望指教上鄒侍郎至完世俗之為説曰欲知人之賢視天下之公論而已夫豈不然而未之盡也何則衆人之譽有近俗而得之者有好名而得之者是二者實無與于賢也而必以公論取之無乃或失乎淵則以謂欲觀人之賢求諸君子之所欽愛者而已蓋君子之取人也以身為則以道為公是是非非無所容貸是誠足信也始淵之幼年得侍四眀叔祖出入起居蓋未嘗不在側也其後成人即遊學四方遇同郡楊先生從之因授室焉是二人者君子人也其情則淵之親而其道則淵之師也楊公有友曰建安遊和州者非世俗之交也而叔祖之深契則惟執事一人而已此非特四賢者自謂也雖今舉天下之人皆云爾也淵故不熟和州之為人獨因楊公知之亦未嘗拜執事也而篤信其為天下賢者蓋以叔祖之言而已故嘗願執掃除之役以從二公之後冀竊聞其謦咳庶幾得所歸焉而未之得乃者偶有以不肖之名聞于和州者公不鄙夷之辱惠書曰是可教也則和州雖未之見其心已相許矣獨執事之門初無貧賤之迹顧今天下如執事之賢者幾人若淵之愚又自謂粗知執事所存之萬一而乃因循自柅不一望其履舄其不幾于自棄者乎伏惟執事道德之髙術智之眀事業之隆名節之重夫人而能言之不待淵飾説以自進也以淵所聞執事之養心如雲行空無意于逆順而往來也以風故心得其正其應事也如權在衡無意于髙下而輕重也以物故事適于平心得其正則無往而不安事適于平則每舉而必當此天之所助人之所與聖主它日之所倚付天下後世所以被惠澤而不窮而志士仁人所以跂踵引領而望之者也嗟乎自古君子小人之消長有以關隂陽之運非適今也若天終無意于君子則已不然則世之所謂繫社稷之安危生民之休戚者宜不得以自逸矣淵誠恐朝廷一旦開悟詔起諸公則如執事之賢固當首被登進以慰夷夏之心淵于是時方將擊壤田間歌咏太平之至樂雖欲一瞻風采有不可得此淵今日所以僕僕然仰干將命不自知其不肖不足以辱執事之降接也惟執事矜其聞風之日久願見之情篤而以禮進退之不勝幸甚默堂先生文集卷第十五
