front:
  text: 默堂先生文集卷第三
  hash: sha256:b2838c94caa76f9cf83d118709efd9b46319c6c93bd0a3a4e55c4dda2bcae93c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_003-1a}
body:
  text: 詩登峴山二首五百年門一夢中登臨回首興何窮當時事業軒天起此日風流掃地空墮淚山頭春草長沈碑江上晚煙濛故令倦客成惆悵目斷斜陽不忍東路過青山曲轉腰松門楸嶺背塵囂煙雲西望孤鴻沒舟楫東來一水朝忠義有懷空鬱鬱功名餘事漫寥寥無人就與山西將緩帶輕裘虜自消晚行晚煙低掃樹千重一簇人家接遠空日暮荒陂行客盡只尋牛迹去匆匆懷鄧南夫丈室經年踈玉麈數行何日寄銀鉤只應立我軒前柳滿眼飛綿緑正稠夫軒名折立我南思安常兄凌虛閣下煙波濶升俊坊前草木香歸去溪南春正好不應蕭索對松篁春晚入荆州緑樹連雲草濕煙亂花飄錦柳飛綿三春別我無多日萬點愁人又一年池館勝逰空過眼江山佳處欲投鞭從君預覔清涼地準備南州五月天早行夢中聞得子規啼燈下驚呼馬亦嘶宿霧故迷山遠近肩輿才辨路髙低雞鳴犬吠遙相應野草幽花自不齊待得晨光開霽色不知行道幾人迷京師相善者鄉友四人各賦一篇以見所慕適正淡薄不易親和平不可離平生一樽酒萬事醒復醉詩成稿不存物至情無纍紛紛塵俗中笑裏有真意載德辭寡覺我喧氣定覺我煩沈吟孤鶴立戲謔陽春溫豈不苦鞭䇿去馬終戀軒由來君子德寡怨非其恩如愚義重財自輕氣剛語還直毁譽不挂懷行坐頗自得浮生困局蹙世路亦囏棘思君膽如斗解我愁似織令德襟懷冬日溫容貌秋水淨惠然肻顧我蒹葭玉相映詩人固難肥酒客亦多病善保千金軀愛子清而徑至荆州寄用中前年攜手東水門秋月夜看黃流奔匆匆別話苦不盡鳴雞吠犬催朝暾放船鎖外望回騎清淚滴滴如泉源飄零可念浪萍散得喪未把秋毫論閩山萬疊阻歸計越國半年空斷魂朅來璧水就朋友聞子荆渚將魚軒尺書迢遞忽寄我消息久絶知生存妻孥同活似慰意伏臘不給誰可言但期君馬當北首豈謂我轡今南轅客鄉邂逅不易得想見妙語如春溫況聞邇來治經術蟲魚瑣細窮朝昏傾囊倒廪幸見不須羞澀時所尊用中既和成以示山口唐藴明藴明亦和再用前韻呈二公髙城繚繞環居門草樹蔽日鼪鼯奔踈篁轉影涼午枕臥看鳥雀嬉晴暾清香一縷爇沈水濃茗十分烹壑源乘風欲效玉川子蓬萊無路心難論虛堂愁坐漠無語頃刻百慮空勞魂緬懷皇祐賢御史當日直氣何軒軒臧孫強諫宜有後竒士果見諸孫存流傳佳語忽到我展卷疾讀皆微言平生廖子口如鐵肻為此友西其轅故應目擊得深省千載無愧孔與溫更將餘力事酬唱巧注未以黃金昏古來求友貴勝已二子年德皆吾尊容齋書事二首南國餘梅潤東墻更竹隂門庭迂市井草樹似山林客寄吾家是齋居古意深微風過枕簟何有萬黃金方丈孤城角風來夢亦醒分明更無事俯仰忽忘形小室塵誰掃空亭柏自青生涯任流轉天地一浮萍和向和卿嘗茶俗子醉紅裙羶葷敗人意花瓷烹月團此樂天不畀諸公各英姿淡薄得真味聊為下季隱不替江湖思輕雲落杯盞飛雪灑腸胃笑談出氷玊毫末視鼎貴我作月旦評全勝家置喙傳聞茶後詩便得古人配誰能三百餅一洗玉川睡御風歸蓬萊髙論驚兒輩寄謝用中黃蘗無多法維摩不二門此間堪折柱吾道亦難言學者初何有師乎貴不煩十年成我志今日是君恩得用中書有禮人不答之悔作詩解之一時先逹總飄零亦有陽春世莫聽漫剌從來無處著曵裾今日欲誰經只應舊友頭空白難使新知眼便青射獵南山休夜出灞陵有尉宿君亭送遵道秋月隔踈簾光體終隱微捲簾試寓目萬里餘清輝人生異肝膽同一造化機君心乃余心南北非相違三年遲君來一見悟前非況乃度寒暑葭玉容相依與君忘年交沒齒其庶幾月色亦良好君胡捐我歸陳漕生辰丈作折代楊六管陽初復前宵月尚圓長庚俄夢李嵩嶽故興宣膚使新恩數忠臣夙眷偏節龍開遠目衣繡聳華年日月聲名起風雷號令傳自應威動嶽曾是力回天相國關中粟尚書地上錢委藏淹府庫飛挽亂車船南獠元歸地西方正拓邉定知新將飽尤賴我公賢赫赫蘭臺舊飄飄鳯沼仙終焉還魏闕聊亦駐荆川曲學聮珠履非才汙綵箋千秋期鶴壽萬里附鵬騫席提舉生辰丈作折代楊朔風迎臘換堯蓂一葉階前尚吐英天上麒麟來昨夢河東鸑鷟自時名錦衣故國今誰有棣蕚中朝日更榮終上青冥環坐座弧南長並一星明入荆州學四絶句呈昭祖問舍求田不可遲十年羈落意多違須知澤雉樊中畜不及蓬鳩地上飛拂天喬木映修廊滿目簾間白苧忙曾是壁池踈散慣臥聽鳴鼓懶衣裳短柏森森團積雪踈篁簌簌撼微風從前不道容齋好此景而今落夢中明知安分即忘機故倚春風看落暉叔度汪汪陂萬頃未應如我苦懷歸金鑾兩絶雨過窗明夏簟虛紛紛鳥雀靜庭除維摩丈室無人問一枕薰風聽粥魚門外塗泥一尺深髙車誰復更幽尋不因雨後看亭柏安得山僧數見臨次韻楊丈夜寒直舍天寒官舍轉騷騷敗壁飢蟲永夜號應對短檠呵凍手只將長卷掃氷毫宦遊久矣空環轍生事蕭然孰載醪亦有從前經國意拔賢人或望山濤鑾輅鹽車等是勞便逢良樂肻鳴號秖應末路歌牛角不及寒窗禿兔毫世事分明如昨夢人情端的勝春醪終當短艇從公去俯仰江湖戲怒濤春日偶題未可郊原縱曉鞍人間猶似有輕寒春光不似常年短過了清明更好看次韻張從道三首石首道中匹馬江村路長鞭短袂裘問民知所病驅御去如流霧卷千山曉霜餘萬木秋古來奔走吏流落有竒謀自建寧泛江至石首江注天圍盡舟排浪陳輕岸容踈柳色秋氣斷鴻聲風日雖堪愛雲煙易妒晴鱸魚如有興好在未知名月夜江行吏隱飄然在一涯更堪行役退年華多情却有空江月長伴離人夢到家次韻從道夜宿推院誰遣參軍厄所長夜聽鈴鼓度修廊風流偶未逢狂客歌頌空驚逼漫郎莫恨驊騮縻皂櫪要令松柏飽氷霜如聞委吏真勞擾不許歸田是孔方送昭遠兼寄昭祖諸友離腸如亂絲欲解紛無緒別話似泉源衮衮日夜注幾年見君文萬里偶相聚一日不易得矧兹寒暑度孤雲向北飛三鳯各南騖人生類泛梗後約亦何據傷心璧池東塵土暗歸路憑髙極遠目不見籃輿去君如千里駒奔放尤難御強使就檢繩不入駑駘步何當宴瑶池定欲求飛兔鹽車未可嘶俯首且羈馽余生易語言開口初莫慮一從摩詰遊便省默默處何時遂攜孥入隱南山霧招君賢昆季靜坐契深悟濁醪聊共傾清境煩君賦況有林下人解道因風絮寄內眀月向人圓愛之不忍睡坐久風露寒忽忽心如醉念君一適我所遇無歡意況乃久別離相思到夢寐我生百不堪繆學屠龍技于今半世人升斗亦未遂賴有室中友素懷隱居志肻與梁伯鸞扁舟共東逝默堂先生文集卷第三
