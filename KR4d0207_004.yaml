front:
  text: 默堂先生文集卷第四
  hash: sha256:21054ed03c5ad09e6620014a8ce9a9f63e46eaf61f4fb7221c4b393fcec90031
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_004-1a}
body:
  text: 詩奉酬楊逹甫見贈春風不世情暖入閒門草君詩其似之披拂逮枯槁平生金石友嵗晚跡如掃一見楊夫子胸腹便傾倒間關六年別一字寄不早忽蒙錦繡贈光采照龍藻嗟我獨何人揖我謂我好無乃嗜好偏收拾到羊棗從來詩人窮君亦行此道我欲從君遊山林不知老小軒觀月呈興宗叔茆簷手可攀修行出簷上寒蟾漏踈眀碎影羅屏障情知月色好逹覽在虛曠東家富池臺端坐不能訪山林足寓目細大初無相但使人心安景物自清暢霜風中夜作曲沼金翻浪禽鳥斷飛鳴杉松起酬唱燎爐宿殘火尚可溫新釀數杯遣沈冥萬慮一時放誰能外形骸于世無所仰晤語一亭間頽然齊得喪老堂也折東家謂佚流長亭先塋折曹載德江拆亂山圍西來素練飛嵐光環石窆潭影漾松扉欲靜風前樹難忘草上暉但期流澤遠長與水東歸再用送昭遠詩韻寄昭遠昆仲六經學不傳誰能尋墜緒君家有師承不數蟲魚注公子韋氏門粲若五星聚胸中容萬頃一一黃叔度人情悅紛華世路爭馳騖取樂須臾間轉首已失據余生末俗中蚤幸識夷路折桂從乃翁頻年麾不去冉有豈辭僕樊遲亦能御雍容荆渚間夫子步亦步初從言下入筌蹄索魚兔終遂義中行良樂驅騏馽有時坐終夕收視息浮慮了了不可言明明有佳處別來能幾時心月翳雲霧諸郎幸不遠寄語多豫悟坐為塵事攖空詠別知賦遙想玉華逰春夢如飛絮聞令德為和詩今作此他日當以示令德也折京師與昭遠約逰玉華既而返舍以事阻爽約小軒閒題二首舍南舍北梅墻裏墻外竹逌然寄其間不見一物俗東風將小雨夜漲春池緑俯檻數龜魚仰簷送鴻鵠交情石投水坐客氷照玉從容得此生已矣萬事足誰言南軒小正可陋華屋但恐世故攖不容長處獨青山拱簷楹緑水鑒毛髮花香晚更清鳥語靜不聒客至不能飲舉觴聊自罰坐嘯激清風起舞㺯眀月是身如浮漚起滅在溟渤百年一彈指何者為不沒文章㑹消磨名譽易衰歇淵明吾之師兹理久已逹約令德郊行二首簷前搖風拂面低麥芽穿雪緑齊齊憑君便作遊春計莫待花繁去路迷小雪纎纎蓋地皮一翻風過忽成泥東君似勸人行樂不使塵埃趂馬蹄酬晏伯逹半生流轉任飛蓬萬里歸來興又東寂寞倦投揚子宅低回却寄魯矦宫阻尋雞黍他年約長憶園林一醉同何日過君花下飲爛看濃艷舞春風錢塘書懷二首遠客真秦贅清時謝楚狂斑衣辭故國青佩久殊方世俗蠻爭觸余生穀似臧正須逃姓字毋使異庚桑客舍連朝雨春愁醉夢如白雲千里目黃犬萬金書所幸交情薄從來世事踈只應狼疐尾空自詠歸歟錢塘學中寄伯思六言五首門外鶯驚短夢窗間雨送清寒亦有惜春情緒分眀不奈花殘㸃㸃榆錢委砌冥冥柳絮穿簾日暖野禽爭食紛綸忽墮危檐劒水庭闈底處苕溪水月彌深緑草年年離恨白雲日日歸心世路紅塵可厭人情白首如新便可閉門端坐不須開眼看人部伍亭前歸路鳯凰山下蕭齊我自無聊不住君如有興重來雪中入國門寄令德三首紛紛輕薄欲誰從愛子從來臭味同千里遠來應念我速須鞭馬要從容此生于世已心灰自笑都城十往來為有飢寒餘慮在故應隨俗强低回誰能一飲千鍾分付閒愁入酒中共向重樓看曉景一天飛絮舞春風下汴參天古柳鳴蟬急卷地黃流轉岸多好去扁舟穩扶柂秋風吹水易揚波過淮天髙秋月涼風定秋水清扁舟淮海間愛此一葉輕微生久羈旅囏險已飽更經今幾往來始見波浪平篙師且停櫂莫遣魚龍驚吾行欲安之要待東方明登召伯斗野亭落帆新城曲維舟古河右幽尋得危亭星斗穿户牖西風掃殘葉庭宇不待帚娟娟雲間月亦復照杯酒明朝又東南汙流映衰柳莫以此時心熾然兮淨垢過浦城贈王令長源二首化龍潭上濯滄浪夢筆峰前憩小棠十載不辭淹簿領一同聊欲課耕桑經綸未展風霜力文采空餘錦繡腸莫嘆窮荒縻驥足萬人飢凍要扶傷半生流落倦塵埃聞說英名首重回畫虎自慙非妙手割雞空復嘆髙才北堂戀戀思歸夢南浦匆匆惜別杯此去山林真已矣看公雲翮振風雷題緑波亭南浦江波緑陽關柳色青夕陽千古恨分付短長亭還舍半生走長途所冀亦已微田園已蕪沒及此徒手歸妻孥攜幼稚相望天一涯所嗟垂老親甘㫖不得時季妹復未嫁長姊貧且嫠皇皇三十口未欲聽所之平生道義交嵗晚無晨炊豈不念我貧閉户長苦飢髙門多自足我復拙言詞已矣可奈何顔公猶食糜鄧元孚待制挽詞四首從容紹聖末直節更誰攀不見豺當路懸知虎在山石渠聊試可江國竟投閒尚冀調金鼎那知去不還永泰君臣分欽慈母子恩淵衷雖有在孤跡自難論身去朝廷遠名垂簡冊尊秖應延閣命猶未厭輿言季父恩稽報平生不自安諸郎方未命猶子遽先官義氣今何在髙風衆所難惜哉耆老逝閭里欲何觀越岸方投紱將回出岫雲楹間俄夢奠地下去修文落日川原靜悲風草樹薰但令千載後掩涕想餘芬與楊如愚四首文章初不計工拙言語何嘗識重輕不向故人齊物我一生懷抱為誰傾半生踪跡辱泥沙胸膽初無獻子家臧穀亡羊俱可念不須蠻觸故紛拏十年相見不豫踈亦記平生戲笑無縱有伯禽堪寓意可能終不記狂奴谷風凄怨不堪歌奈此人情世態何流俗但隨憂樂轉故人應合起頽波存誠齊夏日呈龜山先生二首長者一牀室先生五柳門度人聊示病觀物欲忘言小圃池臺足薰風草樹繁杖藜隨處處歸鳥報黃昏雙檜軒之北髙梧户以南午隂臨短夢曉吹落清談鬬老三無喜嵇生七不堪天涯復相值此意得重參答朱晉老見責不赴㑹屠龍事業初何有畫餅聲名不願求春色未䦨猶足賞亂花深處要追遊逹觀軒學中折延平林杪飛空出栱枅登臨髙處亂烟迷雲鵬擊水南溟近霜劍凌空北斗低千里江山圍萬井一潭風月納雙溪同誰此地呈胸腹下視囂塵萬不齊宿仙霞聖仙寺呈伯思子靜二首風物吾鄉似山川地勢分稻畦翻碧浪麥壠布黃雲客舍常爭席山僧獨獻芹茆柴餘瀝在聊餉僕夫勤老僧以茆折夜泊聖仙餘可以飲僕折柴酒見餉其曉日山原靜薰風杖屨輕開談時造極得意自難名奔走非前計淹留見俗情賴渠金石友端的慰平生通州夏雨長風卷地驅炎暑暴雨翻空送晚凉只此蚊蠅俱掃跡不須迢遞待秋霜延平林力道閣上觀水二首千重翠巘分三岸十里寒潭合兩溪更得橫流吞險瀨豈嫌春水濁如泥要看春水拍天流更為溪山一日留誰遣白雲迷眼界坐令歸思入扁舟兩浙周提刑生日淮南草木亦知威故國重看衣繡歸不用埋輪留魏闕故應持斧靜圜扉天瞻柳舍雙丸㑹地應蓂階五葉飛此日長庚來吉夢弧南終並一星暉默堂先生文集卷第四
