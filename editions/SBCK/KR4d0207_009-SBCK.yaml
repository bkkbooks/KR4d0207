front:
  text: 黙堂先生文集巻第九
  hash: sha256:748da109df78d73cb6e4d8eb6c353baddef53d714efdcdd73f87c8c09918b274
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_009-1a}
body:
  text: 詩寄曹載德諌議二首不將塵土嘆徒勞白首驅馳任所遭鸞鳳尚能安枳棘鸒鳩何敢厭蓬蒿論材競欲推囊穎備物何由數澗毛末路固竆真自許未應延頸試鳴號晚途無復計行藏捶楚塵埃秖自傷未即賣刀歸買犢自憐挾䇿亦亡羊已無竿牘勤毛穎肻為簞瓢念孔方尤喜故人書斷絶不將栖棘戲仇香茂實被檄權永新以詩寄之澗松那可比山苗謾説凌寒有後彫更向鷄蟲論得失何如鵬鷃各逍遥三鍾幸自堪攘臂五斗誰能更折腰正使爭先任勞苦虞人寧不愧弓招次韻李光祖南山四偈聲外聞和豈待言棒頭猶是老婆禪如何更被文殊惑却道維摩但黙然臘竆春到不須􅁷霜下陳根豈用耡若信彫榮如轉轂故應揺落有扶踈窗前松竹翠連山窗下絃歌晝掩闗雪裏忍看梅欲吐烟中遥認鳥知還未暇南山訪隱居秖應無處不逢渠憑君一省從前夢莫嘆離羣歲又除次韻光祖避地眉溪十絶眼在句中寧易知意存言外一何㣲柏舟故是仁人事豈為淹留念奮飛浮木如何濟巨川積薪其下火將然是中已有安身地許爾垂紳玉几前㺯雲㣲月淡廻廊十室連甍占上方誰道各無容足地夜談猶欲致時康少年憑恃氣方强膚理㣲邪未覺傷迨得病深無治法始知先甲是農黄訪道尋幽歴萬山神仙元不在山間須知對面長相失莫嘆喬松去不還四海黔黎共一君須知盜賊亦吾民由來齊梃勝秦甲要在人如父子親當時先主得闗張能使西周弱勝强今日中原豈無士坐愁豺虎亂要荒汙萊正爾肥蚯蚓滯穗那能飽􅢟斯布榖似嫌新曆緩每從清曉報農時何人更下仲舉榻舉世願登元禮門千古家聲君與我未知何以起斯文李也折謂陳與了齋力欲排邪説誰遣竒竆道不興長恨人亡琴亦往頼傳心法有盧愛甥也折光祖了齋眉溪與光祖共談得四絶句乾坤今古自昭然此意何勞宻處論不是逢人喜傾倒正應公事合公言青山雨後足竒態好鳥簷間無俗音縱使麯生難㑹面可無毛穎觧傳心流泉為演秘宻藏枕上聲從澗底來半夜夢回聴説偈似傳衣鉢向黄梅谿􅁁索共桃花笑雨打風吹掃地空待訪靈雲舊消息急流無處覓殘紅交溪庵中因檢藥囊偶成道人頭上經春雪不羡少年何首烏已覺老来甘草莽便當歸去訪田廬次韻陸時可歲暮感懐小橋横截一溪雲隔岸遥通避世人釣艇偶隨秋雁泊吟窗今見臘梅新烟塵已覺千山靜雨露行看萬國春詩酒暮年生處樂一瓢歸去豈辭貧又和時可風御泠然幾過旬異鄉竆臘作離人淹留頼有交情重翻覆從教俗態新扵世無求心似水向人多可氣如春也知已造顔原室不恥人間賤與貧再和時可二首芝眉不見忽經旬屢出新篇故惱人應共翰林爭敏捷豈如開府但清新雞豚且入他鄉社桃李何殊故國春白髪蒼髯共攜手從來管鮑兩忘貧甲子公今不記旬磻溪垂釣豈其人安心有道年年健出語無塵字字新鬬智莫爭三十里貪生何用八千春直須凖備新年醉無地容錐未是貧又用元韻呈時可古來兵出僅三旬便欲修文格逺人圖蔓可堪師已老滌瑕當與俗更新舞干止殺知何日賣劍歸耕要及春但得耡耰徧原野飯藜何惜一身貧次韻光祖閒居感懐風義乆已喪交道何其衰艱窘無與俱乃歌風及頽誰言經由地過門有犂來霜雪豈不惡松筠真耐摧富貴如浮雲扵我何有哉所嗟道不興兹士猶塵埃初到臨安二首風際管絃朝病酒雲中樓閣夜聞香十年一夢沙河路獨步春泥覺燕忙青鞋踏雨花鋪徑朱艦凌風柳拂堤天竺舊㳺心已懶孤山行處路應迷錢塘江潮頭駕月衝殘夢水色浮空送峭寒十幅輕蒲連夜發不知身到海門山次韻王長源飲垂絲海棠花下冦盗縱横已十春今年花下得㣲曛應憐萬木灰薪槱喜見竒葩脱斧斤遣將幾人非鞅鞅覆盟今日尚棼棼憑君為國施長䇿莫戀垂絲鄙獻芹鄧季眀挽詞三首少年長揖出賢闗自許行藏契孔顔雲路不求千載遇篳門贏得一生閒竒言盡掃雞三足妙意誰窺豹一斑盡道東牀如李漢㑹傳餘論落人間它時膚使早還鄉駐節傍連避世墻雁序風標蓮破蕚鳳雛衣袂桂飄香花􅁁對酒春難老竹裏圍棋日自長曾共國人歌友愛傷心重到棣華堂道人扵世已忘名相府聞風眼自青險韻舊聮韓子句直詞今稱蔡邕銘壁間玉唾情何厚梁上銀鈎墨尚馨只爾便知君不朽豈縁中説載元齡省題筆諌詩志士憂君切還將筆効忠但扵心取正不向字求工理自胷襟得情因翰墨通一言毛頴喻千古史魚風託意揮毫上成名補衮中誰知執藝事功與諍臣同和叅謀至日喜雪三首風鳴竹屋懼將顛起視同雲隘萬川共喜葭灰初應律那知柳絮已漫天傳杯莫怕山頽玉閉户從教徑糝氈幕府老成堪倚仗故應衰病得安眠玉花初著亂山顛入夜俄驚月滿川雖有冷光凝白晝尚餘隂曀鎖青天屬車未􅝭瑶池駿逺使猶餐北海氈夢斷忽傳淮蔡捷喜臨尊酒已忘眠句用李愬擒元濟事也折是日報淝上大捷故有是協氣方占大有年珠璣填道璧沈川塵埃已洗三千界雲霧終開尺五天羔袖久慚依帥幕牛衣端不羡蠻氈求田好趂豐登􅇋乞與元龍榻上眠和叅謀叅議尋春二老俱傳正始音春來詩思轉精深風前未展垂天翼筆下空聞擲地金曉日若將開霽色宿雲先已弄輕隂落花流水年年事只恐桃源不可尋次韻呉叅議病中懐歸因以自見柳絲埀地整如梳春盡長懐舊隱居艸暖屢眠斜照外水香時潄落花餘西山忍餓初疑隘北海無功竟坐踈同是念歸公得請自憐濡滯一軒渠次韻安茂通同薛參議上巳日唱和扁舟衝浪去造船折茂通監羸馬傍城行修城折子􅀤監飄泊傷春緒囏難作吏情豈無賢者樂亦有聖人清莫繼蘭亭㑹愁連曲水生三月二十日㳺東山參議不至有詩次韻羈懐厭朝市逸興薄江山放杖囂塵外傳觴紫翠間碧雲猶未合飛鳥已知還不見髙車過重城欲上闗黙堂先生文集巻第九
