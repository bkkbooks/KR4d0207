front:
  text: 黙堂先生文集卷第六
  hash: sha256:7cfec55f316583b3dfdc07a7f636cbe8661e1e8e36ff1cf02ecb0c33c952cb51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_006-1a}
body:
  text: 詩閩縣令陳夢兆魚樂軒有樂寧勿憂無憂乃至樂觀身見物理魚樂豈予各萬生擾為病安静即艮藥何以適其情已定要無虐江湖與此池等是泉未涸周旅苟得所是處覺寛綽君看瀕海民兹物困剽掠縱横墮鈎網瑣細入杯杓誰云滄溟廣㳺泳渺無託乃知尺澤間􅀁樂逾縱壑我家一畆宫隙地不容鑿未能禁數罟念爾每懐怍陳公吏之師養善息羣惡愛民以及魚退念此盤礴魚亦喜公來出􅃿供笑謔當年濠上㳺天􅄜紛酬酢昭琴既不鼓應問兩俱錯賢哉鄭國僑一物心無著但信悠然語未悟已􅄬鑊懸知此魚烹不羨波間躍誰當較異同我亦無今昨午睡懐安縣風篁亭旌旗蔽野堦除寂環佩鳴空枕簟涼夢㫁鈞天知是想一溝泉落樂聲長次韻鄧志宏送張思道㳺福唐紛紛涴耳俱宜洗坐遣髙人厭丘里迅流早自促行舟更有西風滿江葦當年筆陣掃千軍今日流軰推能文英詞谹辯灑醉墨倐忽百變春空雲人間萬事秋毫細軒冕儻來誰著意身隨去棹落波間興逐㝠鴻渺天際三山便到蓬萊宫卸帆海嶼窺魚龍夜涼横笛㺯明月萬頃琉璃秋色中自京回次韻鄧志宏見贈妙齡才思湧如泉末技文章不自賢餘子豈知多問寡老生端許一當千淹留莫止為山簣􅀵拾終同至海川雲路筆間天尺五㑹令雞犬亦能仙翁承事挽詞五首徐行直視日如愚律己齊家盡可書九十一年由砥道肻令荆棘敝衣裾不􅀅堯舜等瞿曇簡語寧同賣菜添惆悵老成無復見一時流俗正清談意深曉堯舜之道則佛在其中矣折公言簡而意足語人曰吾不知佛竊苦語熏心不易忘它時聞教我為詳須知令尹多仁術實自嚴君有義方霜髯碧眼照華燈夾道游人避履聲曾是元宵隨步月西風何忍見銘旌至今人追思之折是年公上元出逰樓閣谿山兩鬬雄中横千丈未雩龍當時令尹兒啼處依舊東流遶七峰泊舟延平二絶野梅飄盡喜春歸又見谿桃片片飛醉臥暖風呼不醒亂紅無數㸃人衣星河不動水東流夜影揺空逼釣舟夢破滄浪歌在耳欲尋溪友向煙洲寓漳南浄衆寺三月晦信步到庵亭曠望久之聊􅀉所感意行不知遠􅀝杖囂埃外南州風物繁此地谿山㑹俯窺城市喧蟻垤幾成壊只爾可忘情未用旋吾斾過永春劇頭舖見壁間石刻臨漳王漕詩輒題數句壁間得㣲詞語盡意有餘模傳豈真知無乃勢所驅從來碧紗籠不䕶寒士書焉知題柱生終無駟馬車粉板㑹當洗援毫聊自娯從人分輕重削跡今何如次韻德純通判賀用中生子暴客年來不過門羡君三秀各生春懸弧適在龍溪側履迹知從劍水濱魯國考祥欣得鯉杜陵占夢信為麟問名更取詩翁語盛事流傳西鬬新取絶筆之義故云折德純欲名之為麟奴次韻李伯紀舍人招飲胸中造物可與友筆下騷人真是奴共傳排佛似遷愈獨喜賦梅追隠逋盤空未念鴟腐䑕在野寧無駒束芻時時造席聞妙語謬辱知己非夷吾再和李伯紀舍人韻時來􅀅相寧有種衛青故是民家奴懸鶉未用嘆嵗惡闊網近喜除官逋蠲逋負折詔書近本無得喪任失馬但有言説皆陳芻從公一飲百壺盡醉倒不知誰謂吾和李舍人留題泛碧齋山脚回環挿遠潯碧琉璃上玉為岑共憐采鷁風前試正值滄波雨後深應為蓴鱸輕去國遂令胡越盡同心濟川此去為舟楫也念江湖有陸沈陪知縣夜飲泛碧齋再用前韻暑雨初􅀵水拍潯谿光南北影千岑移舟為愛玻璃闊放盞那知琥珀深緩帶小風來水面􅀝欄凉月轉天心酒酣更駐凌波襪直待銀河夜色沈􅉢山道中小休秋陽如獵火四顧不可避肩輿得㣲隂休此僕夫瘁我生道途間嵗月七之四山林固清遠及物乃初意黄雲堆隴畆早稻一尺穗􅀁欣居者樂未敢嘆勞勩詔書寛逋負豪吏不少置民竆戒勿擾天下適無事贈別楊至㳺三首醉鄉佳處許誰臨幸有匏尊可共斟要試從前寛窄量但知空盞莫辭深和平簡易是吾師自有家風更問誰不是妙年狂氣歇可能從我獨無疑貪嗔痴盡即如如究竟心源一法無應悟濓谿真古佛始知伊洛是醇儒次韻李伯紀舍人食了齋所􅀉石芝有感石芝附石元無根有名不載農黄文絳囊遠致自東海謫仙為向詩中論談餘得味仍遭苦未辨終甘莫輕吐此言要自顯真心不比繁詞較鍾乳太丘晚交誰獨深梁谿心如百鍊金只應異代友元禮許國有盟今更尋雙魚萬里􅀅芹子妙意難名聊􅀉耳餘甘橄欖正須渠它日忠信今悟矣而微苦乆方􅀤甘知此味者鮮矣宜以為獻也折了齋書與舍人云石芝東州物也初食淡然已書室獨坐春入庭柯寸寸藍風簷􅀌坐怯輕衫青天白日從來好栢樹桃花子細參自浦城放􅂳下建安􅀉龎幾先扁舟西下趂殘陽目㫁雲邉歸雁行短棹莫辭風浪惡人間平地有羊腸茆柴也觧􅀤清狂仰看雲天盡十觴白首歲寒猶道路自憐無意避風霜奉陪婺州守南樓宴集谿山自昔東陽勝賔客偏扵北海多四座英標真􅀝玉一時雄辯劇懸河淹留慚應三刀夢豈弟仍傳五袴歌更避正堂延盖老待􅀅清静􅁇蕭何曹相國尊盖公事云折公待􅀛山異甚故用奉陪􅀛山先生觀修城西山淼淼送斜陽往事回頭一夢長萬里喜霑新雨露百年重拓舊金湯杵聲撼野雷初動鍤柄揮風蟻自行尊俎折衝今可恃補牢端為念亡羊次韻鄧志宏和吏部謝公鐵字韻詩二首結交自惜羞餘耳直要人情淡如水晏嬰鮑叔乆已亡嗟我欲從誰氏子大栟筆陣掃千人詩成不顧俗士瞋長歌欲奪謫仙氣短韻更逼宣城真城謂謝吏部也折謫仙謂李舍人宣爾來念我知交絶託以不能資老拙自笑今年錐也無何須更覔針頭鐵愁霖十日槎生耳寒氣薄人如著水坐對毗耶數卷書未厭銅鑪燒栢子區區我亦可憐人只有無求人不瞋雖無名字振京國不屈未應慚子真凍琴壁間絃自絶袖手深藏鳩更拙本無流水遣誰知此去從人譏嚼鐵再和鄧志宏韻二首石馬祠門餘隻耳夢魂先過瞿塘水人間得喪豈偶然可笑紛紛夸奪子文章自古多窮人妙奪造化天應嗔謾言勤苦得富貴見彈求鴞何日真張羅門巷行人絶嵗晏誰憐生事拙竆通有數勿復言已辦此心堅似鐵先友遺書猶在耳念之清淚如􅉢水可憐萬事已忘情獨嘗託我芝蘭子阿戎文采映前人脱畧不顧妻孥瞋却能飲我瞑􅅭藥知我老大言尤真利欲昏人須猛絶妙年母謂吾謀拙古來觧使玉如泥劒鋩除是錕鋙鐵廖成伯奉議生辰曾聽尊前世綵歌喜聞煙袖舞婆娑祖諌議有小詞云綵折用中建堂名世綵叔烟熏舞袖故云折衣長乆五世祥名駒汗血得夷路老栢凌霜只舊柯桃李盛時隨地有芝蘭生處近人多春風二月年年事莫問靈椿嵗幾何交溪静安院見許尉題壁次韻柱頥脩劍上凌烟自古功名亦偶然鍾鼎山林俱不惡一瓢吾欲盡餘年黙堂先生文集卷第六
