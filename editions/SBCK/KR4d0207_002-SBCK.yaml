front:
  text: 黙堂先生文集卷第二
  hash: sha256:ee794af72adab204c355d8fa50f9dbdf35703000455b03d814f6db44589bf6fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_002-1a}
body:
  text: 詩謁滿處冲歸詩以贈之八年重見各蹉跎把酒論文奈別何行止未應經掃地是非安用辯傾河陽春屬和從來少流水知音不必多妙語驚人慵舉似歸來如學病維摩處沖見和復次韻二首髙談無補自風波畢竟平生意若何萬里誤逰梁苑囿三年悔􅀉楚山河在淮海間折三年往來俱軒裳氣味情終可林壑風流興已多頼有故人真遠􅄊㑹看鵬翼九天摩嵗月空驚去若波樗材渾欲樹無何人情不似春生草末學方矜水灌河顧我嶔􅏟徒意廣如君飄逸患才多周南縱復嗟留滯未便懸頭學揣摩處沖又和頗及佛理亦次韻答之相逢雖許借餘波此理而今更問何便合形骸同槁木不須文墨騁懸河五千遺教元非實三萬藏書亦太多此外別傳應有路頓根無物可漸摩處沖為棲神導氣之術每曉起得意成詩前後四首次其韻功名亦誤人自古誰能了老大欲退藏少壯知幾少彤墀班已齊宿鳥尚木杪豈無山林心路長天杳杳少時自樹立勁氣干雲霄一枕夢初覺萬古心何寥年來畏禍機自悟空嶢嶢小竆不必送真隱誰能招交鬬存龍虎經中學熊鳥嬰兒檢奔放姹女棲窈窕神仙豈無術自為志已湫晨興一炷香吾意竆三藐朝氣爽不昏清浄天無霞善惡兩相融世慮遺塵沙踈鐘下殘月餘響逓幽遐了失去來心淤泥出荷茄秋夕衰榆弱柳未經霜已見飄零片片黄雨後晚風生户牖莫􅀅燈火汗清涼七夕三首北里南鄰錦繡陳萬端千疊日初晴􅀵藏犢鼻何須掛不與人間鬬獨清天上銀蟾曲似鈎人間簫鼓萬家浮從來世事俱兒戲不獨秦娥乞巧樓信馬隨車力不勝聊􅀅觴豆樂交朋青樓乞巧真兒女我亦如今拙未能七夕閨意戲范濟美三首衡陽新雁幾時歸惆悵佳人萬事非蓬首西風還拜月夜涼贏得露霑衣經年不復到庭除又見秋風柳欲踈看罷巧樓歸小閣牀頭重檢近來書祝君樽酒醉羅裳此夜應須石作腸幸自書生惡滋味那堪千里羡牛郎九日登莊樓二首久客驚秋意天涯思不竆三年猶北國萬里對西風時序悲歌裏乾坤醉眼中黄花一樽酒千古此心同木落秋容浄時平國􅀔雄望雲心自遠采菊興誰同詩酒浮生過功名一笑空留連憑痛飲冠幘任髙風次韻范濟美秋雨感懐一別劍谿水三換京塵秋夜聽空堦雨嵗月驚如流豈不念故國水清山亦幽螻蟻有㣲情未忍追浮丘平生老蒼交夫子賢其尤竆經三十年一字不見􅀵頼有管城公落紙無全牛他時恐不免速達吾所羞代勾龍君輔上潼川令卓魯當時事風流莫與班最成三載後名在兩川間桑梓深聆德弦歌幸毖頑牛刀淹試可驥足暫投閒偃室何當造膺門早許攀丹墀初受命墨綬遽言還何子方㳺學終童未出闗梁園今萬里蜀道自千山籍眼終多白萊衣念戲斑歸期春服就潼水㑹承顔同魏季脩雪中閒步二首纎纎月色淡黄昏城郭千家雪照人攜手望春同茗飲小坊燈火自相親草草瑶池小宴終玉人招我廣寒宫歸來懐袖天香滿月照梅梢雪未融次韻俞德翁述懐二首事業無媒秖漫勞平生扵世一牛毛三年萬里看飛雪不向人前愧緼袍飄泊天涯不繫舟又還竆臘動離愁軒裳瑣瑣知何者直自時平未肻休􅀉内去住初難料行藏只是嫌天髙山簇劒江静月磨鎌久別平安否新愁覺夢兼雙魚何日􅀉迢逓嵗􅀅淹春雪太學隂風度嚴切宻雪紛如霧虚窗覺逾明臘紙黏飛絮文書不掛眼對榻聊箕踞春愁暗乗人怱怱出非慮門前亦有酒官禁不可酤永懐傲江湖何當脱羈馽嵗暮述懐􅀉安常兄意廣詩餘怨才狂酒見真雪梅新濺淚霜月冷傷神短劍深藏匣哀絃乆委塵良㳺惜遲莫雲物又驚春三月十一日欲往荆南景德寺睡起呈曹令德風門自開闔門外黄塵暮午衾温留人春夢如飛絮我行指洞庭千里始頓屨僕夫呼起起寸心撮百慮此生睡不足正坐奔馳故四年四往來日月途中度美人亦念我贈以別知賦英辭粲星斗深語􅀤妙悟坐起再三讀一一明月句何似謝所投静黙有佳趣令德送余都門外眷眷惜別余恨不􅅃作詩􅀉之行人不忍別遇酒輒醉倒僕夫怪何遲謬應行亦好憐君如弟兄每見開懐抱天涯重分攜祖席都門道城頭傾落日酒盡跡還掃留連意雖勤晤語終草草君如汗血駒千里未脱皁我若隨波魚圉圉依寒藻去住各有謀聚散初不保惟餘一寸心耿耿遲君老同楊遵道出京本欲作詩而吟咏久廢恐取道襄陽弔古遺跡遵道有作不能多􅁇也先以詩謝之經年不作詩意到無好語强欲理短綆頽井暗塵土夫子賢逹流奔逸不受圉風流夢鱣後清德逼而祖文章守家法騷雅到前古屈宋或交綏曹劉真臭乳而我獨何人詞格本寒苦枯腸費􅊧攪況復乆不吐胡為謬見假亦使郊􅁇愈無乃縁葭莩遂與噲等伍此行過襄陽倒指不旬數龎公亦安之孟子不可覩聲名向千載石刻餘羊杜山川空形勝耆舊一仰俯終當弔遺跡尊酒酹江滸恐君成感慨嚴韻儻見侮作詩謝不能亦以丐斤斧十五日過許夜雨暴作明日行四十里宿扵潁橋又明日晴書時狂風撼平野沙礫眯兩目筍輿我與君道遠疲徵逐驚雷一夜􅀤暴雨溢川谷平明泥􅃿趾寸步不容續我生賦竆蹇觸處背天福風雨豈不好行路非所欲中途聊息肩村驛便可宿我勞固其分端恐僵僮僕燎爐燃濕薪傍舍酒初熟安能浣愁腸但取充飢腹中宵耿不眠明月忽掛屋攬衣起視夜秣馬亦膏轂人情易喜慍天道有飜覆隂霽那可知去去無欲速汝州道中呈遵道青烟漠漠柳依依落日雲中雁北飛咄咄書空誰的㑹遲遲行道子同歸桑隂盖地牛羊困麥秀漫山鳥雀肥向晚未知􅄬宿處敗籬踈屋火烟微承遵道和又用前韻書懐端的荆州得所依羽翰終欲更南飛閩山萬里長牽夢蜀鳥千言只喚歸當日朋儕俱草澤而今兒女自輕肥白雲南望三年客長是尊前誦式微春晚書事楊花撲面春如夢麥穗齊腰日似年多病不縁詩得瘦放懐全藉酒能仙楊花二首出處陶潜宅興亡煬帝堤窗扉容㸃綴原野自髙低地迥棲難穩風髙去易迷顛忙能幾日萍滿水東西漫天方作雪糝徑忽鋪氊已是春如酒那堪爾似綿木香花二首翠袖青裙襯雪膚雨餘終日醉相扶秖應不使朱鉛汙獨抱幽香與世踈直自江梅墮雪英便遲幽艶到清明楊花著地香初破乞與愁人一觧酲自入襄城即有山水之興路中稍有賡唱因呈遵道風沙乆迷神山水忽照眼鱗鱗碧玉甃叠叠青螺綰人烟盛樂土草樹亦精産雲霞入杳㝠禽鳥度盃醆放情千里迥悟意一笑莞胷襟得竒趣詶唱出新譔蟲魚怯嘲誚文史困鳩僝我詩實易成淡薄非佳饌君詞頗簡出嚴絶類燒棧自應即退縮强爾取驚􅎼㣲言固可録狂論猶未剗勿使俗人知歸途畏書簡和遵道楊花金明池道緑隂稠萬㸃顛忙正可愁馬上只貪看舞雪不知飛滿帽簷毬漫興雲林恰恰鸎能友沙路行行蟻有臣雖有溪山供醉眼亦嫌塵土汙芳春黙堂先生文集卷第二
