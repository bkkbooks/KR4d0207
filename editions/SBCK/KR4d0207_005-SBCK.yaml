front:
  text: 黙堂先生文集卷第五
  hash: sha256:555f17b1e38390e966f1582eef0f4fa0959a795862c1c07bc0e17e4759153624
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_005-1a}
body:
  text: 詩看論語四首明明孔聖能毋四的的曾參􅀁貴三一部魯論開聖域古人無死要重參天道文章豈兩岐雷聲淵黙本同時如何子貢能言者説與無言更有疑陋巷從容一事無不因鄰鬬出吾廬簞瓢豈是忘憂物自是從容樂有餘直從堯舜以中傳又到東丘續㫁絃看取子思親的處始知論語自無偏夢得亭上雷霆卷地灘聲急旌斾揺空樹影寒千古西山留爽氣雨餘容我􅀝欄看留別鄧南夫四首平生交友各飄蓬只有丸丸雪後松萬里歸來還往絶獨君時許略從容昻昻勁氣初無作蕩蕩竒胸乆息機容我醉時開讜論一軒眀月夜忘歸有子才如汗血駒新門髙大可容車故應袖手藏深渺怜我氷霜涉畏途比余扵玉有竒文一落泥塗十二春慚愧深知同鮑叔尚言荆璞定逢人其文甚美今余被貢適三上故有是句折十二年前南夫有玉説一篇送子入太學越州道中雜詩十三首心息久相依息調心自住忽焉不自知根塵失所寓向來尚有錐今我已忘兔似入無功鄉不由嵇阮路暴氣燎原火淺量盈澮水不見楊闗西此生真已矣誰言佩豭由不作緼袍恥至道儻有聞客塵如脱屣世儒讀論語未脱小兒氣豈悟無絃琴中藏千古意顔淵黙然處曾子亦心醉處處儻逢渠字字皆有味人心有黙契晤語不在多一笑離凡情萬象皆含和孰是忘言人聽此無聲歌有懐閲古堂夢中時一過蕭山縣宅折閲古堂在浮雲作秋隂細雨如朝霧放形山水間意適無艱步忽遇王通禮法士談道則未然雖聞一字中尚􅀝諸子偏區區尊孔子未悟失其傳自聖猶不疑續經何足愆堂堂陸忠州談辯如傾河從容仁義途步武尋丘軻一斥不復返方書事研磨至今諌草存滄溟遺一波我行何所挾萬里一毛穎服勞髪欲秃未語意先領畸人如告我心清事自省從今中書君亦復免馳騁和如愚思劒谿佳人經嵗隔參辰柳緑桃紅奈遠情遥想玉樓春睡起一江風日㺯清明馮元用九日約白雲寺登髙以追昔年都城望津之㑹偶以事不往􅀩示長篇次韻與君都城別星霜屢變易每懐望津㳺悵然如有失此生羈旅中嵗序驚心魄還家幾何時自愧不暖席建溪古渡頭短棹凌虚碧掀蓬忽見君恍若夢中得相攜定舍館石徑走迂直危亭至如歸坐午及昏黒黄花笑東籬未許蓬蒿􅃿只尺白雲樓坐阻造豪逸人生正似兹有志誰能必當時連鼇手至今猶挾䇿髙才真楚璞末技同齊瑟無心效騫騰自分􅄬閒僻望津儻同登意氣那復昔次韻酬鄧天啓少年翰墨塲自詫穿楊箭誰論第一功不數曹參戰聖門窺管豹一斑時許見棄捐憂患中更欲資陶錬兩鄧富文采端可同席硯􅄬璧或未知賈石誰敢衒小栟詩益竒出語人所羨過門遺新篇無乃思與捐我懐古作者臨文頻撫卷孰能掃千人期君當八面次韻邦美叔和天啓見􅀉竹風挾雨撼蓬窗静聴秋聲轉騒窣朝來飢臥媚㣲涼叩門不作淵眀乞小栟見餉有新詩七言端為吾家出共誰渠有古人風孰識中藏謫仙骨書如周鼓未差訛語效商盤仍詰屈誰與和者叔不痴落筆成章一嗟咄無用如今君豈樗自冦從來我非漆板茆他日儻相尋好在山深林更宻名樗故云折邦美作軒三月二日泛舟下延平晚泊西芹扁舟劣容身風浪困掀簸曲肱逰華胥夢㫁千山過縱横波間石滿目牛羊臥秋毫儻不支巨鑑忽已破篙師號神逸却立變衰懦我豈未之思懸知無可奈此生足驚憂似為天所癉那能一生死且復耐摧挫日暮同濟人舉酒紛相賀一笑盡餘觴歌罷無予和次韻令德答天啓小栟妙語言下筆初無難曹郎更精深一字不苟安我師陶靖節亦未㳺其藩但覺萬仞淵中有蛟龍蟠人言失故步乃在學邯鄲平淡恐未臻先作郊島寒古來文墨士十九姓字漫尚頼相可否鹽梅助鹹酸復次韻答令德見和來詩及維摩黙然之意多言亦焉用守黙良獨難維摩得此門衆生病自安當時許子􅀅不造寔與蕃終以月旦評有愧申屠蟠忠良覆漢鼎魯酒圍邯鄲獨愛千頃陂滄波照人寒君豈叔度歟胷襟江海漫自然已憤厥不須珍柚酸用令德韻題嚴陵祠嚴子陵以匹夫見萬乗乃堅臥不起􅀁謂髙氣盖世者又謂光武差増扵往意若未甚許之則其􅀁藴豈冦鄧耿賈之儔乎司徒霸位三事而正名其為癡光武乃以諫議大夫處子陵宜其弗屑也余觀湯之扵伊尹武王之扵呂望皆師事之故能致王業之隆後世貧賤屈扵富貴此道遂衰聞客星把帝座之事則相顧驚嘆以為甚異況扵尊之為師乎光武扵故人厚者借乎其不知此也世疑子陵之去就殊不得其當予謂光武不能用子陵豈子陵之失哉故因和令徳聊以見意焉價㣲良易酬􅄊博無近用騏驥非良樂萬里誰能控蕭王漢中興四海􅀝為重誰為淵敺魚一呼百萬衆妙􅄸環無端竒功射必中忘機諒未能豈數漢隂甕故人鉤尚直倦作儀韶鳯應無萬牛力負此丘山棟羊裘又獨往苦語餘嘲㺯至今賣菜言空記當時夢跋子静􅀁藏魯直書樂天八字偈凝師八字源則豐樂天説偈流無竆山谷眼明如日中落筆驚電馳蛟龍誰其得之建溪翁姓也折子静取人􅀁棄豈俗同􅊧竒抉怪晉餘風嫉邪憤世髮上衝自我觀之案兩重巧偷豪奪願不逢好語傳播人􅀁攻斯言有味當見容六年折政和附子静所跋之後折七月無諍道人書題公敘舫齋胥靡來時楫鴟夷去後舟濟川曾入夢浮海竟難留忠信雖堪􅀝行藏要自謀應同仙似泰不數勇如由濶水風濤夕鱸肥浦嶼秋落帆如得計整棹欲何求明月時堪載新醪便可浮江山無盡意長艤劒谿頭和羅仲素􅀉子静長篇蒙示所與子静長篇論髙而理正讀之感嘆不能自已是日偶思道來訪問以老兄安否云自崇福還却往龍湖而來書不及此二刹皆雪峰髙弟所廬也豈復問道扵此乎輒次嚴韻聊致區區之意甚不自揆也􅀛山絶壑蟠豫章秀􅆬往往參天長十年􅀵拾多散亡只有太白追蟾光知君所得不可詳宴坐鐔溪名益彰獨嘗為我露其鋩盡掃楊墨揮韓莊邇來黄面稍侵疆劒藏扵室矢在房分􅀅肌肉剜為瘡猶説道心乃平常平常心是折剜肉為瘡語也折道禪家我欲從之挹餘芳竟坐此傳乖􅀁望新詩謾説陋漢唐直以未畫窮羲皇豈知藩籬不自防欲舉萬目誰為綱況彼桀驁非勤王安用援手登之堂愛君駿足如飛黄一空冀北無留良四蹄雷雹方騰驤肻如駑馬徒争强和子静三絶亭竹二首窗外度聲風宛轉庭前舒影月分明參横斗轉情無盡骨冷䰟清夢不成霜雪豈能摧勁節埃塵無復入虚懐故應淡薄無人管不是子猷誰復來漁父一首一聲横笛起蘆花驚㫁天邉雁字斜白首飽諳鱸鱖美未能連夜網㳺鰕舟中誦子静江上之作為和二絶月下長吟露濕衣謫仙嘗憶謝元暉澄江一句無今古何似晴空獨鳥飛云爾折子静詩扁舟直與石相摩得到平流幸已多夜泊寒潭風不定更憂雷雨作驚波黙堂先生文集卷第五
