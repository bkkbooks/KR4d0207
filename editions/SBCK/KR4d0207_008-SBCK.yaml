front:
  text: 黙堂先生文集巻第八
  hash: sha256:0f3adb693f61dbf4bd0c94d167bc75c18b5cd6ae04befe91a4c11435de16de12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_008-1a}
body:
  text: 詩三衢道中感懐寄龎幾先霜風巻地號逹曉不成雨㳺雲乍蔽􅉛朝日翳復吐衢梁三日行去往迷處所茆簷得小休蔬飯不能舉所嗟兵火餘白骨莽無主鄰邦歲又惡賈飯逐婺女遏糴彼何忍楚越視心膂況欲賊取之不救溝壑苦生逢堯舜代短袖不容舞空餘衛物心持此欲誰語故人幕中傑籌畫多所補朝譽競推先丘壑終自許平生陳琳檄觧使頭風愈容我七子間泛愛果輕與此生聽造物未怒狙公芋牧羊或可息抱關亦易處要以一溉勤聊潤漢隂圃二月五日入都㕔乆坐􅇋山甫不至㕔前桃花一夜風雨落盡感事冩懐簿書堆裏只匆匆過眼繁紅夜雨中可念青春看又老一杯無計略從容曉登嚴陵釣臺和安止所留詩溪山有底好適契貧士欲敢論生不侯但喜夢非僕千秋釣臺水不濯市朝足而我獨何人得寓塵埃目攜笻縱朝步初日穿林麓西風扶兩腋一舉千里鵠東窺夫差國繁華混真俗濁流駕頽波一往不可復之子居其間嗜古追前躅爲寄無絃琴一和郢中曲再用前韻人閒得安眠夢斷了無欲􅄼思趨朝士一馬百夫僕況聞稻苗盛昨夜新雨足一飽如可期吾事豈多目盆山鬱葱蒨酌水周其麓照我本來面真白非浴鵠故應此間住却掃便違俗超然寂照中無往亦非復百年只爾是行矣毋躑躅區區欲何為世路羊腸曲過崇仁莫宿山寺書事驛路􅂗泥一尺深竹輿髙下歴千岑愁霖洗盡梅梢雪把酒無人慰此心自梅花村回道中書壁四首刺水秧針出已齊雨餘膏澤未全犁道傍牛喘無情問慚愧林間布榖啼綫路縈紆遶亂山筍輿追逐棘林間艱難那觧蘇疲瘵自笑奔馳未得閒野花無數不知名映竹臨流若有情掃盡殘紅春去後亂山深處眼增眀城郭初看委地紅川原今見緑蒙茸驚人節物催華髪留滯竆山醉夢中邑中諸公見和再用前韻郭外盈疇草又齊十年猶負帶經犂未應五斗能留我端為癡兒索飯啼馬上悠悠夢故山茆齋依舊水雲間長懐竊轡塵沙外豈願駢頭十二閑冷艶幽香不可名老年春去獨關情林深霧暗何由見頼有薫風為證眀看盡愁人萬㸃紅曉来霜􅁂白扵茸它時儻記江南夢畫我黄梅細雨中被檄下鄉督税作釋負詔書寛逋負國用豈云闕郡邑有常供征求安敢輟稽遲推蚤莫釣摘劇豪髪飢民困鞭箠十室九告竭連雨催早稻雪穗迷空闊要令公私辦當復俟旬月平生慮患深獻玉每遭刖憂民已無䇿問俗聊省罰陽城吾所慕晚官敢求逹寧無撫字心便覺催科拙夏日雨後戲書雷霆挾雨驚殘夢蕭艾乗風醒宿酲黄檗一盃清晝永張羅誰復問交情與張司録沈李浮􅀲記昔㳺重来氈㡌映貂裘乗風喜見經旬御泛雪難留半夜舟坐上談機通一馬筆間詞刃失全牛尊前它日論詩地柱後㣲文阻獻酬已十餘日仍雪中往􅝭故折時自􅄼中來經安福到縣泛雪事折用乗風奉和司録道中二首山行浪蘂浮花逐去程流紅應恨水無情簷間頗厭催歸語木杪空憐喚友聲念逺却回鴻陣急忘貧重到燕巢成待憑物理追風御懐抱如今喜盡傾偶成雲露横翔計似踈二原清賞更誰如池塘艸滿供詩夢烟雨春来入畫圖落莫早知貧是病參池今悟直為迂傍人大笑公焉取為説忘機或類吾和司録行縣道中偶風雨有感之作六首葉底鸎初囀枝頭蝶漸稀雨餘憐草長風定恐花飛遲暮歌終窶淹留嘆式㣲更堪西去雁聲逐晚雲歸吏隱深藏霧天㳺更御風分攜妨舉白轉眄忽堆紅北去豺狼盡春回雨露同向來相對飲應復念鄰翁非闗濃艶能傾國可是幽香觧􅝭魂正爾彫零廢吟賞欲留佳麗度晨昏酴醿臥雨有餘態芍藥倚風無限情正是江南花欲盡淡雲來往日㣲眀山頭漠漠烟藏樹山下潺潺水滿溪全勝長安花柳陌萬人塵裏逐輪蹄江山似為詩人設風雨故應春日多醉裡吟哦聊自適眼前開落莫誰何饒州張宏中挽詞二首壯歳英標冠士林暮年詩酒任浮沈竒姿不見臨風玉妙語空傳擲地金殘稿有誰知句眼斷絃何處覔琴心他時戲笑成陳迹惆悵江亭十畆隂時同賔友燕賞其中折公􅀁居處臨流為亭畫棟雕甍照水村簮裳多在脊令原百年得計南山豆萬事忘懐北海尊自昔功名何世乏迨今文字幾人存遺書儻有毫芒在為語韓公請備論次韻李聳卿前軰風流曉露零忽逢豪士壯心驚雷霆落筆千人掃珠玉成詩萬户輕應許翰林追敏捷肻容開府鬬新清向来乞米無佳傳端欲投􅀲趣報瓊䛕暮之戲折以來詩有次韻李聳卿賀太守禱雨有應二首一寸丹誠貫上穹坐令千里走龍宮驕陽彌月苗將槁甘雨連宵澤已豐便覺風霜傾意盡豈愁荆棘致年凶江南歲漕知無缺遥想中都喜氣同使君憂國願年豐肻放炎威乆病農盡道胸中藏渤澥誰知筆下起蛟龍曉凉秋氣生蘄簟夢斷簷聲帶梵鐘髙臥已傳民訟息秖應仁政古難逢歸自郡城見道中山礬盛開梅豆斑斑已滿枝暗香猶未吐酴醿和風暖日江南路正是山礬爛熳時香嚴寺洗足肩輿苦頓撼步入山間路﨑嶇歴荆榛砂礫窘芒屨披雲造蕭寺弛擔日已暮僧房急觧襪一洗塵泥汙瓦盆深及膝湯煖得頻注須臾和氣逹凛凛毛髪豎翛然入無何醉夢寧知處此生事奔走早晏失期度念兹頃刻閒百日不一遇啖蔗入佳境鐘響忽予寤蒲團赴㣲火黙坐聊箕踞眀朝塵沙黄莫憶少陵句山寺早梅三首竹籬茆舍近前溪烟淡風㣲月上遲認得暗香來去處夜寒無路覓横枝氷雪情懐未遽開芝蘭風味已先回故人隔歲無因見一夜月眀何處來丹蕚猶含綽約肌水􅁁籬落雪晴時此間妙得無言意只有西湖處士詩又題山寺二首雲間初日慘無光天外歸鴻豈戀行短景去人如掣電不應留滯野梅香雲母燒香不見烟夜深齋閤閉龍涎此生暇日真難得蕭寺重来已四年即席和焦貫道馬上無端髀􅁏消老来功業正寥寥便須舉白追年少莫恨紅粧不我饒趙元述慶得子次韻貧家豈有石麒麟説夢哦詩愧杜陵但得過庭追孔鯉不愁傳鉢欠盧能和周唐獻郎中登普光寺閣官閒竟日身無事雨過連巒氣似熏未暇含香朝瑣闥且來飛舄躡青雲九天已振摶風翼萬目難藏隠霧文誰凭危欄親玉唾笑談應復許隨群黙堂先生文集巻第八
