body:
  text: 代漕使謝轉副使金字遽傳榮奉十行之札綸言甚渥寵升一路之權逺自日邊驟臨海角拜恩益厚揣分逾涯中謝臣質本凡庸仕逢休顯徒以非常之眷屢叨不次之遷一忝使星再更嵗籥惟此甌閩之地近連吳越之疆方攘竊之旁興亦轉輸之所病誠心憂國但知足食以裕民竭力奉公詎敢養交而避謗實懼異同之論各懷忌嫉之私指瑕公肆於吹毛伺隙宻謀於射影豈圗聖鍳灼見愚衷曲示保全更隆委任荷殊私之誤及愧綿力之難勝此葢皇帝陛下天大普容日明洞照冺是非於衆多之口辨邪正於疑似之間獨昭孤立之忠特畀久虛之職超踰過望報稱尤難績效蔑聞已負勸能之賞死生無變誓堅享上之心代黄兵部謝賜厯日合六氣以育群生已極財成之效定四時而熈庶績更存欽授之文祇荷寵頒具宣徳意中謝恭惟皇帝陛下順帝之則與物為春正底日不失日之官謹先時不及時之罰隂陽寒暑既得其常草木昆蟲咸遂其性尚稽故事均錫新書而臣叨備觀風預聞頒朔敢不夙興夜寐期勿奪於衆時儻使民和年豐亦何憂於國用代漕使貢金器精鏐顯瑞出千古之秘藏良匠效能極一時之至巧寶非地愛功若天成輒傾歸報之誠庻補燕閒之奉中謝臣聞明主輕難得之貨而應其徳者必来治世有畢至之祥而適於用者常寡惟是五材之美莫先百鍊之剛山澤欲以效其珍鬼神為之發其奥因假鑪錘之妙俾親日月之光恭惟皇帝陛下示敦朴以厚民寶儉慈而裕國勢足以兼庻邦之享而亷於自奉仁足以得四海之助而樂於無求故雖物之無情亦以誠而能動遂致精堅之質逺生僻陋之區究觀盛事之難逢葢為聖時而特出考周官之制玩好猶共原召保之心器用斯獻願隨方貢仰慁宸嚴庻憑役志之勤益盡敬恭之義代常平賀表天開地闢昔殊蠻夏之疆陲電掃風除今正唐虞之境土近則棄戈而逺遁逺者奉籍以来歸詔音一傳普天同慶中賀竊以幽都尾箕之分舊屬中原契丹貔虎之師久雄大漠頃乗五季因陷數州縁祖宗意在於靖民故朝廷許之以繼好錫予良厚盟誓猶存乃自外於天常致上煩於睿筭師徒壓境誕揚問罪之辭種落攜心莫守必争之地遂開故壤俯慰遺黎返巢穴之播流而保以金湯收介鱗之傷殘而被以冠帶盡釋累朝之憤丕成不世之勲金石可磨乾坤無盡恭惟皇帝陛下以慈故勇匪怒而威命將出師適副来蘇之望收兵巻甲坐臻不殺之仁混區宇於一家息烽烟於萬里而臣叨持使節逺在海涯服勞莫預於前驅上夀阻陪於下列舞干敷徳喜消北顧之憂鏤牒告功願獻東封之頌代耿提刑賀天寧節天開景命屬良月之就盈運啟興王兆流虹之嘉應人神恊慶夷夏均歡豈繄眷奨之餘敢忘歸報之義中賀恭惟皇帝陛下天臨九有子育群生出百年塗炭之民盡還冠帶極千里金湯之地一變耕桑積兹博愛之仁宜獲無疆之福而微臣逺将使指乆誤宸恩攬轡自憐莫預鴛鴦之列奉觴斯阻空餘螻蟻之情但同天下以歸心請祝聖人之多夀代廖用中謝除本路提刑分職郎曹初以養親而丐免按刑鄉部遽䝉改命以遂私幸嘗熟習於民風庻獲盡心於邦憲戴恩甚渥撫已増榮中謝臣賦命竒窮謀身迂拙雖朝廷收録之意每厚然丘壑退藏之日為多憂患餘生自阻風雲之㑹艱難多故未伸犬馬之勞常思量力以效忠不敢愛身而擇事迺者猥膺召擢亟欲奔趨偶嬰疾於中途復言旋於故里旋值干戈之作近興阡陌之間方愚民乗勢擁衆以横行適所在乏兵經時而勿問善良無所控告井邑至於丘墟目傷沸鼎之聚魚身慮積薪之及火遂忘出位姑事招攜葢念無知之氓本皆樂業之俗或縁饑凍早失撫存但欲自全寧不知悔因廣好生之徳盡寛必死之誅尸祝不可以治庖實慚越俎鄉鄰有望於救鬬寧免纓冠豈謂赦其强聒之愆委以澄清之任庻幾将母不必逺家示曲記於孤忠冀或收於来效叨塵若此綿薄何堪此葢皇帝陛下堯大普容舜明徧照開逺俗自新之路無疾於頑嘉儒生欲善之心不求其備謂撫民在去其邪虐而折獄莫尚乎哀矜取其息一鄉之争或可當八郡之寄刀劒漸消於牛犢共歸解網之仁衣裳不易於介鱗終賴舞干之化此聖徳之所感召豈愚臣足以奉承但竭疲駑少逃瘝曠代廖用中謝除吏部侍郎兼侍讀銓吏劇曹濫蒙超擢談經䆳幄并荷殊私辭不獲從愧無所措中謝臣聞聖人立言以埀教葢将為萬世之傳明主稽古以乂民必欲兼百王之治使孔孟之訓愈乆而無替則文武之道何時而不行然而書雖存而迹已陳語有窮而意無盡非得通方之學曷明至當之歸顧臣何人辱兹遴選此葢伏遇皇帝陛下舜智好問禹能不矜當國家多故之時脩祖宗暇日之事詳延儒雅博考異同横槊賦詩不數建安之小技投戈講藝獨追光武之遺風豈惟資所得以正心固将推有餘以濟物夫何孤陋預獲講明得於手而應於心姑進輪人之義明於上而親於下是為王者之師願尊方冊之聖賢益重寸隂於閒燕庻憑辨説仰助崇深代廖用中謝除給事表憂患摧傷偶存餘息讒誣昭雪復玷近班丹墀方幸於朝趨瑣闥已還於夕拜恩榮沓被感涕横流中謝臣聞忠邪無分則賞罰不足以懲勸因革失當則法度因之而廢弛此自古立政任人之所由失與今日舉偏救弊之所宜先必将大恊於輿情要在不違於公議儻失是非之實漸成朋比之私朝廷之謀偶有未周臺諌之言或未暇及不有論駁孰防弊欺然而務闊畧者或昧於先幾謹苛細者或傷於大體必得踈通之學乃明獻替之宜如臣至愚涉道甚淺斷斷無技碌碌因人鑾輅親征身逺干戈之役凱歌遄返恩先将士之勞徒以經幄舊儒暮年乆廢重煩眷奨特此超除此葢皇帝陛下堯大兼容舜明徧照盡屏異同之迹獨收威福之權惇徳允元已見逺人之率服發號出令終期萬國之咸休故於出納之司特隆紏察之任自維白首復造黄扉實慚衰病之餘尚綴清華之選回天有路所憂綿力之難勝填海何期獨恃此心之不變代廖用中尚書遺表佚老山間已負捐軀之誓歸全牖下敢忘報徳之心念平生遭遇之由荷累聖眷憐之厚正冠待盡雪涕明忠中謝臣振迹寒㣲逢辰休顯越自泮雍之選浸膺臺省之除遂綴從班稍塵要路記言柱史曾㣲直筆之稱擇吏銓曹又蔑得人之效以至鎖闥論事䆳幄談經併出誤恩舉非素望因求補郡繼欲引年方馳謝事之章遽被還朝之詔迂愚無取乃承乏於中司嫌怨已深復升華於八座顧天地之賜極矣而螻蟻之報缺然自取譏彈敢辭黜免尚聫内閣仍奉真祠終還已裭之官更允就閒之請㣲生何幸晚節知榮豈謂憂逐喜来病與衰㑹始經旬月已在膏肓馬勃牛溲姑聽醫師之用舎鼠肝蟲臂一隨造物之推移觀自性之本空豈殘骸之可戀尚留餘息請畢愚衷恭惟皇帝陛下孝弟通於神明忠信行乎蠻貊以上聖無以加之德成萬世不可及之功固将恢帝王敦朴之風躬祖宗勤儉之實杜知謀而不用卷甲兵以深藏益懋基圖大同夷夏然人情懈緩不生於艱棘之初而治道因循常起於宴安之後山霤穿石蟻穴潰堤實平世之所難防惟明主乃能察此所以三苖格舜伯益嘗戒於無虞西旅賓周召保猶期於慎徳忽兹不務非臣所知願扵既安且治之初納此至愚甚陋之說此生已瞑迄無補於明時厚徳難忘徒有期於再世代龜山先生楊侍郎遺表生必有終未究捐軀之報死無可戀尚餘憂國之忠輒布盡言仰瀆髙聽伏念臣奮迹寒苦涉世竒艱身已老而志始伸時可為而力不逮上皇採其虛譽驟寘講筵淵聖謂為朴忠超除諌省乃縁多病亟請就閒方大駕之親巡思舊人而共政召從祠館擢貳冬􅀸恩榮併及於衰殘筋力益難於强勉遽求解職庶免曠官繼陳謝事之章始遂歸田之懇一離行闕八易周星魚鳥相親雖獲首丘之願風塵横騖寧忘向日之誠殺身已負於初心泥古更尋於舊學竊謂淫辭之尚熾葢由正道之不明欲祛百世之疑當辨諸儒之失簡編埀就老疾益侵屬暮景之将沈豈頹波之可復前功已廢空貽覆醤之譏厚徳難酬徒有獻芹之意姑留殘喘少畢愚衷伏願皇帝陛下推堯舜孝弟之誠心遵祖宗勤儉之至徳事惟師古法必用中諦觀世變之推移已騐人情之向背公忠是任奚朋黨之足疑欺誕必誅豈讒邪之敢肆至於境土之未復與夫仇敵之尚驕非無百戰之威當計萬全之利葢功求成者常病於欲速而慮既善者尤戒於失時此自昔成敗之機乃今日進退之決仰惟聖鑒俯察㣲誠尚憐忍死之無它肯信遺言之有補幽塗頓逺此生永隔於望雲餘習未忘後效猶期於結草謝宫祠表歴試無堪已招尤於公議得閒為幸猶竊食於真祠過大㤙寛感深涕隕中謝臣山林棄物蓬蓽寒儒蚤從師友之磨礲粗識聖賢之奥窔以兹自信無復他求雖畎畆愛君嘗講致身之義然干戈衛社本無適用之才偶縁盛世之旁搜獲預一時之嚴召驟加湔洗浸被馳驅諫垣不次之遷既䝉寵任經幄非常之選亦荷優除忠嘉無聞怨咎徒積迹其叨冒寧免撃排正賴矜憐祇從罷免方切饑寒之慮復霑餼廩之優深惟速進之易顛尚幸小懲之致福此葢伏遇皇帝陛下聰明睿智恭儉慈仁收威福於指顧之間英豪畢集明是非於升黜之際黨與潛消罄海内以歸心宜敵人之喪膽大勲方集亘古所難而臣抱疾經年圖報無所逺想功名之㑹毎懐尸素之羞此生巳迫於桑榆敢㤀初志朽質未先於犬馬空有餘忠但憑香火之勤莫賛乾坤之徳再謝宫祠表應誅而釋乆逃寛典之公以老得閒更冒真祠之寵眷憐未替感戴難名中謝臣坎壈孤蹤摧頹暮境忠不足以自達而當諌垣越分之遷學不足以有明而任經幄非常之選因招怨怒迄致顛隮去國頻年始慮饑寒之見迫資身無䇿重䝉紅腐之均霑無地效勞拜㤙知幸兹葢皇帝陛下際天覆幬並日照臨奄九有以宅師邇遐靡間奉三無而馭下邪正自分尚記衰殘曲加矜恤此生已老猶餘報徳之心後效無期敢怠捐軀之誓代宰相辭免兼脩國史表載筆之重擇才為難儻非得人何以行逺葢自元祐而降宣和以前當國家内外無事之時承禮樂制作大備之後典章損益或縁好惡之私簡冊流傳積有異同之論於今為患厥後何觀方将補綴遺亡定正訛謬發前代光明之緒極一時筆削之功如臣瑣材敢承斯責况此艱難之際獨當委任之専討論雖藉於諸儒去取實關於偏見愛既深而智困才将盡而力窮豈敢辭勞固難勉力伏望聖慈察臣誠懇改命能臣儻亟見於新書亦何據於舊例代宰相謝除兼脩國史表燮調元化本非經濟之才潤色王猷更冒纂脩之寵属申舊例簡在眷慈辭不獲從愧無以諭中謝臣聞自昔二帝三王之事皆見於書當時列國諸侯之㣲亦各有史故春秋褒貶乃典謨之餘意而太史紀傳有筆削之遺風雖是非未必盡同然善惡終不可掩前脩己邈成法具存茍非其人孰堪兹事如臣甚陋遭世多虞方憂機務之繁復有文辭之責網羅遺逸豈無意於鋪張領袖諸儒徒有慙於去取亦其志也非曰能之此葢皇帝陛下肩堯聰明躬舜孝友念累朝之大典将就斯編付直筆於近司益重其選臣惟天地造化固難形容乃若日月徃來亦可推步彼不自揆各徇其情未忘牛李之私過為歆向之論此而不察後必難明願鑒已然精加核實亊将辭稱敢同左氏之誣言與意㣲庻洗馬遷之謗尚期訖事獲薦成書十二月上殿劄子臣聞古人有言曰為治者不至多言顧力行如何耳夫言而不能行自古所病譬之欲之燕者北首而趨不舎朝夕雖有遲速終必至燕若坐而説燕亦何能至此傅説所以言行之維艱而孔子所以貴夫躬行也雖然知之者不如好之者好之者不如樂之者好而樂之所以行也而必先於知之則知其可已乎葢不知而必行譬之適燕而南轅縱復疾馳心幽并而足吳越必不至矣臣觀墨子之道取茒茨土階之儉悅手胼足胝之勤摩頂放踵利天下為之則其所行宜若與儒者無異矣然孟子闢之以為兼愛無父作於其心害於其事作於其事害於其政不可以訓是豈儒者之所為乎故是堯舜而非桀紂儒墨之所同乃若堯舜之所以為堯舜墨固有所未知也未知堯舜而託於堯舜以行其私意此孟子所以正名其為邪說而闢之與由是言之行之維艱而知之亦未易也自王氏之學達於天下其徒尊之與孔子等動之以卓詭之行而矜之以華麗之文如以錦繡䝉覆陷穽悦而從之鮮不墜者行之六十餘年其禍已見今可以改矣而人之所知初無以異於昔也方此之時欲使天下學者背邪以歸正棄舊以圖新非反其所知以知聖人其能一變而至於道乎孟子曰學則三代共之皆所以明人倫也又曰聖人人倫之至也又曰堯舜之道孝弟而已矣夫學所以明人倫而人倫之至不越孝弟此固王氏以為淺近而不足知者而不知同天人通我物合内外之道有在於是是之不知其何以行之哉今陛下躬堯舜之孝弟行之既乆至誠感神而逺人自格其效己著豈非有以深知之耶然陛下既知而行之亦當使天下皆知之知而行之者衆則吾道不期而已至矣前年之詔諭天下學者當以孔孟為師是固然矣然王氏之説未即禁止朝野紛然莫知所適謂宜明示好惡一切罷黜使學者膠口不敢復道庻㡬各舎其故而天下之真知出矣臣不勝區區之心惟陛下裁察又上殿劄子臣伏見比年以来以宗室為添差場務官而使之釐務其為不可明矣而所在舊額監官外或加一二人已不勝其弊而其多有至於三四人者此非祖宗不刋之制也豈可不革且如州縣稅務嵗課自有租額虧則有罰増則有賞任其事者誰不願増然所増之課已極而所取之數亦有定例初不以官少而加損亦不以官多而加益也而居是職者供須之物使令之人不從官給一切出於務中圓融異時官止一員稍或貪鄙已足以侵官而厲民况額外復有添員乎又况所添至於三四乎十羊九牧祇益為累而内則轉相倣傚公肆侵欺外則挟官擾民僅同攘奪州縣豈敢禁止商旅為之阻絶校其所得今不異昔此臣所謂不可不革者也事極於此非痛與裁處必不能盡去前弊臣願自今場務官不復添差宗室使之釐務雖有例陳乞亦不當許所有見任及已差下者欲並改為不釐務官後来參部者或不願待闕皆以宫廟處之仍於州縣寄居所在限以員數如見行法不奪其禄使之足以自養不任以事使之得以寡過則親親之恩盡矣如臣言可採伏望睿㫖早賜改正施行又上殿劄子臣聞商旅不行則有無不能以相資有無不能以相資則物之有餘者常病於無用而物之不足者常患乎難得民始有受其弊者矣故舜之懋遷有無周之阜通貨賄不厄商旅乃所以利民而救其弊也自賤夫罔利始有征商之法葢惡夫茍得無厭将使人人棄本而逐末欲以是抑之耳及至後世算及舟車此何道也而自漢以来未之有改豈非國用待之而後裕耶由是言之古之征商抑其貪所以利民今之征商取其贏所以利國夫利國而不及民已非先王之意况其所征有甚於異日乎臣觀國家見行條法凡課利場務視元額多寡趂辦不及者罰之若増之過倍即有減年之賞應賞而有餘者十分之一以給官吏凡所以籠絡而督責之亦可謂盡其術矣而任其事者徃徃猶以為未足則商旅安得而不困乎故比年以来物價騰踊日甚一日貧民下户尤為不易皆由征商太重之故也臣不敢悉以所聞為言姑及近地之可見者只如是衢州至臨安水陸之所經由應税者凡七處使其毎處止於三十而税一不為多矣比及臨安於其所販已加二分之費而負載糧食之用又不在是是非得三分之息不可為也借使善幹其能於十日之間數百里之内致三分之息乎必不能矣如是則所聚之處誠不可以賤售所聚之處既貴則所出之處益不可以賤得此商旅所以不通百貨之直所以久而不能平也雖然此特常用之物而其害已如此至於用之所急一有不通其害尤甚如今嵗旱乾蘇湖雖不至大歉而衢信所收十無五六若蘇湖之米不移則衢信上下来年必至乏食此又人所甚急者如不早為之慮待其流離旋行賑恤亦恐無及故米麥之税臣願權與除免使商旅轉販得以私相接濟久之價平則人人可與備預不至重貽宵旰之憂矣此聖主所以留意不可緩者自餘可税之物縱未能盡如祖宗之舊亦當明諭有司視其所販之直惟務蠲減不求甚増宜足以救目前物貴之弊也萬一臣之愚慮偶合聖心欲乞先下兩浙徧及諸路災傷去處並令依此施行臣不勝過計之至惟陛下財幸論放税劄子臣聞君者出令者也臣者行君之令而致之民者也此古今不易之道也茍出乎上者已審而行乎下者無稽違廢慢之失則上之徳意志慮無不孚於民而民咸被其澤矣徃者宣和之間權臣用事播告之外自有風㫖為吏者從其風㫖而不從其言罪弗及也以故一時號令不信於天下雖寛恤之詔季一舉行掛之牆壁徒為文具而已上意益勤民情愈怨愁嘆之氣熏穹纒壤無所赴告遂為今日離解之禍葢吏不能行令之過也陛下即位以来深監其弊茍有方命必罰無赦内外小大之臣宜其精白一心以承休徳無敢不恭而貪殘之吏尚仍舊習有累聖政臣竊憤之今年春建冦既平陛下加惠一方宥過無大所以洗滌瑕疵蠲除逋負安集奔竄無不曲盡徳至渥也令下未幾已聞州縣之間百端沮抑莫肯奉承論者以為患陛下既已明示威福而申告之矣今又聞赦文以上四州軍殘破為甚全放今年二税下四州軍不免騷擾止取具半而吏引著令諸稱赦放者不得過三分盡追其餘以備急闕是以一定之典而輕議非常之恩以厚誣之計而力沮已行之命遂使陛下愛民之詔㡬成虛發此而不懲無以示信且舊書所載或以故例或縁泛㤙所指無定處所釋無限量今以兵火之後傷殘凋瘵之餘曲示寛典固不同矣又况喪亂已来民不堪命常賦所入十才得四五止取其半猶慮惠不及民况十取其七乎自甌粤之亂陛下為之宵衣旰食者二年於此至遣執政大臣國之良将親徃平之然後復安既安之後所賴以撫綏吾民者唯監司守令而已而行法如此陛下何望焉若其事出於監司宻諭而守令奉之與夫守令率意擅行而監司勿問皆不能無罪也臣愚願先降明詔諭以前日之誠意立行改正然後核監司守令稽違廢慢之實嚴賜黜責自今以徃庻幾貪殘之吏不敢舞文以為奸倚法以僥倖臣不勝區區之心惟陛下財察論莫將除徽猷閣待制奏状右臣伏覩十一月十一日奉聖㫖莫將奉使宣力特除徽猷閣待制京畿都轉運使兼主管奉迎梓宫一行事務臣聞祖宗朝慎重名器未嘗輕以假人至於次對之官尤所吝惜惟徳是命不以賞功異時有嘗為侍從帶權字者雖復積年或遷外任猶不以是予之則下於侍從之列從可知矣自崇觀以来蔡京用事專於私㤙敢違舊制凡被此選者非京之親則其黨與也至今人無賢愚皆知其非方陛下中興之初舉偏救弊大振頹綱如此等事豈宜不改臣謹按莫将昨自司農卿出将使命曽未累月遽有此除近例所無實駭觀聴臣初與将不相識但聞外議籍籍皆以将為乗時射利之徒未必有守陛下灼見其才足以倚辦斷而用之正須假以嵗月俟其績效稍著粗厭人望然後以次命之似或未晚况聖主用人顧眄所及人自知徳豈特美遷方肯盡力若使事有前比固非令猷如其不然庸可以一将之故遂廢萬世可行之法哉臣職在言路創見此舉事干政體不敢緘黙伏望聖慈特寝已行之命以允公議或不得已於近下職名中處之不獨使朝廷恩賞有名亦使將輩知美官難得安於分守以待任使不至過有僥倖臣不勝區區之忠惟陛下裁察謹録奏聞伏候勅㫖乂右臣今月十五日具奏言莫将以奉使宣力除徽猷閣待制不當乞於近下職名處将未䝉施行臣之所論未敢遽已臣聞人主用人其情出於喜怒之初而其事見於予奪之後喜而未予人猶以為榮怒而未奪人猶以為懼葢榮之者榮其方来未已之恩懼之者懼其後日必至之患今陛下棄法而用将拔擢之意人皆知之雖復改命而用将之意猶在也将其有不知耶故疏恩以示情吝予以應法稍就近下職名處之無損於将又合公論可謂兩得之矣臣章未降外議沸騰臣縱欲緘黙不言以固初寵亦何以上副陛下廣開言路之意哉臣惟徃者尹焞亦自卿聫命以次對之職葢由焞先除從班續以疾辭至於十數朝廷惜其老不可留以此寵之所以命有徳也於将何有焉将固非焞之比借使其才可用亦須俟其有功然後加以此名庻厭人望自古才有餘而徳不足者饑則為用飽則颺去先為之極何以使人陛下必以奉迎梓宫使之應辦欲重其事與之以其所宜得者不復盡奪已為過於厚矣将復何求臣所惜者非分之恩所畏者衆多之口事干政體豈可雷同伏望聖慈念臣職事之所當言察臣忠朴之所宜守必賜俞允以示聴從臣不勝俯伏待命之至謹録奏聞伏候勅㫖論宰執不和奏状右臣近聞宰相秦檜與㕘知政事李光因御前奏對互有異同不知所争何事而外議紛紛以為大臣不和有累國體臣身在闕門之外得之傳聞恐非其實以此累日未敢論列今又聞檜以疾在告光亦乞去則是大臣果有不和之迹矣臣職在諌省豈可不言臣聞舜命九官濟濟相遜和之至也衆賢和於朝則萬物和於野故簫韶九成而鳯凰来儀擊石拊石而百獸率舞夫功成作樂寫人心之和而已樂作而物應其理固然然所以感之則出於人心而非樂也子思子曰喜怒哀樂之未發謂之中發而皆中節謂之和致中和天地位焉萬物育焉夫中者和之隐於心而和者中之見於發者也此内外之符也通天下一氣耳動於此應於彼間不容髮矣致之有道則天地安得而不位萬物安得而不育兹其所以為舜之時乎且中無常位以偏而後見中足以召和而偏亦足以生乖和氣致祥乖氣致異各以類應而國之安危係之葢自古及今未有朝廷不和而能有為於天下者也今陛下躬行孝弟而逺人請盟不以兵車而疆土自復臣雖愚懵亦知其所自矣而朝廷之上一二大臣陛下所與同心恊謀以終中興之功者方且各持偏見不能共和以濟國亊臣未見其可也且光與檜争其事之大小緩急臣固不得而知之也然事小而緩亦當退而合議進而聴㫖都俞之間一言可喻何至廟堂之上聲色俱厲取笑四方乎昔光為小官已能力抗朱冲及陽朔之貶一時稱之逮守宣城譽望尤著然其性素剛不能下人屢進屢退皆縁難合而檜亦喜其為人引與共事光又謂檜臨難嘗有不奪之節欣然肯來惟上所用亦既踰年矣今者不顧徃日之契而驟起異同之論事之輕重有不及慮而分之上下有不暇恤則其意必有在矣况非一朝夕之積也必欲其再合宜非他人所與者在陛下訓諭之如何耳若復丁寧告戒以今日之所當務者使之忘私以徇公宜若可合而猶或不能無芥蔕於胷中則其不能相與久處也可見矣縱復可以久處其不能降氣以相從恊力以濟務又可見矣夫亊有是非理有曲直非獨二人者自知之陛下固已深知之矣大臣去就固自有義進退之際惟明主裁之謹録奏聞伏候勅㫖論鄭億年除資政奏状右臣伏覩正月二十八日指揮鄭億年復資政殿學士依舊提舉醴泉觀行在居住仍奉朝請臣聞賞罰者國之紀綱也聖人用之有萬世之公有一時之權萬世之公可常而不可變一時之權可暫而不可久故能賞當其功罰當其罪而國之紀綱立矣今者忘萬世之公而任一時之權用賊豫之所以悦億年者以寵億年將使為善者不勸而為惡者不懼無益於紀綱而有害中興之政臣固不得不論也臣謹按億年故相居中之子雖嘗為從官無他技能而有從賊之醜夫陷於賊固非人之所欲然從之而得美官必有取非其道者因赦而復之是以賊豫之所悦而與之者為正也其可乎且去嵗大霈所謂權也凡有官者不奪亦所以安反側耳而又有褒而遷之者以其不辱僭叛其義不可掩也又有遷而用之者以其明習将畧其才不可廢也億年名在侍從之列其可自同於反側者乎其義果可褒而其才果可用乎此不待臣言也然則用權以廢公非所以待億年亦明矣而其所以可恕者宰輔之世身為從官不幸而陷於賊為不足誅耳然居中之秉政無状天下所共知者億年夤縁以取兩制使無他過以至今日猶在討論追削之域而况於已嘗從賊不奪舊官而加之以職名乎夫以從官所宜得之職名在億年尚不宜與則執政所宜得之職名億年其可與乎且資政隆名賊豫之所竊而與之者也固不可以言復矣陛下必以復為言者則已著其從賊之罪矣使億年粗有知識必不敢受强而授之則彼以義而獲褒如凌唐佐李亘之黨必曰億年以仕賊亦褒矣吾屬何榮彼以才而見用如李顯忠趙彬之輩必曰億年以負國亦用矣吾屬何安由是而推之必又謂嘗為賊豫将相者他日來歸未必不以将相處之也此聲一傳誰不解體是以一時之權寵一億年初無所補徒使為善者不勸為惡者不懼自壊賞罰之紀綱而更為今日中興之累也此而不改民将失望後必難悔矣伏望斷自聖心将億年所帶職名特賜追寝使之在外居住庻幾逺去班列少息紛紛之論臣不勝幸甚謹録奏聞伏候勅㫖代江西帥李丞相薦蕭茂徳奏状臣伏覩臨江軍進士蕭建功介特自守而勇於為義親仁好善而無所茍合居於峽江之上人無賢愚皆欽而愛之幼喪父事母至孝杜門養志不汲汲於進取方盜賊並興所過焚蕩惟建功所居之廬獨得不燬人以是推其賢故贈諌議大夫陳瓘以論蔡京奸惡得罪竄嶺表累年既還而其子正彚復以言事投海島流離困餓無所依歸天下皆知其忠而不敢顧恤其家建功獨徃師焉瓘竒之遂妻以正彚之女其為賢者所愛重如此又故贈寶文閣待制李朴紹聖間因議隆祐太后之賢為小人誣告乆坐廢黜晚得令臨江軍之清江縣既罷官貧不能歸建功築室延之朝夕執經問難惟恐其去故二人之學建功得之為多至其洞曉物情練習世務又自有過人者方朝廷急於得才共佐中興如建功輩豈可終棄謹因臨江軍之請益以臣之所聞仰溷天聰乞賜收録庻使山林脩潔退藏之士仰體朝廷招徕之意不忍韜晦競為世用臣不勝區區之願惟陛下裁察謹録奏聞伏候勅㫖黙堂集卷十二欽定四庫全書黙堂集巻十三宋陳淵撰辭免舉賢良状右脩職郎改差監潭州南嶽廟陳淵准尚書省紹興七年六月一日劄子左朝散郎充徽猷閣待制提舉江州太平觀胡安國奏承潭州公文准禮部牒三省樞宻同奉手詔中外侍從之臣各舉能直言極諫之士一人者臣伏見右脩職郎權江西按撫制置大使司主管機宜文字陳淵深究先聖之㣲言能談當世之要務通達國體曉知政經若獲造廷俾攄所藴必有忠讜上副訪延伏候勅㫖五月二十八日三省同奉聖㫖劄與胡安國依紹興元年九月十一日已降指揮具陳淵詞業繳進劄付淵須至申聞者右淵竊以賢良方正能直言極諌之舉起於漢之孝文盛於武宣逮其衰世猶不敢廢故得人之盛至今稱之唐因其制進士之外設為制舉以待非常之才一時名臣多此塗出至於本朝尤重其選既舉之以侍從之公又稽之以平昔之業必也行藝適稱然後試之以六論詞學俱優然後考之以廷對葢每發必中始獲與選斯亦可謂難矣自非深窮經史百氏之書博考傳記諸儒之說通達國體明習世務必不能仰副朝廷招徠之意如淵學問荒疎志業無取至於文墨尤不足觀豈可茍冐榮名自取黜辱所有繳進詞業指揮不敢承命謹具状申尚書省伏乞照㑹施行謹状紹興七年七月日具位赴召與執政劄子淵徃者蒙㤙賜對旋復被罪朝廷憫其無他特與洗滌更縁薦引置之樞府編摩之地遲暮疎拙懼不能當尋請嶽祠庻幾亟獲㣲禄可以自活自承改命以來忽已兩考方幸投迹丘壑少酧素志今兹又蒙収召顧職分則不敢違禮而飾辭念庸妄則難以冐榮而茍進徬徨失據驚悸成疾乆之不免扶持就道冀逭有司慢令之誅而已無何纔至闕下重蒙睿㫖再令登對揣已無堪益増愧恐恭惟廟堂諸公以堯舜之道輔佐聖主固将盡攬天下英才同徳一心共濟艱運海内遺逸之士誰不歸心如淵等輩鳬鴈飛集初無損益伏望啓迪之暇略賜開陳使不肖者姑以奉祠之禄待罪山林終此一任因之自免以老就閒如是則是非昭融取舎公當非唯少弭朝廷一時過聽之譏亦所以興起天下彈冠願仕之志淵雖與鹿豕為群其幸多矣
