body:
  text: 賀張左丞遷中書伏審被恩丹禁貳政紫微九天之成命星馳萬國之歡聲鼎沸竊以輔弼之任古今所難取之於陶漁者以上下之交孚求之於夢卜者以精神之感格豈如聖世擢自近司道之將行人惟求舊恭惟某官學優而識逺才大而氣充天下服其無雙中朝推為第一頃登丞轄宻贊政機忠義自結聖知紀綱為之日振久膺眷倚益茂勲猷將飛歩於台躔姑濯鱗於鳯沼某久違鈞席竊守鄉邦應龍翔而雲霧從但覺層霄之逺大厦成而燕雀賀庶無零雨之憂慶邦家之有光均生靈而受賜其如喜躍實倍等倫賀王右丞遷左丞代人恭聞明命寵任宗工進司左轄之權益振中臺之氣士夫相慶海㝢交歡伏以某官學造淵㣲氣充剛大青天白日誰不仰於清明璞玉渾金終莫名於器用薦居要路偏歴榮途富貴固已自知功名乃其餘事正應眷注獨賴經綸總領文昌坐致紀綱之肅運動樞極佇觀霖雨之施某蚤綴從班久依鈞庇葢将慶生靈之福豈獨深知舊之情身滯南州正逺龍門之峻神馳東閣徒忻燕厦之成喜躍之私敷宣罔既賀李内翰遷右丞代人伏審光膺帝制入賛國鈞凡在陶鎔誰不鼔舞竊以文章之妙本於精神之㣲功業之隆發於道徳之緒惟書於簡者油然而不竭故施於政者沛乎其有餘正須得經天緯地之才乃能當提綱振領之任真儒登用學者共榮恭惟某官吾道大醇斯民先覺金口木舌教已達於士林錦心繡腸名獨髙於詞苑果從内相進貳中台縉紳斂袵以避車馬之塵夷夏傾心以幸霖雨之澤葢将為天下之福豈獨見朝廷之尊某蚤綴從班久依台席逖聞休命遐想英逰剖竹分憂正滯南州之守登龍稱賀阻陪東閣之賓傾頌之私款誠難叙賀張中書代鄭漕恭聞明制寵任宗工由中台丞轄之司陞紫㣲機宻之地輿情交慶萬口同聲伏以某官學際天人識該今古泰山北斗愚賢莫不共尊寶鼎元龜華夷之所倚重薦居要路徧厯榮途富貴固已自知功名乃其餘事頃參國政式副民瞻将飛步於台躔姑濯鱗於鳯沼方上下交泰之日實生靈受福之初某自逺台階屢更嵗籥側聆播告但劇愉歡攬轡觀風正擁南閩之節登門稱慶莫陪東閣之賓瞻頌之誠敷宣罔既又賀王左丞代人伏聞明制寵用大儒峻躋左轄之隆増重中台之勢士夫胥慶夷夏交歡恭惟某官吾道大醇斯民先覺泰山北斗人皆仰之白日青天誰不知者頃登丞弼茂著勲猷管轄文章坐肅萬機之本運動樞極行調一化之元即正鈞衡豈待旬月某久依台䕃逺馭使軺應龍翔而雲霧從但慶亨嘉之㑹大厦成而燕雀賀庻無凌震之憂喜倍常情言莫能叙乂賀李右丞代人伏審光奉明綸入㕘大政郵音逺播輿頌交興竊以古今所難得者輔弼之才聖賢所甚重者出處之節欲使堯舜湯武功大而名顯亦在臯䕫伊吕言聴而計從自謂得時足以行道側聆政柄允屬儒宗名實已加於人勲業可立而待恭惟某官學優而識逺才大而氣充以金口木舌而鳴其道於士林以錦心繡腸而振其聲於詞苑遂由内相進貳中台推經天緯地之文處振領提綱之任聊試鈞陶之手益觀柱石之才朝廷得人縉紳増氣某逺違鈞席久玷使星持節南州正逺龍門之峻寓書東閣但欣燕厦之成喜忭無涯款誠難叙賀楊亷訪轉官代黄兵部伏審光膺顯命峻陟殊階公論攸宜輿情胥慶恭惟某官異才超絶偉量宏深咳唾成珠久矣㕘天於咫尺威稜揺嶽暫兹持節於東南徳厚不居功成必報果䝉異眷亟奉寵恩某竊庇餘輝預聞盛美其為喜躍實倍等倫賀俞提刑賜帶代人伏審顯被異恩榮膺珍錫餘光所逮同列増榮恭惟某官名自聖知才出衆上貪鄙望風而竄伏奸兇絶迹以氷消智畧著聞旌崇惟稱雲章千字屢聞踰衮之褒寶帶萬釘更佩横金之寵某久依䕃潤尚阻趨承慶盛事之流傳撫懦衷而竊抃賀張市舶再任代人伏審䟽恩甚寵圖舊惟專共知委注之隆交慶功名之㑹恭惟某官才猷夙著譽望益休乘軺蚤應於使星衣錦遂還於仁里舳艫輻輳日聞夷俗之歸心寶貨雲屯坐見海商之富國以兹成效未易重權自憐挽粟之非才行即及𤓰而受代喜宸衷之篤信倍輿頌以増歡賀張侍郎知福州代人伏審出殿大藩歸榮故里宸衷委注靡拘三互之文民意悦孚幸被二難之政縉紳為之聳動父老莫不歡呼恭惟某官學造淵㣲氣充剛大忠貫金石而濟之以勇謀合蓍龜而發之以誠權豪斂袵以避車馬之塵中外傾心以徯霖雨之澤他年同氣去私之徳未忘此日專城來暮之歌繼作實伯仲一時之盛擅江山千里之雄雖卧閤之尚淹亦過家之可樂某叨持使節久駐鄉邦深慚衣錦之非才方幸及𤓰之有代輕裘緩帶儻陪咳唾之音挽粟飛芻猶賴提攜之力其如喜躍曷易名言賀耿提刑賜帶代知府伏審拜綸章難得之褒被鏐帶非常之錫宸㤙甚寵輿議交歡恭惟某官深宏博大而濟之以明正直剛方而行之以恕家傳儒學獨髙投筆之風人畏威名共仰埋輪之節遂使山林無嘯呼之警囹圄息愁嘆之聲澤被全閩功施鄰壤九環束衽坐令衣繡之増輝萬里封侯行㸔佩魚之加賜某叨膺符竹宻庇仞牆適飛騎之逺征悵登門之尚阻其如喜躍曷易名言又賀張市舶再任代人伏審載奉明綸仍持舊節甚矣報功之速信哉圖任之專凡在庇休誰不忻躍恭惟某官忠誠自許志業推優富貴固已前知功名乃其餘事三年故國寧矜衣錦之榮萬里逺夷不絶獻琛之願遂使百賈輕風波之險而悅於招致萬寶如丘山之阜而易以征求積此顯庸宜膺久任某叨承郡寄幸竊台輝曽尺牘之未修遽珍函之先及拜塵尚阻賀厦已稽喜與愧并言莫能叙賀胡帥到洪州伏審祇奉宸恩光臨帥府屈朝廷之元老而専豈弟牧民之任當閫外之重寄而有富貴還鄉之榮凡在見聞誰不慶戴惟南昌之故郡實江右之雄藩旁連荆衡近控甌粤訃安千里政常病於難成兼制九州患多萌於不慮矧今烽烟時警軍旅方興未紓北顧之憂始置南巡之議寛大之詔屢下逺邇之聴未孚兵數潰而益驕民既窮而多怨以姑息為抑强之術者不念蜂蠆之有毒以暴征為足用之計者莫知根本之易搖将因循而弗圖則緩急以何賴宜得萬人之傑屹若長城坐令十國之連固如磐石恭惟某官恢閎博大簡易端方通郤縠之詩書深明其變兼吉甫之文武何適不宜葢嘗保城社於孤危莫援之餘而能全身名於艱險備嘗之後蘇武之漢節猶在相如之趙璧終歸再居喉舌之司仍受腹心之託雖神明所䕶獨昭忠義之誠然夀考無疆實係生靈之福顧東南久爾無備而守牧未必皆賢方此屯邅尤資彈壓必欲盡蠲逋負一洗煩苛息争訟於笑談之中絶奸宄於罇俎之上江山佳處窮昔日之勝逰管籥聲中召一時之和氣副上所倚非公孰能但以經綸尚鬱於巖瞻智畧獨埀於睿想雖過家之樂足以自慰而居外之久豈其所宜諒衣錦之莫留忽賜環之已至甘棠小憩誰無召伯之思緑竹難忘行㸔武公之入淵迂疎末學坎壈餘生卑哉枳棘之棲甚矣泥塗之辱浚都飛斾共傳五馬之良滕閣揮毫未列三王之次登門尚阻賀厦無從但伸慶問之勤莫究瞻依之切賀許左丞少伊伏審光膺帝制入賛國鈞位升左轄之隆氣凜中臺之峻朝廷増重海内交歡竊以古今所鮮有者輔弼之才君臣所難偶者聖賢之㑹幽明黙契熊羆前兆於蟠溪精爽潛交舟楫忽形於傅野豈如明世擢自近班道之將行天豈無意恭惟某官學臻聖域徳秀儒林文章一世之楷模業履三朝之標準泰山北斗賢愚莫不共尊寶鼎元龜華夷之所倚重正應眷注獨賴經綸管轄文章坐肅萬機之本運動樞極行調一化之元然而當國家多難之時任春秋賢者之責宜盡攄其素藴庻亟慰於輿情似聞造膝之間屢啓沃心之論雖天地通氣莫窺澤物之功而山川出雲已有為霖之望淵登門有舊仰庇殊深悃愊之辭欲少伸於知遇歸依之素實兼倍於等夷傾遡之誠敷陳莫究謝辛帥代用中提刑親闈結戀方辭寵於省曹天度遂私俾按刑於鄉部異恩曲被綿力難勝幸借潤於餘波庻少安於孤迹恭惟某官名傾四海勇冠三軍赫然百戰百勝之威偉矣萬舉萬全之䇿早膺宸眷久直禁嚴暫分閫外之權一定海隅之擾蜂屯蟻聚初煩禆將之陳師電掃風除遽慶平民之復業飛聲逺暢後患潛消遂寛南顧之憂益茂中興之業某偶縁叨冒幸竊庇庥究觀施設之有方巳覺妄庸之可勉行圖㕘觀躬奉教條粗伸感激之私莫罄瞻依之切回南劍通判伏審顯膺帝制來佐侯邦竊聆視事之初尤慰依仁之願恭惟某官材猷卓越術業精深未陞禁路之華姑副題輿之選淵負疴退處進謁未皇遽承飛翰之先臨益愧登門之尚阻回廖提㸃典屬籍以睦親既叨優選侍經帷而講道併荷殊私榮寵有加愧懼増劇此葢某官真誠篤厚雅量恢𢎞身雖退而道益伸年彌髙而志逾勵情深憂國毎思被髪以纓冠志在得人惟務匿瑕而藏垢致兹晚暮屢被超除方圖尺牘之修遽奉雙魚之遺其如銘佩曷罄敷宣代鄧彦通及第謝陳達野運使草茅賤士瞻日月之餘光糟粕腐儒奉絲綸之明詔此古人難以必遇在今日乃得盡言敢論末第之㣲但慶平生之幸竊以三代賢能之書廢兩漢選舉之法疎道不同條人為異趣華藻名家之學激昻死黨之風因循東晉之清虚熟爛李唐之詞賦功名富貴尚多有之用舎行藏無足道者賈太傅因讒夫而傷古張廷尉貶髙論以徇君十事要功甚矣姚崇之譎三書自薦惜哉韓愈之卑賢者未免有疵衆人夫復何望若夫顔子之樂陋巷孟氏之㳺諸侯其處也藏器待時其出也殉身以道亦曰得君而後用固非異俗以為髙方嘉㑹千載難逢適大聖萬世一遇宜展山林之素藴以膺廊廟之旁求志雖止於為貧進不妨於行義此所以盟心鐵硯裹飯棘圍雖鼔瑟不利於干主而焚舟必期於圖霸如某者嶔􅏟厯落真可笑潦倒麤疎已不堪詩學毎懼面牆下筆固無腹稾流落喪家之狗浮沈水上之萍久待詔於公車屢隨書於禮部周旋反復者四千里不啻險阻艱難者二十年有餘呵故將於夜中誰非醉尉辱王孫於胯下盡是少年趨時自知不工立意誠亦有待乃者畏貽譏於畫虎妄有意於連鼇復縁鄉吏之薦名遂預春官之别考孤軍當隊逺鴈失群不圖寒族之㣲忝在貴㳺之末雖遺羮無路空餘寸草之心然捧檄承顔不負一經之教静量忝竊葢有夤縁此葢伏遇某官道大兼容仁深樂育一麾南國三載故鄉衣錦飛榮復擁八城之寄登車思治坐令萬物之春曽是品題致䝉收録念昔曳裾而稱客於今斂板以趨庭雖禮數之相遼諒故情之猶在竹頭木屑既叨暇日之收馬勃牛溲願備異時之用過此以徃未知所裁代彦通謝陸徽猷舉状少年激懦妄意功名晚節知難敢論經濟甘作求田問舎之計尚餘愛民利物之心黽勉無堪因循多愧三年均地幸逃消骨之深憂百里牧民更覺吹毛之可畏神迷獄訟力困簿書自貽傷錦之譏有負割雞之戱折腰而戀五斗本出為貧攘臂而受三鍾方虞責實豈期金諾誤賜衮襃初無左右之先容獨信平生之可保此葢伏遇某官名髙當世徳冠群公他日讜言石投水而黙契至今幽黨雪見晛以無留淮陽非汲直所居河内惟冦君之借暫據蕃宣之地益隆清浄之風毎思便亊以臨民更欲得人而宣化致兹庸陋誤辱眷憐豈惟寸進之階葢是終身之託竹頭木屑奚棄物之足收雞壅豕零庻有時而可用刳肝難叙刻骨敢忘代趙令賀吉州楊龍圖伏審光膺宸命榮鎮侯藩凡屬庇庥舉皆欣抃惟螺川之劇郡實江右之奥區國家念千里之遙毎嚴選擇朝廷屈萬人之傑實賴蕃宣恭惟某官器識恢宏謀猷深逺亟赴功名之㑹少攄經濟之才不鄙逺民肯臨外服三刀作夢聊施撫字之勞五袴興謠竚見循良之譽某備員屬邑託迹下僚披霧有期未覺江湖之逺拜塵尚阻敢稽竿牘之脩祝頌實深敷宣罔既荆南府謝解崇寧乙酉燕國求賢姑從隗始漢壇論將驟以信登選雖自公得豈無媿竊以望隆南楚境接西州右襟唐鄧之墟左據衡湘之㑹實四方㳺宦以為重地故一時同進莫匪名家父子彪固之相傳兄弟機雲之並出文摛錦繡義薄雲天陽春白雪之歌故應寡和流水髙山之意况有知音自非卓爾之才曷稱褎然之舉如淵者性甚榆㝠材惟樗散嘗聞長者之謦咳竊窺大道之淵源同物我之殊觀㑹天人於一理回亡未聞好學妄意庻幾軻死不得其傳儻或在是年今及壮志尚未成守業益堅顧舎鏝之焉敢干時甚拙嗟鼔瑟以何求憶昨誤玷賢書偶隨方貢旋見遺於蘭省因自託於璧池展黄卷以自娛敢有虀鹽之厭望白雲而興歎永懐菽水之歡遂息慮於功名仍退安於寂寞不問雞蟲之得失但知鵬鷃之逍遥然而南畆投閒雖一㕓而已足北堂致養乏三釡以奚堪遽離劍水之潯再指梁園之曲周旋徃反者馳驅動四千里險阻艱難者前後葢十餘年道心蕩於名利之㣲日力費於科舉之末素匪萬全萬舉之智殆貽三戰三北之羞義所難安事非獲己何蕃在學久未寧親李漢求師因而授室雖在荆湖之逺實同洙泗之逰方探聖賢之用心豈知嵗月之将老鳶魚作士分長謝於西雝芹藻育才偶暫留於魯泮方外臺較藝之日乃諸儒決勝之秋勉臨矢石之間已甘氣竭繆借吹嘘之力曲致灰然何期揚粃在前積薪居上禰衡一鶚既叨知已之榮劉氏二龍復與同門之慶可謂幸矣何以當之此葢伏遇某官吾道大醇此民先覺思皇王國之多士樂得天下之英才規矩準䋲足以器成後學抑揚去取自能風變斯文致兹妄庸首與掄採荆龜納錫幸充前列之珍齊鳥奮飛願鼔沖天之翼過此以徃未知所裁福建鎖試謝解溝中斷木文已謝於青黄爨下焦桐音偶諧於律吕得非所望愧甚於榮竊以庠序育才科舉取士三年論秀疎宻適得其中厯世垂觀英傑並由兹出頃縁補敝浸廢前功稍仍祖宗舊貫之良庻招巖穴異能之彦彈冠競起共矜白雪之歌結軌偕来莫匪青錢之選況七閩儒者之盛萃八郡貴㳺之多父子彪固之相傳兄弟機雲之並出家家抱璞一一吹竽自非必勝之才曷稱至公之舉如某者伶俜冷族蹭蹬畸人備厯險艱飽嘗憂患他時狂妄真有意於屠龍晚節邅回僅貽譏於畫虎終負一鳴之願莫酬十上之勞繼被特㤙尤乖初志退不能隠居而求志進無以立身而揚名工商既已恥為饑凍從而見迫鬱鬱簣中之恨悠悠胯下之思因忘操瑟之徒工更欲焚舟而再戰雖無古意類流水之難知尚賴先容庻朽株之可器獸既困而猶鬬灰已死而復然豈窮蹇之敢期實品題之有自此葢伏遇某官取人以恕與善無厭樂育天下之英才思皇王國之多士激揚所逮幸嘗借於餘波陶冶而成更兼收於棄物致兹庸妄過被選掄敢不仰體深仁益圖来效竹頭木屑既䝉暇日之儲馬勃牛溲當備異時之用過此以徃未知所裁代龜山謝許侍郎少而為學但稽糟粕之傳長也效官甘視牛羊之壮徒爾畫墁而求食未嘗操瑟以立門因無取於匠氏斧斤之餘遂自棄於化工鑪冶之外自頃聖神震起學校鼎新收之投閒置散之中處以傳道授業之任三年南楚始幸脱於虀鹽百里東吳復自纒於朱墨人民社稷之寄惟重財賦獄訟之責實繁方虞製錦之難未省割雞之易折腰以為五斗将終身焉仰首而效一鳴非其志也正慮轉喉而觸諱誰能搖尾而乞憐豈期特達之知誤被孤寒之迹襃逾華衮諾重千金自昔嘗聞於今親見此葢伏遇某官思皇多士樂育英才謂以道而事君宜薦賢而報國忽此吹嘘之見借非由左右之先容為其不能枉尋使之得以寸進頑非木石銘在肺肝敢不益勵初心愈堅晚節守先王之道以待後學尚期素願之獲伸論國士之風而報己知猶幸窮途之可勉謝太守舉状伏蒙照牒舉某堪充縣令親民任使者遲暮無堪徒自縻於寸禄低徊未去猶結戀於餘輝實虞譴斥之難逃敢冀薦論之誤及寵榮逾分循省若驚竊以自昔上臣事君以人當時賢士樂道忘勢其或降志辱身以自溷必也虛心屈體以勤求葢惟上下之相資莫知貴賤之有間世道並喪風猷浸隳居下者以難進為拙謀挾貴者以旁招為餘事公論殆廢私謁肆行待價而沽顧連城而莫售無因而至雖照乗以難前儻乏先容孰非棄物如某者駑駘下駟樗櫟散材本無富貴功名之資敢厭塵埃箠楚之冗人言鸞鳯難堪枳棘之棲自顧鷽鳩但覺蓬蒿之適憶昨去家千里佐政一同息肩纔逮於兼旬捧檄遽趨於鄰境銅章攝事再逢隴麥之屯雲蓮幕服勞兩見江梅之飛雪幸逃瘝曠皆出庇庥黔慰我心初乏細民之譽髯令公喜謾貽同列之譏因引分以退歸庻遜賢而免咎深戒冶金之躍忍為轍鮒之呼豈謂搜揚曲記疵賤此葢伏遇某官至公處已内恕及人恢大度以并包推至仁而普施致兹衰朽亦累陶鎔識慮迂疎豈精明之足取學問荒廢何該博之可稱過形踰衮之襃仍借重金之諾頑非木石銘在肺肝敢不洗滌初心激昂晚節青雲在望曽揮附驥之鞭黄閣言旋行曳登龍之履迎賀吉州楊龍圖伏審茂膺宸檢榮領郡符由使星已試之才而屈守偏方綴延閣至近之班而俯臨逺服暫假朱轓之重一分黄屋之憂矧江右之名邦惟廬陵為樂土豐穰仍嵗而倉廩充實奸宄絶迹而閭里恬安不煩撫字之勞已底和平之治共傳豈弟孰不歡忻恭惟某官杞梓異才珪璋德器文采一時之傑特謀謨異代之忠嘉雖更委任之煩未暢經綸之志愛民有素行聞五袴之歌居外豈宜聊應三刀之夢某箕裘腐學枳棘卑棲簿書期㑹之間此生已老捶楚塵埃之末萬事忘情震風懐夏屋之安披霧幸青天之覩炎威已極未親一扇之風奔走無階敢後雙魚之問傾慕之至敷述難周回南劍太守親闈結戀方辭寵於省曹天度遂私俾按刑於鄉部異恩曲被綿力難勝賴撫字之得朋庻衰遲之可濟恭惟某官忠惟憂國志在康時眷言彫瘵之氓日軫哀矜之念餘波所逮尺朽知榮洗垢索瘢已戒煩苛之令賣刀買犢尤資豈弟之風豈謂勞謙遽貽榮問辱奨提之甚惠覺孤陋之難當尚阻瞻承徒深愧感回郡縣諸官被命中宸按刑鄉部恩隆望外愧溢顔間念非剸劇之才謬處觀風之任幸依輝䕃庻逭譴訶未皇竿牘之修遽奉緘謄之賜謙勤過甚感激難名尚阻参承第深瞻跂除察院回外官賀状祇奉宸恩叨居臺屬得非其稱愧甚於榮此葢某官宏度包荒至誠與善以平昔吹噓之賜振暮年鬱滯之餘刮垢磨光方幸聖時之不棄揚清激濁實虞公議之難諧方将益講前聞徧詢先達正恨披雲之阻遽蒙墜翼之先感佩兹深筆舌難究又回曽提刑蓬山藏拙久慚英俊之㳺烏府效官復玷忠良之選超踰過分憂懼増深此葢某官學造精㣲氣鍾純粹闢邪以正至言追孟氏之風用罰惟中餘事乃蘇公之意達之氣類雅賜吹噓致此賤庸亦蒙收録未暇遂情而伸感先䝉貶誨以示勤祇服眷私但深愧戢除正言回楊通判糾違曠責已慚六察之聯掌諌非才更預七人之列超踰過分感懼増深此葢某官義動簮紳名傾朝野風雨不渝於常度雪霜彌見於後凋江國並㳺嘗曳龍門之履蓬山承乏亦㕘驥尾之塵仰盛徳之無疵奚間言之能凂暫從監郡久未造朝雖中外之迹稍疎而眷奨之情益厚致兹朽質亦冒殊恩未皇竿牘之修遽奉緘謄之賜其如感佩曷罄敷陳答蘭溪宰糾違曠責已慚六察之聫掌諌非才更預七人之列超踰過分感懼増深此葢某官學造精㣲氣鍾純粹追風無逺嗟絆驥以何施㳺刃若新歎割雞之焉用乆矣知交之厚偶兹出處之殊推先毎恨於言輕居上獨慚於後至匿瑕藏垢素荷兼容激濁揚清實資延譽致兹朽質亦累誤恩未伸感徳之私遽辱飛牋之及其如銘佩曷罄敷宣回黄知縣伏審光膺宸命榮綰縣章百里蒙仁共慶若人之君子一㕓託迹愧非賢者之大夫未伸桑梓之恭先拜瓊琚之贈謙虛下逮愧懼滋深恭惟某官豈弟撫民公清率下誕布優優之政不求赫赫之名堂上鳴琴方擴愛人之學桑間馴雉已彰遂物之仁牛刀姑試於小鮮驥足肯辭於峻坂顧惟遲暮幸竊庇庥堯庭方戀於朝班偃室阻陪於賓序正恨龍門之逺遽勤衮字之襃但切感銘若為報稱除宗正少卿謝胡運使典屬籍以睦親遽叨優選簉經帷而談道併荷殊私退省非才實愧公議此葢某官異才間出雅望素隆論思宜在於朝端漕輓尚淹於外計不忘亊道固将以道而事君惟務足民葢欲因民而足國擴此愛人之徳毎深引類之仁是致疎庸亦蒙甄拔未暇叙情而伸感先蒙貶誨以示勤祇服眷私但深銘刻賀年堯厯頒新序恊履端之始夏時因舊祥開嗣嵗之興三陽既交萬物自叙恭惟某官器推廊廟名聳縉紳適丁道泰之辰宜享類升之福淵正拘官守尚阻㕘承徒深慶頌之私莫究瞻依之切賀嚴州通判冬至乾文仰察日當大昴之纒律管下旋候應黄鍾之氣騐新陽之來復知有徳之偕升恭惟某官望重縉紳名傾朝野尚屈一時之經畫暫俾千里之承宣履兹道長之辰宜擁大來之吉某限拘職守阻遂㕘承徒深頌祝之私莫究瞻依之切謝州縣官賀冬一陽來復萬寶向榮斯正人道長之初實同徳彚征之漸尚稽慶問先辱珍函愧感交深款誠難叙黙堂集巻十一欽定四庫全書黙堂集巻十二宋陳淵撰
