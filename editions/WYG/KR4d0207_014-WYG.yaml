  text: 十四
  hash: sha256:29473899eff56892a47924f15290ca4d02a6b5900c4deb190c594181213de9bf
body:
  text: 宋陳淵撰與李泰發尚書淵側聞尚書重名乆矣陽朔之行淵實親見靖康鯁論得之先生長者為詳宣城之政人人能道之至於出處去就又有大過人者葢嘗願見而不可得而自到臨安以来執事適出今幸大斾之旋輒以平昔慕望之勤冀瞻風采而又以聲氣臭味之似布腹心於左右投機之㑹間不容髪不暇如禮裁書儻容而察之有可採者淵聞宰相之進退天下安危治亂之所係焉自朋黨之論興天下之士有詆訐大臣搖奪公議以行其私者臺諫侍從之臣莫之敢救非直不敢救而已徃徃以毁其人為直而以譽其人為諂由是賢者在上孑然無助方将犯天下之所難以持危扶顛為務而異意之人以不便於己巧為邪說媒孽其短深排而力攻之人主或不察賢者又勇於必退小人得計而天下之事去矣自上即位以来當忠邪難辨之時進退大臣或不恊於公議者則朋黨之論有以害之也去年范丞相去位上既灼見前日輕信之失奮然不顧擢用二相其一以有天下之大功其一以有天下之大節自是髙舉逺引無所附離之人争先淬礪不愛其身以徇國家之急上亦傾心倚注指日以兾成功以謂小人之言自兹可息中興之業庻㡬有濟而比者至有寒士獻書闕下大肆狂悖欲以蔽聖主之聰明其言所指不一蓋皆所謂安危治亂之機者此其措意豈淺哉若幸身在朝廷又為上所親信釋而不論則後日之患将有不可勝言者矣竊意此書非寒士所能為觀其文辭委曲若素在朝廷之上者是必奸人有以使之也葢兩年来君子登用小人稍退黜群枉失勢期免後禍且圖進身故伺隙抵􅇖借人之筆舌以逞其欺㒺之說将變已定之計為今日之害此甚可慮也且非特如是而已必又内連左右近習之徒外結背公死黨之士相為應援以中陷忠良此而可忍孰不可忍其書計左右必見之若其言有及於執事者自有公論不足深校然今日淮西之事上所委任不為不重将由是恢復中原收取失地以伸四海積年之憤為萬世無疆之計萬一鼔行而前而讒邪之徒相與瑕疵之於後欲求不世之勲於千數百里之外豈不難哉况其言潜傾大臣而以其所汲引之人為有黨此又不可不辨者願以區區之意聞於上若聖主已覽其奏洞然不疑則前日閫外之寄便當身任其責雖冐危難所不可辭不然去就之際猶當斟酌之也薦詹方行淵等伏睹本州廸功郎監合同場詹勉學問粹深操履堅正方崇觀政宣間學校之士務為詭辭曲說追逐時好唯恐不售而勉獨以謝顯道陳可中為師窮幽極㣲期於自得晚得一官為貧就禄不求茍合可謂自信甚篤躬行無倦老成之人而沉匿下僚鮮有一知者伏望鈞慈考其所學特賜旌别庻㡬晚進有所激勸不為無補矣與李丞相論王權等家屬淵竊惟江西盜賊服叛不常皆縁自來治之無法所以連年猖獗不已大為民害比者王權蘇勝劉文脩潘汝霖等四人伏誅上下交慶乃知天之所不赦亦必待人而後行也自兹兇渠宜亦知所畏懾而一路之害可悉除矣然前日賊首赴使司惟蘇勝以其老弱偕至比以呈稟䝉鈞㫖押下吉州并王權等家屬并送千里外軍州編管若以王權等殺人之多則其家屬罪止編管已為輕典縁王權等之黨無慮數百人當時皆受招安後來有違節制者四人而已其兄弟妻子無與也四人既誅其家屬不可依其餘黨而盡釋之乎夫誅四人違節制也釋其家屬從吉州之始招也如是則既來者足以安其反側之心未來者亦可以開其自新之路人情愛生而惡死使來者知必可以得生孰肯舎生而就死哉消弭未然之患或出於此淵愚意欲乞以此四人家屬送吉州依元招安指揮放令遂便庻㡬威不獨立恩有所歸兩得其道也儻有可採伏望不棄狂言特賜施行論考實臣聞人主之道在乎知人而知人之要莫若考實不考其實而欲以耳目之所聞見心志之所測度期于得人雖堯舜不能也今夫騏驥之於駑駘其技固不相侔矣使之同一皁櫪羈縻而飲食之雖騏驥亦何以自别乎故必待厯塊超澗奔逸絶塵然後知其異於凡馬也堯舜號為知人而書之所稱曰明試以功車服以庸夫明試以功考其實也車服以庸因其實而用之耳若舜之在下堯既聞其聰明矣又歴試之至於用鯀亦然四岳舉之堯曰方命圯族既而曰試可乃已自今觀之若舜者宜不待試而若鯀者又不必試然且云爾者考其實而已唯考其實故舜之聖終有以底績而鯀之不肖不能逃其罪於九載之後也迺者朝廷進用人才間有異於是者雖陛下明於知人處之莫不曲當無可議者然臣嘗謂人之才智隠於無為若功業則遇事而後見方其無為非識者莫能辨逮遇事之後雖庸人亦得而可否之故用人之際唯在考實考實之法非固尚勞績而畧志節也所以審衆情而核真偽者不得不然也况庻官之於侍從如霄壤之不相侔百官之於臺省如涇渭之不相似若不待其經厯既乆名稱流聞人人皆以為宜遷然後授之亦恐艱難之際終不足以厭人望矣臣故以堯舜考實之道為獻位卑言髙唯陛下裁赦論用宗子匹夫角力壮羸不等則壮者必勝使二羸而當一壮則勝負未可知也又况於羸者之多乎故閭閻細民以父子昆弟之多寡為强弱急難之際豈無他人不若親戚為可恃也豈獨閭閻之民為然雖大而天下亦莫不然武王克商同時而封者五十三人而異姓不在是焉當時不以為私後世不以為過豈其才智皆足以過人而徳業皆可以服天下乎所以布枝葉而芘本根强手足而衛頭目不得不然也周之所以卜世三十卜年八百者其以此耳今北朝之强既與吾為敵國而吾之親族衰替未有甚於此時不圖所以紏集而簡拔之使居腹心之地以為吾援壮羸異勢其何以濟此北朝所以輕視中國易發而難制也頃者敵騎憑陵二帝北狩戚屬之在東都者席巻而從之獨陛下一人適居於外天實留之以興我宋其餘宗室散處遐方下國又皆踈屬卑秩不近畿甸幸而獲免亦已寡矣謂宜旁搜逺訪使各陳族系圖而上之近還圻地親加試擇焉其有屬尊而官髙聞望素著者俾領方面或處監郡之任其次委以州縣掌兵之職若已嘗出仕而貪墨殘忍不才無能者姑仍其舊後生可教者教之俟其成就然後用焉如此則數年之後聲績傳播将有如漢之河間東平者出夷狄聞之必謂中國親族多賢足以自輔自然畏威而不敢肆矣昔仁祖朝富弼在樞府仁祖詔弼專管北事弼因上安邊十三䇿其一則論宗室當教而用之所以强本支而服四夷者以謂敵人貴親多以近親為名王将相以治國事以掌兵柄所以自强而中國未聞有皇親可以為朝廷屏翰者敵必謂王室孤危無所扶助本根不固易以搖動此誠宜為北朝之所窺測也此言仁祖時也其後熈寧元豐間始行教養考試之法英才輩出雖未嘗大用無赫赫功名震耀海内而亦不得為無人也不幸遭值冦攘徃徃罹害流離殊邦凋喪殆盡今乂有甚於仁祖以前矣然弼言於仁祖時是時海内乂安兵革不用而又契丹講和之後而其反復切至如此使當今日其所獻計又宜如何也區區管見惟陛下深念之論除盜賊天命惟周公不敢知然今日之事以理觀之天之眷宋未有艾也何則祖宗之徳澤在人未竭而民之戴宋未有窮已故也臣請試言之昔我太祖皇帝市不易肆而得天下太宗繼之四方僭偽不勞而服真宗仁宗視民如傷屈意和戎以安赤子不殺之徳入人心髓復更五世以至今日中間奸臣繼執國命百姓征稅無所措其手足故北朝得以侵侮中國自古王室遽爾敗壊遂至於不可支持者未有酷於此時然民心猶未離也豈非祖宗徳澤在人未竭而民之戴宋無窮乎觀民之從違則天意可得而知矣方淵聖入繼大統雖兄弟之間不能無疑而獨於陛下親厚此有以見天意也當是時大臣如耿南仲之徒茍可以獻疑於淵聖者無所不至及其奉陛下為大元帥莫有阻遏之者陛下雖欲不去京城不可得也此又有以見天意也使北之行未果敵已入冦方圖引還而二聖逺狩皇族内外莫不扈駕以徃而陛下適逺父兄之側故王室陵夷而宗廟社稷賴陛下復存此又有以見天意也天留陛下以興我宋其意之篤葢如此當此之時但當欽承天意以追復宗祖之舊而已葢天之所以付陛下甚重而其責亦不輕若二聖未歸宗社未復天人未一金人之仇未報則祖宗之業因循而不復振而陛下之責亦不能塞矣此宜朝夕黽勉坐薪嘗膽而以為憂也然以今日之勢觀之則有未能遽如陛下所欲者葢大江之南荆湖之間與夫閩廣之冦尚為内患故也夫歸二聖復宗社一天人以報金人之仇而内患不除若出師北向以窮逺畧則鼠竊狗偷近生肘腋亦足以牽制我矣故當先静其内然後外亂可弭也諸葛亮必擒孟獲然後出師葢為是爾徃者朝廷嘗命宰執副以大将先由福建以次及江東西湖南北之盜葢有意先平内患也臣以謂既有以平之必圖所以守之慎擇守令毋拘以常制而使之以愛民為本豈獨施於内而已哉雖削平僭竊威服遐方而臣之亦可也論時事十一衛兵臣聞兵以强弱多寡為輕重常使内重而外輕則王室尊而諸夏安矣昔楚漢相拒於滎陽京索之間天下之勢如提衡然未知所軒輊也髙帝始得蕭何張良又得陳平猶以為未足又得韓信属之以數十萬之兵戰勝攻取無不如意然後天下之勢其重在漢項氏已衰漢業未成昔之躡足而封者已據千里之地漢雖滅楚而輕重之勢又變矣故信之王髙帝之所深憂也方髙帝築壇以拜信既委之以諸将之兵矣而髙帝所将之兵猶衆也其分兵多於信所以使之東向以争天下而於己未能去兵者亦所以制信是以雲夢之㑹信不得遯故嘗謂髙帝曰陛下不善将兵而善将将此信所以為陛下禽也嗚呼此髙帝所以能并一天下而終於無患也與今自人主不復将兵而諸将在外人提數十萬之師朝廷所資以禦夷狄除冦盜者而進退去就唯其所欲此豈非可慮之事乎而樞宻三衙尚仍舊法自相牽制而所蓄之兵益損於舊使其力足以制之猶患所以使之者非其人况强弱多寡相什百耶故臣愚願増其數使與外兵畧相當而又去資格私昵之弊搜求傑特取其才智之優於諸将者命以為帥無事則歸宿衛有事則統之以出戰力飽而氣不挫有所不出出則宜無不勝矣如是則人主雖不将兵其與親御六軍何異既以増重朝廷之勢而又使諸将望風知懼艱難之際有所招麾不敢首鼠自營以為一身計此亦今日之急務也薄斂哀公問於有若曰年饑用不足如之何有若對曰盍徹乎公曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足夫夏后氏五十而貢商人七十而助周人百畆而徹其實皆什一也夫取民以什二用之猶不足而告之以什一之法不亦迂乎此儒者之論所以多不見聽於時君而商財㩁利之臣所以常得行其計也然世之患不足者始則多取於民民既不足又從而暴斂之掊克屢興於是有轉徙流散去而為盜賊者終於不足雖加之以刑戮財何自而得乎非特如此而已因之以致大亂者是不反其本之過也由是言之雖若甚迂直在其中矣用老成夫學然後知其不足經厯既乆然後知其誤謬方少年恃其天資過人盛氣以待物更事之後未有無悔者也悔而知改猶足以為善悔而不改終於敗國亡家者有之矣故學不可以已也若乃學焉而未至事不素練則老成之人可尊而不可忽人主深居九重之中稼穡艱難之未知而能應天下方來之變者知此而已昔者孫權年未及冠而能使曹操望其營壘曰生子當如孫仲謀此可謂一時豪傑之主矣然其母嘗以屬張昭故昭毎諫之必以太后為言我太祖皇帝英偉之資無與倫比而杜太后常令趙普輔之夫孫權之智不減張昭而太祖之聖豈趙普所可跂及乎取其經變之多厯事之乆而已况於不及二君而欲棄老成之人未見其可也用有徳天下之士有有徳者有有才者有有智者人君用之唯其宜而已智者謀之才者辦之有徳者守之是三者闕一不可用或偏焉必不能有所濟矣故書曰凡厥庻民有猷有為有守汝則念之才智與有徳者之謂也或曰治平之時惟徳是任艱難之際所當用者才與智而已是不然夫有徳者何施而不可昔髙帝定天下天下所謂傑然者三人既已為其腹心爪牙之用矣其餘如曹參周勃陳平亦皆足以相國才智之徒葢不少也然必待四老人者出以傅太子然後漢室以安光武中興冦鄧耿賈之流二十八人者依乗風雲俱有可稱所謂才智者亦衆矣然必起良吏卓茂以為太傅然後風俗以變由是言之才智之士艱難之時雖不可無而有徳者亦不宜忽矣覈實夫實之不可不覈乆矣今使寒族與世胄並進則世胄疑於練習老成與少壮俱用則少壮疑於敢為朴茂與輕俊角才則輕俊疑於多能木訥與利口共談則利口疑於通曉如不覈其實方且任情違理以私害公斷而用之是使寒族老成朴茂木訥之人皆見棄於一時豈不亦甚可惜哉故人主惟實之求見其可而後用之内以自信外以信於人故讒邪不能損其明欺蔽不能乗其間而天下之真賢寔能相與弹冠而起為吾所用矣聖學子入太廟毎事問或曰孰謂鄹人之子知禮乎入太廟毎事問子聞之曰是禮也昔之稱聖人者必曰生知夫生而知之者知其理而已至於儀章器數其在事物之間者葢有不能盡知也故孔子問禮於老耼學琴於師襄問官名於郯子嘗曰吾十有五而志於學又曰十室之邑必有忠信如某者焉不如某之好學也又曰以思無益不如學也又曰我非生而知之者好古敏以求之者也又曰聖則吾不能我學不厭而教不倦也故孟子曰夫聖孔子不居夫居其聖則終至於不能聖唯不居其聖是以無所不學而聖益聖也求諫四天地至大日月至明而人之㳺乎覆載之中出乎照臨之下皆其徳也今使人旦朝賛之暮夜譽之則人必以為得狂疾矣何則天地日月非賛譽之所能益而亦無待乎人之賛譽也人主之徳其大如天地其明如日月葢其所當然者雖賛譽何加焉故其平居所宜聞者切直之論而已虚辭飾說以相媚悦非所急也且凡賛譽者非欺則䛕使欺且䛕者得行其志人臣之利也而人主何利焉若夫切直之言乃人主之利而乂人臣之所不利故人主聞切直之言常少而聞贊譽之語常多此不可不察也開道而求諌和顔而受之猶懼不至况樂輭熟喜便佞而惡聞其過乎昔在崇觀迄於宣和一時用人徃徃将順者多而正救者少馴至敗亂職此之由誠願推切直之為利監賛譽之為害狂愚者雖甚必恕䛕佞者雖寡必逺則下情得以上通而天下治矣又昔之治世工誦箴諫大夫規誨士傳言庻人謗夫謗猶不廢也非直不廢而已舜之求言乃立謗木是使人謗己也而周公之戒成王曰小人怨汝詈汝則皇自敬徳是又不禁人之詈己也由是言之後世所謂謗訕之刑指斥之誅豈古之道哉祖宗之時謗訕指斥之律葢有不得已行之者自紹聖以来至於宣和之末何多也使誠有是事聞而改之可也又豈可以一人之勢而盡箝天下之公論乎若其無是事而文致其罪則天下之士聞之将有藏其身而不見膠其口而不言者矣此今日之禍所由致真宗朝有訟事投匭者言涉不遜真宗録其所訟之事以示外廷曰若以其言盡付之有司所寃未直而指斥之罪先加之矣真宗之心與舜周公之心可謂不期而合者也後之子孫其可不以為法乎陸贄曰諫者多表我之能好諌者直示我之能賢諫者之狂愚明我之能恕諌者之漏泄彰我之能從有一於兹皆為盛徳人主欲知諫之有益斯言盡之矣又人之所以惡聞其過者求已勝也而不知求勝於人終莫能勝唯不求勝乃能勝人書曰予視天下愚夫愚婦一能勝予夫如是故能合天下之勝已者資之以成已何慮乎不勝孔子曰丘也幸茍有過人必知之孟子曰古之君子過則改之葢聖人未嘗無過以人知之為幸而君子有過亦以改之為貴未聞有惡聞其過者此所以有能有功而天下莫能與之争也其為勝也不亦多乎何則今人之為不善其知而故為之者固不足道有以善為之莫之覺而入於不善者是其始於善不善特未明也有人於此指摘其瑕疵而譏議之則其見聞智愚必有以勝於我矣若拒而不受彼言之者固無所損而吾之不善自若也如取其言之善以為一已之有是以取天下之善為吾之善也雖欲不勝人其可得乎又太宗皇帝嘗以里語告真宗曰道吾惡者是吾師是雖人之常談而聖人取之葢人主惟不知其過故與亂同事而不自悟使聞其過而改之雖堯舜可進也由是言之道吾惡者非師而何孔子曰三人行必有我師焉擇其善者而從之其不善者而改之夫不善者猶将内自省焉而以為師而况於攻吾之惡乃所以進我於善也其可師也明矣仲虺之誥湯曰能自得師者王如是而得師又豈因人而得之哉不因人而得之夫是之謂自得人主能自得師則天下莫不師焉其為王也孰禦閩冦二閩中之冦本縁饑饉方其時補助賑濟之政不加焉暴賊横斂又從而困苦之民窮而無告此其所以為冦也若乗其未熾誅其渠帥而撫其餘黨使之各安其業莫或擾之則庻乎可息矣徃者捕之既失其時逮其滋蔓難圖又不得已而招之招之之賞既厚復使之私有其衆而莫為之散愚民有獲爵之榮而不失為冦之利幾何其不相效耶效之者競起爵賞又不能人人而厭足之前者未敗後者繼作衮衮不休終莫能禁職其事者始忿疾焉於是陽招而隂誅之既招而誅無以示信誰復可誘於是數請益兵而果於殄滅矣然而聚兵既多則又有餽餉煩費之患不免重科於民盜賊焚刼之於前官吏誅求之於後而民始不聊亦相率而為亂矣此所以上勤聖主宵旰之憂未能遽解逺方積年塗炭之禍也今朝廷遣一㕘政副以大将統兵數萬以窮討之顧何患不盡誅耶然又有可慮者二使凱旋之後萬一失業之民狃於故態輒復再叛其可再以大兵除之乎故為今之計不若預擇士人之有智畧而熟於其事者付以强卒三二千令漕司日給其費以備緩急仍權罷本路一嵗上供之物聽得募士或遇竊發使人人得以自効有功者賞之庻㡬豪强者在官樂於殺冦而憚於為冦而又申飭郡縣之吏舉行比年寛恤之詔應公家逋負之物有未輸者一切蠲除之如是則流亡歸業百姓各安其居而後患永弭矣又閩中之冦可以計敗而不可以力勝今以大兵臨之力若有餘矣然大兵之出不可以為常使彼逆知大兵供億之難賞給之厚朝廷重於擾民不復再出既去而復叛則如之何其亦恃吾之力耶亦思所以敗之之計耶故嘗謂以大兵而討窮冦猶之殺虎然今以十人而制一虎則虎必可擒矣然機穽不設虎有奔突之患其勢必至於殺人夫殺人而得虎不若不殺人而得之為愈也故殺虎者必廣為機穽多方以誤之俟其既陷然後以强弓毒矢加焉而虎不能脱矣此所謂以計敗也葢兵詭道也臨機應變不一而足全在得人而已若所乗之勢或殊則所操之術亦異今閩中之地不滿千里而山川林麓常居五分之四雖有長刀大劍衝突之騎何所用之故異時為賊所陷者皆精鋭之兵不量可否驟進而深入之之過也然則大兵非不能勝也雖或勝之必有所傷最為可惜竊謂自今萬一群偷再作不若用其土豪率其土人以本路官軍制節之假以嵗月期於必得散據其要害而伺察其出入左右交攻縱横相援閃誤追誘衝陷掩襲縱未即擒必不能廣為州縣之害矣又且減費用之煩省科率之擾民之所願何憚而不為耶夫衝城之器不可以窒穴致逺之技不可以捕鼠昔人論之詳矣若以為賊徒之衆非王師不可必誅然自古葢有以少擊衆者亦在朝廷精選智畧之士運用之如何耳又豈在多乎用兵必先脩政事用兵中興之一事耳然事有相待而後成者不一而足而今之言兵者勇於必進不恤其他故不得不為之慮也臣嘗讀詩至周之小雅觀文武成王所以致太平之效與夫宣王所以成中興之業其迹可得而言者葢自鹿鳴以至魚麗文武之詩也自南有嘉魚以至菁菁者莪成王之詩也自六月以至無羊宣王之詩也孔子嘗以其世之先後而次第之其意若曰作於前者不如是不足以為文武繼於後者不如是不足以為成王後之為君者得此則治失此則亂六月之序曰小雅盡廢四夷交侵中國㣲矣則失乎此者也車攻之序曰能内脩政亊外攘夷狄復文武之境土則得乎此者也夫自文武至於成王其詩亦多目矣一詩廢則一事闕茍有所闕已不純乎文武之政而况於紀綱文章蕩然大壊乎彼宣王中興非能舎文武之政以自為也補其闕而已自六月至於無羊補其闕之道也葢復境土必本於攘夷狄攘夷狄必本於修政事政事既修然後兵可用未有政事不修而先於用兵者也臣故曰事有相待而後成者不一而足為是故耳今姑以兵之一事言之而明其所以相待者如器械之備餽餉之煩賞給之費與夫修城浚池選将練卒之故是皆不可闕者一有不至兵不可出矣亦安得不為之慮乎葢古者用兵能發之必思所以勝之能勝之必思所以守之發而不勝不如不發勝而不守不如不勝故臣願陛下上思祖宗之所畀付下念生靈之所愛戴大脩政事使在我者無可乗之隙而在彼者有來蘓之願則天戈所至宜無不承順者矣宣王中興之道葢出於此是謂萬全之䇿惟陛下留意幸甚學者以孔孟為師昔者孟軻著書七篇其末章厯叙堯舜至於孔子有見而知之者有聞而知之者而其終繼之以去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾其意以謂道之在天下自古至今無適不然必有人焉發明而推行之然後傳之萬世而無弊是數聖人者道之賴以傳者也道固不窮傳亦無盡由孔子而來至於軻猶可以耳目接也得其傳者非軻而誰故自漢迄唐知道之士如揚雄韓愈莫不推尊孟氏而世之言道者亦必曰孔孟孔孟云者明其無二致也豈諸子百家之所可擬歟近者陛下詔天下學者當以孔孟為師無所偏執此誠萬世不可易之論也然孔孟之言載在方冊昭如日星有目者之所共睹有心者之所共知其要焉在豈非所謂大中至正之道乎大中至正之道則孔孟之所以為孔孟也若夫諸子百家之學或蔽於人而不知天或蔽於天而不知人或蔽於為我而不足以及物或蔽於兼愛而不足以成已幽明殊歸内外不合於是詼詭譎怪之論興詖邪􅁋遁之辭勝而大中至正之道始不行矣今欲學者以孔孟為師則必使之知大中至正之道自更科以來天下學士無所適從若朝廷尚不免以文章取人謂宜明詔有司審所去處毋溺於諸子百家之說唯大中至正之道是從俾堯舜禹湯文武周公之志復行於今豈唯今日學者之幸将天下後世實幸仁政得民心治天下有萬世不易之道有一時解紛之計不易之道猶饑渇之於飲食不可一日而無解紛之計若病之用藥已則去之戰國之世諸侯以詐力相吞所患者國之不富兵之不强耳是以當時謀臣䇿士非富國强兵之説不進於其君而孟子則鄙之曰仲尼之徒無道齊晉之事者是以後世無傳焉故雖管仲之於威公九合諸侯一匡天下其功可謂盛矣而孟子猶不為也豈以管仲之所成就者可以濟一時之急而不可行之萬世乎方梁惠王以天下莫强之國東敗於齊西喪地於秦南辱於楚欲以一洒其恥問於孟子宜其有甚髙絶異之謀轉禍於立談之頃而成功於反掌之易者而孟子則對之以施仁政於民省刑薄斂深耕易耨脩其孝弟忠信而已又何其不切與葢濟一時之急者不過富國而强兵行萬世而無弊者非仁政不可也夫仁政得民之術也得天下有道得其民斯得天下矣得其民有道得其心斯得民矣彼所謂富國者困民之本也所謂强兵者毒民之資也以是而欲得民之心不亦難乎雖然不言富國非委貨財而不取也不言强兵非消甲兵而不用也治其本而末從之矣本之如何得民心是已民心既得以之足食則君孰與不足以之治兵則效死而民弗去此湯武之王所以無敵於天下也今為兵而理財取財而虐民民不堪命将轉而為盜賊奸宄莫禁饑饉乗之其患有不可勝言者矣願思孟子之言脩仁政以固民心毋以祖宗之徳澤未替為言而忽於恤民則天下幸甚論心過臣聞古之聖賢不能無過雖周公孔子顔子皆有過也而萬世所法焉茍知過而改之亦何足以累徳哉故曰過而不改是謂過矣過而能改善莫大焉夫聖賢之過二有形於事者周孔之過也有動於心者顔子之過也形之於事或不可悔則當改之於後来動之於心在所當克則當改之於方作故有心過有行過人主之所宜改者心過而已心過不作而行過亦無矣顔子之不貳過過於心不貳之於行也故孔子之稱顔回曰有不善未嘗不知知之未嘗復行也夫如是何過之可名哉祖宗之設諫官葢不自以為無過使之進諫以補過也然形於事者可得而言而毎患於難改動於心者宜若易改而毎患於難言故心過非自知而改之不可也孔子之語顔回曰非禮勿視非禮勿聽非禮勿言非禮勿動所防者心過而已葢操則存舎則亡出入無時莫知其鄉者人心也而人君之在天下一日萬幾語黙動静之間所應多矣安能無過而居補過之職者亦何所致力哉然臣嘗聞之師曰心有私焉過也仁而不私則無過矣心有偏焉過也心而不偏則無過矣心有利焉過也義而㤀利則無過矣是三者正心也理義之心也過或生焉如太空之有雲霧乍起乍滅而空之體常自若也如明鑑之有塵埃或去或留而鑑之體常自若也於此乎知之則偏私與利将無所容矣是之為說見於論語之所謂仁子思之所謂誠孟子之所謂性堯舜之所以帝禹湯文武之所以王以心傳心後之王者不可不知也故臣願陛下所防者心過而行過自無者以此敢縁職亊輒陳所學庻幾涓塵有補海岳區區僭言惟陛下赦之經筵進故亊前漢書汲黯傳大将軍青侍中上踞厠視之丞相𢎞宴見上或時不冠至如見黯不冠不見也上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此臣聞汲黯在朝淮南王憚而寢謀世謂黯之忠知無不言言無不盡故諸侯将叛畏之而不敢發黯於是為有功於漢矣臣竊以謂黯之忠古今鮮儷然使武帝棄而不用黯言何所發哉淮南寢謀雖曰憚黯亦武帝用之之功也何以言之方武帝欲崇儒術以興禮樂則用公孫𢎞為丞相欲定律令以振紀綱則用張湯為御史大夫欲攘夷狄以强中國則用衛青為大将軍丞相固上所親信御史大夫尤為用事天下重足而立大将軍貴寵無二公卿以下皆卑奉之而黯嘗廷詰𢎞以為齊人多詐始與人建議後皆倍之又責湯不能安國富民何空取髙帝約束紛更之為又或說黯以為大将軍尊重不可不拜黯曰使大将軍有揖客反不重耶黯之正直不撓如此以故朝廷一時貴臣莫不憚之葢不特如是而已武帝招延士大夫常若不足然性嚴峻或小有犯法或欺罔輒按誅之無所寛假當時在位誰不惴恐而黯面折廷諍終無所屈嘗謂武帝陛下内多欲而外施仁義奈何欲效唐虞之治帝為之變色罷朝且以黯為戅又以為愚又以為不學若不能堪者至其與嚴助論黯則必以社稷之臣目之此固武帝之所甚重而深與之也故史載武帝之待遇黯曰大将軍侍中上踞厠視之丞相宴見上或時不冠至如汲黯見上不冠不見也葢武帝之欽禮黯其過於丞相大将軍如此則凡為将相大臣者安得而不憚故淮南憚黯由将相大臣憚之也将相大臣憚黯由武帝欽禮之也然則淮南寢謀非武帝之功而何臣又聞人主據天下之利勢生殺予奪惟我所欲其誰敢抗之以其莫敢抗也泰然居於民上無所畏忌則賢者懼禍亦将逺引深藏不復為世用矣賢者不為世用而讒諂面諛之人得志其不及於危亂者無是道也故如武帝之好兵喜殺窮奢極侈實無足取至其欽禮汲黯以絶未萌之禍後世不可不法也祖宗之設臺諫官所以崇奨之者無所不至亦近於此雖無汲黯其誰敢不憚使常得其人又不亟除而輕去之臣知奸雄自兹屏息矣蘇軾有言曰奸雄之始以臺諫折之而有餘及其盛也以干戈取之而不足故崇奨臺諫莫尚於祖宗之法惟陛下念之進寫龜山先生論語解臣昨面奉聖諭令楊適脩寫父時解論語及禮記中庸義進入臣除已同共校對恭依聖訓作大字脩寫投進訖今來臣又别繕寫到小字本共壹拾壹冊見在殿門外秖侯進入伏望聖慈特賜宣索取進止黙堂集巻十四欽定四庫全書黙堂集巻十五宋陳淵撰
