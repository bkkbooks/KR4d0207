body:
  text: 寄曹載德諌議二首不將塵土嘆徒勞白首驅馳任所遭鸞鳳尚能安枳棘鷽鳩何敢厭蓬蒿論材競欲推嚢穎備物何由數澗毛末路固窮真自許未應延頸試鳴號晚途無復計行藏捶楚塵埃秪自傷未即賣刀歸買犢自憐挾䇿亦亡羊已無竿牘勤毛穎肯為簞瓢念孔方尤喜故人書斷絶不將栖棘戱仇香茂實被檄權永新以詩寄之澗松那可比山苗謾説凌寒有後彫更向鷄蟲論得失何如鵬鷃各逍遥三鍾幸自堪攘臂五斗誰能更折腰正使爭先任勞苦虞人寧不愧弓招次韻李光祖南山四偈聲外聞和豈待言棒頭猶是老婆禪如何更被文殊惑却道維摩但黙然臘窮春到不須臾霜下陳根豈用耡若信彫榮如轉轂故應揺落有扶疎牕前松竹翠連山牕下弦歌晝掩關雪裏忍㸔梅欲吐煙中遥認鳥知還未暇南山訪隱居秪應無處不逢渠慿君一省從前夢莫歎離羣嵗又除次韻光祖避地眉溪十絶眼在句中寧易知意存言外一何微栢舟故是仁人事豈為淹留念奮飛浮木如何濟巨川積薪其下火將然是中已有安身地許爾埀紳玉几前弄雲微月淡囘廊十室連甍占上方誰道各無容足地夜談猶欲致時康少年慿恃氣方强膚理微邪未覺傷迨得病深無治法始知先甲是農黄訪道尋幽歴萬山神仙元不在山間須知對面長相失莫嘆喬松去不還四海黔黎共一君須知盜賊亦吾民由来齊梃勝秦甲要在人如父子親當時先主得關張能使西川弱勝强今日中原豈無士坐愁兵氣動欃槍汙莱正爾肥蚯蚓滯穗那能飽􅢟斯布榖似嫌新歴緩每從清曉報農時何人更下仲舉榻舉世願登元禮門千古家聲君與我未知何以起斯文謂陳與李也了齋力欲排邪説誰遣竒窮道不興長恨人亡琴亦往賴傳心法有盧能光祖了齋愛甥也眉溪與光祖共談得四絶句乾坤今古自昭然此意何勞宻處論不是逢人喜傾倒正應公事合公言青山雨後足竒態好鳥簷間無俗音縱使麯生難㑹面可無毛穎解傳心流泉為演秘宻藏枕上聲從澗底来半夜夢囘聴説偈似傳衣鉢向黄梅溪邊索共桃花笑雨打風吹掃地空待訪靈雲舊消息急流無處覔殘紅交溪菴中因檢藥嚢偶成道人頭上經春雪不羡少年何首烏已覺老来甘草莽便當歸去訪田廬次韻陸時可嵗暮感懐小橋横截一溪雲隔岸遥通避世人釣艇偶隨秋鴈泊吟牕今見臘梅新煙塵已覺千山靜雨露行看萬國春詩酒暮年生處樂一瓢歸去豈辭貧又和時可風御泠然幾過旬異鄉窮臘作離人淹留賴有交情重飜覆從教俗態新於世無求心似水向人多可氣如春也知已造顔原室不恥人間賤與貧再和時可二首芝眉不見忽經旬屢出新篇故惱人應共翰林爭敏㨗豈如開府但清新鷄豚且入他鄉社桃李何殊故國春白髪蒼髯共擕手從来管鮑兩忘貧甲子公今不記句磻溪埀釣豈其人安心有道年年徤出語無塵字字新鬬智莫爭三十里貪生何用八千春直須凖備新年醉無地容錐未是貧又用元韻呈時可古来兵出僅三旬便欲修文格逺人圖蔓可堪師已老滌瑕當與俗更新舞干止殺知何日賣劔歸耕要及春但得耡耰遍原野飯藜何惜一身貧次韻光祖閒居感懐風義久已喪友道何其衰艱窘無與俱乃歌風及頺誰言經由地過門有犂来霜雪豈不惡松筠真奈摧富貴如浮雲於我何有哉所嗟道不興茲士猶塵埃初到臨安二首風際􅃹絃朝病酒雲中樓閣夜聞香十年一夢沙河路獨步春泥覺燕忙青鞋踏雨花鋪徑朱艦凌風栁拂堤天竺舊游心已懶孤山行處路應迷錢塘江潮頭駕月衝殘夢水色浮空送峭寒十幅輕蒲連夜發不知身到海門山次韻王長源飲埀絲海棠花下世事闗心已十春今年花下得微曛應憐萬木灰薪槱喜見竒葩脱斧斤遣將幾人非鞅鞅覆盟今日尚棼棼慿君為國施長䇿莫戀埀絲鄙獻芹鄧季明挽詞三首少年長揖出賢關自許行藏契孔顔雲路不求千載遇篳門贏得一生閒竒言盡掃鷄三足妙意誰窺豹一斑盡道東牀如李漢㑹傳餘論落人間它時膚使早還鄉駐節旁連避世牆鴈序風標蓮破蕚鳳雛衣袂桂飄香花邊對酒春難老竹裏圍棊日自長曾共國人歌友愛傷心重到棣華堂道人於世已忘名相府聞風眼自青險韻舊聯韓子句直詞今稱蔡邕銘壁間玉唾情何厚梁上銀鈎墨尚馨只爾便知君不朽豈縁中説載元齡省題筆諌詩志士憂君切還將筆効忠但於心取正不向字求工理自胸襟得情因翰墨通一言毛穎喻千古史魚風託意揮毫上成名補衮中誰知執藝事功與諍臣同和參謀至日喜雪三首風鳴竹屋懼將顛起視同雲隘萬川共喜葭灰初應律那知栁絮已漫天傳杯莫怕山頽玉閉户從教徑糝氊幕府老成堪倚杖故應衰病得安眠玉花初著亂山顛入夜俄驚月滿川雖有冷光凝白晝尚餘陰曀鎖青天屬車未返瑶池駿逺使猶餐北海氊夢斷忽傳淮蔡㨗喜臨尊酒已忘眠是日報淝上大捷故有是句用李愬擒元濟事也恊氣方占大有年珠璣填道璧沉川塵埃已洗三千界雲霧終開尺五天羔袖久慚依帥幕牛衣端不羡蠻氈求田好趁豐登候乞與元龍榻上眠和參謀參議尋春二老俱傳正始音春来詩思轉精神風前未展埀天翼筆下空聞擲地金曉日若將開霽色宿雲先已弄輕陰落花流水年年事只恐桃源不可尋次韻呉參議病中懐歸因以自見栁絲埀地整如梳春盡長懐舊隱居草暖屢眠斜照外水香時潄落花餘西山忍餓初疑隘北海無功竟坐疎同是念歸公得請自憐濡滯一軒渠次韻安茂通同薛參議上巳日唱和扁舟衝浪去茂通監造船羸馬傍城行子發監修城飄泊傷春緒艱難作吏情豈無賢者樂亦有聖人清莫繼蘭亭㑹愁連曲水生三月二十日游東山㕘議不至有詩次韻羈懐厭朝市逸興薄江山放杖囂埃外傳觴紫翠間碧雲猶未合飛鳥已知還不見髙車過重城欲上關黙堂集巻九欽定四庫全書黙堂集巻十宋陳淵撰參謀得告暫歸留别同舍次韻青蒿何敢附蒼官要以陳根託嵗寒萬事忘情知我拙一牕容膝許同歡也知堅卧元非病况是無心可得安歸去儻餘飢溺念豈能無意復纓冠次韻茂通喜雨師行初不犯秋毫坐縛兇渠泚與滔和氣自應迴嵗旱豐年當復騐秋髙横流是處通飛鷁歸佩何時得孟勞要廣江南千里潤須令天下入甄陶送張巨山著作使閩分韻得我字嵲道山仙者居是中乃置我白前英俊前糠粃出揚簸同寮事闊畧未忍棄衰惰日聞所不聞更欲學其可張侯廊廟器文字粲藻火一班見餘論已足踐青瑣欣然取使節去我何其果無乃萬斛舟未授濟川柁相攜湖上别酒盡重城鎖分離情已重去住計誰左從來洞庭野乘鴈不加夥何日西江潮送我東歸舸石夫人挽詞好客陶家舊多才謝女風一窺知帝輔三徙得儒宫遺子經猶在知人鑒已空里閭推逹識愛壻有乗騘送黄平國倅邵武雪到蓬山尚破裘倦聴餘子説封侯松楸更作連宵夢桂玉寧堪卒嵗留衣繡故應人所羡題輿仍為國分憂艱難兀坐添華髪亦欲如公可得不答呉濟仲見寄季子觀周樂妙意傳青簡諸孫拾其遺頗具前人眼新詩如珠璧字字無可㨂故應意有餘不但音睍睆念昔我方狂意輕三子撰自聞歌白雪欲和色先赧中間各流落念子忘寢饌阻尋千里盟未卜一笑莞書来得佳句竒字富瑟僴推先情已厚感舊涕應澘周宣致中興土宇日益昄膚使盡蘇張九合寧須轏兵車也天才必有用造物豈徒産椽筆儻容揮斗印定當綰既去却須来毋絶漢中棧次韻鄧天啓賀茅舍新成二首長者一牀室先生五栁廬久貧應似我多病或如渠客少門常寂身閒日自舒窺園知鮮暇安得摻君裾艱難思健士誰復數寒儒老去懐三徑歸来就一區春情縈夢草晚步及栖烏不愧王摩詰新詩有畫圖次韻延年弟相慶逐客身無事乗閒葺敝廬堂成因有室水到自成渠地迥千巖秀春迴一氣舒幸為時所棄容我懶簮裾經年侍清宴飽食愧侏儒脱迹鴛鴻路忘懐草木區朝簷㸔鬬雀晚檻引飢烏已覺蓬蒿適誰能九萬圖次韻宗仁弟相慶吾閩山水國幽絶勝衡廬隱几雲生席開軒栁映渠連枝均魯衞異説屏荆舒此外無它慕何門可曳裾侵疆猶未復世不乏真儒肯使金湯地長為榛莽區頽齡真病鶴急警任飛烏縱有藏身處偷安豈逺圖次韻沈公雅相慶度沈子膏粱胄從余一草廬幾年同寂寞此日更勤渠師範宗韓孟源流接誼舒艱難思報國猶未厠朝裾尚書足勲業振迹自窮儒清徳逾三世忠名滿八區詩才推道藴𤣥㫖賴童烏豈厭隆中卧慙無八陣圖代朝宗弟和餞行二首席門誰復顧寒儒深愧頻迂長者車更為穆生時設醴應憐馮子食無魚諸生久被絃歌化盛禮誰將簡册書從此邑人蒙勸奬定知容駟有髙閭少年經業富三餘肯羡相如駟馬車要向青雲開羽翼豈辭黄巻注蟲魚平生頗負連鰲手老大猶隨荐鶚書此去果符叢桂兆敢求椽筆掲吾閭鄉人羅公脩撰未第時其父夢有授之詩云吾閭仙桂作叢榮紫陌先登歴幾春昨夜月娥親付與黄金榜上第三人是年羅公雖中第不如所夢次舉叔祖諫議應焉名次既不差而所謂仙桂作叢者謂祖與兄常占甲科也後令尹王公盡換邑中坊額或欲與諫議書齋巷口置坊名為叢桂坊門已立而王公去不果名已而為火所燬今巷陌故存凡卜居於此者如曹公樞宻族兄大夫家兄少卿皆相繼登科之人蓋不獨諫議一齋而已而某之陋舍幸厠其間鄉鄰欲再建坊門取此名掲之久矣誠若有待輒恃知遇先此上干尊聽故於和詩末章及之幸恕狂率也
