body:
  text: 三衢道中感懐寄龎幾先霜風巻地號逹曉不成雨游雲乍蔽虧朝日翳復吐衢梁三日行去往迷處所茅簷得小休蔬飯不能舉所嗟兵火餘白骨莾無主鄰邦嵗又惡賈飯逐婺女遏糴彼何忍楚越視心膂况欲賊取之不救溝壑苦生逢堯舜代短袖不容舞空餘衛物心持此欲誰語故人幕中傑籌畫多所補朝譽競推先丘壑終自許平生陳琳檄解使頭風愈容我七子間泛愛果輕與此生聽造物未能狙公芧牧羊或可息抱關亦易處要以一溉勤聊潤漢隂圃二月五日入都㕔久坐候山甫不至㕔前桃花一夜風雨落盡感事冩懐簿書堆裏只怱怱過眼繁紅夜雨中可念青春看又老一杯無計畧從容曉登嚴陵釣臺和安止所留詩溪山有底好適契貧士欲敢論生不侯但喜夢非僕千秋釣臺水不濯市朝足而我獨何人得寓塵埃目擕笻縱朝步初日穿林麓西風扶兩腋一舉千里鵠東窺夫差國繁華混真俗濁流駕頽波一往不可復之子居其間嗜古追前躅為寄無絃琴一和郢中曲再用前韻人閒得安眠夢斷了無欲那思趨朝士一馬百夫僕况聞稻苗盛昨夜新雨足一飽如可期吾事豈多目盆山鬱葱蒨酌水周其麓照我本來面真白非浴鵠故應此間住却掃便違俗超然寂照中無往亦非復百年只爾是行矣毋躑躅區區欲何為世路羊腸曲過崇仁莫宿山寺書亊驛路塗泥一尺深竹輿髙下歴千岑愁霖洗盡梅梢雪把酒無人慰此心自梅花村囘道中書壁四首刺水秧針出已齊雨餘膏澤未全犁道傍牛喘無情問慚愧林間布榖啼綫路縈紆遶亂山筍輿追逐棘林間艱難那解蘇疲瘵自笑奔馳未得閒野花無數不知名映竹臨流若有情掃盡殘紅春去後亂山深處眼增明城郭初看委地紅川原今見緑蒙茸驚人節物催華髪留滯窮山醉夢中邑中諸公見和再用前韻郭外盈疇草又齊十年猶負帶經犂未應五斗能留我端為癡兒索飯啼馬上悠悠夢故山茒齋依舊水雲間長懐竊轡塵沙外豈願駢頭十二閑冷艶幽香不可名老年春去獨關情林深霧暗何由見賴有薫風為證明看盡愁人萬㸃紅曉来雙鬂白於茸它時儻記江南夢畫我黄梅細雨中被檄下鄉督税作釋負詔書寛逋負國用豈云闕郡邑有常供征求安敢輟稽遲推蚤暮鈎摘劇豪髪飢氓困鞭箠十室九告竭連雨催早稻雪穗迷空闊要令公私辦當復俟旬月平生慮患深獻玉每遭刖憂民已無䇿問俗聊省罰陽城吾所慕晚官敢求逹寧無撫字心便覺催科拙夏日雨後戯書雷霆挾雨驚殘夢蕭艾乗風醒宿酲黄檗一杯清晝永張羅誰復問交情與張司録沉李浮𤓰記昔游重来氊㡌映貂裘乗風喜見經旬御泛雪難留半夜舟坐上談機通一馬筆間詞刄失全牛尊前它日論詩地柱後微文阻獻酬時自郡中来經安福到縣已十餘日仍雪中往返故用乗風泛雪事奉和司録道中二首山行浪蘂浮花逐去程流紅應恨水無情簷間頗厭催歸語木杪空憐喚友聲念逺却囘鴻陣急忘貧重到鷰巢成待慿物理追風御懐抱如今喜盡傾偶成雲路横翔計似疎二原清賞更誰如池塘草滿供詩夢煙雨春来入畫圖落莫早知貧是病參池今悟直為迂傍人大笑公焉取為説忘機或類吾和司録行縣道中偶風雨有感之作六首葉底鸎初囀枝頭蝶漸稀雨餘憐草長風定恐花飛遲暮歌終寠淹留嘆式微更堪西去鴈聲逐晚雲歸吏隱聲藏霧天游更御風分㩦方舉白轉盼復堆紅北去風煙静春囘雨露同向來相對飲應復念鄰翁非關濃艶能傾國可是幽香解返魂正爾彫零廢吟賞欲留佳麗度晨昏酴醿卧雨有餘態芍藥倚風無限情正是江南花欲盡淡雲来往日微明山頭漠漠煙藏樹山下潺潺水滿溪全勝長安花栁陌萬人塵裏逐輪蹄江山似為詩人設風雨故應春日多醉裏吟哦聊自適眼前開落莫誰何饒州張宏中挽詞二首壯嵗英標冠士林莫年詩酒任浮沉竒姿不見臨風玉妙語空傳擲地金殘稾有誰知句眼斷絃何處覔琴心他時戯笑成陳迹惆悵江亭十畆隂公所居處臨流為亭時同賓友燕賞其中畫棟雕甍照水村簮裳多在脊令原百年得計南山豆萬事忘懐北海尊自昔功名何世乏迨今文字幾人存遺書儻有毫芒在為語韓公請備論次韻李聳卿前輩風流曉露零忽逢豪士壯心驚雷霆落筆千人掃珠玉成詩萬户輕應許翰林追敏㨗肯容開府鬬新清向来乞米無佳傳端欲投𤓰趣報瓊以来詩有䛕墓之戯次韻李聳卿賀太守禱雨有應二首一寸丹誠貫上穹坐令千里走龍工驕陽彌目苗將槁甘雨連霄澤已豐便覺風霜傾意盡豈愁荆棘致年凶江南嵗漕知無闕遥想中都喜氣同使君憂國願年豐肯放炎威久病農盡道胸中藏渤澥誰知筆下起蛟龍曉凉秋氣生蘄簟夢斷簷聲帶梵鐘髙卧已傳民訟息秪應仁政古難逢歸自郡城見道中山礬盛開梅豆班班已滿枝暗香猶未吐酴醿和風煖日江南路正是山礬爛漫時香嚴寺洗足肩輿苦頓撼步入山間路﨑嶇歴荆榛砂礫窘芒屨披雲造蕭寺弛擔日已暮僧房急解韈一洗塵泥汙瓦盤深及膝湯暖得頻注須臾和氣逹凛凛毛髪豎翛然入無何醉夢寧知處此生事奔走早晏失期度念茲頃刻閒百日不一遇啖蔗入佳境鐘響忽予寤蒲團赴敵火黙坐聊箕踞明朝塵沙黄莫憶少陵句山寺早梅三首竹籬茅舍近前溪煙淡風微月上遲認得暗香来去處夜寒無路覔横枝氷雪情懐未遽開芝蘭風味已先囘故人隔嵗無因見一夜月明何處来丹蕚猶含綽約肌水邊籬落雪晴時此間妙得無言意只有西湖處士詩又題山寺二首雲間初日慘無光天外歸鴻豈戀行短景去人如掣電不應留滯野梅香雲母燒香不見煙夜深齋閤閉龍涎此生暇日真難得蕭寺重来已四年即席和焦貫道馬上無端骨肉消老来功業正寥寥便須舉白追年少莫恨紅粧不我饒趙元述慶得子次韻貧家豈有石麒麟説夢哦詩愧杜陵但得過庭追孔鯉不愁傳鉢欠盧能和周唐獻郎中登普光寺閣官閒竟日身無事雨過連巒氣似熏未暇含香朝瑣闥且乘飛舄躡青雲九天已振摶風翼萬目難藏隠霧文誰凭危欄親王唾笑談應復許隨羣黙堂集巻八欽定四庫全書黙堂集巻九宋陳淵撰
