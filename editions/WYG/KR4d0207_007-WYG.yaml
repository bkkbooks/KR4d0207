body:
  text: 用中示以字瑞既書其事又賦詩一首河圖布畫非人力鳥跡成文豈偶然自昔秘藏神所䕶至今陳露墨猶鮮胸襟有道推先覺斤斧無情肯自全但欲剖心彰景命㸑桐何意擬薫絃字瑞竒特再用前韻春來無物不爭妍㸑木呈祥孰使然應為竒文開奧穾不隨凢卉競蕃鮮窪隆宻向暌中合㸃畫仍從毁處全御史説符直可騐從来謀國直如絃提舉生辰東井遥觀盾日升南風猶入舜絃鳴鵬程九萬豈終息椿嵗八千方再榮平世功名期鳳鳥一時文采應長庚浮𤓰沉李年年事稽首弧南一㸃明俞憲生辰代龎幾先北固樓前萬頃秋月明風定大江流從来此地多英傑果有竒才副簡求秀氣一天開夜色威名千里駕潮頭山川長在人難老應抱文章入相周淮南持斧功成後甌粵乗軺喜蹔臨使者英標衣蹙繡近臣新渥帯横金三山氣入中秋好八郡香焚曉霧深已為黎元開夀域可無椿嵗慰人心耿憲生辰象緯祥光動門弧瑞氣纒秋来孤鶴徤霜近古松堅鄰境風煙静新恩雨露偏軺車猶問俗寳帶獨優賢投筆男兒志封侯烈士年老成端可恃終冀勒燕然鄭漕生辰二首代幾先作至公無轍迹萬變歸諸正誰云學則然要在成以性我公鍾間氣異禀剛且勁一毫不容私心境自澄映超然是非表燭物眼常淨還將溟渤量一了百川競由来仁者夀茲理天所命欲知椿齡永視此寛平政桂花弄小春晚香適再盛年年幾望月影泛杯中聖尚書心如水逺裔有餘慶鄭相也何以繼清風家聲南北鄭象緯祥光動門弧瑞氣盈小陽春在序幾望月偏明他日三千牘清時九萬程名因使粵重功自備呉成偉量溟波闊竒詞錦段呈褒揚看唾玉輕重倚提衡松栢真難老芝蘭足後生筍班行趣召金帶已先横内史言何美謂鄭當時尚書心自清謂鄭崇秖應南北相謂鄭絪鄭餘慶重振舊家聲唐大夫生辰氣轉初寒候祥開既望辰應時来鸑鷟占夢獲麒麟盛德圭無玷髙才竹有筠胸襟藏巨壑人物妙洪鈞使者光華逺朝廷寵數新鵬程九萬里椿幹八千春鼎鼐虚前席風雲即要津黒頭紆衮繡天意在斯民次韻運使龍圖寵示道中夜行之什畏途千里可宵行正是鄰邦道路平諭蜀昔傳司馬檄備呉今罷亞夫營陰雲掃地千林出曉月凌空萬騎迎緩帶驛亭留險語春雷端使蟄蟲驚次韻子靜淵明束帶向督郵已覺歸思不可留紛紛朱墨何時休豈得置錐無一丘平生涉世如虚舟明月從人驚暗投胸次已無涇渭流不應在我縁春秋黄兵部生辰四首中朝人物競推先富貴前途㸔永年九萬里程飛正逺八千春歳久彌堅南國初持使節囘斑衣仍把錦新裁大椿更向萱堂祝長到春来共夀杯蚤嵗飛榮應宿郎至今鷄舌尚含香未應駟馬誇流俗只為慈親樂故鄉地上泉流府庫充艱難天與嵗時豐他時若論關中漕合數蕭何第一功遯齋有感逹士豈嫌祠竈請虞人安可以旌招由来不戀五斗米自是叩門勝折腰戲題延平閣上黄昬欲去更凭欄珍重銀蟾照膽寒可是歌眉能繫别人間無此好溪山西風吹露濕峩冠迥立三山二水間後夜江樓應殢酒一鈎殘月與誰看謁羅養蒙辱示長篇次韻它時對語聞鸎遷青秧離離初揷田重来刈稻歌有年浪過日月將誰憐故人落筆生雲煙胸中端有萬斛泉從来經笥謾便便詩書何如一囊錢有時玉樹臨風前仰視落日窺層巔已知萬古然不然得處往往多忘筌正須青綾䕶醉眠坐使士類歸埴埏不應直為蓴鱸還夜聴秋雨窮遺編我今已辦訪戴船日欲倚棹寒潭邊要當學海如百川未信軻死今無傳小詩七首寄養蒙兼呈景駿粥魚齋鼓網蛛窠古寺長廊客少過唯有一溪明月在夜寒偏向斷垣多斜陽不到竹隂幽小徑縈紆傍碧流行到草深橋斷處却乗明月泛歸舟它時樽酒對春風夜雨霏霏扺曉鐘但説尋常往来地豈知重到有丹楓太史溪頭十里間朝陽峰下水涵天青鞋不踏紅塵陌夢斷僧牕又一年才疎不下孔北海道廣更師陳太丘世路風波無着處却尋真隱得清游二妙胷中萬頃寛詩成千字海濤飜已能共入淵騫室自是同登李杜壇晚交誰似兩龔清氷雪情懐獨老成揚粃在前容齒長積薪居上看文鳴翫月據牀招佳月月轉牀屢移夜久風露凉孤斟樂忘歸氷輪擅空闊是處留清輝浮雲掃除盡如與賞心期我行萬物表中空無一疵光明徧十方毫髪了無遺心境互融澈起坐迷東西此生看此月十年悼無時它日客共飲淋浪酒霑衣十語乆不契此心唯自知西風掃殘暑秋色日益竒憂國付鼎食消閒屬山棲恐妨此時樂勿露囊中錐三絶句寄幾先陽明連絡四支中胃氣由来處處通但使黄婆能飽飯客邪端的不須攻冷暖平生既自知是中無病欲誰醫但思寒熱從何得未用長吟譴鬼詩敵犯東南夜壘驚却防西北有竒兵將軍堅卧鼻雷吼七國崢嶸次第平善治病者如周亞夫用兵守其所必攻則猝至之敵不能為害道出南浦見蕭子莊十首霧壓山城石徑遥筍輿乘月度溪橋已投栁舍人方起却訪鱣堂市未囂牆仭未容肩可及豹斑時許􅃹能窺相逢一笑無餘事明月滿懐心自知雨絲收盡暮天凉萬竅號風釀曉霜待趂新晴出閩嶺夜談還喜漏偏長平生交契獨公深嵗晚那無裹飯心白首它年林下約此盟端的幾時尋五年重見各蒼顔往事紛紛醉夢間不為投閒多暇日豈能千里謁龜山龜山涉世若虚舟觸處忘懐得自由道大不容長役役心閒無事只休休了齋已復歸黄壤便恐人間此道微後代不知誰得法祇今無復更傳衣四海知心有幾人淡然今與鬼為鄰天下共寃渠不恨平生憂國自亡身子靜號淡然居士斯文初不間衡茒但有𤣥經豈患嘲騏驥從他千里足鷦鷯容我一枝巢我在龍潭直下居西来應不少雙魚故人南浦如相憶為寄平安尺素書龜山了齋其道則兄弟也余與子莊子靜相與為友而師事之故詩中併及焉過江即巖下少駐感而有作三峯卓立蒼崕表朝夕雲煙自圍繞幾年不向眼中青忽露全身萬山曉凝然不動亘今昔陌上行人空自老我生悟此其已久夢事縈人嗟未了却怪神龍依絶頂獨以一身蟠故沼風雷際㑹豈無時忍視飢氓日紛擾未能呵汝救凶年明朝馬首霜風早黙堂集巻七欽定四庫全書黙堂集巻八宋陳淵撰
