body:
  text: 興國燦老往漳州二偈送之江梅又趁一陽迴身在旃檀林下来行到漳南香未歇百花聞此一時開浮雲出岫本無心桔橰俯仰人所引一大藏教留後人㸔與不㸔渠自省鄧端友臨要閣五首昔年曾到十三樓一日西湖十頃秋寒碧軒中最宜暑只縁脩竹近清流寒碧軒乃西湖上十三樓之一絶似此景故云十里烟波竹外溪隔溪青嶂遶牕扉詩人不見東坡老直節空餘一尺圍東坡詩所謂牎前修竹一尺圍也誰家多竹門可欵臨要閣前沙岸傍謾道薫風能解愠正應蒼玉自生涼繁枝蓋地欲成幄傑榦凌空不礙簷為語韓公莫除好此間風月豈須添退之竹洞詩云若要添風月應除數百竿甘苦元從舌上知竹間風味與誰期萬竿可斬從人説一榻乗涼要自嬉端友和臨要閣詩再次韻五首茅齋西望水邊樓亦復開軒對奕秋欲效子猷偏種竹竹前那得一溪流乗興誰當訪剡溪竹間應復掩雙扉也知劇暑攻人急正賴青雙一解圍午牎青夢接羲皇茗盌無多置我傍此味若令兒輩覺人間容有竹風涼宿靄初收一巻簾萬山騰沓擁飛簷靜㸔野色連蒼竹便覺閒中氣味添不將朝服換斑衣正以親年慰所期却恐英名喧衆口未容莱子作兒嬉送朝宗弟赴試南宫霜餘賓鴈日南征念子衝寒去我閩應向月娥占昨夢欲扳仙桂赴新春平生學海真無底晚節詞鋒更有神要路爭先吾老矣可無髙論躡平津慶鄧徳逹得子海中仙果真難得天上麒麟必異才速客未為湯餅供荐觴須俟鯉魚来書心畫詩書法從中得難將筆下尋欲知神合處始悟畫由心篆𨽻秦非古真行晉迄今竒蹤存翰墨妙意本胸襟雄徤猊飜石騫騰鳥出林古人求筆正八法響隨音題興國寺碧落軒北山山下僧伽塔影落軒前草樹間誰向月明㸔白牯靜中相對兩俱閒休論暮四同朝四且説前三與後三造物戲人無足較老禪深處要重參端友以桂漿兩樽見惠賦詩六首白衣挈榼踵吾門頗説雙泉更有兄洗盞為君開醉色不知人世有王閎秋水無聲㵼玉觥鏡奩初啓淨無塵未將滋味誇殊勝已覺風神最惱人濁者為賢聖是清古人無復論甘辛因觀表裏如氷玉始信荀楊未盡醇䑕竊跳梁十二間數杯中夜得安眠千艘雷動人方擾一闕山頹我自仙餉我兩罇才斗許客来索飲不論升明朝此物豈易得縱有市酤寧獨醒投轄誰云有祖風啜醨難與貴人同竹林若許供鷄黍助我醇醪幸少豐代陳應之作淑徳初無玷髙情更出塵擇鄰思教子剪髪為延賓裁鑒推前識提攜即偉人東牀他日選烏府號忠臣謁璨老病未能起留二偈示之趙州不出三門淨名堅卧一榻我来堂下便迴此間有問有荅西堂偶爾頭痛首座從来脚跛堂頭更自黙黙客来一場􅀈㦬和璨老示雙井茶紙被簡板三偈雙井江南妙品不減建溪月團但使睡魔不作何須歸去蓬山江靜微波皺縠庭空落絮鋪茵正是鄰牀作夢直須欵欵反身縱使前詞洗盡不妨後信重通㑹取曹溪一滴語言文字皆空次韻蕭茂徳未能仰首試鳴號且復塵埃奈此勞健筆凌雲誰誤許扁舟乘雪興何髙餘生敢歎鬚如㦸薄俗終防笑有刀留滯周南何足數人間如我九牛毛黙堂集巻十欽定四庫全書黙堂集巻十一宋陳淵撰
