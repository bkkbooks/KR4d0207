body:
  text: 謁滿處沖歸以詩贈之八年重見各蹉跎把酒論文奈別何行止未應經掃地是非安用辯傾河陽春屬和從來少流水知音不必多妙語驚人慵舉似歸來如學病維摩處沖見和復次韻二首髙談無補自風波畢竟平生意若何萬里悞遊梁苑囿三年悔寄楚山河三年徃來俱在淮海間軒裳氣味情終可林壑風流興已多賴有故人真逺器㑹看鵬翼九天摩嵗月空驚去若波樗材渾欲樹無何人情不似春生草末學方矜水灌河顧我嶔􅏟徒意廣如君飄逸患才多周南縱復嗟留滯未便懸頭學揣摩處沖又和頗及佛理亦次韻荅之相逢雖許借餘波此理而今更問何便合形骸同槁木不須文墨騁懸河五千遺教元非實三萬藏書亦太多此外別傳應有路鈍根無物可漸摩處沖為棲神導氣之術每曉起得意成詩前後四首次其韻功名亦誤人自古誰能了老大欲退藏少壯知幾少彤墀班已齊宿鳥尚木杪豈無山林心路長天杳杳少時自樹立勁氣干雲霄一枕夢初覺萬古心何寥年來畏禍機自悟空嶢嶢小窮不必送真隱誰能招交鬬存龍虎脛申學熊鳥嬰兒檢奔放姹女棲窈窕神仙豈無術自為志已湫晨興一炷香吾意窮三藐朝氣爽不昏清淨天無霞善惡兩相融世慮遺塵沙疎鐘下殘月餘響遞幽遐了失去來心淤泥出荷茄秋夕衰榆弱栁未經霜已見飄零片片黄雨後晚風生户牖莫將燈火汙清涼七夕三首北里南鄰錦綉陳萬端千疊日初晴收藏犢鼻何須挂小阮猶難免俗情天上銀蟾曲似鈎人間簫鼔萬家浮從來世事俱兒戯不獨秦娥乞巧樓信馬隨車力不勝聊將觴豆樂交朋青樓乞巧真兒女我亦如今拙未能七夕閨意戯范濟美三首衡陽新鴈幾時歸惆悵佳人萬事非蓬首西風還拜月夜涼贏得露沾衣經年不復到庭除又見秋風栁欲疎看罷巧樓歸小閣牀頭重撿近來書祝君樽酒醉羅裳此夜應須石作腸幸自書生惡滋味那堪千里羡牛郎九日登莊樓二首久客驚秋意天涯思不窮三年猶北國萬里對西風時序悲歌裏乾坤醉眼中黄花一樽酒千古此心同木落秋容淨時平國勢雄望雲心自逺采菊興誰同詩酒浮生過功名一笑空留連慿痛飲冠幘任髙風次韻范濟美秋雨感懐一別劒溪水三換京塵秋夜聽空堦雨嵗月驚如流豈不念故國水清山亦幽螻蟻有微情未忍追浮丘平生老蒼交夫子賢其尤窮經三十年一字不見收賴有管城公落紙無全牛他時恐不免速逹吾所羞代句龍君輔上潼州令卓魯當時事風流莫與班最成三載後名在兩川間桑梓深聆德絃歌幸毖頑牛刀淹試可驥足暫投閒偃室何當造膺門早許扳丹墀初受命墨綬遽言還何子方游學終童未出關梁園今萬國蜀道自千山籍眼終多白萊衣念戯斑歸期春服就潼水㑹承顔同魏季脩雪中閒步二首纎纎月色淡黄昏城郭千家雪炤人㩦手望春同茗飲小坊燈火自相親草草瑶池小宴終玉人招我廣寒宫歸來懐袖天香滿月照梅梢雪未融次韻俞德翁述懐二首事業無媒祗漫勞平生於世一牛毛三年萬里看飛雪不向人前愧緼袍飄泊天涯不繫舟又還窮臘動離愁軒裳瑣瑣知何者直自時平未肯休寄内去住初難料行藏只是嫌天髙山簇劒江靜月磨鎌久别平安否新愁覺夢兼雙魚何日寄迢遞嵗將淹春雪太學陰風度嚴切宻雪紛如霧虚牎覺逾明臘紙粘飛絮文書不掛眼對榻聊箕踞春愁暗乗人怱怱出非慮門前亦有酒官禁不可酤永懐傲江湖何當脱羈馵嵗暮述懐寄安常兄意廣詩餘怨才狂酒見真雪梅新濺淚霜月冷傷神短劔深藏匣哀絃久委塵良游惜遲暮雲物又驚春三月十一日欲徃荆南景德寺睡起呈曹令德風門自開闔門外黄塵暮午衾温留人春夢如飛絮我行指洞庭千里始頓屨僕夫呼起起寸心撮百慮此生睡不足正坐奔馳故四年四徃來日月途中度美人亦念我贈以别知賦英辭粲星斗深語發妙悟坐起再三讀一一明月句何似謝所投靜黙有佳趣令德送余都門外眷眷惜别余恨不欵作詩寄之行人不忍别遇酒輒醉倒僕夫怪何遲謬應行亦好憐君如弟兄每見開懐抱天涯重分㩦祖席都門道城頭傾落日酒盡迹還掃留連意雖勤晤語終草草君如汗血駒千里未脱皁我若隨波魚圉圉依寒藻去住各有謀聚散初不保惟餘一寸心耿耿遲君老同楊遵道出京本欲作詩而吟咏久廢恐取道襄陽吊古遺迹遵道有作不能多繼也先以詩謝之經年不作詩意到無好語强欲理短綆頽井暗塵土夫子賢逹流奔逸不受圉風流夢鱣後清德逼而祖文章守家法騷雅到前古屈宋或交綏曹劉真臭乳而我獨何人詞格本寒苦枯腸費搜攪况復久不吐胡為謬見假亦使郊繼愈無乃縁葭莩遂與噲等伍此行過襄陽倒指不旬數龎公亦安之孟子不可覩聲名向千載石刻餘羊杜山川空形勝耆舊一仰俯終當弔遺迹尊酒酹江滸恐君成感慨嚴韻儻見侮作詩謝不能亦以丐斤斧十五日過許夜雨暴作明日行四十里宿於穎橋又明日晴書事狂風撼平野沙礫眯兩目筍輿我與君道逺疲徵逐驚雷一夜發暴雨溢川谷平明泥没趾寸步不容續我生賦窮蹇觸處背天福風雨豈不好行路非所欲中途聊息肩村驛何可宿我勞固其分端恐僵僮僕燎爐燃濕薪傍舍酒初熟安能浣愁腸但取充飢腹中宵耿不眠明月忽挂屋攬衣起視夜秣馬亦膏轂人情易喜愠天道有飜覆陰霽那可知去去無欲速汝州道中呈遵道青煙漠漠栁依依落日雲中鴈北飛咄咄書空誰的㑹遲遲行道子同歸桑陰蓋地牛羊困麥秀漫山鳥雀肥向晚未知投宿處敗籬疎屋火煙微承遵道和又用前韻書懐端的荆州得所依羽翰終欲更南飛閩山萬里長牽夢蜀鳥千言只喚歸當日朋儕俱草澤而今兒女自輕肥白雲南望三年客長是尊前誦式微春晚書事楊花撲面春如夢麥穗齊腰日似年多病不縁詩得瘦放懐全藉酒能仙楊花二首出處陶潜宅興亡煬帝堤牎扉容㸃綴原野自髙低地迥棲難穩風髙去易迷顛忙能幾日萍滿水東西楊花入水為萍漫天方作雪糝徑忽鋪氊已是春如酒那堪爾似綿木香花二首翠袖青裙襯雪膚雨餘終日醉相扶祗應不使朱鉛汙獨抱幽香與世疎直自江梅墮雪英便遲幽艶到清明楊花著地香初破乞與愁人一解酲自入襄城即有山水之興路中稍􅆳唱因呈遵道風沙久迷神山水忽照眼粼粼碧玉甃叠叠青螺綰人煙盛樂土草樹亦精産雲霞入杳㝠禽鳥度盃醆放情千里迥悟意一笑莞胸襟得竒趣酬唱出新撰蟲魚怯嘲誚文史困鳩􅟅我詩實易成淡薄非佳饌君辭頗簡出嚴絶類燒棧自應即退縮强爾取驚赧微言固可録狂論猶未剗勿使俗人知歸途畏書簡和遵道楊花金明池道緑陰稠萬㸃顛忙正可愁馬上只貪看舞雪不知飛滿帽簷毬漫與雲林恰恰鸎能友沙路行行蟻有臣雖有溪山供醉眼亦嫌塵土汙芳春黙堂集巻二欽定四庫全書黙堂集巻三宋陳淵撰
