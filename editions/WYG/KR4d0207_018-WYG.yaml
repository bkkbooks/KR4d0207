body:
  text: 與鄒德久郎中令弟相見言李樞密家書報公授官仍召對未到除密院編修賢者進用有漸士論同慶况朝廷甄錄盛德之後舉當其才尤可為天下賀也前奉書可見區區之情矣不知公何時到闕于甚日引見已赴新任未也李公可謂社稷之臣前功甚俊偉後責尤重得吾友左右盖萬人敵此非不肖私言也致廣大也必盡精微毫髪不盡廣大之體虧矣潮頭過處無有别浦未勢既迴乃入溝港氣横八極而其心愈小然後人為之用籩豆之事則有司存也此在徳久或有取于不肖之言自餘無可願者又淵數于令弟徳裕處聞動静足慰懐仰更䝉眷念重賜手翰雖荷不相遐棄之意然愧恐多矣見諭久無書恐淵以此不足正失鄙意方今國歩如此誠願公等専意世務不以人事虚費曰力竿牘之不繼又何怪乎北耗連獲捷報大寛逺旅之懐况身近朝廷其喜可知矣自兹海内平定非獨得行其志者可以享福退而安閒尤足樂也幸甚幸甚久别所欲言于左右者多矣臨紙悵然莫能萬一又徳久以英偉之姿名重海内雖嘗被識拔而久處閒散未慰輿論似聞無所施設鬱鬱未快頗欲引去正不應爾漢金馬門乃風雲㑹遇之地而東方生于此避世宜顯而能晦兹其所以為賢耶况先徳未昭聖鑒不遺天生魁傑必有所試聊復安職以俟振舉此朋友之至願也淵屢乞歸而主人不許其去于公無補私計亦不甚便只候熱退再理前話必可脱也又叔祖右司盛徳重名四海所待以康濟斯民不幸傾逝誰不悲悼况於骨肉之間子孫之列平生愛與之厚者其痛傷宜何如淵不肖自為兒時已被誨育至今埀三十年所以撫念䇿勵之意益久不替自顧窮蹇愁悴道不加修玷辱師友無所措其顔面而去年南康省見則教之曰凡為士者不當以利欲汩其中儻来之榮初未嘗以此期汝也不知何所取于不肖而然仰惟此恩圖報無所但極悲感愧歎而已維揚之葬未必亡者之意要之及時了畢大事于禮無悔其得多矣至于身後緣業當付之造物耳其亦奈何淵正困乏中思見崇仁諸尊丈乂以徒往無益而止今專人往致奠令自江隂回逹此誠懇無聊之甚喋喋為愧龜山僑寓毗陵有屋有田可以久居皆吾友之力雖尊賢樂善之誠無所不至誰則能爾甚可歎服也世道如此唯勇于必退為得䇿退而無食安之實難如聞整頓間事頗復有叙為超然長往之慮深矣鴻飛㝠㝠弋人何慕可為當路者太息也又為别忽復五年傾渴誨論未嘗須臾忘也獨以相去隔濶不獲數奉起居之問兹為愧歉前年陳夢兆遣人至都下道由淛江嘗具慰狀託楊家諸公上浼比人還得龜山書語不及此不知果達否流落之迹衆人所棄德久未必厭我也當是多故無緒相濡沫耳去嵗失意即由洪撫而歸到家數欲問訊龜山而鄉僕不肯入淛因循至今夏始獲便中附書則其他處可知其無竿牘往来之禮矣所以然者盖皆有説不足為吾友道也比年以来出龜山門下者如參辰之不相值非南北阻絶顯晦殊志則中道自廢者也獨吾徳久道義益隆名稱普聞凡我同學皆出其後兹可為主斯文者慶矣幸與同志豈不仰徳而綿薄無堪駑蹇自滯徒深愧歎耳淵就祿之計亦大可笑但窮途于此欲免飢凍不得不然想望髙人如在雲漢自兹便恐埋沒塵土未遂相從因人或辱寄聲告鞭䇿其所不逮毋為獨善也非徳久吾誰望耶再與向伯恭侍郎薌林幽居名聞海内固夢寐所不能忘自度尚堪一行庶解平生願承教誨之意而世路風波動恐累人坐想牆仭徒深嘆仰耳淵年老志衰中間䝉朝廷記錄拔之閒散皆左右往時力賜薦援之故豈不知徳而屢試罔功自置廢棄更為知巳之辱何愧如之意欲俟祠官任滿即圖掛冠此計若遂便可千里従公遊矣伏紙増懐語不能載僧祖初昨住峡江善法寺己酉淵赴辟陕右道由峡江識之未㡬遇南昌之變因解擔寺中不數日山冦竝起逺近遭刼奪来者如雲至有全家衣不解體者初公皆處之煖室朝夕贍之畧無吝情如是累月比其去毫髪無所取此豈尋常裸顛露足持鉢自營之徒所能為哉以是常愛之重之每恨衰晚流落無以取信于人坐使此老行業未著比聞嘗緣嵗歉無以輸官遂棄去善法已又累年往往齋粥不給年老無歸最可憐憫欲望左右因以郡官從容委曲及之或䝉收拾俾得把茅盖頭如淵受賜也與李丞相伏自毗陵拜違侍側忽復五年下情傾仰無以况喻久不奉書記室實以浮沈逺宦塵冗卑賤自疎門下罪不可文唯劇愧懼比辰氣候向寒不審鈞履何似伏惟游神物表與道為一獲福無量益祈倍萬調䕶以慰海内跂踵引領不勝飢渴之至相公立不世之勲熏穹纒壤貫于幽眇忠誠義氣有生之類所同愛戴至于出處進退為社稷安危所繫天下士夫視以去就故朝有動静暮傳四海淵雖在遐方陋邑亦獲與聞良慰懐想惟是竿牘之問始慮浼黷聴覽終致懈慢然前年聞暫過臨川去嵗聞入秉鈞軸俱嘗專遣人拜書適不果達此未易一二言也惟大人君子察其肺肝未賜遣絶淵不勝幸甚往者天幸執事者留寓沙陽獲與鄉里後進躬服掃除之役日聞咳唾之音䝉所以提攜訓誘之特異衆人仰荷知憐恨無以報唯冀公在廊廟江海之大不卻細流庶㡬此時有以自效不為門下之辱今世道若此公復居外此情千萬如何可言唯公用舎天實為之天如未喪斯文公之起近在旦夕矣恃此無慮然亦不能忘懐也自頃相公謀安宗社遂踐樞廷已而復登台輔是時天下毫髮絲粟之才莫不争先疾馳以赴功名之㑹獨不肖辱在泥途未累陶冶雖親戚知舊咸以為疑必欲有以自達于公者淵謂公之用于世假以嵗月必致中興如淵衰晚無堪獲為太平幸民不猶愈乎惟大厦將成雖榱桷之微不以散材棄燕雀何知徒竊庇于帡幪已成之後耳獨當為天下蒼生祝公之歸不敢以私一已也淵到永豐已書三考又八月矣代者不至尚此竊食幸江西郡邑無事可以蔵拙飬病其餘不足道也春間䝉胡帥辟筠掾不行已而冦撫諭者素昧平生以許右丞意招至豫章欲相率詣行在又以故不果往即日再權永新令新官後月當来来即歸永豐矣此去鄂渚不十日可到恨拘縻官守無由一造牆仭瞻望聲光以日為嵗伏紙叙懐莫究曲折往在豫章見田元邈張元象甚款知皆出門下田固徳人張亦竒偉之士不見如許人乆矣吳㑹昌亦于此時邂逅吳張皆能道昔時相従事幸詳聞之益復令人歎仰不能巳也鄧至宏得近書胡處晦兩月前過宣城亦附便相問自言初無所補要且先度嶺習儀耳亦可見别後所學也龜山先生即得就閒亟欲歸鄉乃為閩冦所阻想亦以滯留浙中不樂也久不收書鄂渚必有往来之信知其所安耳昨了齋叔祖為作黙堂箴来廬陵始獲善工并徳久篆字刻成今輒納一本去幸賜批覽人去速愧装背不如法也此箴頃在沙陽嘗以真蹟拜呈䝉留玩數日且許為一言繼不敢以請徳久嘗為作記諸賢多有論述所以昭先訓而啟後學猶有待于相公也衰晚已無求于世不朽之託唯左右念之恃久在門下敢以浼聞與許少伊左丞去年諸公相繼引去之後都城復遭敵人圍迫已而二聖逺狩未報還期臣子所同痛憤每一念至欲死無所况如左右嘗䝉眷遇特深情當如何伏訃再還闥禁感事傷懐尤為難處但以宗廟社稷復安聖主英睿必致中興君臣之間方當共濟艱厄四海傾注幸公尚留遂膺柄任固不應輕為去就也瞻望誨席尤劇惓惓伏聞向者所寓去京師不逺兹被賜環必已入覲朝夕啟沃固多開益天下幸甚第廬陵僻處江西如坐井底却不得到闕之耗至如龜山亦復半年無書不知已在朝廷否近者諸賢議論似不一今日救焚拯溺之時豈容如此如左右既䝉異眷當圖所以靖之不然恐非亷藺體國之意也如駕敝車冒險疾馳昧于所適而惡人之指其迷何由濟乎僭越易言恃有以深鑒之淵少意冒聞周子美者同官乃温人盖常參侍兹者為令永豐㑹軍興之際盜賊羣起人人危懼輒奮不顧身深入險阻鋤其強豪兩州因以無事功狀明白或欲蔽之而不可得遂為保奏今邑人感之親送郡章詣行在或恐難達乞台㫖引付所屬也渠意似望達者一言之助第恐不相關渉耳然此人寔有可觀非敢以鄉人舊識相求也始于中憲有是非可否之權足以駕道而公以中和之氣從容廟堂之上何事不濟竊與中外共慶今審入賛機政㫁而行之莫不在我方之言職尤易為力自兹君臣同德號令曰明天既悔禍敵人必向風效順矣惟人才隠伏未盡進用然公既幹大化必有纓冠而来者民心固未遽離今又有以懐之財匱力殫徐為之計不足多慮也喜不自已不覺僭易惟恕罪幸甚淵衰晚茍祿無足言者今年二月幸書三考惟是未有代者日夕念歸計無従出昔者黽勉出仕實以貧寠求活亦冀緣是及物庶不虚作一世人而簿領奔走老益難堪生平意緒消鑠殆盡矣若幸脱去遂永為丘壑之物唯賢者在上昆蟲草木宜無不得其所行當安于田里歌詠中興之功以畢餘境而已區區之情尚冀知察昨以罪去國悤悤就道不獲詣違臨行伏奉誨問所以存撫慰勉之良厚雖忝交契僚屬之舊方兹廢黜誰則有此用是銘感在心久不能釋念欲奉書少伸區區傾依之意適公復領臺綱而不肖名在罪籍不敢遽尋舊好遂因循至今伏俟台察循義何為不遑寧處然江隂亦自不惡夢達惠州固佳處五馬豈易得但未知闕逺近如何耳安止極可憐當賴公少振發之博學能文可以續龜山之燈者切幸留念與李先之祭酒自五月以来伏聞朝廷艱難二聖播越朝夕憤嘆寝食無味尚此懐祿實亦何顔况如左右已被召擢而經濟之心未獲展露天下休戚固當以身任之其情宜如何耶仰惟憂國愛民之誠如拯溺然不得趣召至于再三也不勝狂易伏幸深察衰遲之迹雖鳬鴈飛集無足比數亦復不安其職欲去不果未知所濟謂宜得如左右者勉强一起庶㡬上下有望只如朝廷隄備西北未見可守之方若将棄之而去此分裂之漸也縦不得已遷建康則東南數路豈可重困今在事者百端擾之将失民心朝廷不知也則憂國愛民之士安得恝然不以為慮乎此事盖非執事為上極言之将與誰冀昨䝉下諭欲乞宫祠為私計則便矣奈宗社何此不可廣也人微意陋以左右見知之深不敢嘿嘿仰祈孚察與胡少汲尚書竊聞出鎮名藩已遂視事不勝歡慶惟豫章於江西為㑹府地大物夥號為難理異時國家内外無事猶必以名徳之重為士大夫所推先者臨之然後吏畏民安姦宄潛息矧今艱棘之際選置師帥尤難其人正上下延頸跂踵以俟適得老成卧治想見號令未行千里帖然盜賊獄訟日益消弭也淵備員簿領實在部封十城之内得以託迹竊食豈不知幸所恨拘縻無由躬聴約束歎仰何已臨風叙情言不能既朝廷以江西一路軍民之重付之麾下其委任之専有他日帥司之所不得與者名實所加萬口交慶但舊徳宿望久居于外非今日急賢之意旦夕必有召節謂宜濶畧細故凡所施行先其大者期以旬月其源清矣果遂西歸則後之来者無更革之難而有遵承之便其憂不濟耶賀啓一通上浼台嚴非獨為禮亦各言其志耳衰晚僭易伏幸矜恕淵少時學于叔祖了齋其後二十五六嵗始獲承教于龜山楊先生因授室焉凡出入于兩公之門者盖莫如淵之久也惟執事于兩公友善故淵于師席議論之餘得以畧聞盛德髙風固嘗想望聲光冀獲親炙而道路南北邈不可得今兹幸接武屬吏之後且復相去不逺天其或者俾遂見公以成其夙志耶喜慰之懐于是為甚第未知公未還朝間淵果無所抳否匏繫于此心往形留矣與李濟之察院自五月以来伏聞國家多難二聖逺征至今痛恨如不欲生雖衰晚卑職無足比數要自不能釋然耳茍祿逺官未知攸濟雖嘗䝉誨不逮而末路强顔亦復難處聖主備嘗艱險所以扶持宗社固自有道何由即見中興之效得與海内遂其麋鹿之性乎惟公伯仲家世忠義固當為蒼生强起不應久處閒曠以負天下之望也義迫于中不得不言惟深鑒之朝廷今日之禍根源深逺已至此不足追論但諸公所以救此者似未得其道何以言之朝廷議遷建康為萬一不得巳之計耳營造修築何必豫謀若大駕果能巡舎西北而不顧則天下之勢分矣又以宫室城池之役大擾江湖淮浙之民縦得所保東南其可恃乎西北已揺東南又失人心欲望雪二聖逺狩之辱復祖宗累世之舊是則難矣此事灼然而主上未之知也要之先達素信于人者為吾君極言之庶㡬東南不至糜潰頃者祭酒已嘗被召中道而返方今日求賢如渴之際兄先而弟従之偉論一出大事定矣不審以為如何儻可聽從天下之幸祭酒道徳文章擅名當世往者泥蟠方深澤未及逺一為憸人所陷流落遐方遂至白首雖終䝉兩朝知察有意大用而未遑入覲遽而厭世有識之士誰不痛悼况復手足至親平生友愛其如催割何以堪處惟公以父兄道術所付痛自排遣無使憂鬱致疾以慰斯人之望則海内幸甚元祐人物之賢三十餘年間淪喪殆盡幸有一人如令兄者人望以有濟朝廷又已見知且頻年趣召将處之以其所宜為者不幸奄棄豈非命邪死生有定數無可歸咎幸天悔禍不榮其身而昌其徳有公在焉足以為無窮之託則亡者為不亡矣自餘無足言者近承有臺察之除聖主急賢士夫交慶適以左右同氣殞逝不敢别具賀狀竊審辭不赴召恐不須再三也方艱難之際莫有以身許國者若賢人君子為時所用又欲退避所望以致中興之功者誰耶仰恃眷私不敢隠黙伏幸原恕與鄒至文右司叔祖遽爾傾背聞之傷悼至今不能已想在親愛哀痛難處始恐諸公扶䕶還郷為之憂慮寢食殆廢今葬於維揚諸事無悔得所處矣但族中多貧無以相助淵雖在婺女又以路費不繼且無以藉手未果西去想望几筵徒殞涕耳去年五月見叔祖于南康為留數日時以敵尚未平碎累營心恨不獲已臨别見問何時再㑹淵言更一二年當以都下參侍叔祖笑曰此夢太逺孰知其遂至此耶苦事苦事聞得之時出平江正之亦如四明果何所幹遽離苫闈耶况生事未就諸叔數出極非䇿至文家居相近當以告之三山無耗或云當陳状曽與德久商量否崇仁計出無聊今專遣人問之来書必詳及邇来動静也自餘何言答朱喬年吏部衰晚廢黜非唯人所賤簡亦自不敢以罪迹累人用是略去世俗往来之禮一二年頗復安之故以喬年亦不果頻問起居自取疎斥可謂甚矣不謂寛容猶復記念示以誨翰委曲眷存有加于昔不知所以得于左右者感服之餘但自省責而已淵杜門念咎聊以永日不敢上勤矜恤唯冀公道盛行得如公之賢光輔聖主終致中興大慰蒼生之望耳自餘何言與曹仲素通判去嵗狂盜竊發㑹稽尤為危急徒得左右忠誠義氣轉禍為福出數千萬人于必死之地其為功盖一時所無而僅有也聞之踴躍欽羨不能自已至于郷人榮公遷秩之際則不敢以是致賀所以起居之問因循至今想素䝉愛念未遂遣罪也相去不數程尚阻晤見臨風叙情莫盡惓惓之意與莊參謀自公去後始見公詩皆佳作惟書輞川圖數絶為尤竒故常咏嘆之無已恨悤悤未及深語遂相逺也張子房佐漢滅楚易于拉朽觀其狀貌乃如婦人故司馬遷常惑之公志追嫖姚而羸然如不勝衣此豈常人所易知也造物者乃處之遐方名為郡守而使之居不安食不飽所未喻也財賦匱竭盜賊縦横君子居之日久必可為若民受其賜亦復何恨更願為民社少留使逺方侯藩有所矜式豈勝幸甚此外無可言者與王直閣近别台顔方欲上狀未果乃䝉賜教累數百言詞意之重待遇之勤皆非衰晚廢棄之人之所能當捧讀皇恐惘然如醉夢中莫知所答故久不敢上報不審果辱照亮否公于不肖為前輩位望聲名過人數等固晚進所欽仰儻有所使令孰敢不力况前日埀諭實欲宣之人人以昭潛德但懼舌短耳過形謙誨誠所未安不敢以為榮幸也比辰霜寒伏審台候起居萬福區區尚稽面承謹具狀上謝言莫能盡辱示厯官劄子巳即時通呈丞相因及左右欲辨明之意丞相謂知之已詳不待言也淵嘿窺其意無他但異時付公以河北招撫之事故不免徧詢熟議以盡賢者之情疑若禮厚而誠至今者帥府無事不必謀之于人已可自了故雖如公過従之疏亦復何言此公所以反覆過慮恐為謗議所轉致知已者前恭而後倨也来教固云考言者之素行與被譖者之顯迹因以用誠而懲妄此言極有味然吾既已知之他人其有不知乎願公盡掃前日之疑不改平昔之度徐待其察縦塵垢未浄亦豈鑑面本有之物耶恐公未能忘懐故聊復一言以塞懸望自餘非筆墨可既也幕中雖無事然謁謝書問頗費日力臨别十日之約深負前言也衰老役役濫厠羣彦之列茍祿無補俯仰増愧近亦力乞去未䝉見許嵗行盡矣若因循逢春私事俱廢奈何召斾復亦入城不審待得一見否無聊之甚尚冀款教庶寛旅懐也澤民以羅養䝉歸遂當還任二漕留宰髙安旦夕可赴官矣伯陽舉狀遂溢格末路真可喜耳北耗頗慰人意觀德音可見矣逢漕遷副使余憲已過贛恐要知故及之與胡處晦學士珵近便中伏䝉誨翰審聞動履之詳極慰欽仰淵自壬子秋得罪離臨安竄逐牢落繼以禍患疾病人事廢絶積四年不謂左右之問謂公以疎慢見罪既久遂相忘矣豈意愧念之中恕其不逮更賜咳唾之音委曲存問有過平昔衰晚何以得此幸甚幸甚館中况味如何留守真相知必不久為冷官矣文章之氣不振無若近世鋪張揚厲要在得人願公講明正道握管濡毫以遲中興使一代之典無愧前古亦儒者之極功也自餘非有所望于公者與張如瑩侍郎澄衰晚不任謬當要職方圖自效已至人言迹其狂瞽投竄有餘矣而聖恩祇従罷免可謂莫大之幸自反鄉社忽忽復見初夏蓽門蓬户可以休老若非咳唾之餘每加容覆何以得此知感知感所恨桑榆暮景未知所以為報徒切傾遡耳周子美節推白首下僚實可憐憫昨在臨安最䝉異顧嘗辱薦引至今未有繼者如聞替期尚逺適左右超擢之初餘光可借倘財計之司有取亷士則如斯人當在鑪錘之間矣蚊蝱負山愧不量力為與之有舊頗惜其已老尚在選調耳不罪僭易與王帥江西之有帥府自昔雖存安撫之名而無西北藩方之實今朝廷在焉四方朝貢所㑹盖東都建康之配非天下大都所可比擬也由是言之公之權雖重而其責亦可謂不輕矣此淵所以仰懐知遇至于通昔不寐思所以補報萬一而不能黙也何則今一切須索出于一路而上供正數曽不少損則凡所征求比之他路必有偏重不均之患官吏将何以應辦而百姓必受其弊其或緣是遂失民心非所以濟中興之業也古語有之凡舉大事必順民心民心所向天意從之而得民心有道所欲與之聚之所惡勿施爾矣此固在宏度之内不待言者稍加留意母忽則宗社之福也與張給事子猷致逺比見所與徳裕書頗有迎侍之意伏想念親朝夕不能釋方朝廷力圖恢復實賴賢者賛相之助而二年来往往相繼求去自便之計得矣上何賴焉惟公清議所屬宸眷尤厚獻納論思之地為國重輕不可遽為去就而堂上康寧有賢弟足以奉承萬一老人不欲逺去鄉里姑俟年嵗之間若此道盡行君親恃以無憂其過温凊定省之孝逺矣不審公以為如何恃平昔眷予輒為一言幸恕僭易之罪與王長源通判奉違忽復兩月瞻仰殊不勝情比来霜寒不審侍奉如何伏想寓興林泉日有餘樂足以悦親神明相之百福来㑹淵到家生理殆不可説行李雖已整頓有緒緣債負未償欲去不果坐想就食之地如在異域始欲乗便走見少畢區區請教之意今亦未能矣斑戯之㑹自兹乃夢境也傾渴抵掌談笑之適無日不然臨風叙情莫究萬一仲素邇来况味如何少賈已安居未也想時得過從此邑冬事比他處為擾貧士雖閒莫我顧者逺想平演絶致登髙賦詩朋友同之最為可樂頗恨為飢所驅作此暌阻雖却紬繹滯思發揚雲山烟水之勝却恐塵埃口舌滓穢清賞為我謝演仙他年芒鞋藜杖相從似不甚逺爾時主人無恙能于歌舞叢中略輟半日之閒復尋舊盟否因筆漫寄一笑切莫作實談看也數小碑本似佳可置山齋壁間輒送上收留幸也與陳子通别紙區區之迹子通素所知察凡所以不得已而應悶然而受惘然而處之者他人不我喻也言之于不見喻者適以自㸃而喻之者又不必言故聞吾事者或以賀或以弔皆可付之一笑也久不為問其于是耶自去嵗與令郎同塗而歸之後適親友數人俱在里中可以日夕過從欣然忘懐便不覺過一夏留連至秋杪聞子静有縲絏之厄遂之建安省之住二十日而歸久在林間乍入喧囂意緒不樂既歸益安困窮之分嵗将盡或憐其貧趣令攝事建安曹局飢凍所驅固無所擇至此㡬兩月雖䝉諸公相知然筮仕之初遽當繁劇已不能堪忍矣淵明不以五斗米為督郵折腰寧叩門以乞食昔人嘗議之嗟乎士之不遇賞音千古所同真可悲哉自今觀之强之其所不樂雖萬鍾可辭而况五斗乎辭之不幸至于乞食固吾所樂也而又何恤焉淵明百世一人豈淺之為丈夫者所能窺測亦及之而後知耳恐子通要知不肖安否因書聊復云云不足為餘子道也與胡明仲侍郎寅久不奉記室之問懐仰無窮相去既逺若湖湘無来便私居又不能遣人往往終嵗兩不相聞唯于邸報中日俟召還之信却聞不樂守郡又未知雅意如何遽欲脱去益令人不能釋恨無由面晤也公再治永民樂公豈弟之政久矣倘留上下之情少留麾節貽此邦嵗月之安宜亦不惡而乃辭疾丐閒恐必有説也便中幸教之庶解所惑見所寄子猷輸蔵記偉哉論也非見處親切諦當而以身任吾道不及此矣何意暮年聞此于公乎欽服之餘不覺増歎昨䝉見諭姻事尋遣人于四明家叔處得回音欲奉報久矣厄于無便忽復幾年愧悚無已家叔既謂世間豈復有此親却云不敢以子壻奉浼當是鄒氏尚相黏綴耳不欲更詢之亦恐相去數千里難於等候滯左右他處擇對也家叔帖子巳寄和仲處恐尊悉鄉人葉超然自言公曽許其来數千里逺去已有定意不可回故因附之書亦以久不聞動静欲報前議别無的便也去意渠自能言之貧甚又無資可以參選真可憐耳淵罪竄之餘平生意氣毫髪不存自聞公入朝日有建明而讜論豁議聳動羣聴為之不覺失聲而嘆者屢矣方慶朝廷得人恢復有漸遽承補外良用憮然即日不審已還侍側啟處何似想惟忠誠義節無間内外有以自適者故非常見所能窺測也夫公道難行正論易屈非適今也茍知君臣之㑹合無常功名之成敗有數則一是之外無可留情者矣此明仲早已得之家學盖不待老者之言也唯冀坐進此道以俟聖察中興之功誠有望于左右也別紙詳教備見愛君憂國之意欽服欽服水事唯上饒守申奏為悉已而便乞宫祠而去豈有所疑耶行朝近日平静但趙相又遭言章復有吉陽軍之命身在瘴鄉復當逺道何以堪之鄉里盜賊再来遂深入刼掠帥司如不聞才退復走泉南破同安不知朝廷得聞否所幸海冦猖獗已從招撫而大兵許来沙縣防遏然而窺伺之羣埀涎于吾邑久矣不大得意當不止鄉民如何得安居也眼病甚作字不能多建昌寄邵武徐守叔祖右司雖與世不偶而其所以遊者皆天下士淵奉承左右埀三十年竊常窺諸公長者相従之盛其人非文章氣節聳動海内則必淡然無營獨立于聲利之表者若見若聞皆可師仰今也梁木其壊而芝蘭之氣未歇得見其所與遊者猶将興起衰懦况于聞執事之風復親熏而炙之耶幸甚過望不可言也悲夫世變屢移冷煖随之人情苦不甚逺至于死生既隔猶且委曲問念眷眷無已非達人大觀迥超世外誰復能爾乃者愛憐照卹下逮不肖見者異焉若區區之心非專為是謝也因風不憚縷縷亦冀深察再與翁士特學士伏審先學士安厝已畢而士特所以致其誠信者於禮無悔國人稱頌之盛幸竊聞之歎仰無已賢者不得志於今必有傳于後先學士雖晚達遽終即其所為已足以暴耀當世况以士特為其子其不朽無疑矣此士夫所屬望願益勉之以為天下之勸淵不勝區區之情黙堂集巻十八欽定四庫全書黙堂集巻十九宋陳淵撰
