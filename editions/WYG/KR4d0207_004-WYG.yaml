body:
  text: 奉酬楊逹甫見贈春風不世情暖入閒門草君詩其似之披拂逮枯槁平生金石友嵗晚迹如掃一見楊夫子胸腹便傾倒間關六年别一字寄不早忽蒙錦繡贈光彩照龍藻嗟我獨何人揖我謂我好無乃嗜好偏收拾到羊棗從來詩人窮君亦行此道我亦從君遊山林不知老小軒觀月呈興宗叔茒簷手可攀修竹出簷上寒蟾漏疎明碎影羅屏障情知月色好逹覽在虚曠東家富池臺端坐不能訪山林足寓目細大初無相但使人心安景物自清暢霜風中夜作曲沼金飜浪禽鳥斷飛鳴杉松起酬唱燎爐宿殘火尚可温新釀數盃遣沉冥萬慮一時放誰能外形骸於世無所仰晤語一亭間頽然齊得喪東家謂佚老堂也流長亭曹載德先塋江折亂山圍西來素練飛嵐光環石窆潭影漾松扉欲盡風前樹難忘草上暉但期流澤逺長與水東歸再用送昭逺詩韻寄昭逺昆仲六經學不傳誰能尋墜緒君家有師承不數虫魚注公子韋氏門粲若五星聚胸中容萬頃一一黄叔度人情悦紛華世路爭馳騖取樂須臾間轉首已失㨿余生末俗中蚤幸識夷路折桂從乃翁頻年麾不去冉有豈辭僕樊遲亦能御雍容荆渚間夫子步亦步初從言下入筌蹄索魚兔終遂義中行良樂驅騏馵有時坐終夕收視息浮慮了了不可言明明有佳處别來能幾時心月翳雲霧諸郎幸不逺寄語多予悟坐為塵事攖空詠別知賦遥想玉華遊春夢如飛絮京師與昭逺約遊玉華既而返舍以事阻爽約聞令德為和詩今作此他日當以示令德也小軒閒題二首舍南舍北梅墻裏墻外竹逌然寄其間不見一物俗東風將小雨夜漲春池緑俯檻數龜魚仰簷送鴻鵠交情石投水坐客氷炤玉從容得此生已矣萬事足誰言南軒小正可陋華屋但恐世故攖不容長處獨青山拱簷楹渌水鑒毛髪花香晚更清鳥語靜不聒客至不能飲舉觴聊自罰坐嘯激清風起舞弄明月是身如浮漚起滅在溟渤百年一彈指何者為不没文章㑹消磨名譽易衰歇淵明吾之師茲理久已逹約令德郊行二首簷栁揺風拂面低麥芽穿雪緑齊齊慿君便作遊春計莫待花繁去路迷小雪纎纎蓋地皮一飜風過忽成泥東君似勸人行樂不使塵埃趂馬蹄酬晏伯逹半生流轉任飛篷萬里歸來興又東寂寞倦投揚子宅低徊却寄魯侯宫阻尋雞黍他年約長憶園林一醉同何日過君花下飲爛看濃艶舞春風錢塘書懐二首逺客真秦贅清時謝楚狂斑衣辭故國青佩久殊方世俗蠻爭觸余生穀似臧正須逃姓字毋使異庚桑客舍連朝雨春愁醉夢如白雲千里目黄犬萬金書所幸交情薄從來世事疎只應狼㚄尾空自詠歸歟錢塘學中寄伯思六言五首門外鸎驚短夢牎間雨送清寒亦有惜春情緒分明不奈花殘㸃㸃榆錢委砌冥冥栁絮穿簾日暖野禽爭食紛綸忽墮危簷劒水庭闈底處苕溪水月彌深緑草年年離恨白雲日日歸心世路紅塵可厭人情白首如新便可閉門端坐不須開眼看人部伍亭前歸路鳳凰山下蕭齋我自無聊不住君如有興重來雪中入國門寄令德三首紛紛輕薄欲誰從愛子從來臭味同千里逺來應念我速須鞭馬要從容此生於世已心灰自笑都城十徃來為有飢寒餘慮在故應隨俗强低囘誰能一飲巻千鍾分付閒愁入酒中共向重樓看曉景一天飛絮舞春風下汴㕘天古栁鳴蟬急巻地黄流轉㟁多好去扁舟穩扶柂秋風吹水易揚波過淮天髙秋月涼風定秋水清扁舟淮海間愛此一葉輕微生久覊旅艱險已飽更經今幾徃來始見波浪平篙師且停櫂莫遣魚龍驚吾行欲安之要待東方明登召伯斗野亭落帆新城曲維舟古河右幽尋得危亭星斗穿户牖西風掃殘葉庭宇不待帚娟娟雲間月亦復照杯酒明朝又東南汙流映衰栁莫以此時心熾然分淨垢過浦城贈王令長源二首化龍潭上濯滄浪夢筆峰前憩小棠十載不辭淹簿領一同聊欲課耕桑經綸未展風霜力文采空餘錦繡腸莫歎窮荒縻驥足萬人飢凍要扶傷半生流落倦塵埃聞説英名首重囘畫虎自慙非妙手割鷄空復嘆髙才北堂戀戀思歸夢南浦怱怱惜别杯此去山林真已矣看公雲翮振風雷題緑波亭南浦江波緑陽關栁色青夕陽千古恨分付短長亭還舍半生走長途所冀亦已微田園已蕪没及此徒手歸妻孥㩦幼稚相望天一涯所嗟埀老親甘㫖不得時季妺復未嫁長姊貧且嫠皇皇三十口未欲聽所之平生道義交嵗晚無晨炊豈不念我貧閉户長苦飢髙門多自足我復拙言辭已矣可奈何顔公猶食糜鄧元孚待制挽詞四首從容紹聖末直節更誰攀不見豺當路懸知虎在山石渠聊試可江國竟投閒尚冀調金鼎那知去不還永泰君臣分欽慈母子恩淵衷雖有在孤迹自難論身去朝廷逺名埀簡䇿尊秪應延閣命猶未厭輿言季父恩稽報平生不自安諸郎方未命猶子遽先官義氣今何在髙風衆所難惜哉耆老逝閭里欲何觀越㟁方投紱将囘出岫雲楹間俄夢奠地下去修文落日川原靜悲風草樹薫但令千載後掩涕想餘芬與楊如愚四首文章初不計工拙言語何常識重輕不向故人齊物我一生懐抱為誰傾半生蹤迹辱泥沙胸胆初無獻子家臧穀亡羊俱可念不須蠻觸故紛拏十年相見不予疎亦記平生戯笑無縱有伯禽堪寓意可能終不記狂奴谷風凄怨不堪歌奈此人情世態何流俗但隨憂樂轉故人應合起頹波存誠齋夏日呈龜山先生二首長者一牀室先生五栁門度人聊示病觀物欲忘言小圃池臺足薫風草樹繁杖藜隨處處歸鳥報黄昏雙檜軒之北髙梧户以南午隂臨短夢曉吹落清談鬬老三無喜嵇生七不堪天涯復相值此意得重㕘答朱晉老見責不赴㑹屠龍事業初何有畫餅聲名不願求春色未䦨猶足賞亂花深處要追遊逹觀軒延平學中林杪飛空出栱枅登臨髙處亂煙迷雲鵬撃水南溟近霜劔凌空北斗低千里江山圍萬井一潭風月納雙溪同誰此地呈胸腹下視囂塵萬不齊宿仙霞聖仙寺呈伯思子靜二首風物吾鄉似山川地勢分稻畦飜碧浪麥壠布黄雲客舍常爭席山僧獨獻芹茒柴餘瀝在聊餉僕夫勤夜泊聖仙老僧以茒柴酒見餉其餘可以飲僕曉日山原靜薫風杖屨輕開談時造極得意自難名奔走非前計淹留見俗情賴渠金石友端的慰平生通州夏雨長風巻地驅炎暑暴雨飜空送晚涼只此蚊蠅俱掃跡不須迢遞待秋霜延平林力道閣上觀水二首千重翠巘分三㟁十里寒潭合兩溪更得横流吞險瀨豈嫌春水濁如泥要看春水拍天流更為溪山一日留誰遣白雲迷眼界坐令歸思入扁舟兩浙周提刑生日淮南草木亦知威故國重看衣繡歸不用埋輪留魏闕故應持斧靜圜扉天瞻栁舍雙丸㑹地應蓂堦五葉飛此日長庚來吉夢弧南終並一星暉黙堂集巻四欽定四庫全書黙堂集巻五宋陳淵撰看論語四首明明孔聖能毋四的的曾參所貴三一部魯論開聖域古人無死要重參天道文章豈兩岐雷聲淵黙本同時如何子貢能言者説與無言更有疑陋巷從容一事無不因鄰鬬出吾廬簞瓢豈是忘憂物自是從容樂有餘直從堯舜以中傳又到尼山續斷絃看取子思親的處始知論語自無偏夢得亭上雷霆巻地灘聲急旌斾揺空樹影寒千古西山留爽氣雨餘容我倚欄看留别鄧南夫四首平生交友各飄蓬只有丸丸雪後松萬里歸來還徃絶獨君時許略從容昻昻勁氣初無作蕩蕩竒胸久息機容我醉時開讜論一軒明月夜忘歸有子才如汗血駒新門髙大可容車故應袖手藏深渺憐我氷霜涉畏途比余於玉有竒文一落泥塗十二春慚愧深知同鮑叔尚言荆璞定逢人十二年前南夫有玉説一篇送予入太學其文甚美今子被貢適三上故有是句越州道中雜詩十三首心息久相依息調心自住忽焉不自知根塵失所寓向來尚有錐今我已忘兔似入無功鄉不由嵇阮路暴氣燎原火淺量盈澮水不見楊關西此生真已矣誰言佩豭由不作緼袍耻至道儻有聞客塵如脱屣世儒讀論語未脱小兒氣豈悟無絃琴中藏千古意顔淵黙然處曾子亦心醉處處儻逢渠字字皆有味人心有黙契晤語不在多一笑離凡情萬象皆含和孰是忘言人聽此無聲歌有懐閲古堂夢中時一過閲古堂在蕭山縣宅浮雲作秋陰細雨如朝霧放形山水間意適無艱步忽遇古招提空翠森囘互倚杖聽泉鳴悠然不能去天姥寺小舟適久雨疎篷常自蔽形留一席間心與天地際逝者不可作遺編等蟬蜕一念無古今千載若符契胸中有佳處妙意不期㑹弄筆作五言心手無内外千古陶淵明秀句含天籟偶然游其藩遂爾厭彫繪淵明已黄壤詩語餘竒趣我行田野間舉目輒相遇誰云古人逺正是無來去展巻味其言即今果何處老耼言道德頗復求自已但於閤闢機未免容或使列莊猶反約申韓遂殊軌所差適毫釐奚翅繆千里揚雄窺聖域何啻越距楚斷然著成書凖易與論語古來文字學似此奚足數誰謂千秋人斯言果輕許
