seq: 5
front:
  text: 王通禮法士談道則未然雖聞一字中尚倚諸子偏區區尊孔子未悟失其傳自聖猶不疑續經何足愆堂堂陸忠州談辯如傾河從容仁義途步武尋儒科一斥不復返方書事研磨至今諌草存滄溟遺一波我行何所挾萬里一毛穎服勞髪亦禿木語意先領疇人如告我心清事自省從今中書君亦復免馳騁
  hash: sha256:bbaf4113ff535b8943b71c0328f84a4246aa46082d286085b449a6acd2957a6d
  markers:
  - {type: page-break, offset: 21, content: '', id: KR4d0207_WYG_005-4a, image: WYG1139/WYG1139-0324a.png}
body:
  text: 和如愚思劔溪佳人經嵗隔參辰栁緑桃紅奈逺情遥想玉樓春睡起一江風日弄清明馮元用九日約白雲寺登髙以追昔年都城望津之㑹偶以事不徃蒙示長篇次韻與君都城别星霜屢變易每懐望津游悵然如有失此生覊旅中嵗序驚心魄還家幾何時自愧不煖席建溪古渡頭短棹凌虚碧掀篷忽見君恍若夢中得相㩦定舍館石徑走迂直危亭至如歸坐午及昏黒黄花笑東籬未許蓬蒿没咫尺白雲樓坐阻造毫逸人生正似茲有志誰能必當時連鼇手至今猶挾䇿髙才真楚璞末技同齊瑟無心效騫騰自分投閒僻望津儻同登意氣那復昔次韻酬鄧天啓少年翰墨場自姹穿楊箭誰論第一功不數曹參戰聖門窺􅃹豹一斑時許見棄捐憂患中更欲資陶錬兩鄧富文采端可同席硯投璧或未知賈石誰敢衒小栟詩益竒出語人所羡過門遺新篇無乃思與狷我懐古作者臨文頻撫巻孰能掃千人期君當八面次韻邦美叔和天啓見寄竹風挾雨撼篷牎靜聽秋聲轉騒窣朝來飢卧媚微涼叩門不作淵明乞小栟見餉有新詩七言端為吾家出共誰渠有古人風孰識中藏謫仙骨書如周鼓未差訛語效商盤仍詰屈誰與和者叔不癡落筆成章一嗟咄無用如今君豈樗自冦從來我非漆板茒它日儻相尋好在山深林更宻邦美作軒名樗故云三月二日泛舟下延平晚泊西芹扁舟劣容身風浪困掀簸曲肱游華胥夢斷千山過縱横波間石滿目牛羊卧秋毫儻不支巨艦忽已破篙師號神逸却立變衰懦我豈未之思懸知無可奈此生足驚憂似為天所癉那能一生死且復耐摧挫日暮同濟人舉酒紛相賀一笑盡餘觴歌罷無予和次韻令德荅天啓小栟妙語言下筆初無難曹郎更精深一字不茍安我師陶靖節亦未游其藩但覺萬仭淵中有蛟龍蟠人言失故步乃在學邯鄲平淡恐未臻先作郊島寒古來文墨士十九姓字漫尚賴相可否鹽梅助鹹酸復次韻荅令德見和來詩及維摩黙然之意多言亦焉用守黙良獨難維摩得此門衆生病自安當時許子將不造寔與蕃終以月旦評有愧申屠蟠忠良覆漢鼎魯酒圍邯鄲獨愛千頃陂滄波炤人寒君豈叔度歟胸襟江海漫自然已憤歎不須珍柚酸用令德韻題嚴陵祠價微良易酬器博無近用騏驥非良樂萬里誰能控蕭王漢中興四海倚為重誰為淵驅魚一呼百萬衆妙筭環無端竒功射必中忘機諒未能豈數漢陰甕故人鈎尚直倦作儀韶鳳應無萬牛力負此丘山棟羊裘又獨徃苦語餘嘲弄至今賣菜言空記當時夢嚴子陵以匹夫見萬乗乃堅卧不起所謂髙氣蓋世者又謂光武差增於徃意若未甚許之則其所藴豈㓂鄧耿賈之儔乎司徒霸位三事而止名其為癡光武乃以諌議大夫處子陵冝其弗屑也余觀湯之于伊尹武王之於呂望皆師事之故能致王業之隆後世貧賤屈于富貴此道遂衰聞客星犯帝座之事則相顧驚嘆以為甚異况於尊之為師乎光武于故人厚者惜乎其不知此也世疑子陵之去就如不得其當予謂光武不能用子陵豈子陵之失哉故因和令德聊以見意焉跋子靜所藏魯直書樂天八字偈凝師八字源則豐樂天説偈流無窮山谷眼明如日中落筆驚電馳蛟龍誰其得之建溪翁子靜姓也取人所棄豈俗同搜竒抉怪晉餘風嫉邪憤世髪上衝自我觀之案兩重巧偷豪奪願不逢好語傳播人所攻斯言有味當見容政和六年七月無諍道人書附子靜所跋之後題公叙叔舫齋胥靡来時楫鴟夷去後舟濟川曾入夢浮海竟難留忠信雖堪倚行藏要自謀應同仙似泰不數勇如由水濶風濤夕鱸肥浦嶼秋落帆如得計整棹欲何求明月時堪載新醪便可浮江山無盡意長艤劔溪頭和羅仲素寄子靜長篇蒙示所與子靜長篇論髙而理正讀之感嘆不能自已是日偶思道来訪問以老兄安否云自崇福還却往龍湖而来書不及此二刹皆雪峰髙弟所廬也豈復問道於此乎輒次嚴韻聊致區區之意甚不自揆也龜山絶壑蟠豫章秀幹徃徃參天長十年收拾多散亡只有太白追蟾光知君所得不可詳宴坐鐔溪名益彰獨嘗為我露其鋩盡掃楊墨揮韓莊邇來黄面稍侵疆劔藏于室矢在房分將肌肉剜為瘡猶説道心乃平常剜肉為瘡平常心是道禪家語也我欲從之挹餘芳竟坐此傳乖所望新詩謾説陋漢唐直以未畫窮羲皇豈知籓籬不自防欲舉萬目誰為綱况彼桀驁非勤王安用援手登之堂愛君駿足如飛黄一空冀北無留良四蹄雷雹方騰驤肯如駑馬徒爭强和子靜三絶亭竹二首牎外度聲風宛轉庭前舒影月分明參横斗轉情無盡骨冷魂清夢不成霜雪豈能摧勁節埃塵無復入虚懐故應淡薄無人管不是子猷誰復來漁父一首一聲横笛起蘆花驚斷天邊鴈字斜白首飽諳鱸鱖美未能連夜網游鰕舟中誦子靜江上之作為和二絶月下長吟露濕衣謫仙嘗憶謝𤣥暉澄江一句無今古何似晴空獨鳥飛子靜詩云爾扁舟直與石相摩得到平流幸已多夜泊寒潭風不定更憂雷雨作驚波黙堂集巻五欽定四庫全書黙堂集巻六宋陳淵撰
