body:
  text: 辭免監察御史奏状左承事郎守秘書丞臣陳淵右臣今月某日准尚書省劄子四月十八日三省同奉聖㫖除臣監察御史者臣聞命震驚㒺知所措伏念臣困而後學老不適時頃縁貧病過竊奉祠之禄退安林藪已為僥幸重蒙恩召賜對改秩且復寘之書府尤非其分今在官未及一年告假殆居其半瘝曠之罪日俟汰斥而乃更冐臺察之除雖由親擢其敢奉承臣仰惟國家自祖宗以來崇奨紀綱之地信用其言故凡居憲府者不論髙下必以守道不回忠信可考之人為之所以止邪於未萌而消患於無形者用此道也顧臣何人乃獲茲寵况臣祖父名監與今所除銜上一字聲韻雖殊而字畫無别稱用之際情所未安欲望収回成命改授能臣上以遵累朝慎擇之意下以弭賤臣濫得之譏臣不勝區區之願謹録奏聞伏候勅㫖辭免右正言奏状左承事郎守監察御史臣陳淵右臣今月二十八日准尚書省劄子十月二十七日三省同奉聖㫖除臣右正言者臣聞命震驚罔知所措伏念臣一介賤士百無所長陛下拔自逺方寘之要職欲稽報效未即棄捐臣非不欲傾竭肺肝仰酬知遇而年衰氣索鞭䇿不前復此超除義實難處况諌省乆虛之職乃朝廷不次之遷豈惟公論之所不容亦恐後来無以塞責伏望聖慈収回成命以待異才改除臣一在外合入差遣少安愚分謹録奏聞伏候勅㫖再辭免奏状右臣近具奏辭免除臣右正言恩命准尚書省劄子奉聖㫖不允臣以非才義難秖受須至再有陳請伏念臣頃以貧寠之故仰禄嶽祠未及終任特䝉収召臣名在仕版不敢違命比至闕下洊被殊恩一年之間已遷臺屬皆非臣所宜得者辭不獲從亦既就列臣唯近制察官唯以分紏六曹稽違為職繙校簿書僅同胥史非若前代用人必有回天之力動搖山嶽之勢然後可以辦也故如臣輩衰遲疎繆之甚茍安分守亦可勉强然進非其序固已大愧物論未皇自劾遽又超遷况諫省之官自昔難得其人若非望實兼隆豈宜輕授而又中興之初陛下與一時名臣共圖儁功克昌大業雖深謀逺慮必出宸斷而拾遺補闕亦賴正人顧臣何者敢冐兹責此所以聞命驚憂無所容措懼必得罪而不敢以亟遷為榮也伏望聖慈察臣誠懇實非飾辭特賜檢㑹前奏如臣所乞以允公議臣不勝祈天俟命之至伏候勅㫖辭免秘書少監劄子左承事郎守右正言陳淵准尚書省劄子節文二月八日三省同奉聖㫖陳淵除秘書少監兼崇政殿說書進講左氏傳淵衰晚不才昨䝉誤恩擢寘諌省淵智識淺短議論闊疎曽無毫髪上副聖主求諫之意朝夕憂懼無所容措方俟譴逐又辱超除惟秘省越分之遷經筵非常之選如淵何者敢當此寵况淵祖父名監與今来官稱正應迴避所有上件恩命不敢秖受欲乞特賜敷奏収還成命改除淵一在外合入差遣以安愚分再辭崇政殿說書奏状左承事郎新除宗正少卿兼崇政殿說書臣陳淵右臣近䝉聖恩除臣秘書少監兼崇政殿說書進講左氏傳縁臣祖父名監已具申尚書省乞賜敷奏改除臣一在外差遣再蒙聖恩除臣宗正少卿其崇政殿說書進講左氏傳之命尚仍其舊臣義當辭免不敢輒避煩瀆重干聖聽臣聞春秋之有三傳所見不同互有得失故自漢以來如歆向父子猶不能無異同之論以陛下聖學髙明尤深於春秋其於左氏傳亦宜有所去取以通經㫖如臣淺陋無識顧何足以上當勸講之職所有除命未敢秖受伏望聖慈特賜収還以安愚分伏候勅㫖貼黄臣初除秘書少監兼崇政殿說書秘書少監於近降指揮不合辭免縁臣祖父名監於法當避已具申尚書省乞賜敷奏除臣一在外差遣伏䝉聖恩改除臣宗正少卿臣已祇受訖所有崇政殿說書例許辭免在臣分義不敢但已遂至上凟天聽臣不勝惶懼戰栗之至壬子八月十八日上殿劄子臣嘗謂僣竊未平則二聖之歸無期腹心之禍不解南北分裂生靈塗炭此固不可一日而寧居也然而欲平僭竊而内有盜賊為之梗則盜賊未除僭竊亦不可得而平矣牽制踰淮之師涵養敵人之勢因循不振職此之由故為今日之計莫若先除盜賊俟其不能為患然後北向以定中原跨河越岱而并居之乗機應變坐制强敵宜無不如意者昔劉先主之入蜀也欲資其富饒以争天下其先定之訃固将滅魏并吳而存漢然孟獲未降諸葛孔明不敢越險而東出則以掣肘者在其後故爾故其討獲也七擒而七縱之力屈而不誅其人勢敗而不絶其欲竄之山谷乃所以安之獲安而蜀人安矣蜀人安然後孔明得以十倍曹丕之才併力而擊魏魏亡吳服而漢不得不興此其志也惜乎謀已定而數竒師未㨗而身殞然其所建立已足以取信於後世矣今江湖荆楚閩廣之冦葢非止一孟獲而已而其所過殘滅井邑為墟暴虐之甚又非獲比則為民除害誠有不可緩者而陛下連嵗出師必遣宰執又副之以大将芟夷招納舉無遺筭其所以度内外之勢審先後之序固不待臣之言矣然臣以謂討之之難不若安之之難葢自宣和以來監司守令不得其人掊克相師繼以殘忍民無所赴愬棄耡耰而帶刀劍者幾年於兹矣今旌麾所臨次第平定而郡縣牧民之官乂不加釋㓙渠雖殱禍根未絶萬一舊弊繁興逆意復萌雖欲人人誅之不可得矣臣故曰討之之難漢宣帝謂龔遂曰選任賢良固将安之故臣願陛下及其初定慎擇忠信之使分按諸路諭以重民之意委以刺舉之權俾奸貪不法之吏不容於時而公正亷勤之人得以自効然後拔其殊尤聞之朝廷以為郡縣之長則逺方受賜鰥寡孤獨宜無不得其所矣此安之之道也必欲濟師舊邦以慰簞食壺漿之民而盡復祖宗之境土須吾民之安然後擁衆横行以圖决勝似或未晩傳曰欲速則不達又曰必有忍其乃有濟區區之忠惟陛下察之又上殿劄子臣聞古之為臣者有稟令無議令故令出於上下知奉承之而已此法之所以行而事之所以立也徃者靖康之初淵聖皇帝以兼容之度博訪羣言俱收而并用之甚盛徳也而忠邪雜糅是非不公故毎下一令上至禁從下至百執事之臣與夫布衣韋帶之士必群起而交攻之或已發而中廢或盛行而遽改或姑存之終至於委靡不振而後已以故一事無成拱手以待禍其為弊至今尚在也此而不革無以立政故臣不避僭越之誅為陛下極諫之夫議政之地昔時士大夫屏息而過之如恐犯分及其後風俗一變乃始有竊議其非者又其後公肆詆諫無所忌憚則今日之弊是也亷陛不分莫此為甚朝廷之勢安得而尊朝廷不尊則國威不立國威不立而欲以指麾顧盼定天下之大議臣固知其難矣傳曰下輕其上爵賤人圖柄臣則國家揺動而人不静矣此古今通患也今天下之事宰相行之臺諫言之若是亦足矣臺諫耳目有所不及則詢之侍從侍從思慮有所未至則求之百執事其有遺䇿乎而又下取布衣韋帶之士俾道聽塗說之流得以肆其不根之論臣恐徒為紛紛無益於治雖然人主之徳莫大乎聽納如陛下之舎己從人不間貴賤雖堯舜亦不過此臣子所宜将順者也而臣私憂過計更為此言者非固欲棄愚者一得之慮也以謂布衣韋帶之議資之以廣聰明則可也若創法立度而惟此曹之徇適足以自眩而已自古造事者謀之以同斷之以獨故總覽兼聽之誠常施之於未決之前而是非可否之私不容於已定之後為是故也故臣愚願陛下自今凡有大事議之而後行已行而議者勿聽毋使明謨坐困曲説則天下幸甚紹興九年十一月上殿劄子臣聞孔子之言智仁勇曰知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣夫自修身治人以至為天下國家莫不以此故子思子曰智仁勇三者天下之達徳也所以行之者一也無所不達而行之以一則於斯三者莫知所先後矢臣至愚甚陋陛下不知其不才處之諫省若将責以言者臣井蛙之知誠不足以測知滄溟之大亦何所逺然臣嘗讀中庸之書竊窺三者之㫖求所以合乎聖徳者以謂陛下仁智則有餘矣而獨於勇未嘗加意焉此臣所以不能無疑也何以明之陛下無所不知而能行其所無事智之至也無所不愛而能克己以消兵仁之至也乃若抑畏太甚而示人以弱則靳於勇矣夫勇非撫劍疾視曰彼烏敢當我之謂也如天之行健終古不息如水之攻堅彊莫之能先操至權以黙運幹萬化於不測夫是之謂真勇神器待之而後安四海依之以為命其又可略耶昔者以大事小莫若湯之於葛文王之於昆夷以小事大莫若太王之於獯鬻勾踐之於吳孟子葢嘗以是為仁且智矣彼其處心積慮豈有異於陛下乎如太王勾踐固不足為陛下道至於湯文之事乃陛下之所安行者然以臣觀之湯事葛文王事昆夷雖曰無所不至及其十一征而無敵於天下命将帥遣戍役以守衛中國亦何有於葛與昆夷哉故忘己以樂天者雖聖人之事而用兵以保民者亦王者之所不得已焉此湯之勇所以表正萬邦文王之勇所以一怒而安天下之民也由是言之湯之於葛文王之於昆夷方其事之也勇已行乎其中矣苐不露其威而已今陛下之於鄰國将不露其威乎亦将信之而不以為備乎此臣所以通夕不寐求其說而不可得也或曰小役大弱役强天也順天者存吾何容心哉臣則以謂欲知天道視民之去就而已民心歸之天其有不從乎湯以七十里文王以百里其强大不足言矣而孔子以湯武之事為順乎天而應乎人得民故也得民斯得天矣曷不觀今日河南陕右之民乎已叛者欲歸方叛者隨悔此豈人力之所能致哉天實使之也然則或以不校為順天或以征誅為順天其義一也陛下孝弟之至通於神明凡遐方異類不可以言化而理諭者固将有以感之也則兩宫之還宜有近日未還之間隱忍以致愛親之誠既還之後釋憾以結鄰國之好此固陛下已定之意其誰曰不然然臣之所言葢非謂今日之所當行也以謂天下之大社稷宗廟之重祖宗開創之至勤累世扶守之不易適當小雅盡廢之後而陛下承之其可不為後来慮乎天命靡常事變難測以天下之力過為之備以待不虞非失計也記曰凡事豫則立不豫則廢故臣願陛下稍收異議以来天下敢言之士毋或輕棄厚積錢穀以為他日糗糧之用毋或妄費宻飭諸将練兵秣馬毋得輕動失信亦毋恃其不来以豫立事而養之以勇庻㡬萬世根本於我乎定則天下幸甚又上殿劄子紹興九年十一月臣聞儉非聖人之中制而孔子對林放之問則曰禮與其奢也寧儉非以儉為禮之本故與葢常人之情由儉入奢易由奢入儉難故當用儉之時不可不慎不慎而無以約之則末流之弊将至於不可勝救矣臣觀自昔創業之主皆有儉徳葢其興於閭閻熟知民間之疾苦稼穡之艱難故愛惜天物有不期然而然者禹之治水八年於外三過其門而不入逮地平天成之後乃作禹貢既第田以制賦又因民之所願而取其有餘其㣲及於漆枲絺紵羽毛齒革與夫魚鹽橘柚之可於口菁茒簵楛之適於用皆在所取葢亦莫非民力之所得者方禹櫛風沐雨手胼足胝之時親見百姓之勞苦已而安享其奉固宜有所不忍也故禹菲飲食惡衣服卑宫室孔子美之以為無間豈所謂愛惜天物有不期然而然者與至於守成之君徃徃不然輕費妄用卒以召亂求如漢之孝文葢亦千一耳今陛下所乗之勢如孝文而天性似之所厯之艱險如禹又不待學而後至其於儉徳天下户知之矣而臣强聒猶欲有所獻者書之稱禹曰克勤於邦克儉於家或曰儉可以施於家而已是大不然國之本在家而儉固将施之於國也孝文惜百金之費而制度不立終愧前古使其儉於一已又能推而廣之如彼其質雖二帝三王之功可跂而及矣可勝惜哉比年以来陛下恩惠太泛賞給太厚匪頒賜予之費幾於無節此固陛下甚盛徳事然府庫空虛而發之不已財賦匱竭而取之益詳陵寝未成郊祀不逺内有諸将之饋外有鄰境之好所用既衆而所入寔寡此臣所甚懼也周官惟王及后世子不㑹說者曰不得以有司之法治之誠然是周公作法開後世人主侈用之端也而可乎臣謂周之冢宰以九式均節財用有司雖不㑹冢宰得以式而論之矣若事事如式雖不㑹猶㑹也故臣願陛下自今凡有錫賚法之所無而於例有疑者或輕重非倫或多寡不類事下三省則三省得以共議事下户部則户部得以執奏出納之吝有司得以獻其疑可否之宜臺諫得以論其失凡所經由不許承誤陛下聞其言又從而嘉納之一有失當行即改正則前日之弊庶幾可息矣上以省費用之煩下以絶僥倖之求無善於此臣不勝過計惟陛下財幸紹興十年正月上殿劄子臣伏見藍公佐歸自異域王倫獨留金人過有須索且求盟書此其意非淺淺者而朝廷視以為常不謀於衆萬一應之差若毫釐則安危之機於此判矣前計已得要在終之而已而終之之説必有變通臣為言官寂無所聞而又不能廣陛下之聰明不幾於失職乎臣惟古者國有大疑謀之於心又謀之於卿士庻人欲其同也同而行之則無悔矣今縱未能謀及庻人為􅀸士者獨不可一詢之乎自風俗之壊士大夫徃徃諫於廷諍而怯於公言故朝廷有事彼此相視不吐一辭亊成則曰我固知其如此葢不必言亊敗則曰我豈不欲言顧言之未必見聽耳是以上下相戒以言為出位以不言為守職今若出自聖意必使之言則人無以為辭矣且朝廷設官有言責者彼自不得不言至於侍從之臣以論思獻納為職葢陛下腹心之任也徳盛位尊實上所親擢而深知之者豈可有事而不與之議乎願詔宰相徧召從官示之以其事使之各盡其説毋有所隱庶幾所同者衆則國論自定萬一從官又有異見不欲宣言於衆實封上聞取自聖斷然後行之則上下不惑而萬世可遵矣臣不勝區區之忠惟陛下裁擇又上殿劄子臣聞朝廷自藍公佐既歸之後嘗有大議而諌官不得與聞比者外間詾詾一日百變雖有所聞亦復不知其實尸厥官罔聞知臣不敢逃罪輒進瞽言惟陛下留神而幸察焉臣聞和戰有二議其實一事然自靖康以来朝廷上下公卿大夫之間以和為是者必以戰為非以戰為可者必以和為否二者各執所見不能合而為一此聽其說者所以乆而益惑也夫和與戰初不在我也彼倡而我應之爾應之者其可豫為一定之論乎方我之欲和也而彼欲戰戰固不可已也則和之說廢矣逮我之欲戰也而彼欲和和固不可已也則戰之説廢矣故和之與戰二議而一事不可不察也曷不以前日之所嘗行與其所已騐者而觀之則其議决矣方敵騎之長驅東南也所過殘滅不遺餘力當是時果可以求和乎其後淮上之師屢出屢勝國勢已安則戰之效也戰未必不如和於此可見矣劉豫數敗彼知我之不可圖也間以使來歸其侵疆而許我以和當是時果可以請戰乎已而不遺一鏃奄有河南陕右之地十分天下而復其九則和之效也和未必不如戰於此又可見矣夫事之已騐如此而議和者不言戰議戰者不言和亦已過矣然則和之與戰惟所施之宜而已其又可執耶今者敵人留王倫為質要我以嵗幣迫我以誓書趣我以来使臣固不知其詳然以臣觀之其皆未可遽許乎何以言之嵗幣必薄然後可繼而彼之所圖者太厚誓書必實然後可信而彼之所約者太過使人有辭然後可遣而彼之所期者太速許之則終必失信不許猶冀其見察也或曰彼将不和則如之何曰吾方待命未嘗求絶彼何不和之有假使不和我有辭矣辭順而彼不聽是其本無意於和也今雖偽以為和後亦将變矣變之遲速亦何擇焉且和終不可恃也和變而為戰則徃年淮上之師是也豈皆為彼所敗乎其倡在彼其應在我臣故曰和之與戰惟所施之宜而已孟子曰未聞以千里畏人者也况今日之地十有千里者乎臣僭議國事罪當萬死然臣所言天下之公論非臣所言也臣已有奏劄乞令從官㑹議今先為此言以進其聽而從之罪而誅之臣不敢有所擇也臣不勝皇懼戰慄之至正月十五日進入劄子臣近以朝廷議欲遣人再使金國曾具奏劄迄詔宰臣徧召從官示之以其事使之各盡其説庶幾所同者衆則國論自定如從官或有異見不欲宣言於衆俾實封上聞取自聖斷至今累日未蒙施行豈聖意自有所在而非臣下之可與乎無乃紛紛之論可厭而朝廷大臣以謂不足惜乎古者國有大疑謀及卿士似不如此臣之所言未可已也臣聞以天下為天下則身佚而功倍以一已為天下則力勞而效淺葢天下者民心之所在也民之所欲天必從之湯以七十里而興商文王以百里而興周其後世子孫更數百年而不絶者得民心而已民與之則天與之矣雖然民則衆矣欲知其心何自而察之哉察其所服從者斯可矣百官者民之所服從也百官亦多矣欲知其心何自而察之乎察其所仰望者斯可矣朝廷侍從之臣百官之所仰望也異時宰執由此其選葢人物之傑然者也國有大事過而詢之天下之心於此可考矣故多不患於難諧寡不溺於偏見亦何憚而不使之議乎夫以朝廷侍從之臣而不使之㕘議國之大事則陛下之所取謀者二三大臣而已萬一二三大臣不能無蔽陛下必從其説将誰使正之艱難以来十有五年於兹矣陛下焦心勞思不皇暇食以至今日幸而國勢已立敵人有所畏憚海内跂踵以俟中興正須博採兼聽惟是之從布宣徳意曲順民心而廟堂之上容有袐而不示者豈啟迪聖主以天下為天下之道乎幸聽臣言詔令從官都堂㑹議必有至當之論以助陛下矣古人有言曰所言公公言之所言私王者無私私則有偏公則無執有偏則民易以怨無執則衆無不從上下内外莫不從之天下可運於掌矣惟陛下毋以臣言為不足聽而忽於用衆則天下幸甚黙堂集巻十三欽定四庫全書黙堂集巻
