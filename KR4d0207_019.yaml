  text: 默堂先生文集卷第十九
  hash: sha256:fcac81587b55f3f127e91c67f3256b3babc7e906a0a40935b4db552575098133
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_019-1a}
body:
  text: 書上都督張丞相書紹興壬戌二月淵惶恐頓首再拜淵受閣下之恩厚矣誰不知者然自始至今十有四年之間思所以報而未得其所固已大負公議若曰道里修阻上下之勢殊絶以此未能逺造墻仞進瞻履舄猶有可言至於起居之問未嘗一慁隸人之聽此其為罪雖儀秦之辨不能以自文也然淵聞之寬裕有容乃大賢之所必同而因循自棄亦常人之所不免淵之得罪誠不可文然詢之嘗出入門下者以謂左右未嘗以此為疑也則淵亦安得自絶於長者之門而獨不為一言哉言之而重得罪也死不恨矣淵建炎間攝邑於江西之永新實與東州周頴為代穎到官不數月以才被召是時閣下適有川陜之行遇穎於途問所與逰者穎以淵之不得罪於永新之民也輒以為對閣下因處淵以行司屬官淵以前此名未嘗以聞也閣下過聽而遽拔之其必有以深知不肖者不可辭也被命即行舟至臨江聞金人將襲南昌舍舟而逃幾不免者屢矣比其出老身雖無恙而裘葛裹糧為之一空且自臨江而西所在荆棘故不得已歸閩因致書左右道其窮愁無聊失所依棲之狀託周君附便以謝初不知其人以病告歸至錢塘物故遂不果達自兹閩中大擾竄伏轉徙之中亦復無暇通問盜少息或者教以出仕以解飢凍方待逺闕復遭口語謫官嶺外蓋三年然後得識繼聞閣下還朝進秉鈞軸淵於是欲敘前日之感則後時不足以為禮欲伸一時之賀則趨勢非所以蓋愆操牘濡筆不能成詞但自悔責而已故嘗平居無事一念至此汗流浹背若無所容且懼且愧非適今也淵因循自棄之甚無可言者然淵五六年前嘗聞廖公尚書之言以謂閣下往日在朝每欲出焦桐於新㸑之餘被斷木以青黃之飾誠不能無意於淵獨未有間耳而近者又得熊祠部書復道閣下語及不肖恨未之識自顧何者敢煩齒記如此蓋閣下寬裕有容自其常度非可以常情測也仰惟此恩何以為報恭惟宫使少傅相公以直道結聖知以誠節慰人望忠貫金石謀合蓍龜蓋天之所賚以興我宋雖出處有內外之殊而社稷安危所係天下歸心焉今兹得間適契所願然已成之功讒言所不能搖素定之䇿異議所不能變上所依重行即詔還矣方此之時士皆有求於公而公亦何待於士哉而一介微賤辱在泥途有如淵者猶不能舍此其志豈易量耶孟子之言伊尹曰思天下之民匹夫匹婦有不與被堯舜之澤者如已推而內之溝中其自任以天下之重如此此固閣下之志而淵何足以當之為是猶不能忘聞閣下將如湖湘道出劒浦去敝里為近猶以前日之罪不敢負荆迎見輒具手書因女夫沈度面投伏冀燕閒特賜披覽許以自新豈勝幸甚沈度乃道源侍講之孫讀書為文頗有祖風頃在福唐嘗辱照恤以其數幸參侍也故以書授之干冒鈞嚴下情不勝戰栗之至答張子猷給事致逺人來又辱惠誨伏審秋暑增熱台候益勝感慰無喻了齊詩跋稍改舊文益佳三復嘆仰無已然來諭終欲措荀卿於孟子之列則意所未安荀楊所至固可取但許之以傳堯舜之道則非彼所能當耳何則道之所在不容有小疵者所能傳也若曰漢儒嘗列之鄒國漢儒於此蓋未之達恐不足據唯退之原道見處最親故來諭以為欲且從原道正與鄙意相契然原道以謂軻之死不得其傳焉豈復數荀揚哉讀荀子篇其末云荀與楊大醇而小疵此猶是恕語二子書具存豈特小疵而已此原道所以言不得其傳也歟今後生傳洛學者斥浮屠此何足論龜山云佛氏之於吾儒極其所至所差眇忽耳此語雖達如王氏尚未能窺其藩籬彼將以口耳之學評議兩家多見其不知量也以給事素不以賢貴自挾故有言必盡幸勿見罪也齒長之誨益見寬厚唯足思慕栖雲之風私以禪額其院初嘗獻疑恐私字未穩然得其實又似無害更有一事前書已奉聞恐忽而未諒今再提起幸留情高文意在了齊欲為延福不朽之傳却只作題跋而不名以記實不肖所未達方公得了齊詩推重其人以為延福改律為禪肇自了齊故寺僧畫像設祠使後人知所從來而名足師所居之堂為了堂成文以記之則其事自顯矣今文成不名以記而徒跋其詩之後他日萬一有不悅者去其詩板則堂亦從而廢矣幸為延福加慮易跋為記庶久逺有所附託不為庸人湮沒初意似尤善也不審尊意以為如何公平生唯以謙損為務此固可以為鄉黨法然或謂之跋或謂之記其實皆欲尊信前輩初無毫髮增損願更裁酌其中不勝萬幸淵鄙意狂戇以公見容故尋常語言無擇往來書問有相可否處幸勿示俗人恐烏焉成馬便成罪過耳暑氣過於長夏病軀揮熱不暇作字不謹併幸照察尚阻參承更冀奉親倍保崇重不宣與曹載德諫議輔江西唯廬陵為僻左北來之音幾無而僅有以故不復頻問動靜之詳然至於老兄遷擢之峻眷倚之重天下所共嘆仰者則亦未始不知也比承超除諫省人無賢愚莫不相慶況若不肖平生熏炙德義情同手足之親其喜宜如何而竿牘之問獨後衆人者顧以謂老兄今日之達當在五六年之前屬者龍翔雲興諫行而言聽輿論猶以為遲而又艱棘之初責任之篤非他職可比曽無一言仰禆高明萬一其敢以為賀乎唯恕亮之淵少年時獲侍左右氣不下人自謂古人事業可以力致世或鄙笑唯老兄稍取之至於今往日之意衰矣而䝉顧特異豈所以取之者未遽替乎何幸何幸然淵自菴山與老兄别爾後南北多暌少合雖合亦不復如向者同硯席之欵以故胸中所欲言者未嘗得自敘也蓋不肖自見龜山先生始覺平生所學無毫髮是逮了翁三謫還相見于湓江乃深相知今了翁逝矣誰明此心龜山今嵗遭遇旋即告老與其從人固不若自晦也一時故人多在雲天之上茍有問者為言無何有之樗不殘於斧斤幸矣亦何求於匠氏哉恐欲知老懷聊復及之吕丈諫議知同省不敢上狀謹此起居少伊康侯兩舍人常從容否各久别以久不奉書今聞在廊廟何敢通問也朝廷事固非踈逺冗賤之所敢僣言若郡縣間積弊十未革一二也令未孚澤未普根本所在無以固結之如西北之擾乃其可見者要當圖之於未形耳未知諸公以為如何承諭北鄙陷溺之民有壺漿內附之意其果然耶其亦生事者之意耶祖宗惠養夷夏實同一家所以為後來之慮逺矣盟書具在自可而渝之無乃不可乎以今日朝廷財富而兵强當契丹兄弟內潰女直外擾之時一舉而空其巢穴正兵家之利宜無以為非者然王者之師豈忍乘人之敝於此而弗問則所以固結其心當益深於澶淵縱敵之恩矣若事不出於下如載德雖位卑然閫外之憂守倅同之固當言之朝廷以為去就不應默默而已也答鄧天啓淵久不聞動靜被教伏審孝履支持為慰㑹山中董工治墓不及即報想䝉推恕所喻勤懇足見不恥下問之意辱誠愛不敢自默姑道所聞唯吾子裁之今之詩風雅之苗裔也以之吟詠性情於居憂之時君子於此宜有所不暇矣三年不為樂樂必崩宰我之疑問也而孔子之言如彼可不思乎然詩道甚難果有意為之當求之古之作者自杜子美一鳴今古鮮儷方之風雅尚未必皆合聖人之意況其餘乎以淵所聞學而不師聖人出言而倍之以為戲事可也夫戲非徒無益而於學為有害盡心力於無益而得其害豈君子之志哉其流則然矣故淵嘗不欲作詩非直以今日之罪逆遂不為也吾子偶好此道當所不暇為之時姑置之其亦可矣至於他文或直詞以述事若太鄙朴則於理不瑩稍加櫽括使就句讀固儒者之常度也雖在喪居為之何害而遂懼終三年之喪不親筆硯當為粗俗人不亦過憂乎大抵古人之學用心於內夫用心於內其事無窮如得其門則言語文章亦不足為矣是在學者所當汲汲者如吾子之高識必知所輕重豈待多言然後喻哉衰絰而墨之非古也亦嘗推究其所自來乎況今為此者為與吉事耳居喪固不可以與吉事也然當任家事又有不得已而墨之者夫至于不得已而墨之其孰以為罪者若乃居則以是接人出則以是為贄謁逰從之服是不為服也復何議哉記曰衰與其不當物也寧無衰以墨衰為喪服豈止不當物而已如曰行禮俟朞月而後為之是紾兄臂而姑徐徐之說也吾子其盡禮哉不然則亦施之於不得已而已可也荒塞之詞無復次敘唯加亮幸甚與李深道知府近以塵冗不果數上問唯是瞻仰盛德無已頗聞遣人迎新守益欲馳見而病軀艱於將護水陸多畏不審臘中遂得瞻覿否羣偷掃跡嵗事又登此郡大治而公遽去奈此民情何尚祈調攝别迓新寵區區語不能載淵少意上浼親情鄧迪功覲純彥之弟德符之壻也一第纍年不調日欲赴部而貧無以為資又限於銓試每至期輒不能發足正當仕進之時實可念聞郡中尚有未發綱運不知可差此人否萬一今冬已應副相知其數不足則來春亦可預差若遂還朝後守自不當渝雅意也不審台慈以為如何果䝉垂憐如衰晚得之矣干冒勿罪容易賊先聲可畏邑民易動爭為奔避之計百里蕭然亭舍不烟若非賢太守處之有道禍不止此一廛所託賴庇為多幸甚幸甚況又過䝉照恤書問繼頒顧惟何者敢承此意但深愧戢耳所諭已得㫖令葉帥提兵疾來韓侯續統軍至而盧焦兩將已在山前如此則掃除逆類當有日諸郡可恃以無患矣行看就擒益顯處畫之功即與邑民同慶也佇俟夏秋之交暑氣尤熾不敢上狀恐煩揮答沈倩歸方以復聞坐鎮清暇為慰又辱真字捧讀悚感如接顔詞益釋滯念頗聞公事有閒時得與賓客笑傲於山巔水涯之外遡雙溪之清風挹演山之佳氣一觴一咏有足樂者但恨衰晚未能羽翼病軀日陪勝賞也傾渴傾渴沈倩又得從容教益重䝉眷豫豈勝榮幸所諭可謂愛忘其拙多荷多荷揮熱言不盡情賜察為幸竊知御書閣當先諸郡而成足見奉上之敏延平在南服湫隘為甚而此閣規摹雄傑正據其㑹他日欄檻橫空氣出千山之上便覺國勢益張矣此邦人之幸也惟公髙才留滯偏方曽無展䄂之地而襟度恢濶措畫無茍坐使山麓河漘易小為大豈易與俗人言哉行看飛聲上徹冕旒即對超除以慰上下之望官醖為況極荷記念去嵗避盜逺適家釀篘不及時比歸盡壞病中無以飲藥忽白衣遽至甚副所欲也多感代人上􅩐帥厚某不肖無以過人然自顧才力所施猶可以及未老之年或有成事譬之疲駑下駟筋力尚壯遇良樂驅䇿其致逺無難也今也正坐茸闒之中困於不試自以鬱鬱若使進瞻節鉞服勞於士伍之間奔走承風亦未必百不能也惟執事之勢可以攀附而從之而又不費攀援之勞故敢輒以控告仰冀賜察辱憐而收之不勝幸甚干冒威嚴不寒而栗某嘗聞先太尉以文武之資值聖人有為之時開疆闢國雖古賢將不能過常恨不及見之今閣下英姿逺略是續是似人皆以為有太尉之風故先聲所壓不煩指麾而旗鼓增氣某地寒官卑復不得與聞號令之末以默觀神機之運想見風采夢寐不忘使誠心足以自達他日之遇猶覬其萬有一得也答邦美叔承諭讀易已兩終親依得所想見超卓欽羡欽羡淵在了翁及龜山左右以未嘗學易不敢輒問今喪事已畢幸未即死得此披閲而質疑無處每當開卷未嘗不嗟悼也吾叔在彼且宜著力非惟盛年易過亦恐暇日難得如淵者真可為戒也所引飲甘露不消翻成毒藥之喻以證噬嗑六三噬臘肉遇毒之吝則恐未然噬嗑一卦利用獄而已六三之吝疑而不得其情者也故孔子於繫辭釋其初上兩爻明君子用刑之道與夫小人可刑之理則其餘爻視此可以類推若更入他說卦之全體析矣嘗謂聖人立象以盡意象近而意逺故玩辭不必求異惟在得味而已觀易要得味伊川發之其說始於子思今人所未喻也味之一字若甚淺也然真知味者誠鮮伊川有嗜炙之喻亦嘗見之否因書略及所聞儻或不然願更疏示一二淵拜復答鄧志宏正言淵承示令弟所書楞嚴呪諦觀惻然想見追慕之誠孤苦餘生重之疾病凡可以自盡者心力俱廢覩此勝緣欽嘆之餘不知涕泗之橫流也所諭欲使不肖為序以冠經首固願附名其間傳於無窮然淵自亡母葬期已得吉卜日夕營治送終之具思慮損心土以無助而水氣妄行中虛下泄踰月未已方金行益深彌不自支若使紬繹鄙思稱述能事其必不可成矣厚意虛辱徒有愧畏素䝉矜照想不以為罪也淵辱惠翰稱道過當豈不肖之所宜䝉感慚感慚吾里人物英秀者多但考其文采議論似未有琢磨之益天才之美易壞難成其或由此獨吾子昆仲超然離俗不蹈羣行之轍他時聳壑昻霄未易量也然謙虛下逮不棄衰退之人毋乃失所冀乎更願博求良師益友以取修途誰有所聞不願傾倒字序固不敢以拙惡為辭但今哀苦中未可為也亮之與奉議叔論墨縗昔晉襄公伐秦墨衰絰晉于是始墨君子譏之則墨衣之制蓋非古也今卒哭之奠不待安厝而以百日為斷固已失禮既百日則遂從事慶弔並行又益失禮而以墨衣為贄謁之服雖君子由之比之昔人非不得已此何義也故淵不欲具墨衣雖然慶弔無與焉可也三年之喪亦已久矣骨肉之戚且尊者不可以久不見也顧今俗不族居雖至親而異家者多矣家異則情異事異蓋有老者病者事之可慶賀者皆諱凶服入其門然則雖欲請見問候其勢或不可則亦將墨其衰絰以從俗乎抑以喪服請見不我見則莫之恤乎乞裁酌其中而辱教之令可行也淵俯伏俟命答羅仲素别紙之諭極荷謙豫之厚固不敢以智識淺陋而不復也管仲與伊尹同是不召之臣與舜同是天降大任此與人之辭也曽西不肻比之蓋其自為如此方其與之也同是不召則王之與霸孰分同是大任則聖之與賢奚擇猶之孔子許之以仁也是豈三王之仁乎仁可以許之則不召之與大任蓋其實事又其細者也何遽欲等其道哉乃若自為則孔子之門何有於管仲宜曽西不為也伊尹處畎畝之中由是以樂堯舜之道言道之所在無間於畎畝也吾奚為不自得哉雖窮居無歉矣然樂於畎畝推而之天下一也此其所以幡然而改其改之也改其故跡而已豈改此道也夫惟此道素行於畎畝之中則致是君澤是民亦此道耳故曰合內外之道也固時措之宜也又何不完之有使其終不以湯聘而改則疑於不完矣明於庶物則窮物之理是也智為物昏則是非決擇將不得其當矣其將何以為仁義而由之乎獨善其身獨行其道此道之所以明也淑諸人傳諸後以是而已雖窮而在下何嘗不與衆共耶其曰獨者必其在我者而已周公之過蓋微矣如彼其智豈不足以知管叔而使之監殷者篤於親親之恩而不暇擇故也及其誅也周公豈能無過然周公終不兄弟之私情而屈天下之公義以王命正典刑是所謂改故曰及其更也人皆仰之以此而已萬物無乎不備之處仁在其中反身而誠無一物之非我不待外求而已得矣何樂如之然既知有是則必體之然後於仁不逺强恕而行則物我一矣所以體此道也不然踐履不到終不近矣䝉虛已下問謹具所見以聞有未是處疏示幸甚與李叔易學士别紙兹者伏承令兄右丞立非常之功膺不次之用朝廷得人海內同慶况門下士如不肖者最䝉異顧其喜可知又況手足之愛如公昆弟道同心契共以天下為憂者一旦得志有為乃出於平時磨切薰習之餘雖賢者經綸固自有素而一時應變議論不必踰閾而已定兹其為樂豈若世俗富貴之情哉欽嘆無已輒以為賀淵於右丞誠不敢自外然不果奉啓稱慶者以昔時嘗以故人諸孫與賔客之列今為奔走之吏勢分懸絶或幾於僣易且嫌諂上也又無以見其欣躍之誠故敢私布尺牘於下執事伏幸深察與季深别紙朝廷設官以臺諫為名使之於天下事無所不得言也若不能言或言之不當便當改命何至取布衣應詔之言一二行之豈臺諫無人耶其亦言之不足采耶自古朝廷必有主議之臣是非可否取決焉然後事出於一而上下有所依附如此人不易得者今為誰耶漢之勃報功可也識慮則劣唐之琯用譽可也應變則拙功有難易譽有虛實是又不可不審也與胡幾仲不審比日履兹初霜動止何似如聞侍奉還豫章已復幾月經涉艱險而能全其身名復逰里閈不失榮寵自古所難得者今誰如公父子乎非神相忠義何以至此敢以為賀所恨拘縶尚稽欵奉臨風可勝拳拳之至淵久在龜山門下聞公議論文章與夫志趣之逺節行之高居常欽服恨未承接亦復因循不果通問唯是區區懷想無已雖人生遇合要自有數無足悅戚然聲氣所同是亦人情之至樂哉今春龜山令預辦睢陽之行時以道阻不果不謂我不即公而公復南來此去豫章不逺似決有晤見之期第未知遲速如何耳望風喜慰無以為喻與黃用和宗博昨兩䝉將樂寄到所惠教眷意甚勤足見不棄以所居沙縣僻陋無便其去將樂三驛或將樂有人入浙又不及知故久不果上報踈慢之罪言莫能文祗用愧恐夏間承賜對改秩繼有除命歡喜之甚亦未暇慶問不審尚䝉照恕否冬深寒甚比日起居如何生事有敘閒居足以自逸計不以逺闕為病苐聖主寤寐忠賢行即召擢不容退處耳衰老跧伏田廬智力俱困不復有他念惟冀朋友道行為蒼生之福擊壤畎畝時得一快也壬子之秋幸獲邂逅略欵晤語繼承遽歸不得面别至今不足竄逐之跡自還閩中連年禍患不可殫敘想已知之去嵗例䝉朝廷湔洗續除樞屬已過所望緣貧甚非就祿無以糊口而編修闕逺不敢守株遂乞嶽祠得之方以自幸忽丞相以幕官見處素荷知察不免單騎一來本不為久計倐經三時尚此竊食碎纍懸隔情何以堪次第春初乃獲從所請也丞相在江西未及一年百事就緒又天與豐穰民情欣悅所深慮者唯兵不足耳然王師所向克捷賊虜逺遁南昌近裏又似不足憂也恐公欲知此中委曲故輒及之龜山先生云亡士失依仰過朞祥又半年矣觸境悲痛不可為言昨朱丈言於朝廷遂䝉宣索三經義辨既進御久之却付祕府收藏正論未眀學者頗以為疑未知他日更有施行否此書行不行繫道之存亡故欲及今傳授以幸天下若曰為解釋文義與王氏爭當否而已失其本意矣頃嘗作書與臨安諸公反復論此自愧言輕近得德久來音謂獨嘗與吾友論之他人或不知也不審亦以僕之所言為然否無由請教臨風但增悵仰答曹公訓所論故者以利為本竊恐未然孟子一部書始末只是分别義利所以與諸子不同舜跖之分利與善之間耳利既無取則故非性明矣而天下之言性者唯故而已豈其然哉雖然故出於自然亦可以言性所惡於故者為其本於利也猶之以鑿為智也若用智而不鑿如禹之行水也亦何惡於智乎蓋故非不善也其害在利智非不善也其失在鑿而已不然作曆者茍求其故千嵗之日至可坐而致而故亦可貴矣莊周曰無以人滅天無以故滅命然聖人未嘗廢人也又曰去智與故循天之理然聖人未嘗棄智也人在所不廢智在所不棄則故之為用豈可無哉要在不以利為本而已耳茍或有疑更望疏示答范益謙郎中側聞休譽為日滋久每恨道路參差不獲承接唯劇瞻仰中間嘗辱誨問詞意良勤所宜即報而所居僻逺因循多事無便可乘遂成怠慢不審果蒙賜察否即日天氣清肅伏惟進道不已如川方至視世間幻妄去來無足以動心者從容無為福履自集尚逺晤言臨風傾渴意不能悉昨䝉示書與居仁舍人誨帖同至極知雅意之勤以公之賢士夫推重之多雖微居仁其有不聞者乎但前後過豫之詞有淵所不敢承者又推原道學所自謂淵親傳師說獨紹正宗尤為難當久不具報者雖出於困循其實不知所以答也皇恐皇恐淵為兒時已知誦先給事所著唐鑑後既冠稍通文義朝夕玩味常恨不見其人又五六年始見龜山因得出其門下龜山蓋學於伊洛而得其傳者嘗以唐鑑所論質之乃知先給事所得實與伊洛之學無異轍也信守前聞不覺已老猶欲訪其子孫所嘗親薰而炙之者庶幾有所考證幸先侍讀有子如公未棄衰朽可以扣請今反以下詢無乃過聽乎聊布真誠以謝不敏來教以先生見稱先生蓋弟子謂其師之詞或齒德俱尊然後可以稱之不然無實之毁隨之矣今猥及不肖何耶師道不行久矣昔韓退之文章妙天下嘗作師說因抗顔為師謗誚交至身不得寧退之於此名宜若無歉人猶不以是豫之況餘人乎萬一他日又有以見教幸去此二字使無愧懼焉受賜尤厚也所諭止為此事而已足見雅意若曰此事不可無師以四海之廣亦有可以當此名者益謙更博求之或不廢朋友資以為切磋琢磨之益淵雖非直諒多聞者俾挾䇿以從公後不敢辭也病中語言無擇幸併容恕與吕居仁舍人桐江拜别忽已五年庚申之夏歸自臨安舟過蘭溪聞大斾已離郡城當趨衢梁喜有承接之幸比至其處遍問所寓莫有得之者或云道中留滯蓋留兩日以俟而來耗寂然遂怏怏而南固知後㑹難必然不謂至今尚爾隔濶也瞻仰之情無日不然中間嘗辱誨帖又於子猷書中每䝉垂問絶知眷豫之勤感戴無喻緣所居僻逺無便致書但深愧怍不審果能寬恕否即日秋氣清爽伏惟啓處增勝百福順集益祈調護即膺休寵下情豈勝䖍祝今嵗緣避寇居山寺中凡數月坐臥卑濕之地遂得足疾入夏增劇既歸鄉里痢疫大作全家番病兒輩婢僕中有喪亡者老懷大不能堪幾至斃踣賴秋氣日清積熱稍退雖未灑然無事可冀不死以是人事廢絶故於左右亦復無暇奉問此來祠官已滿任食貧纍重不能無慮不免再申前請因得附此病中草草幸賜察也范益謙嘗聞其名未識其面有書見遺甚勤昨嘗煩左右指揮送示逮今方獲馳報淵晚學一無所得䝉公吹噓之過或者慕龜山而不可見往往欲置之朋友之間此意何敢承也好善之弊遂至於此後有問不肖者願公姑道其實而已使問者不至妄聽亦空踈之幸也淵不勝至懇與范致聞安撫伏審就閒仙里安居有暇遂以餘力營創甲第雕甍畫棟輝映演山之下至於池臺園囿尤劇觀美雖復經年不䝉誨問而謦咳指呼之音常聞百里之外以兹頗知朝暮動靜之詳所以慰釋寒陋勝於翰墨日至也幸甚幸甚然近者朝廷方偃兵息民而文事荐興百度修舉正須宏才贊助中興如公已試見效自不當久在外也繭絲之計唯老者為宜正恨無力耳聊復及之以發一笑與黃運使比至衢遣回建卒曽具問想已達尊聽季夏酷暑伏惟台候萬福少意輒凂聞嚴日休察判薦章尚少職司一員已䝉鄭使憐其垂成許為發奏而長者嘗有特與催趣之諭伏計哀憫孤寒必能宛轉成就之也大熱賔客叢中作此數字復遵一紙之約切乞照亮自餘益願為國保重與十弟朝宗弟得書審所履之佳為慰知向來曽患傷寒久之方得汗今雖無事要是中年人血氣日耗更宜調攝也齊㑹今年科場恐聚散無常如何五八郎果是長進皆吾弟教道之功其父氣義過人其母孝愛無比必須有後造物不吾欺也明年省試當在行朝免解者及今便可下手作省課期於必取年漸髙不可因循若只睹采是先服輸矣至祝至祝王程之學是者用之未暇趨時此固是也自古及今唯有一是若真得其是雖孔孟何加苐恐人各是其所是則有以非為是者矣以非為是豈人之情哉違道以徇私或者未悟耳今其言曰據已所見無乃於道灼然無疑乎不然以非為是恐未免也要須參之孔孟然孔孟豈易知者耶諫省始論程氏之徒有詔行下及再有人辨明又復頒示天下所主者果誰耶而學者便以王程並論失其㫖矣王氏以熙豐以來發明六經固嘗以孔孟自任然六十餘年間瀆貨害民開邊生事壞已成之良法啓欺蔽之幸門遂使夷狄亂華二聖播越生民塗炭中國失守蓋自古禍亂未有如此之酷者誰實兆之今其書具在可驗也若此而猶可以為是乎雖世無孔孟吾恐不免於聖代之誅矣孟子曰管仲曽西之所不為也子欲於此擇其是亦陋矣無由面言信筆略及之自餘加愛不一答汪端中沈倩幸與交遊之末因之獲聞緒論又覩近文足見學業之富自此充之不已古人不難到也而撫奄之詞乃復下逮不肖果何取耶惟公家有哲匠文字之妙冠絶古今四海願以為模範思欲親炙之而不可得公將求天下之師其有過於此乎而與善無厭更欲借聽於聾雖䝉泛愛未敢聞命也臨書恐懼言不能載昨䝉朝廷過聽置之諫省百無所成竟以罪去至今羞見朋友乃辱贊譽亦何敢承此職乃叔祖了齊平生履歷之地所以名傳萬世其基於此而不肖之孫幸承其後已是未厭衆論而怯懦無補自取廢黜實為門户之辱不謂重言更賜推許反復來諭但增駭懼耳何由共談少謝不敏與將樂王宰少意恃公不鄙輒以浼聞清流簿蕭子莊乃不肖所畏之友其學問操履人所共服不待言也不幸遽亡家貧纍衆幾不能全櫬以歸幸潘宰以同官之故稍加賻恤已於初四日發離計程當已至仙邑恐有所幹如買舟雇腳之類幸賜指揮也偶左右未行間其孤經由治下蓋非常之遇若䝉憐憫存殁受賜不敢忘矣陳致虛秀才與其弟宗虞識之否才學可觀而謹畏自守鄉里所推若數至函文願有以教督之以成就其資質也與鄭彥繼到家百故毛起況味可知近者賔客少息冬事有間始圖觀書而我故人雅意不期而同者又在數驛之外未由合并此情可想而知矣中間聞嘗一至臨安果何為耶又知今嵗秋試頗如意考官雖不果取往往道公文字議論之美兹亦可以言命矣得失毫末計應手掃除不復留胸臆也諸令似知讀書益精深可喜可喜窮達不足道要當使家學有傳乃佳耳尹彥明辭新命甚堅近已到建康不知終如何辭劄極可人意比得明仲書以謂此公真洛門後出龍象信不誣矣康侯數得書近專人方回春秋傳博辨精微著書如此故可傳逺耳淵已老餘無所待亦欲粗畢平生綴實尚未得間也伏𥿄言不能盡與李外甥五八甥得書知孝履支持為慰所寄詩賦大段長進可喜可喜尊君平生辛苦晚得一第未酬雅志流落殊方衆所嘆息賢母歷盡囏險未得汝力遽然長逝每一念至痛割何窮今汝盡變幼習刻苦讀書心識開明果易啓發自此充之何所不至更須不舍晝夜復振門户非惟汝所當然亦所以迪前人之光塞外家之責也書齊若散聊可且歸屋下自看文字勿外逰也至囑答蕭茂德别紙建功了齊嘗言侯孝恭善奕碁天性本高無待於學初來京師為孫侁李伯祥饒三路蓋一二年不復進客食貧困憤而從劉仲甫為攜碁具遍詣諸公貴家教奕以此為糊口計有從學者以饒九路為始如是一年教成孝恭常旁睨亦不介意一日仲甫謂曰汝可與孫李敵手矣孝恭自以不及俄而孫李俱至仲甫令爭先賭勝二人初不服已而不得已從之皆為孝恭所敗既去仲甫問汝知所以進耶曰不知也仲甫曰汝之奕非學成者性之所得本高初不知九著以下之著故為此等用是取勝其所以敗過猶不及也自汝從余教人則知此矣故二人無所致其巧孝恭乃大悟夫趣識本高則不屑為其卑者此學者之大病也故善學者無所不學若在朝廷而不知田野之事通經術而以史籍為不足觀謂道足以揆事而世務有所不通謂理足以御變而人情有所不察內外不合天人殊致此王氏所以失也自以為高而人人得以欺之豈非不習低著為人所敗之類耶嘗以了齊之言有味故書之䇿云與李子家簡雨涼伏惟侍奉萬福連日不見丞相欲有所言未得昨日幸見公又以人衆不果請間殊極悵惘近使司差屬官相驗和買絹初令抽摘㸃檢既又有指揮揀稱至今未了屬官承命固不敢滅裂近又聞候稱盤畢有輕短者貼錢納官不知果否和買絹官錢極少而未嘗支今民間輸官每買一匹用錢六七貫足其他裹費又不在是已輸在官如不堪上供則罪在稱揀之人若令納者貼錢雖云絶攬家之弊此錢入官如何收支徒失寬恤之名重獲苛細之譏此甚不可也昨任州縣官常主兹事每自揀擇但取無糊藥者至其輕一二兩短一二尺者初不問也蓋上供交納處只見大槩衣賜若無糊藥人爭取之何暇計少許輕短耶今應近降指揮合差官㸃檢固不可已亦須得通曉事體粗知人户輸納之艱者斟酌舊例僅勝常嵗即無退駁庶幾官物易足不然姦弊百出雖欲多方關防未易革也訪聞未㸃檢前一縣之輸日百數十匹近者鞭笞催趣不過三五匹而已萬一失此一時致令輸官遲細將來大數不足奈何奈何願罷貼錢之議及禁無絹納錢之說斷自今日已後官吏不得容情收接惡物犯者罪之若前此已納在官者勿問可也仍須受納官先申一日交絹之數報㸃檢次日早入稱盤入庫不中者退之物寡而易見令簡而必行當亦不至大段不堪上供也不審可以以此上聞丞相否不敢頻造書館縷縷幸察看畢勿出尤荷容恕也與鄭致逺知縣昨日到興國遣人往郡中投牒遂留連抵晚佳節恐不廢燕賞否欲因出造詣積雨作凉秋風益可喜伏計客去心閒撥煩剸劇日有餘暇可以從容承誨然老人踵門又恐煩公倒屣相迎不能不妨臥治雖復懷仰之深亦以自抳坐想遺外形骸之真傲睨古今之論時一悵然謹專人問起居一二日或得馳謁他俟面言與顔岹縣丞邑有丞例以嫌不可否事令唯無助遂致庶政不理纍年於兹矣方公之來以百里為己任令丞洞然無間吏不敢肆欺其間積弊頓革上下莫不安之而上司遽爾奪去何不思之甚也昨日方聞如此為之嘆息不已區區豈止為一廛之託而已耶萬一若公不厭此民或可辭免使敝里終受其惠豈勝幸甚衰疾無由晤見莫究曲折併俟照察與孫次卿學士不見顔色之日久矣實願少親談麈居無事時不敢坐屈長者及高車過門又緣偶有出入不得伺偵先驅得罪何言然自秋至今凡四辱寵訪三以致齊一以臥病斯亦可以相亮矣而愧畏懷想之私終恐踈慢上忤實德故輒道其區區不敢更望推恕也與鄧德裕刪定伏承先承事優被贈典舉焚告之禮此乃世德所招人子至榮鄉閭踈濶之事義當奔走墓下執籩致勤少伸平生慕望之意因與邦人共慶盛舉況辱寵召其何以辭偶緣抱病不克如所欲但深悚嘆更冀孚察不以為罪幸甚鄧家回定書河潤所霑幸竊里閭之好絲緡下逮敢辭門閥之卑承命雖榮負慚為甚共惟令嗣祕省簮紳著姓蘭玉克冢久欽三復之稱宜獲五長之助孱然殘息豈謂好逑但憑鳴鳯之占庶答采葑之貺潤叟入聘書頃緣聲氣之同獲講婚姻之重卜筮既無其咎男女亦欲及時問禮所宜已失桃華之方盛請期斯緩庶幾梅實之猶存謹布微誠恭俟嘉命有少聘幣具如别箋為族姪求婚書葑菲不棄幸嘗附於高門聲氣所同將復修於舊好過恃朱陳之契輒忘齊鄭之嫌仰締華姻俯慚非敵舍弟某箕裘肄業簮紱承家已及成人尚虛中饋伏承令女第二小娘子懿德夙親於保傅善聲久溢於庭闈坦腹東床愧辱擇人之鑒采蘋南澗願資承祖之能謹致薄儀冀聞嘉命代回胡給事定書執鞭慕義方愧難攀委幣問名乃䝉謙豫豈以葑菲之獲采蓋緣臭味之或同誨諭甚勤寒微滋懼恭惟令嗣承務芝蘭挺秀圭璧效珍共惟三復之賢宜獲五長之助眷求箕帚俯及衡茅敢自棄於高門庶逺徼於餘福代沈家下定書依庇深仁正賴葭莩之契修盟舊好更資河潤之餘益愧寒門復攀高援共承令姪女言容有教禮法是循而某姪庠粗知師友之源幸無子弟之過敢恃朱陳通婚之舊輒忘齊鄭非偶之嫌恭惟菲儀冀聞嘉命謝鄧氏問姪女婚書恭承嘉命申喻雅懷問名不棄於衰門合姓益敦於曩契無從遜避但切兢慚伏承令孫秀才賦性甚明好學不倦當盛年而求匹豈賤息所能當庶憑鳴鳳之占少答采葑之貺聖節致語口號代人上帝垂休申錫無疆之歷真人誕降自膺有永之年稽流烏受命之符實繞電發祥之日人神胥慶夷夏交歡均燕樂以示慈罄邇遐而䝉福恭惟皇帝陛下天臨四海子育羣生日月照而四時行無逺弗届風雲從而萬物覩聞德皆來當重十之慶辰撫當千之景運洞庭九奏春回儀鳯之音嵩嶽三呼雷震後天之祝但某等叨居樂部幸遇昌期遙望闕廷敢奏口號默堂先生文集卷第十九
