body:
  text: 雜文存誠齋銘并序余甞問所以為道之方於龜山楊先生先生曰大學之書聖學之門庭也是可讀而求之余退而學焉觀其言修身齊家治國平天下之道其本在扵誠吾意而已其説簡而盡其理直而周其用要而博雖不敢疑而未知其必可行也已而質之先生先生曰是固然又辱教之曰中庸之書大道之淵源也是可讀而知之余又退而學焉至其論至誠不息其極至扵不見而章不動而變無為而成則作而嘆曰嗚呼盛哉誠若此天下國家其不足為也已又從而考之則天之所以髙明地之所以博厚山嶽之所以峙江海之所以流莫不以此盖甞收視反聴一塵之慮不萌於胸中表裏洞然機心自息既自以爲知之矣又以謂其致之也不凝則其居之也必不安其養之也不熟則其發之也必不粹斯道也其可須臾離哉以其不可違也而莫之違之故吾誠甞存焉盖古之聖賢未有釋此而能至者以余之不肖幸與知之而數年之間汨沒扵奔走曽不得少暇以休滌其心而坐進乎此此余之所以乆而不入扵道也大觀元年先生官扵餘杭夏四月余自親側復來因即縣宇之東舊屋數椽治爲講習之所掲其牓曰存誠齋盖有志乎力行其所知也自今而往凡吾飲食起居出處語黙之際必常見其所謂誠者了然於吾心然後出之庶㡬日進於君子而不為小人之歸也則命名之意可無愧矣既以自矢且為之銘以自省銘曰天地之道為物不貳君子養心致一而已喜怒哀樂未發其㡬意必固我絶之於㣲正當此時寂然不動有物感之全體即用是之謂一匪一無誠一日至焉天下歸仁我觀聖賢異域殊世惟是之存若合符契敬以為宅忠恕其門自我譬之推而及人惟我與物初無二體各私其私則有彼已私智磨盡成性渾然無物非我其天守全天理所在如鏡如像有來斯應不與俱往又如月影散落萬川定相不分處處皆圓相彼世儒内外不一不勝其私機變横出孰知至人動莫非真飲食起居誠無不形我作此齋大可容膝宴坐其間虛而不迫迴光内照隱几無言氣専神凝息調而淵表裏俱融焉有所倚或紛乎前行以無事古人逺矣斯道莫傳以銘存誠其庶幾焉容齋記江陵教授之㕔事東有廊廡南引而屬於門其修可四尋舊以為書室余治其三之一而有之可以置几席羅經史百氏之書宴坐寢休其間名之曰容齋始余客㳺大梁幾年而楊先生職江陵學官使招余以來既至方盛夏南地本卑濕而官舍狹陋不庇風雨其西南去古城不百步艸木蓊鬱虵虺蚊蚋之所匿伏處則無以休其怠惰之情出則無以宣其湫底之氣余竊不樂而先生安之怡然如顔子之在陋巷晏然如原憲之居環堵出對賔客入見子弟常自若也兹豈無得而然哉故予每以是為愧且自狀其不學之過而思夫人所以進此道者已而胸中廓然顧向之滯思了無毫髪可得環視所居簷宇之隘綽綽乎有餘地矣則又存吾所固然之廣大扵性委吾所不可必之外物扵命自以謂室雖愈小茍可以容吾身處之不厭也容齋之作其此時乎嗚呼天地亦大矣曽不能外吾方寸之地則是身之在心猶海中之一漚耳萬物之理大則不容小則易措故人能漚視其身者必能隨所託而安之蓬户甕牖亦奚以為戚哉孟子曰堂高數仞榱題數尺我得志弗為也夫孟子之得志於此或不暇為則士方竆時修其所必為以須時者其不有大於居室者乎修其所甚大而遺其所甚小此方丈之内所以能容我而不迫也古之人在畎畆則樂處畎畆素夷狄則行乎夷狄以至死生之際無所變懾其原盖出於此或者舍天下之廣居厚蕞爾之小體遇事不釋隨之以憂愁憤怨雖天壤之間將無往而不為碍也則夫丹楹藻井之宏麗其足以容之乎盖得其所安則無隘而有餘失其所安則無廣而不足所安之得失皆自其心則齋之有容不可以他求也故予深悼其初心之不然書是於齋以自訟焉崇寜二年七月十五日劒溪陳淵記介堂記江西之士多以通才逹觀自處視修潔謹細為不足道間有言動不違於理取予必以其義負繩墨而蹈規矩者衆必指以為迂怪曰是了然自異欲以奚為縉紳先生導其説於前而放曠不羈之徒又噪而助之以故名節不聞於時偷薄成風而㢘恥之道盡矣余靖康建炎間甞假令於廬陵之永新地廣物衆比他邑為難治思所以救前日之弊者唯反其所習而勸之為不可緩於是博訪端慤自守不為流俗所移之士尊其道而友其人庻幾下觀而化盖乆而後得龍君時升焉時升抱才處晦厄竆不改其度交非其類如將凂已推之辭受之際雖毫髪不茍也其平居接人無貴賤戚踈必盡其誠一語失中必反復折難歸於直而後已人亦以是畏憚之盖古之介者也與向所謂自處以通達而流入於偷薄者異矣故余樂與之㳺又因其作堂秀溪之上將以逺城市避喧囂離人而立於獨也則請以介名之且示余區區相與之意所以勸也或者曰介者不同於衆與物多忤其失為矯激為僻滯為執而不通為隘而不容子何善夫爾也余曰君子之行所至不同而介則不可去也若乃命介以小節而以和光同塵為處世之法脂韋汩沒終亦無所名矣昔者孟子論伯夷栁下惠或以為聖之清或以為聖之和夫清固疑於介而和何有焉然而孟子又曰栁下惠不以三公易其介是雖和也介其可少乎盖不羞汙君不卑小官援而止之而止者下惠之和也使其枉道而事人戀戀於父母之邦而不能去或處之以三公則不辨禮義而受之是亦茍賤無恥之人耳亦何貴於和哉故曰君子不可以去介者為是故也雖然仲子不義與之齊國而不受人皆信之而孟子則以謂以其小者信其大者為不可盖簞食豆羮之與萬鍾其為物一也而人常輕於舍簞食而重於辭萬鍾者道義之不明則物之多寡有以亂之耳是故易於為其小而難於為其大也夫道義者應物之權衡也伊尹不以一介與人不以一介取諸人至於禄之以天下弗顧繫馬千駟弗視一以是處之又豈有難易乎由是言之仲子之於齊國下惠之於三公俱非其所甞試也而孟子於此有信有不信焉者亦自其道義以觀之耳故知仲子之不足信然後知下惠之所以異知下惠之可信然後知伊尹之所以同非深達孟子之㫖者不足與語此今余既取時升之介且以名其堂於時升無間然者又欲進之以古人之道義則所期於時升者其有既乎時升其勉為栁下惠之介余之望也紹興七年五月十三日延平陳淵記邵武軍光澤縣學記上即位十有六年稍厭金革之事専修文徳中外晏然人用休息於是振舉舊制以彰中興越明年詔即行在所建太學設師儒之官増弟子員凡所以教養考選之具視祖宗時為備天下學士聞風而至闕下願就誨育者至不可勝數上親臨其宫加勸奬焉仍以宸翰所書經子之文均賜外郡學由是州縣之吏職在流承者莫不以學校為急務竭力赴功唯恐居後光澤之學成盖其時也而余友順興吳君璋適寓兹邑以書來告且道邑令王君之賢舉事之敏願有紀焉余惟光澤得邑介於江閩兩境之間地瘠而民貧雖當往來之衝而非商旅化財居貨之地他日為政於此者常若無暇而王君獨能以撫字之隙改築鄉校祗上之徳先之訖事而民不以為病是可嘉也已故為敘其因而益以余之所聞庶以廣王君勸學之意云盖學者學為善而已善者性之正有之而為信充之而為美擴之而為大大而能化則入於聖矣故周官以六徳教民聖在其中善之所積也而或者易之以為不足為無乃未之思耶孟子曰學則三代共之皆所以眀人倫也而人倫之眀自事親始事親必本於誠身誠身必本於眀善善之不眀而欲積之以成徳而期於神眀自得是猶却行而求及前人也末世竆年終不近矣雖然善亦難明哉學者必甞於喜怒哀樂未發之前意必固我兼忘之後旋視而反聽之當其入乎無間而行乎非有如人之始生而愛其親已長而欽其兄亦豈利而為之哉純乎善而不雜於利此舜之所以為舜也使學者憂不如舜日孜孜而不知倦其於作聖也何有故曰學者學為善而已渠不信夫今聖上躳舜孝於九重之中固已通於神明光於四海宜其下觀而化疾於影響而且以得乎先聖之意者寓諸心畫之間以幸多士所謂眀善以誠身誠身以事親之說見於孔子子思孟子之書昭然如雲漢之在天有目者皆可睹也人倫之所以眀誠出於此將見人才衆多天下可運於掌矣盖宣王北伐之後方有事於蠻荆而新田之芑已有可采卒之復文武之業者亦未必不由此也王君為政於光澤知所先後其有見於斯乎如聞邑舊有學乆弊弗葺學徒雖衆而藏修㳺息之所甞苦益陋以故圓冠方屨之士動以千數而進登仕籍者累數十年或無一人王君始至憫焉於是為易而新之峻其欄宇以揮發山川之秀氣庶幾自此異人間出繼為盛世之用此亦為人上者愷悌之善政也然仕止於為禄習科舉之文者皆足以得之科舉所以誘人為善而非古人所謂善也學者眀乎古人所謂善利之分而無愧於王君樂育之誠則又善矣王君名聿求福唐人余未及識之觀其勸學之意亦可知其為人焉紹興十五年二月十日延平陳淵記甘露寺題名記崇寜丙戌嵗七月十二日候潮於瓜州時秋暑熾甚舟中鬱鬱不快獨與友人張載徳拏上艇破駭浪乗凉於金山是夕天宇空濶江上月眀觀波瀾之洶湧魚龍之出沒秋光蕩搖萬頃一色清風薄人毛髪盡立恍然不知身世之所在也明日曉霧初霽草屨藜杖相與登絶頂憩留雲亭上俯視舟楫江上絡繹往來真夢境也更數刻下謁滿公於妙高臺飯罷而日既午矣遂渡京口至北固浴其山之下風乎淨名齋之前楹下瞰衆峰騰蹙中圍萬井山林城市之趣兼得之盖東南竒觀也日暮攜手上方北眺楊子所謂龍㳺焦山海門數島簸揚其間盖㣲矣東望滄海天水相銜雲濤渺然使人有隘人間之志欲脫去塵世而未能也須臾㣲雨作且止將宿焉僕來告余舟已南矣乃步月而歸劒谿陳淵題淵字知黙載徳名公厚云定交篇朋友以情相親者不若以義相許以義相許者不若以道相從余在太學求切磋琢磨之益乆矣上焉者盖僅有之其次可三五人又其次則亦十數而止耳嗚呼何其得之之難也豈余之所以自樹立者不足以取信於人其人奔逸逺引而莫余見歟抑亦致之之誠有所未盡歟夫所以取信於人者余既不敢不勉若人之信否固不可必也而余之於朋友亦可謂盡其誠矣方其未得之也則致其眷眷慕望不已之意其既得之也則惟恐不獲其歡心至其日乆所為未必盡同有索我於形骸之内者則必為之戚戚然反覆譬喻以申余之志而使之察已而見察則如醉夢之醒如昆弟親戚之乆離而再見如廢手足之以藥而獲遂也余之於朋友盖如此其誠豈有不盡者乎然而誠既盡而寡與信矣其難得哉余觀世之君子其羣居握手昵昵無間誓以死生真若可信者一旦少迕其意則目怒背毁遇之若視路人絶之如遺草芥豈其得不必艱而謂不足惜歟不然何其離合之易然也建安陸敬思余舊聞之於太學盖所謂眷眷慕望之不已者獨恨未識其面一日訪余外舅楊先生於荆州余得之於語黙步趨之間君子人也與余言若有意於余者余知其勝已願從之㳺而不敢以為友也及其相聚既乆則傾竭肺腑而忘其形迹之所在余亦不自知其不肖不足以取累於人惟恐其舍余以去既去余念之無已而繹其所以規切我者皆欲以成我而期我於逺也此豈世俗無故而合者之比耶余於敬思於是不止求之情義之間而已然則敬思寜不有以處我哉余外舅甞告余曰耳餘之交或以謂凶終於勢利非也直相責之深而相知之淺耳余考之史信然故常以是為戒不知敬思於我其以人譽而取我乎其亦有以知之乎夫以一人譽而取之則必以一人之毁而棄之此理之必至者敬思之於我其不然審矣盖必有以處我也余實無足知則敬思所以處我者將何以乎此不可不余告也予雖不敏竊甞慕顔閔㳺夏之風而欲求道於洙泗之間期萬有一得焉以為終身依據之地庻幾不為父兄朋友之累而敬思之志既與余同矣誠以是自處亦以處我則吾二人者其有愧於古之人乎其不異於世俗之紛紛者乎孔子曰定其交而後求盖必如是而後交可定也作定交一篇以寄敬思敬思儻告我以其志願安承教跋定交篇後始余見敬思於荆州傾盖如故經月而後别時敬思逰京師余適有感焉為此文欲以寄之因循未果盖崇寜三年也其後敬思亦請昏於楊氏又四年復㑹於餘杭之官舍日侍先生之側益以親狎志同而氣合魚川泳而鳥雲飛也則向之所期於敬思亦既得之矣此文遂不復出大觀二年春偶於故藁中見之因語及焉敬思聞而欲之謂余曰吾二人之相得今非昔也則此文宜若無用矣然以為無所用而棄之不若録以相遺庶以識吾二人者之初心為不偶然也因忘其語言之不工不辭而授之三月十五日延平陳淵書講論語序論語之書載孔子與其羣弟子問辨之言當時學者相與守之以傳後世者也然自秦漢以來以迄於今其間以儒自名者窺其藩籬則有之矣入其門升其堂而踐其閫奥者實無一二焉嗚呼論語之難知也如此非其書之難知道之難知故也以余之不肖其敢自謂足以知之乎然求之二十餘年矣亦不可謂無其意也故甞謂道之難知古人常病其難而今人不以為病也惟病其難故求之勤唯求之勤此其所以有得焉何以明之昔者孔子居於魯從之㳺者盖三千其徒其歴聘諸侯之國至有為之僕御而不辭者凡師之所在其徒未甞不在也削跡於衛伐木於宋圍於商周厄於陳蔡流離奔走其困可謂甚矣子路愠竆顔淵疑死是人皆躬被其害而終莫之去盖其勤如此夫以四科之賢類非齪齪無用於世者使稍推其緒餘宜皆有以過人如彼其才求名而名歸趨利而利附顧乃輕富貴而忘貧賤捨安逸而䝉憂患重之以飢困之辱而不恤臨之以死生之變而無懼此豈人情哉而且為之是必其所求有大於此者故未能以此而易彼也然猶有得焉有不得焉則道之難知可知也已諸君讀是書觀孔門學者如此之勤亦甞深思其所以然乎思之深然後有所疑疑之篤然後知所病學而至於知所病則此書之所載庶乎其不知倦矣且書者道之所寓也楊子云曰七十子之徒日聞所不聞見所不見文章亦不足為矣夫學於孔子者文章猶不足為則其所聞所見豈世俗之所謂聞見乎盖必有不可以言傳者而非書之所能該也雖非書之所能該捐書而求之又不可也以吾心之權衡驗當時之答問其初也即此而下學其終也非離此而上逹從容自得於幽閒之中而超然黙㑹於意言之表古之知道者亦必由之不然以孔門學者終身之所傳而資吾一旦之所取衆人之所有而博吾一已之所問如是而猶不獲焉雖躳逢聖人而親炙之其如我何哉余於此書誠不足以知之至於一斑之見亦時有焉諸君其勉之儻有所聞其敢不告若夫學而不之思思而無所疑疑而不以為疾非所望於諸君矣鄧徳恭字序至宏折肅初字余友鄧南夫之子名肅請字於余余字之徳恭又趣余廣其説乆之未暇及也一日從余為庵山之逰煩暑思隂適得異木逍遙乎其下周視茂林嘉卉之旁連者舒翅揚英姿媚横發因為之言曰子欲知徳恭之義乎觀於木斯可矣夫木之為物傾欹乎巖崖之巔夭矯乎磵壑之側挺秀含輝吐竒呈怪其升如擢其埀如墜其縈紆曲折如龍虵之蜿蜒其森植勁拔如劒㦸之轇轕日麗雨㓗春濃秋瘠盡態極妍不可繪畫此其敷榮於外蔚然而似恭者也故五行木曰曲直在事為貌而貌曰恭盖取諸此雖然擾雲之幹逹而上者非以為高也蔽牛之枝樛而下者非以為卑也其宛轉磅礴因風而為容者非以為同而其寡特剛實凌霜而挺節者非以為異也盡貌之變俯仰皆得則亦本諸自然而已夫惟得之自然而無侈乎外此恭所以本於肅而肅乃所以為恭者徳也恭則徳之形於外者耳形於外者約之以恭而主於中者根之以肅徳其有不全者乎故曰恭儉惟徳無載爾偽而木道行矣若乃以聲音笑貌為恭而不將之以嚴威儼恪之誠安在其為徳也古之人合内外之道其見於洒掃應對之末起居飲食之際經禮三百曲禮三千盖皆所謂持其志無暴其氣者其戒慎恐懼於不睹不聞之中豈茍然而已哉知此而已今子妙質夙成天才宏放視世俗之所能舉若無足為者盖將乗其高氣放浪乎萬物之表則周旋進退之間古人欲其曲而中者宜其不經意矣廼翁以肅名子得無意乎故余願以恭勉子而恭欲其出於徳焉亦所以逹其名之義也詩曰肅肅兔置施於中林徳之所在曽何隱顯之間乎子其篤實以孚其名如玉有質吾言其攻石哉言已退而為之序無諍道人辨崇寜壬午之春余自淮南來京師或有以無諍道人相命者其眀年寄食太學俛首衆中而是非臧否意在而言忘於是名若能體之者作無諍道人辨以自見焉其詞曰無諍道人逰乎無何有之鄉造有謂先生於虛堂之上先衆賔而展謁後衆賔而就席兀然若遺骸漠然若欺魄先生方讙於衆賔之問答雖已怪之未暇詰也既而衆賔歡洽起坐參差儳說噆告矛盾交戞自古今成敗人物短長有天地以來六合之内外與夫山川草木鳥獸蟲魚之情狀變化無不及也其高者抗太虚其下者潛黄泉孰事緒之㣲而弗抽奚理窟之深而未究乎於是喧囂滋煩互相傾擠卬眉嚼齒鼓掌頓足或附耳呫囁或反唇爾汝或髮上衝冠或拔劍擊柱少焉氣得者悔義而負辱者神喪紛然投袂起矣先生周旋衆賔俟其登車攬轡已反揖道人而進之熟視其狀貌窅然若無接也告之故則唯然而應質之疑則泛然而辭益怪焉曰是乃所以為無諍也耶道人曰向之譊譊者奚為哉若予者理之所否而智之所取也人之所奴而天之所主也先生曰有是哉然子得之而不盡者也夫雞之鬬也馬之蹄也牛羊之角觸也虎豹之瓜牙搏噬也造物者固甞賦之以是矣子之舌無恙乎亦安得而噤黙乎道人曰今若則既有謂矣余試為若妄陳之吾甞逰於物之初矣㝠㝠濛濛莫擇其中吾又甞觀夫物之内矣錚錚樅樅為窪為隆將交乎物之所接則物斯我敵若休乎物之所一則我與物俱泯矣若余者盖細視域中而自適其適者也先生曰密人之距而周西伯之怒夾谷之辱而魯司㓂之叱朱翟翳路孟氏所以好辯釋老倚門韓公所以不能下氣也而獨不聞之乎且子亦甞見水之礙於石乎衝回流而遄往乗逆勢而反却斂萬頃扵尺尋瀉怒濤於絶壁盪摩排拶雪墳鼎烹奔騰洶湧山頽地傾陽山之險閩溪之惡吕溪之峻瞿塘灔澦之隘如鵝雁之雜呼如車騎之駿奔如風吼林而雷春驚也至於一得平地滔滔汨汨東放之海則漻然而已矣然則有聲者盖亦不得其平而然耶遇其不平而後有聲是有聲者乃所以求無聲乎故輗軏龍躍而澄寂不動者水之性也若夫滿而流流而礙礙而有聲豈其所樂哉不得已也道人曰古人所不得已者僕既獲聞命矣夫其不得已也豈以求勝哉若水之不得其平而有聲也非水自爾也彼有為不平者也故其有聲也石為之聲是以終之無聲焉所謂以不平平之則其為平也平矣昔者蚡嬰交訾於東朝渾濬掠美於吳㑹國師之移太常中郎之小令史嗣復託譏於佩劍史肇發怒於毛錐自我觀之富貴外物也不足相尊功名餘事也不足立已六經陳跡也不足伐異文章末技也不足自喜朋黨殊趣也各植其私事業殊用也亦惟有時而又奚以相過乎吾將鄙蠻觸於蝸角而同堯桀之毁譽等臧榖以亡羊而泯夷跖之是非則夫儒墨之徒相誹相隳孰為莛楹孰為厲施其亦劍首之吷而蠅頭之㣲矣子又何暇規我以古人而攖我以世禍乎先生曰嘻辨哉夫子終欲藏其狂言而晦晦於黮闇乎其亦有待乎道人曰春氣上蒸草木倒植者時焉爾非敢有待也恐不能脫於理也昔者藺將軍懦於㢘頗而意在存趙陳丞相怯於王陵而謀欲安劉故出胯不校者終成名而唾面勿拭者斯全身此皆鄰於道者也而豈未之思耶先生俯而諦思仰而自弔已而長言之曰茅靡耶波流耶彼其所以紛紛耶聚塊耶積塵耶此其所以忘情耶彼何人者耶其獨無間處耶道人於是使之反之搏髀為之節而和之曰以石投水無沒者之可索耶以水投水無易牙之可得耶其將三語而黙契耶亦將眉之揚而目之擊耶所謂如人飲水冷煖自知者耶歌數終逌然不揖主人而退主人亦不知降階序而送焉莊周曰終日言而未甞言幾是已作無諍道人辨代廷試䇿臣聞仲尼之道覆燾如天持載如地錯行如四時代明如日月原其法之備則比堯舜為逺過要其徳之至則視三聖為大成則其所以為聖自生民以來盖未之有宜其無所不能於教人為有餘而於學無不足矣然而官名禮樂之問猶下詢於郯子老𣆀師襄之流而不廢其在洙泗之間與群弟子辨疑答問之際盖亦時有取焉是以子夏有得於詩之一言則興起予之歎顔淵無所不說則發非助我之辭由此觀之彼人之所學賢者雖以教人為事其獨無所學乎故傅說之進於高宗曰惟斆學半盖謂是也今陛下躳仲尼天縱之聖居得志之位操可為之勢以先王之道啓後學之䝉蔽可謂千載一人矣而又推行三舍之法徧逮海宇所以焦勞於九重之中而不自暇者莫非以學校為先務故凡播之訓詞而著之甲令以眀倫善俗無一不關於聖慮者方此之時非直天下之材所願終身承教於陛下雖陛下亦以教事自任也則今日所䇿臣等無乃奉行祖宗之故事不得不然而其實無所待乎其亦將有所取乎不然官名禮樂之問胡為下及於艸茅之賤士也如臣所陳快炙背而美芹子之類也顧何足以自獻乎雖然狂夫之言聖人擇焉愚者千慮必有一得惟陛下不以其疵陋而忽之庶乎涓埃之㣲或有所助也乃若顔淵之無所不説臣未之能子夏之可與言則在陛下取之而已臣愚不佞謹昧死上對䇿問三首不舉子之俗惟閩中為甚而吾郡積習盖敝俗也幾年於兹未之能革議者患之聖人在上旁燭幽隱比降詔書俾䟽法令以示民使之知禁宜其下觀而化速於影響然或者尚慮革之之難也聞之昔之為順興者深究其敝於是先之以訓誘申之以威信茍觸憲網必刑無赦曽未嵗餘此風遂變其後數年有恱其事者以彼之所為施之將樂稍加懲艾闔境大擾夫縣令於民為親所以承流宣化其勢甚利而父母之殺其子性固不忍以兹利勢順民性而導之宜若易然今或以為難何也豈治民者未得其術與抑亦舊染之習未可以卒令與若乃二宰之政其得其失至今先生長者類能言之諸君儻聞其說乎幸迹其本末併䟽已見眀以告我當道之賢守令使推行之庶㡬革積年之敝自吾郡始他日芣苢之詩被之絃歌是亦諸君之助也昔孟子之言性曰人之性善荀子從而非之曰人之性惡楊子以人之性善又不能無惡也因為之言曰善惡混而韓子者又以三子之言為猶有所遺别之以三品焉曰上焉者善下焉者惡中焉者可導而上下也自四子之說興天下之言性者紛然不一而卒無定論夫性者人之所固有也學者期復乎是而止耳誠不可不知而其論之不一如此將孰從乎彼性惡之説後世莫不深罪其言之偏而不敢正以為非如不敢正以為非則是以楊子韓子之説為得而孟子之說為未盡矣夫孟子百世之師也學者所取以為標凖者也其果不能盡夫性之説而有待於楊韓耶人之言曰楊子之言性兼性之不正者言之實無害於孟子之説然公都子之問甞曰性無善無不善又曰性可以為善可以為不善又曰有性善有性不善而孟子既辨之於其書矣彼楊子韓子之説其果能外是乎不然則學者於此不容無説孔子曰性相近也習相遠也或曰孔孟之言性一也或又曰不能無異誠有異乎其無異乎夫性之在人既不可不知宜瑩其説使無疑焉然後反身而誠庻乎其能盡之今也如繫風捕影茫然失據將以誰斯謂宜有至當之論以證四子之言以發吾夫子未盡之意此吾黨羣居所宜切磨以求益者也儻有所聞幸相為言之毋隱或問佛於王通通曰聖人也其教如何曰西方之教也中國則泥盖有取於其心不取其迹也佛法之行於中國盖千數百年於兹矣豪傑名世之士往往不鄙其說一有詰之以非吾儒之道則過而為王通之論者不知幾何人也予疑夫迹之於心猶木之有末而水之有流也豈有迹非而心是者今其教益熾而學士大夫所以奉之者比隋唐之際又甚世無韓子其孰以為不然借使原道之論興而以燕伐燕之譏得以勝之矣嗟乎道之不眀異端害之也彼其所以入人之深亦各有理豈易以口舌爭乎然倘至於道則有不可不辨者聖人在上人倫已眀茍用其言於法有禁未火其書意可見矣然猶不能絶人之心好也願與諸君極其本原而揚㩁之深眀前世儒者取予之是非槩之以先王禮義之誠意以證今日學士大夫所以奉之之失庶幾從上之令於道弗畔非茍為異也亦以自治而已諸君以為如何觧論語十二段子張仁在其中矣仁人心也求之於外則不足以得仁矣君子學以致其道致其道致一之謂也一息或違斯道逺矣故孔子曰君子無終日之間違仁造次必於是顛沛必於是士見危致命見得思義祭思敬喪思哀其可已矣君子之學始乎為士終乎為聖人未能有至焉不可已也若夫為士則如是已足矣故曰其可已矣不然亦不可也執徳不弘信道不篤焉能為有焉能為亡此觀人之法也才智之士亦能為時重輕然非道徳以本之亦不足以任重致遠矣淮南王視說公孫等如發䝉所憚者唯汲黯近社稷之臣洪容而已矣子夏之門人問交於子張有所擇所以立已始學之事也無所擇所以同衆為成徳者言之君子之言當其可而已非有異也皆所以進人為善雖小道必有可觀如老聃莊周以其說救一時之弊可也然行之萬世則膠而不通矣日知其所亡習矣而不察者衆人也察則知之而不能忘矣百工居肆以成其事君子學以致其道致道者格物之謂也格物而物格焉道斯得矣盖道不可須臾離也故造次必於是顛沛必於是方之百工能成其事亦云用志不分而已小人之過也必文小人自私而已不能克已也有過唯恐人知之故必文君子有三變此夫子之容也子夏知之故謂君子當如此見之於容如此其中常自若也大徳不踰閑小徳出入可也或遠或近或去或不去則有出入焉若夫歸潔其身則一而已矣故曰小徳川流大徳㪟化堯曰篇聖人代天理物者也堯咨舜曰天之曆數在爾躳天實命之也天命之而人之所為不可以不至所謂允執厥中者所以繼天禄夫有民斯有君民不竆則為君者可以長保其禄民無所歸禄亦永終矣聖人所以代天理物者不出此道舜亦以命禹道無二也夏之有天下其禄既終矣湯得是道故以身任天下之責而不以有罪歸之萬方周率是道利則歸人過則歸已此二帝三王之所以為天下國家之意社稷長乆之大畧也今周又衰矣繼周而興者當如何孔子於是盖有道矣雖不得施可得而言也謹權量審法度修廢官興滅國繼絶世舉逸民所當先行在此六者其事則民食喪祭為不可輕而其術則不過寛信敏公而已是故孔子不幸無位耳使其得志二帝三王之道其有異乎此論語所以終也賛頌裴老真賛一切虛空有作皆障於所作中庸分真妄師圖其像謂是為真畫非實相師亦何人認物為我我固非我見畫猶身存之亦可師於彼此兩無所安亦無所離作如是觀寄椰子様茶羅與光祖頌不得其髓而象其皮膠漆所成甚是而非有隔其中羅動塵飛麤中求細扵焉用篩彼昏不滌視此器之有如公者奚以此為留龍居士試建茶既去輒分送并頌寄之未下鈐鎚墨如漆已入篩羅白如雪從來黒白不相融吸盡方知了無別老龍過我睡初醒為破雲腴同一啜舌根回味只自知放盞相看欲何說得老龍見和復呈而一味無别故末云云折來頌云内性白外形黒是渠白芽聚為黒塊方訝墨堅復如粉碎生滅滅已元非内外説性説形又説一味急㸃一盃扶居士醉題仙霞嶺上菴中示仲思媯之後封于兹出我車濟乎沂龍得雨燕始歸一投匕遂拂衣忠州孫見者思發一笑譯其辭鄒昭州畫像賛粹乎其為容即之者莫測其剛也實無所不能而獨不露其所長也其毅然不撓者遇事而後見之而其超然自遂者顛沛造次是以為常也玉在山而木潤淵生珠而崖不枯吾睹其似者而猶恱之盖其所不可得而形容者雖百世不亡也楊補之真賛分别黒白而無愛憎之私故人不怒㳺戲翰墨而無好名之累故人不爭頽然天放盖幾於忘我者而不能已其不平之鳴吾聞至人灰心槁骸有口掛壁其聲如雷是謂不言之辯終日如愚古唯有回彼有十年端坐莫或得之畫工乃能傳此一黙豈非吾師轎版銘我坐籃輿按此禪版誰歟荷者肩頳足蠒若古有義上下相臣我獨何為役此賤貧孰謂殊形不切於已爾背流汗吾顙有泚車中憑軾馬上據鞍不可徒行匪毒斯安我恬豢養處非其義矜此勞人銘以志愧黙堂先生文集巻第二十
