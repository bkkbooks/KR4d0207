front:
  text: 默堂先生文集卷第五
  hash: sha256:8dc60fefc61a39fd03324ca65582bc9ec5ecceb2be1ae7eca340f799c284e88c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_005-1a}
body:
  text: 詩看論語四首明明孔聖能毋四的的曾參所貴三一部魯論開聖域古人無死要重參天道文章豈兩岐雷聲淵默本同時如何子貢能言者説與無言更有疑陋巷從容一事無不因鄰鬬出吾廬簞瓢豈是忘憂物自是從容樂有餘直從堯舜以中傳又到東丘續斷絃看取子思親的處始知論語自無偏夢得亭上雷霆卷地灘聲急旌斾搖空樹影寒千古西山留爽氣雨餘容我倚欄看留別鄧南夫四首平生交友各飄蓬只有丸丸雪後松萬里歸來還往絶獨君時許略從容昻昻徑氣初無作蕩蕩竒胸久息機容我醉時開讜論一軒眀月夜忘歸有子才如汗血駒新門髙大可容車故應袖手藏深渺憐我氷霜涉畏途比余于玉有竒文一落泥塗十二春慚愧深知同鮑叔尚言荆璞定逢人其文甚美今余被貢適三上故有是句折十二年前南夫有玉説一篇送子入太學越州道中雜詩十三首心息久相依息調心自住忽焉不自知根塵失所寓向來尚有錐今我已忘兔似入無功鄉不由嵇阮路暴氣燎原火淺量盈澮水不見楊關西此生真已矣誰言佩豭由不作緼袍恥至道儻有聞客塵如脫屣世儒讀論語未脫小兒氣豈悟無絃琴中藏千古意顔淵默然處曾子亦心醉處處儻逢渠字字皆有味人心有默契晤語不在多一笑離凡情萬象皆含和孰是忘言人聽此無聲歌有懷閲古堂夢中時一過蕭山縣宅折閲古堂在浮雲作秋隂細雨如朝霧放形山水間意適無艱步忽遇王通禮法士談道則未然雖聞一字中尚倚諸子偏區區尊孔子未悟失其傳自聖猶不疑續經何足愆堂堂陸忠州談辨如傾河從容仁義途步武尋丘軻一斥不復返方書事研磨至今諌草存滄溟遺一波我行何所挾萬里一毛穎服勞髮欲秃未語意先領畸人如告我心清事自省從今中書君亦復免馳騁和如愚思劒溪佳人經嵗隔參辰柳緑桃紅奈遠情遙想玉樓春睡起一江風日㺯清明馮元用九日約白雲寺登髙以追昔年都城望津之會偶以事不往蒙示長篇次韻與君都城別星霜屢變易每懷望津遊悵然如有失此生羈旅中嵗序驚心魄還家幾何時自愧不暖席建溪古渡頭短棹凌虛碧掀蓬忽見君恍若夢中得相攜定舍館石徑走迂直危亭至如歸坐午及昏黑黃花笑東籬未許蓬蒿沒只尺白雲樓坐阻造豪逸人生正似兹有志誰能必當時連鼇手至今猶挾䇿髙才真楚璞末技同齊瑟無心效騫騰自分投間僻望津儻同登意氣那復昔次韻酬鄧天啓少年翰墨場自詫穿楊箭誰論第一功不數曹參戰聖門窺管豹一斑時許見棄捐憂患中更欲資陶錬兩鄧富文采端可同席硯投璧或未知賈石誰敢衒小栟詩益竒出語人所羡過門遺新篇無乃思與捐我懷古作者臨文頻撫卷孰能掃千人期君當八面次韻邦美叔和天啓見寄竹風挾雨撼蓬窗靜聽秋聲轉騷窣朝來飢臥媚微涼叩門不作淵眀乞小栟見餉有新詩七言端為吾家出共誰渠有古人風孰識中藏謫仙骨書如周鼓未差訛語效商盤仍詰屈誰與和者叔不癡落筆成章一嗟咄無用如今君豈樗自冦從來我非漆板茆他日儻相尋好在山深林更密名樗故云折邦美作軒三月二日泛舟下延平晚泊西芹扁舟劣容身風浪困掀簸曲肱逰華胥夢斷千山過縱橫波間石滿目牛羊臥秋毫儻不支巨鑑忽已破篙師號神逸却立變衰懦我豈未之思懸知無可奈此生足驚憂似為天所疸那能一生死且復耐摧挫日暮同濟人舉酒紛相賀一笑盡餘觴歌罷無豫和次韻令德答天啓小栟妙語言下筆初無難曹郎更精深一字不苟安我師陶靖節亦未遊其藩但覺萬仞淵中有蛟龍蟠人言失故步乃在學邯鄲平淡恐未臻先作郊島寒古來文墨士十九姓字漫尚賴相可否鹽梅助鹹酸復次韻答令德見和來詩及維摩默然之意多言亦焉用守默良獨難維摩得此門衆生病自安當時許子將不造實與蕃終以月旦評有愧申屠蟠忠良覆漢鼎魯酒圍邯鄲獨愛千頃陂滄波照人寒君豈叔度歟胸襟江海漫自然已憤厥不須珍柚酸用令德韻題嚴陵祠嚴子陵以匹夫見萬乘乃堅臥不起所謂髙氣蓋世者又謂光武差增于往意若未甚許之則其所藴豈冦鄧耿賈之儔乎司徒霸位三事而正名其為癡光武乃以諫議大夫處子陵宜其弗屑也余觀湯之于伊尹武王之于呂望皆師事之故能致王業之隆後世貧賤屈于富貴此道遂衰聞客星把帝座之事則相顧驚嘆以為甚異況于尊之為師乎光武于故人厚者借乎其不知此也世疑子陵之去就殊不得其當豫謂光武不能用子陵豈子陵之失哉故因和令德聊以見意焉價微良易酬器博無近用騏驥非良樂萬里誰能控蕭王漢中興四海倚為重誰為淵驅魚一呼百萬衆妙算環無端竒功射必中忘機諒未能豈數漢隂甕故人鉤尚直倦作儀韶鳯應無萬牛力負此丘山棟羊裘又獨往苦語餘嘲㺯至今賣菜言空記當時夢跋子靜所藏魯直書樂天八字偈凝師八字源則豐樂天説偈流無窮山谷眼明如日中落筆驚電馳蛟龍誰其得之建溪翁姓也折子靜取人所棄豈俗同􅊧竒抉怪晉餘風嫉邪憤世髮上衝自我觀之案兩重巧偷豪奪願不逢好語傳播人所攻斯言有味當見容六年折政和附子靜所跋之後折七月無諍道人書題公敘舫齋胥靡來時楫鴟夷去後舟濟川曾入夢浮海竟難留忠信雖堪倚行藏要自謀應同仙似泰不數勇如由濶水風濤夕鱸肥浦嶼秋落帆如得計整棹欲何求明月時堪載新醪便可浮江山無盡意長艤劒溪頭和羅仲素寄子靜長篇蒙示所與子靜長篇論髙而理正讀之感嘆不能自已是日偶思道來訪問以老兄安否云自崇福還却往龍湖而來書不及此二剎皆雪峰髙弟所廬也豈復問道于此乎輒次嚴韻聊致區區之意甚不自揆也龜山絶壑蟠豫章秀幹往往參天長十年收拾多散亡只有太白追蟾光知君所得不可詳宴坐鐔溪名益彰獨嘗為我露其鋩盡掃楊墨揮韓莊邇來黃面稍侵疆劒藏于室矢在房分將肌肉剜為瘡猶説道心乃平常平常心是折剜肉為瘡語也折道禪家我欲從之挹餘芳竟坐此傳乖所望新詩謾説陋漢唐直以未畫窮羲皇豈知藩籬不自防欲舉萬目誰為綱況彼桀驁非勤王安用援手登之堂愛君駿足如飛黃一空冀北無留良四蹄雷雹方騰驤肻如駑馬徒爭強和子靜三絶亭竹二首窗外度聲風宛轉庭前舒影月分明參橫斗轉情無盡骨冷魂清夢不成霜雪豈能摧徑節埃塵無復入虛懷故應淡薄無人管不是子猷誰復來漁父一首一聲橫笛起蘆花驚斷天邉雁字斜白首飽諳鱸鱖美未能連夜網遊蝦舟中誦子靜江上之作為和二絶月下長吟露濕衣謫仙嘗憶謝元暉澄江一句無今古何似晴空獨鳥飛云爾折子靜詩扁舟直與石相摩得到平流幸已多夜泊寒潭風不定更憂雷雨作驚波默堂先生文集卷第五
