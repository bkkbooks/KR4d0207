front:
  text: 黙堂先生文集卷第七
  hash: sha256:9019ed64813840108c07008dcf04d9deb0eefc359fcf5ca0485caa829f12d280
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_007-1a}
body:
  text: 詩用中示以字瑞既書其事又賦詩一首河圖布畫非人力鳥跡成文豈偶然自昔秘藏神所䕶至今陳露墨猶鮮胷襟有道推先覺斤斧無情肻自全但欲剖心彰景命㸑桐何意擬薫絃字瑞竒特再用前韻春來無物不争妍㸑木呈祥孰使然應為竒文開奧穾不隨凡卉競蕃鮮窪隆宻向睽中合㸃畫仍從毁處全御史説符直可騐從来謀國直如絃提舉生辰東井遥觀盾日升南風猶入舜絃鳴鵬程九萬豈終息椿嵗八千方再榮平世功名期鳯鳥一時文采應長庚浮瓜沈李年年事稽首弧南一㸃眀俞憲生辰代龐幾先北固樓前萬頃秋月眀風定大江流從來此地多英傑果有竒才副簡求秀氣一天開夜色威名千里駕潮頭山川長在人難老應抱文章入相周淮南持斧功成後甌粵乗軺喜蹔臨使者英標衣蹙繡近臣新渥帯横金三山氣入中秋好八郡香焚曉霧深已爲黎元開夀域可無椿嵗慰人心耿憲生辰象緯祥光動門弧瑞氣纒秋來孤鶴健霜近古松堅鄰境豺狼盡新恩雨露偏軺車猶問俗寳帶獨優賢投筆男兒志封侯烈士年老成端可侍終冀勒燕然鄭漕生辰二首代幾先作至公無轍迹萬變歸諸正誰云學則然要在成以性我公鍾間氣異禀剛且勁一毫不容私心境自澄映超然是非表燭物眼常浄還将溟渤量一了百川競由來仁者夀兹理天所命欲知椿齡永視此寛平政桂花弄小春晚香適再盛年年幾望月影泛杯中聖尚書心如水遠裔有餘慶也折鄭相何以繼清風家聲南北鄭象緯祥光動門弧瑞氣盈小陽春在序幾望月偏明他日三千牘清時九萬程名因使粵重功自備呉成偉量溟波濶竒詞錦段呈褒揚看唾玉輕重倚提衡松柏真難老芝蘭足後生筍班行趣召金帶已先横内史言何美當時折謂鄭尚書心自清崇折謂鄭秖應南北相鄭餘慶折謂鄭絪重振舊家聲唐大夫生辰氣轉初寒候祥開既望辰應時來鸑鷟占夢獲麒麟盛德圭無玷髙才竹有筠胸襟藏巨壑人物妙洪鈞使者光華遠朝廷寵數新鵬程九萬里椿幹八千春鼎鼐虚前席風雲即要津黒頭紆衮繡天意在斯民次韻運使龍圖寵示道中夜行之什畏途千里可宵行正是鄰邦䑕盗平諭蜀昔傳司馬檄備呉今罷亞夫營隂雲掃地千林出曉月凌空萬騎迎緩帶驛亭留險語春雷端使蟄虫驚次韻子静淵眀束帶向督郵已覺歸思不可留紛紛朱墨何時休豈得置錐無一丘平生涉世如虚舟明月從人驚暗投胸次已無涇渭流不應罪我縁春秋黄兵部生辰四首中朝人物競推先富貴前途看永年九萬里程飛正遠八千春幹久彌堅南國初持使節回斑衣仍把錦新裁大椿更向萱堂祝長到春來共壽杯蚤嵗飛榮應宿郎至今雞舌尚含香未應駟馬誇流俗只為慈親樂故鄉地上泉流府庫充囏難天與嵗時豐他時若論闗中漕合數蕭何第一功遯齋有感逹士豈嫌祠竈請虞人安可以旌招由來不戀五斗粟自是叩門勝折腰戲題延平閣上黄昏欲去更凭欄珍重銀蟾照膽寒可是歌眉能繫別人間無此好溪山西風吹露濕峩冠迥立三山二水間後夜江樓應殢酒一鉤殘月與誰㸔謁羅養蒙辱示長篇次韻它時對語聞鸎遷青秧離離初揷田重來刈稻歌有年浪過日月将誰憐故人落筆生雲烟胸中端有萬斛泉從來經笥謾便便詩書何如一囊錢有時玉樹臨風前仰視落日窺層巔已知萬古然不然得處往往多忘筌正須青綾䕶醉眠坐使士類歸埴埏不應直為蓴鱸還夜聴秋雨窮遺編我今已辦訪戴船日欲倚棹寒潭邉要當學海如百川未信軻死今無傳小詩七首寄養蒙兼呈景駿粥魚齋鼓網蛛窠古寺長廊客少過唯有一溪明月在夜寒偏向㫁垣多斜陽不到竹隂幽小徑縈紆傍碧流行到艸深橋㫁處却乗明月泛歸舟它時樽酒對春風夜雨霏霏抵曉鐘但説尋常往來地豈知重到有丹楓太史溪頭十里間朝陽峰下水涵天青鞋不踏紅塵陌夢㫁僧窗又一年才踈不下孔北海道廣更師陳太丘世路風波無著處却尋真隠得清逰二妙胷中萬頃寛詩成千字海濤翻已能共入淵騫室自是同登李杜壇晚交誰似兩龔清氷雪情懐獨老成揚秕在前容齒長積薪居上看文鳴翫月據牀招佳月月轉牀屢移夜久風露涼孤斟樂忘歸氷輪擅空闊是處留清輝浮雲掃除盡如與賞心期我行萬物表中空無一疵光明徧十方毫髮了無遺心境互融澈起坐迷東西此生看此月十年悼無時它日客共飲淋浪酒霑衣十語久不契此心唯自知西風掃殘暑秋色日益竒憂國付鼎食消閒屬山棲恐妨此時樂勿露囊中錐三絶句寄幾先陽眀連絡四支中胃氣由來處處通但使黄婆能飽飯客邪端的不須攻冷煖平生既自知是中無病欲誰醫但思寒熱從何得未用長吟譴鬼詩敵犯東南夜壘驚却防西北有竒兵将軍堅臥鼻雷吼七國峥嶸次第平所必攻則卒至之敵不能爲害折善治病者如周亞夫用兵守其道出南浦見蕭子莊十首霧壓山城石徑遥筍輿乘月度溪橋已投柳舍人方起却訪鱣堂市未囂墻仭未容肩可及豹斑時許管能窺相逢一笑無餘事明月滿懐心自知雨絲收盡暮天涼萬竅號風釀曉霜待趂新晴出閩嶺夜談還喜漏偏長平生交契獨公深嵗晚那無裹飯心白首它年林下約此盟端的幾時尋五年重見各蒼顔往事紛紛醉夢間不為投閒多暇日豈能千里謁龜山龜山涉世若虚舟觸處忘懐得自由道大不容長役役心閒無事只休休了齊已復歸黄壤便恐人間此道微後代不知誰得法秖今無復敢傳衣四海知心有幾人淡然今與鬼為鄰天下共寃渠不恨平生憂國自忘身然居士折子静號淡斯文初不間衡茅但有玄經豈患嘲騏驥從他千里足鷦鷯容我一枝巢我在龍潭直下居西來應不少雙魚故人南浦如相憶為寄平安尺素書静相與為友而師事之故詩中併及焉折龜山了齋其道則兄弟也余與子莊子過江郎巖下少駐感而有作三峰卓立蒼崕裏朝夕雲烟自圍繞幾年不向眼中青忽露全身萬山曉凝然不動亘今昔陌上行人空自老我生悟此其已乆夢事縈人嗟未了却怪神龍依絶頂獨以一身蟠故沼風雷際㑹豈無時忍視饑氓日紛擾未能呵汝救凶年眀朝馬首霜風早黙堂先生文集卷第七
