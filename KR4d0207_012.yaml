body:
  text: 表代漕使謝轉副使金字遽傳榮奉十行之札綸言甚渥寵升一路之權逺自日邊驟臨海角拜恩益厚揣分逾涯中謝臣質本凡庸仕逢休顯徒以非常之眷屢叨不次之遷一忝使星再更歲籥惟此甌閩之地近連吳越之疆方攘竊之旁興亦轉輸之所病誠心憂國但知足食以裕民竭力奉公詎敢飬交而避謗實懼異同之論各懷忌嫉之私指瑕公肆于吹毛伺隙密謀于射影豈圗聖鑒灼見愚衷曲示保全更隆委任荷殊私之誤及愧綿力之難勝此蓋皇帝陛下天大普容日明洞照泯是非于衆多之口辨邪正于疑似之間獨昭孤立之忠特畀久虛之職超踰過望報稱尤難績效蔑聞已負勸能之賞死生無變誓堅享上之心代黃兵部謝賜曆日合六氣以育羣生以極財成之效定四時而熙庶績更存欽授之文祗荷寵頒具宣德意中謝恭惟皇帝陛下順帝之則與物為春正底日不失日之官謹先時不及時之罰隂陽寒暑既得其常草木昆蟲咸遂其性尚稽故事均錫新書而臣叨備觀風預聞頒朔敢不夙興夜寐期勿奪于衆時儻使民和年豐亦何憂于國用代漕使貢金器精鏐顯瑞出千古之祕藏良匠效能極一時之至巧寶非地愛功若天成輒傾歸報之誠庶備燕間之奉中謝臣聞眀主輕難得之貨而應其德者必來治世有畢至之祥而適于用者常寡惟是五材之美莫先百鍊之剛山澤欲以效其珍鬼神為之發其奧因假爐錘之妙俾親日月之光恭惟皇帝陛下示敦朴以厚民寶儉慈而裕國勢足以兼庶邦之享而亷于自奉仁足以得四海之助而樂于無求故雖物之無情亦以誠而能動遂致精堅之質逺生僻陋之區究觀盛事之難逢蓋為聖時而特出考周官之制玩好猶共原召保之心器用斯獻願隨方貢仰慁宸嚴庶憑役志之勤益盡敬恭之義代常平賀表天開地闢昔殊夷夏之疆陲電掃風馳今正唐虞之境土胡虜棄戈而逺遁燕雲奉籍以來歸詔音一傳普天同慶中賀竊以幽都尾箕之分舊屬中原契丹豺虺之羣邈居大漠頃乘五季因陷數州緣祖宗意在于靖民故朝廷許之以繼好錫豫良厚豢養浸驕乃自絶于天常致上煩于睿算師徒壓境誕揚問罪之辭種落攜心莫守必爭之地遂開故壤俯慰遺黎返巢穴之播流而保以金湯收介鱗之傷殘而被以冠帶盡釋纍朝之憤丕成不世之勳金石可磨乾坤無盡恭惟皇帝陛下以慈故勇匪怒而威命將出師適副來蘇之望收兵卷甲坐臻不殺之仁混區宇于一家息烽煙于萬里而臣叨持使節逺在海涯服勞莫預于前驅上夀阻陪于下列舞干敷德喜消北顧之憂鏤牒告功願獻東封之頌代耿提刑賀天寧節天開景命屬良月之就盈運啓興王兆流虹之嘉應人神協慶夷夏均歡豈繄眷奬之餘敢忘歸報之義中謝恭惟皇帝陛下天臨九有子育羣生出百年塗炭之民盡還冠帶極千里金湯之地一變耕桑積兹博愛之仁宜獲無疆之福而臣逺將使指久誤宸恩攬轡自憐莫預鴛鴦之列奉觴斯阻空餘螻蟻之情但同天下以歸心請祝聖人之多夀代廖用中謝除本路提刑分職郎曹初以養親而丐免按刑鄉部遽蒙改命以遂私幸嘗熟習于民風庶獲盡心于邦憲戴恩甚渥撫已增榮中謝臣賦命竒窮謀身迂拙雖朝廷收録之意每厚然丘壑退藏之日為多憂患餘生自阻風雲之會艱難多故未伸犬馬之勞常思量力以效忠不敢愛身而擇事乃者猥膺召擢亟欲奔趨偶嬰疾于中途復言旋于故里旋值冦攘之作近興阡陌之間方愚民乘勢擁衆以橫行適所在乏兵經時而勿問善良無所控告井邑至于丘墟目傷沸鼎之聚魚身慮積薪之及火遂忘出位姑事招攜蓋念無知之氓本皆樂業之俗或緣飢凍早失撫存但欲自全寧不知悔因廣好生之德盡寬必死之誅尸祝不可以治庖實慚越俎鄉鄰有望于救鬪寧免纓冠豈謂赦其強聒之愆委以澄清之任庶幾將母不必逺家示曲記于孤忠冀或收于來效叨塵若此綿薄何堪此蓋皇帝陛下堯大普容舜眀遍照開逺俗自新之路無疾于頑嘉儒生欲善之心不求其備謂撫民在去其邪虐而折獄莫尚乎哀矜取其息一鄉之爭或可當八郡之寄刀劍漸消于牛犢共歸解網之仁衣裳不易于介鱗終賴舞干之化此聖德之所感召豈愚臣足以奉承但竭疲駑少逃瘝曠代廖用中謝除吏部侍郎兼侍讀銓吏劇曹濫蒙超擢談經邃幄并荷殊私辭不獲從愧無所措中謝臣聞聖人立言以垂教蓋將謂萬世之傳眀主稽古以乂民必欲兼百王之治使孔孟之訓愈久而無替則文武之道何時而不行然而書雖存而迹已陳語有窮而意無盡非得通方之學曷眀至當之歸顧臣何人辱兹遴選此蓋伏遇皇帝陛下舜智好問禹能不矜當國家多故之時修祖宗暇日之事詳延儒雅博考異同橫槊賦詩不數建安之小技投戈講藝獨追光武之遺風豈唯資所得以正心固將推有餘以濟物夫何孤陋獲預講眀得于手而應于心姑進輪人之議眀于上而親于下是為王者之師願尊方册之聖賢益重寸隂于間燕庶憑辨説仰助崇深代廖用中謝除給事表憂患摧傷偶存餘息讒誣昭雪復玷近班丹墀方幸于朝趨瑣闥已還于夕拜恩榮沓被感涕橫流中謝臣聞忠邪無分則賞罰不足以懲勸因革失當則法度因之而廢弛此自古立政任人之所由失與今日舉偏救弊之所宜先必將大協于輿情要在不違于公議儻失是非之實漸成朋比之私朝廷之謀偶有未周臺諌之言或未暇及不有論駁孰防蔽欺然而務闊略者或昧于先幾謹苛細者或傷于大體必得踈通之學乃眀獻替之宜如臣至愚涉道甚淺斷斷無技碌碌因人鑾輅親征身逺干戈之役凱歌遄返恩先將士之勞徒以經幄舊儒暮年久廢重煩眷奬特此超除此蓋皇帝陛下堯大兼眀舜眀遍照盡屏異同之迹獨收威福之權惇德允元已見逺人之率服發號出令終期萬國之咸休故于出納之司特隆紏察之任自惟白首復造黃扉實慙衰病之餘尚綴清華之選回天有路所憂綿力之難勝填海何期獨恃此心之不變代廖用中尚書遺表佚老山間已負捐軀之誓歸全牖下敢忘報德之心念平生遭遇之由荷纍聖眷憐之厚正冠待盡雪涕眀忠中謝臣振迹寒微逢辰休顯越自泮雍之選浸膺臺省之除遂綴從班稍塵要路記言柱史曾微直筆之稱擇吏銓曹又蔑得人之效以至鎖闥論事邃幄談經併出誤恩舉非素望因求補郡繼欲引年方馳謝事之章遽被還朝之詔迂愚無取乃承乏于中司嫌怨已深復升華于八座顧天地之賜極矣而螻蟻之報缺然自取譏彈敢辭黜免尚聮內閣仍奉真祠終還已褫之官更允就間之請微生何幸晚節知榮豈謂憂逐喜來病與衰會始經旬月已在膏肓馬勃牛溲姑聽醫師之用舍鼠肝蟲臂一隨造物之推移觀自性之本空豈殘骸之可戀尚留餘息請畢愚衷恭惟皇帝陛下孝悌通于神眀忠信行乎蠻貊以上聖無以加之德成萬世不可及之功固將恢帝王敦朴之風躬祖宗勤儉之實杜知謀而不用卷兵甲以深藏益懋基圖大同夷夏然人情解緩不生于艱棘之初而治道因循常起于宴安之後山霤穿石蟻穴潰堤實平世之所難防唯眀主乃能察此所以三苖格舜伯益嘗戒于無虞西旅賔周召保猶期于慎德忽兹不務非臣所知願于既安且治之初納此至愚甚陋之説此生已瞑迄無補于明時厚德難忘徒有期于再世代龜山先生楊侍郎遺表生必有終未究捐軀之報死無可戀尚餘憂國之忠輒布盡言仰瀆髙聽伏念臣奮迹寒苦涉世竒囏身已老而志始伸時可為而力不逮上皇採其虛譽驟置講筵淵聖謂為朴忠超除諌省乃緣多病亟請就間方大駕之親巡思舊人而共政召從祠館擢二冬卿恩榮併及于衰殘筋力益難于強勉遽求解職庶免曠官繼陳謝事之章始遂歸田之懇一離行闕八易周星魚鳥相親雖獲首丘之願豺狼橫騖寧忘向日之誠殺身已負于初心泥古更尋于舊學竊謂淫辭之尚熾蓋由正道之不眀欲袪百世之疑當辨諸儒之失簡編垂就老疾益侵屬暮景之將沈豈頺波之可復前功已廢空貽覆醬之譏厚德難酬徒有獻芹之意姑留殘喘少畢愚衷伏願皇帝陛下推堯舜孝弟之誠心遵祖宗勤儉之至德事惟師古法必用中諦觀世變之推移已驗人情之向背公忠是任奚朋黨之足疑欺誕必誅豈讒邪之敢肆至于境土之未復與夫夷狄之尚驕非無百戰之威當計萬全之利蓋功求成者常病于欲速而慮既善者尤戒于失時此自昔成敗之機乃今日進退之決仰惟聖鑒俯察微誠尚憐忍死之無他肻信遺言之有補幽塗頓逺此生永隔于望雲餘習未忘後效猶期于結草謝宫祠表歷試無堪已招尤于公議得間為幸猶竊食于真祠過大恩寬感深涕隕中謝臣山林棄物蓬蓽寒儒早從師友之磨礲粗識聖賢之奧穾以兹自信無復他求雖畎畝愛君嘗講致身之義然蠻夷猾夏本無適用之才偶緣盛世之旁搜獲預一時之嚴召驟加湔洗浸被馳驅諫垣不次之遷既蒙寵任經幄非常之選亦荷優除忠嘉無聞怨咎徒積迹其叨冒寧免擊排正賴矜憐秖從罷免方切飢寒之慮復霑餼廩之優深惟速進之易顛尚幸小懲之致福此蓋伏遇皇帝陛下聰眀睿智恭儉慈仁收威福于指顧之間英豪畢集眀是非于升黜之際黨與潛消罄海內以歸心宜虜酋之喪膽大勳方集亘古所難而臣抱疾經年圖報無所逺想功名之會每懷尸素之羞此生巳迫于桑榆敢忘初志朽質未先于犬馬空有餘忠但憑香火之勤莫贊乾坤之德再謝宫祠表應誅而釋久逃寬典之公以老得間更冒真祠之寵眷憐未替感戴難名中謝臣坎壈孤蹤摧頺暮境忠不足以自達而當諌垣越分之遷學不足以有眀而任經幄非常之選因招怨怒迄致顛擠去國頻年始慮飢寒之見迫資身無䇿重蒙紅腐之均霑無地效勞拜恩知幸兹蓋伏遇皇帝陛下際天覆燾並日照臨奄九有以宅師邇遐靡間奉三無而馭下邪正自分尚記衰殘曲加矜恤此生已老猶餘報德之心後效無期敢怠捐軀之誓代宰相辭免兼修國史表載筆之重擇才為難儻非得人何以行逺蓋自元祐而降宣和以前當國家內外無事之時承禮樂制作大備之後典章損益或緣好惡之私簡册流傳積有異同之論于今為患厥後何觀方將補綴遺亡是正訛謬發前代光明之緒極一時筆削之功如臣瑣材敢承斯責況此囏難之際獨當委任之専討論雖藉于諸儒去取實關于偏見愛既深而智困才將盡而力窮豈敢辭勞固難勉力伏望聖慈察臣誠懇改命能臣儻亟見于新書亦何據于舊例代宰相謝除兼修國史表燮調元化本非經濟之才潤色王猷更冒纂修之寵屬申舊例簡在眷慈辭不獲從愧無以喻中謝臣聞自昔二帝三王之事皆見于書當時列國諸侯之微亦各有史故春秋褒貶乃典謨之餘意而太史紀傳有筆削之遺風雖是非未必盡同然善惡終不可掩前修己邈成法具存茍非其人孰堪兹事如臣甚陋遭世多虞方憂機務之繁復有文辭之責網羅遺逸豈無意于鋪張領袖諸儒徒有慚于去取亦其志也非曰能之此蓋伏遇皇帝陛下肩堯聰眀躬舜孝友念纍朝之大典將就新編付直筆于近司益重其選臣惟天地造化固難形容乃若日月往來亦可推步彼不自揆各徇其情未忘牛李之私過為歆向之論此而不察後必難明願鑒已然精加核實事將詞稱敢同左氏之誣言與意微庶洗馬遷之謗尚期訖事獲薦成書劄子十二月上殿劄子臣聞古人有言曰為治者不在多言顧力行如何耳夫言而不能行自古所病譬之欲之燕者北首而趨不舍朝夕雖有遲速終必至燕若坐而説燕亦何能至此傅説所以言行之惟艱而孔子所以貴夫躬行也雖然知之者不如好之者好之者不如樂之者好而樂之所以行也而必先于知之則知其可已乎蓋不知而必行譬之適燕而南轅縱復疾馳心幽并而足吳越必不至矣臣觀墨子之道取茆茨土階之儉悅手胼足胝之勤摩頂放踵利天下為之則其所行宜若于儒者無異矣然孟子闢之以為兼愛無父作于其心害于其事作于其事害于其政不可以訓是豈儒者之所為乎故是堯舜而非桀紂儒墨之所同乃若堯舜之所以為堯舜墨固有所未知也未知堯舜而託于堯舜以行其私意此孟子所以正名其為邪説而闢之與由是言之行之雖囏而知之亦未易也自王氏之學達于天下其徒尊之與孔子等動之以卓詭之行而矜之以華麗之文如以錦繡蒙覆陷阱悅而從之鮮不墜者行之六十餘年其禍已見今可以改矣而人之所知初無以異于昔也方此之時欲使天下學者背邪以歸正棄舊以圖新非反其所知以知聖人其能一變而至于道乎孟子曰學則三代共之皆所以眀人倫也又曰聖人人倫之至也又曰堯舜之道孝弟而已矣夫學所以眀人倫而人倫之至不越孝弟此固王氏以為淺近而不足知者而不知同天人通我物合內外之道有在于是是之不知其何以行之哉今陛下躬堯舜之孝弟行之既久至誠感神而夷狄自格其效己著豈非有以深知之耶然陛下既知而行之亦當使天下皆知之知而行之者衆則吾道不期而已至矣前年之詔諭天下學者當以孔孟為師是固然矣然王氏之説未即禁止朝野紛然莫知所適謂宜眀示好惡一切罷黜使學者膠口不敢復道庶幾各舍其故而天下之真知出矣臣不勝區區之心惟陛下裁察臣伏見比年以來以宗室為添差場務官而使之釐務其為不可明矣而所在舊額監官外或加一二人已不勝其弊而其多有至于三四人者此非祖宗不刋之制也豈可不革且如州縣稅務歲課自有租額虧則有罰增則有賞任其事者惟不願增然所增之課已極而所取之數亦有定例初不以官少而加損亦不以官多而加益也而居是職者供須之物使令之人不從官給一切出于務中圓融異時官止一員稍或貪鄙已足厲民況額外復有添員乎又況所添至于三四乎十羊九牧秖益為纍而內則轉相倣效公肆侵欺外則挾官擾民僅同攘奪州縣莫敢禁止商旅為之阻絶校其所得今不異昔此臣所謂不可不革者也事極于此非痛與裁處必不能盡去前弊臣願自今場務官不復添差宗室使之釐務雖有例陳乞亦不當許所有見任及已差下者欲並改為不釐務官後來參部者或不願待闕皆以宫廟處之仍于州縣寄居所在限以員數如見行法不奪其祿使之足以自養不任其事使之得以寡過則親親之恩盡矣如臣言可採伏望睿旨早賜改正施行臣聞商旅不行則有無不能以相資有無不能以相資則物之有餘者常病于無用而物之不足者常患乎難得民始有受其弊者矣故舜之懋遷有無周之阜通貨賄不厄商旅乃所以利民而救其弊也自賤夫罔利始有征商之法蓋惡夫茍得無厭將使人人棄本而逐末欲以是抑之耳及至後世算及舟車此何道也而自漢以來未之有改豈非國用待之而後裕耶由是言之古之征商抑其貪所以利民今之征商取其贏所以利國夫利國而不及民已非先王之意況其所征有甚于異日乎臣觀國家見行條法凡課利場務視元額多寡趂辦不及者罰之若增之過倍即有減年之賞應賞而有餘者十分之一以給官吏凡所以籠絡而督責之亦可謂盡其術矣而任其事者往往猶以為未足則商旅安得而不困乎故比年以來物價騰踊日甚一日貧民下户尤為不易皆由征商太重之所致也臣不敢悉以所聞為言姑及近地之可見者只如是衢州至臨安水陸之所經由應稅者凡七處使其每處止于三十而稅一不為多矣比及臨安于其所販已加二分之費而負載糧食之用又不在是是非得三分之息不可為也借使善斡其能于十日之間數百里之內致三分之息乎必不能矣如是則所聚之處誠不可以賤售所聚之處既貴則所出之處益不可以賤得此商旅所以不通百貨之直所以久而不能平也雖然此特常用之物而其害已如此至于用之所急一有不通其害尤甚如今歲旱乾蘇湖雖不至大歉而衢信所收十無五六若蘇湖之米不移則衢信上下來年必至乏食此又人所甚急者如不早為之慮待其流離旋行賑恤亦恐無及故米麥之稅臣願權與除免使商旅轉販得以私相接濟久之價平則人人可與備預不至重貽宵旰之憂矣此聖主所以留意不可緩者自餘可稅之物縱未能盡如祖宗之舊亦當眀諭有司視其所販之直惟務蠲減不求甚增宜足以救目前物貴之弊也萬一臣之愚慮偶合聖心欲乞先下兩浙遍及諸路災傷去處並令依此施行臣不勝過計之至惟陛下財擇論放稅劄子臣聞君者出令者也臣者行君之令而致之民者也此古今不易之道也茍出乎上者已審而行乎下者無稽違廢慢之失則上之德意志慮無不孚于民而民咸被其澤矣往者宣和之間權臣用事播告之外自有風旨為吏者從其風旨而不從其言罪弗及也以故一時號令不信于天下雖寬恤之詔季一舉行挂之墻壁徒為文具而已上意益勤民情愈怨愁嘆之氣熏穹纒壤無所赴告遂為今日難解之禍蓋吏不能行令之過也陛下即位以來深鑒其弊茍有方命必罰無赦內外小大之臣宜其精白一心以承休德無敢不恭而貪殘之吏尚仍舊習有纍聖政臣竊憤之今年春建冦既平陛下加惠一方宥過無大所以洗滌瑕疵蠲除逋負安集奔竄無不曲盡德至渥也令下未幾已聞州縣之間百端沮抑莫肻奉承論者以為患陛下既已眀示威福而申告之矣今又聞赦文以上四州軍殘破為甚全故今年二稅下四州軍不免騷擾止取其半而吏引著令諸稱赦放者不得過三分盡追其餘以備急闕是以一定之典而輕議非常之恩以厚誣之計而力沮已行之命遂使陛下愛民之詔幾成虛發此而不懲無以示信且舊書所載或以故例或緣泛恩所指無定處所釋無限量今以兵火之後傷殘凋瘵之餘曲示寬典固不同矣又況喪亂以來民不堪命常賦所入十才得四五止取其半猶慮惠不及民況十取其七乎自甌粵之亂陛下為之宵衣旰食者二年于此至遣執政大臣國之良將親往平之然後復安既安之後所賴以撫綏吾民者唯監司守令而已而行法如此陛下何望焉若其事出于監司密諭而守令奉之與夫守令率意擅行而監司勿問皆不能無罪也臣愚願先降眀詔諭以前日之誠意立行改正然後核監司守令稽違廢慢之實嚴賜黜責自今以往庶幾貪殘之吏不敢舞文以為姦倚法以僥幸臣不勝區區之心唯陛下財察奏狀論莫將除徽猷閣待制奏狀右臣伏覩十一月十一日奉聖旨莫將奉使宣力特除徽猷閣待制京畿都轉運使兼主管奉迎梓宫一行事務臣聞祖宗朝慎重名器未嘗輕以假人至于次對之官尤所吝惜惟德是命不以賞功異時有嘗為侍從帶權字者雖復積年或遷外任猶不以是豫之則下于侍從之列從可知矣自崇觀以來蔡京用事專于私恩敢違舊制凡被此選者非京之親則其黨與也至今人無賢愚皆知其非方陛下中興之初舉偏救弊大振頽綱如此等事豈宜不改臣謹按莫將昨自司農卿出將使命曽未纍月遽有此除近例所無實駭觀聽臣初與將不相識但聞外議籍籍皆以將為乘時射利之徒未必有守陛下灼見其才足以倚辦斷而用之正須假以歲月俟其績效稍著粗厭人望然後以次命之似或未晚況聖主用人顧眄所及人自知德豈特美遷方肻盡力若使事有前比固非令猷如其不然庸可以一將之故遂廢萬世可行之法哉臣職在言路創見此舉事干政體不敢緘默伏望聖慈特寢已行之命以允公議或不得已于近下職名中處之不獨使朝廷恩賞有名亦使將輩知美官難得安于分守以待任使不至過有僥幸臣不勝區區之忠惟陛下裁察謹録奏聞伏候敕旨右臣今月十五日具奏言莫將以奉使宣力除徽猷閣待制不當乞于近下職名處將未蒙施行臣之所論未敢遽已臣聞人主用人其情出于喜怒之初而其事見于豫奪之後喜而未豫人猶以為榮怒而未奪人猶以為懼蓋榮之者榮其方來未已之恩懼之者懼其後日必至之患今陛下棄法而用將拔擢之意人皆知之雖復改命而用將之意猶在也將其有不知耶故疏恩以示情吝豫以應法稍就近下職名處之無損于將又合公論可謂兩得之矣臣章未降外議沸騰臣縱欲緘默不言以固初寵亦何以上副陛下廣開言路之意哉臣惟往者尹焞亦自卿聮命以次對之職蓋由焞先除從班續以疾辭至于十數朝廷惜其老不可留以此寵之所以命有德也于將何有焉將固非焞之比借使其才可用亦須俟其有功然後加以此名庶厭人望自古才有餘而德不足者飢則為用飽則揚去先為之極何以使人陛下必以奉迎梓宫使之應辦欲重其事與之以其所宜得者不復盡奪已為過于厚矣將復何求臣所惜者非分之恩所畏者衆多之口事干政體豈可雷同伏望聖慈念臣職事之所當言察臣忠朴之所宜守必賜俞允以示聽從臣不勝俯伏待命之至謹録奏聞伏候敕旨論宰執不和奏狀右臣近聞宰相秦檜與參知政事李光因御前奏對互有異同不知所爭何事而外議紛紛以為大臣不和有纍國體臣身在闕門之外得之傳聞恐非其實以此纍日未敢論列今又聞檜以疾在告光亦乞去則是大臣果有不和之迹矣臣職在諌省豈可不言臣聞舜命九官濟濟相遜和之至也衆賢和于朝則萬物和于野故簫韶九成而鳯凰來儀擊石拊石而百獸率舞夫功成作樂寫人心之和而已樂作而物應其理固然然所以感之則出于人心而非樂也子思子曰喜怒哀樂之未發謂之中發而皆中節謂之和致中和天地位焉萬物育焉夫中者和之隱于心而和者中之見于外者也此內外之符也通天下一氣耳動于此應于彼間不容髮矣致之有道則天下安得而不位萬物安得而不育兹其所以為舜之時乎且中無常位以偏而後見中足以召和而偏亦足以生乖和氣致祥乖氣致異各以類應而國之安危繫之蓋自古及今未有朝廷不和而能有為于天下者也今陛下躬行孝弟而逺人請盟不以兵車而疆土自復臣雖愚懵亦知其所自矣而朝廷之上一二大臣陛下所與同心協謀以終中興之功者方且各持偏見不能共和以濟國事臣未見其可也且光與檜爭其事之大小緩急臣固不得而知之也然事小而緩亦當退而合議進而聽旨都俞之間一言可喻何至廟堂之上聲色俱厲取笑四方乎昔光為小官已能力抗朱沖及陽朔之貶一時稱之逮守宣城譽望尤著然其性素剛不能下人屢進屢退皆緣難合而檜亦喜其為人引與共事光又謂檜臨難嘗有不奪之節欣然肻來惟上所用亦既踰年矣今者不顧往日之契而驟起異同之論事之輕重有不及慮而分之上下有不暇恤則其意必有在矣況非一朝夕之積也必欲其再合宜非他人所得與者在陛下訓諭之如何耳若復丁寧告戒以今日之所當務者使之忘私以徇公宜若可合而猶或不能無芥蒂于胸中則其不能相與久處也可見矣縱復可以久處其不能降氣以相從協力以濟務又可見矣夫事有是非理有曲直非獨二人者自知之陛下固已深知之矣大臣去就固自有義進退之際惟明主裁之謹録奏聞伏候敕旨論鄭億年除資政奏狀右臣伏覩正月二十八日指揮鄭億年復資政殿學士依舊提舉醴泉觀行在居住仍奉朝請臣聞賞罰者國之紀綱也聖人用之有萬世之公有一時之權萬世之公可常而不可變一時之權可暫而不可久故能賞當其功罰當其罪而國之紀綱立矣今者忘萬世之功而任一時之權用賊豫之所以悅億年者以寵億年將使為善者不勸而為惡者不懼無益于紀綱而有害中興之政臣固不得不論也臣謹案億年故相居中之子雖嘗為從官無他技能而有從賊之醜夫陷于賊固非人之所欲然從之而得美官必有取非其道者因赦而復之是以賊豫之所悅而與之者為正也其可乎且去歲大霈所謂權也凡有官者不奪亦所以安反側耳而又有褒而遷之者以其不辱僭叛其義不可掩也又有遷而用之者以其眀習將略其才不可廢也億年名在侍從之列其可自同于反側者乎其義果可褒而其才果可用乎此不待臣言也然則用權以廢公非所以待億年亦眀矣而其所以可恕者宰輔之世身為從官不幸而陷于賊為不足誅耳然居中之秉政無狀天下所共知者億年寅緣以取兩制使無他過以至今日猶在討論追削之域而況于已嘗從賊不奪舊官而加之以職名乎夫以從官所宜得之職名在億年尚不宜豫則執政所宜得之職名億年其可與乎且資政隆名賊豫之所竊而與之者也固不可以言復矣陛下必以復為言者則已著其從賊之罪矣使億年粗有知識必不敢受強而授之則彼以義而獲褒如凌唐佐李亘之黨必曰億年以仕賊亦褒矣吾屬何榮彼以才而見用如李顯忠趙彬之輩必曰億年以負國亦用矣吾屬何安由是而推之必又謂嘗為賊豫將相者他日來歸未必不以將相處之也此聲一傳誰不解體是以一時之權寵一億年初無所補徒使為善者不勸為惡者不懼自壞賞罰之紀綱而更為今日中興之纍也此而不改民將失望後必難悔矣伏望斷自聖心將億年所帶職名特賜追寢使之在外居住庶幾逺去班列少息紛紛之論臣不勝幸甚謹録奏聞伏候敕旨代江西帥李丞相薦蕭茂德奏狀臣伏覩臨江軍進士蕭建功介特自守而勇于為義親仁好善而無所茍合居于峽江之上人無賢愚皆欽而愛之幼喪父事母至孝杜門養志不汲汲于進取方盜賊並興所過焚蕩唯建功所居之廬獨得不燬人以是推其賢故贈諌議大夫陳瓘以論蔡京姦惡得罪竄嶺表纍年既還而其子正彚復以言事投海島流離困餓無所于歸天下皆知其忠而不敢顧恤其家建功獨往師焉瓘竒之遂妻以正彚之女其為賢者所愛重如此又故贈寶文閣待制李朴紹聖間因議隆祐太后之賢為小人誣告久坐廢黜晚得令臨江軍之清江縣既罷官貧不能歸建功築室延之朝夕執經問難唯恐其去故二人之學建功得之為多至其洞曉物情練習世務又自有過人者方朝廷急于得才共知中興如建功輩豈可終棄謹因臨江軍之請益以臣之所聞仰溷天聰乞賜收録庶使山林修潔退藏之士仰體朝廷招徠之意不忍韜晦競為世用臣不勝區區之願默堂先生文集卷第十二
