  text: 黙堂先生文集卷第十七
  hash: sha256:7c54dc282fb682d6fe95823b7d3c5939942d9cb7b2f4611bba9ce8949a82fe7e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_017-1a}
body:
  text: 書與胡康侯侍讀秋暑方熾伏惟台侯動止萬福淵前月十八日以久不奉問起居遂遣家僕上狀今必塵清聴矣方兹俟報忽拜六月初間誨翰伏審邇來尊體益健極慰瞻仰召命嚴峻既巳弗藥便可趣装上副明主虚懐久待之意矣佇聞柄任海内所同未叅侍間伏乞為道倍萬調䕶謹奉狀不宣淵前月下旬伏䝉省劄備坐宫使侍讀薦淵應直言極諌科奉聖㫖依已降指揮令具詞業繳進竊惟制舉之設自漢及唐沿襲不廢盖皆以待非常之才至本朝尤重其選自非精通經史百氏之書深明古今治亂之變達於世務而文采又足以發之不以應詔如淵學術荒淺議論踈濶而又年衰多病文思僻澀一無足取俾充兹選公議謂何故自聞命以來雖復自幸不敢以爲榮也況淵實無所有尤善累人往者當路或憐其竆漫加剪拂便遭廢逐今兹積垢未洗縦復不能晦跡逺遁豈可更以彈擊之餘上玷左右知人之鑒三復重言但増戰慄唯公名徳之重天下歸向咳唾所及駑蹇増價誰不願出門下必有真賢實能仰副搜拔如淵不肖徒知感激而已已具詞免狀申省謹布肺腑尚冀孚察亦不敢具公啓上謝併幸原恕淵區區之意已具前書不復縷縷上凂台聴誌中不可加損之喻已悉尊㫖然字説雖不行於世病根猶未盡除如間日之瘧寒熱才退便若無事萬一其證尚在尤宜急攻要須見不復發乃可去藥耳元祐紹聖之事可以觀矣誠恐後之視今亦無以異扵今之視昔也明道先生云但得道在勿問今與後已與人此言甚大公既無疑矣了齋云身短而事長難與急者論實中不肖之病然未能不以為憂也徒有愧扵諄諄之誨耳伏冀深察之龜山論語及易義盡扵所送去者承復索其餘更待問諸楊恐必無也何由承教臨風徒切傾渇淵再拜專人至伏䝉書誨方渴仰中獲聞春夏之交尊體益康健豈勝慰釋自前月見邸報已聞給事被召中外交慶況如淵者其喜可知而來教畧不及當是路遠朝報未到耳如近人朝廷用人頗復求舊諸公咸集以俟長者之至當不復辭矣衰晩扵世無求但與天下蒼生跂踵以承膏澤又不知果扵何日起程萬一未迴鄉里間得欵遂一見莫大之幸也伏紙懐想言不盡意春秋傳久欲受教以相去差逺不敢面請今兹辱頒惠仰荷不棄豈勝誠感所恨未見全帙又不能無望也伊川先生曰春秋聖人之用也學聖人而見其用無餘藴矣畧窺一二驗之扵心推之扵事皆可施行深切著明如見聖人筆削而躳授之計自秦漢以來雖如董生研究恐未覩此秘也行年六十餘矣獲見斯文豈不知幸淵已請扵丞相再候乞宫祠有報若許不許皆令暫歸計所報當在端節前後逺不出後月半間春秋傳猶有二十巻乞及期附來至懇至懇定夫所撰思復行狀顯道墓志與龜山所撰定夫墓志皆無本但記得思復墓志盡載行狀之詞唯結處論世儒之失即龜山之文也諫臣所論罪在無知盖不足辯經筵一二公尚放得下閒人又可彊觧事耶承喻愧恐愧恐尚書省及免役事初不詳聞易傳親傳者别無本今納去看畢示下幸甚幸甚龜山文集已編成六十巻得諸楊書云爾伏恐尊悉淵再拜承諭春秋傳已脱藁當已繕寫奏御矣無由一見全帙想望凾丈恨無羽翼耳淵不肖雖不足仰窺作者之意然亦嘗竊聞一二矣至如論齊晉之事重道義而輕功利此自孟子以後儒者所未嘗及脱或及之莫能純一故王霸儒墨混為一區而伊吕管晏擬非其倫矣是無他知之不明講之不精故也左右傳道扵已絶復續之餘所見既的所守甚嚴而文字之妙又足以絢發之則其作聖賢扵千載豈在他人乎前所賛嘆不為過矣所恨衰晚未能千里負笈面承緒論若傳本已多其藁無用䝉借錄俾聰明未衰之間得以玩習他日復見公林下誾誾侃侃亦足以奉承餘誨矣不審肻賜矜許否答胡寧和仲郎中昨奉書久無來報意多事不暇遣人遂發家僕馳問方此懸望忽辱專介惠書獲聞邇來侍奉多福喜慰可知也尊丈召除大慰海内之望前書已具賀伏䝉誨諭益荷眷予之厚耆徳彚征天下之福然來教以老者為言非賤冗衰退之人所當覬望也朝夕引去終嶽祠之任即不復就祿矣末由晤見千萬為親愛重謹奉狀不宣䝉論及淵明事若以人物言之如雲漢在天可仰而不可及但學者是是非非又不可茍夫正人之是非乃所以正已也豈可以輕議為嫌前書謂陶公何譏焉者盖謂秦漢以來道義不明諸子百家各懐私見故雖如陶公之賢亦未嘗子細觀誠有見焉非妄説也若以為雅意素有所主即棄官為是如此則晨門荷蓧長沮桀溺之流不經聖人指㸃誰敢以為非乎揚子雲云古者髙餓顯下祿隱不知何所據而言恐只是失身扵天祿而不能去恐或議之聊以自湔耳伯夷栁下惠孔子皆以為賢孟子亦曰其趨一也何髙下之辨乎故論其髙淵明乃千載之士論其是古人軌轍較然亦可見也龜山婺州之任未嘗從辟盖方是時饑餓不能出門户帥司以攝闕員耳仕固有為貧者未易疵也但尊丈既以栁下惠許之不當更引淵明例耳不就二字已悉雅意墓志第二本已送去將樂矣請知之久以病在告不曽見丞相前此甚望春秋傳來計得之喜甚旦夕叩問之金紫辭不下乞宫祠又未許不知今嵗得去否淵䝉侍讀以大科相薦自顧何人敢當此舉想出扵諸友賛揚之力愧荷愧荷或云侍讀意不在科目徒欲因此振發衰懦耳果爾尤不可也淵行年六十餘日覺昏憊縦使向前亦何所補深恐緣是益重其過更為長者之累雖所幸也其能安乎近有問淵尊丈何以相知遂形論薦淵答以此翁必是見不肖與張柬之公孫生年齒相上下故以其似而薦之不知淵學問名節與此兩公大懸遠也問者遂大笑因侍次幸道之又論龜山墓志中事差市易務事始末龜山宣和四年既罷祠官貧甚不果赴部郭慎求在朝以書問所欲公年已七十矣嵗在壬寅巳年七十折癸巳生至宣和四年答以老不能辦事唯求一筦庫為貧耳慎求得書詢吏部見闕監當官近毗陵未差者吏部報以常州市易務即為求得之馳以告公慎求初亦不知前一日為人所授公聞之曰非見闕固扵吾事無濟然市易事吾素不以為然縦便得祿其可就乎盖慎求不察吾意耳至五年秋末果退闕因傅國華之薦召赴都堂審察即以足疾辭不赴六年國華又以前請未行再薦遂以秘書郎召對且御筆詔若辭者坐罪乃不克免先是傅國華奉使三韓得㫖許扵經由三路凡人才可薦者薦之不限以員及歸具奏臣往來京西淮淛人才可薦者甚多然抱道處晦無如楊某者願以所得薦三路人才薦此一人上亦聞公名故始召審察又召上殿云若謂監市易務不就除秘書郎即就即非同時事失其實矣今削去不就二字為當更恐欲見其實故具之然如市易務方待闕未上雖不見扵墓志亦可也攻王氏一章行狀不載墓志載之公嘗為某言自佛入中國聰明辯智之士多為其所惑鮮不從者唯韓退之歐陽文忠立得定然佛之徒未必誠服其説其餘能文章好議論者扵佛之道實未必知而恥扵不知往往樂其誕而自小更入其黨無足議者如王荆公晚年深取其言自謂己知之而知有不盡此非同乎流俗也盖其扵儒者之道未嘗深造故溺焉而不自悟耳是以為世大害自元祐以來世之賢者多攻之而亦多不得其要領某扵明道先生哀詞中論世儒之學云物我異辨天人殊觀中庸髙明之學析而為二而道因以不行矣雖王氏復生不能以口舌觧也其道不然也如此其見之行事顛倒悖謬盖不可以一二舉所謂從許子之道相率而為偽者也惡能治國家故淵嘗竊謂龜山諫省所論王氏一章正名其為邪説是矣然則其流弊足以亂天下為言猶是一時之論至扵拔本塞源當與待後之賢者相與推明其意如孟子之辯楊墨然後能成龜山之終也墓志所載雖用全篇亦持其端而已又可畧乎三經義辨止載朱公有益學者之詞龜山與給事書云荆公黜王爵罷配享嘗謂其所論多邪説取怨於其徒此三經義辨所不得巳也如日錄字説亦有少論著然此事不可易為之云云又龜山既從蕭子荘之請為作浦城學殿記言王氏立言之謬又答其書云向在諫垣嘗論王氏之失太學諸生安於所習鬨然羣起而非之頼君相之明卒從其言今雖有定論而學者真知其非者或寡矣屏居投閒因摭三經義有害扵理處是正之以示後學云云以此兩書之詞觀之則三經義辨用之於王氏豈無意乎又豈止為觧釋文義之不當遂欲求勝乎誠以道術所在萬世所待以開明者不可闕耳今墓志所書止引朱子發奏疏云所著三經義辨有益學者某之愚見更欲少賜提掇之庶㡬不與末篇所謂凡訓釋論撰同為空言也如何如何淵啓令弟又荷錄示疑問至感至感果何求哉心則逺矣此兩句極幽遠有味連上文讀至此語若不足意已獨至盖不必稽之陶公而後得龜山之為人也陶公扵此功名富貴誠不足以累其心然於道其㡬矣扵義則未也豈可與行義以達其道者同日語哉孟子論伊尹之取與既以謂合扵道又以謂合扵義其論養氣既以謂配道又以謂配義此理恐陶公所未講也何則仕為令尹乃曰徒為五斗米而已一束帶見督郵便棄官而歸其去就果何義乎孔子之言易曰和順扵道德而理扵義體用不分而動静一如矣自聖學不傳學者各任其意則有舎義而言道者佛之徒是也陶公何譏焉恐不可以龜山為比如後來再問心逺所對數條鄙意以謂以語陶公猶未到他履踐處況扵龜山此盖老人恐學者不悟其語故為是委曲辨析之詞未敢聞命繫辭曰以言乎遠則不禦夫豈有畔岸哉嘗試以是觀之恐是老人初意更告為問過也鄒陳以師禮事龜山胡公實傳其學此居仁作行狀失於審詳之故銘序中不及淵知其意矣如以宣和御筆為當時海行指揮可謂斬釘截鐵之論春秋筆削豈復有假借乎欽服欽服代龜山與南劍張守比辰霜寒伏惟鎮撫多暇尊候動止萬福某衰晚里居幸依餘庇得以茍安無足道者少意上聞今日見廵尉云縣中被符起發弓兵百五十人隨吴成忠入郡防托而邑令憚扵申明即日移文巡尉遣行此事係一邑利害某雖閒人不敢隠黙盖將樂經殘破之後居民近稍有歸者今嵗收成十不及二三人雖畏禍而饑凍迫之其勢不能保其必不為亂比緣制置司召汀州民兵經由此地公肆刼勍甚者至盡取其家貲殺其人焚其廬上下驚擾無處竄避尋常所恃唯甲户槍手緩急可倚又以先次盡數揀發所頼唯巡尉少尉弓兵隂與彈壓庶㡬不逞之徒未遽猖獗而一邑善良恃以偷生今若上稟嚴㫖悉令赴郡郡中得此未必有補而蕭然新破之邑大為闕事矣欲望矜察特免起發豈勝幸甚此不獨區區自全之計實一邑之幸也建安之寇不知任都統者如何處置雖禽獲可卜然自順昌將樂一帶賊所出入並無遮障萬一假道順昌奔衝將樂未審何以禦之前此一派直趨沙縣入尤溪如蹈無人之境為此處獨闕隄防耳因見任團練更與議之也便中草草言不能盡惟祝為民自厚答廖用中侍郎秋暑方熾伏惟鎮撫多暇台候動止萬福淵自去年劍浦違别左右至今不䝉存問方兹懐仰忽奉賜誨喜慰可知也頗聞漳南自艱難以來風物與昔無異民淳事簡賦役易辦此道已行上下相安尤觧滯念不肖累乞歸而帥座不許暮年索居凡事不便又近嵗稍葺先疇庶㡬退處無求而飽緣是一出前功盡廢兒軰又失學懐抱可知盖非獨以無補欲辭衍祿也丞相在南昌化弱為强易貧為富威令既行坐以無事正是衰晚偷閒竊幸去取豈不自幸然所樂不存亦自無如竆命何耳盖自去冬至今夏月月請去謂欲周旋人情不免流滯稍涼當必行其志也恐公要知曲折故此縷縷伏乞為道保重上副眷倚下慰人望不宣與梁兼濟提刑比到郡承周守示及德久與龜山及左右兩書尋具咨目欲附歐承去便奉納而歐承遽行不告遂并留少賈處未發間忽家中送到正月所答手誨眷意殷厚慰勉周至大釋久仰之懐幸甚幸甚别紙論及不呼徳字為非是且以見責尤荷不鄙顧不肖何者敢當此意淵昨侍了齋見龜山與之書中間語及伯思光祖皆以字獨李徳駿稱其官了齋謂徳駿事師甚勤未有可絶之罪理宜稱字書辭反復至數百言盖春秋書邾儀父字也而傳以為貴之之稱然則自上而稱其下以字誠可貴者此了齋所以辨而不置也又淵紹聖間嘗在京師是時了齋官博士黄冕仲為禮部貳卿二人實平主之友而了齋登科先於冕仲書問之間雖各以字呼不為過而了齋以冕仲既作侍從止稱其官盖尊之也由是言之自上以字而稱其下為可貴若為下者以字而稱其上則㡬扵僭矣故凡尋常庸流之人語先逹貴仕必以官不如是者謂之不遜今淵齒雖長扵同軰而學問不進德日益衰其所知所能俱落人後比之尋常庸流之人相去不能以寸其敢挾長以自取不遜之譏乎故前此稱公以官而不以字者非敢為謟也避僭而已耳此亦了齋之遺教也雖然公之義亦髙矣身為部使者且嘗參丞相幕府之畫衆所仰戴而乃過自謙抑俯伸鄉曲之敬下同扵寒賤廢棄之人非忘其勢位自克以禮者能若是乎使不肖堅守前是不復改易則公之謙抑不彰扵朋友之間而淵始得罪矣恭承雅喻敢不欽從自今謹以親戚之契知交之舊佩服來訓不敢失墜或以問焉則以公之意告之庶免扵戾也姑布其情仰謝萬一不宣李徳駿以唐縣令拒賊死扵兵其家屬幸賊未至先奔京師已而南歸屢為羣盜追及囊槖罄盡所存者唯妻與子五人餘皆被害今其妻又亡諸幼寄食扵外家其猶子鋏素隨徳駿學後不利扵為儒以武得官德駿家事頼此一子緩急實得其力見任黄州監稅官滿代者至矣忽為淮西漕李公所劾李馭吏甚嚴凡事必核實已追鋏赴蘄州獄豈能無罪然其家距勘所二千餘里並無彊幹子弟在彼照管妻孥即日已見狼狽實可矜憫左右離淮西未久所在必有相識或因以書往還乞為問之欲知其實以報建安幸賜留念萬一有罪固無如之何或使者以是警之亦未可知使其老母得此消息猶可安心也得一實信活兩家之命又使死難之士其後不至填委溝壑此仁人君子所宜動心也長沙控制上流在本朝為重鎮異時内外無事亦必擇賢有才而譽望素著可以服人者為之帥不敢輕授況今艱難之際尤宜遴選舉以付公孰曰不宜此有識之士所以交相慶賀而親戚朋遊之間所以喜而不寐也地逺不得面慶又以無便久稽馳問先辱恵誨何勝愧感謹因布復畧致欣躍之誠伏幸照察兼濟平生有意功名未得展盡素藴今遇聖主深知特隆委任真足以有為矣幸毋避嫌也竊惟事君之道茍得行其志願不以遠近為異湖湘雖邈在南服而地大物衆國家安危所繫儻賢者不鄙其民而繼以無倦何後效之難圖耶願公勉之異撃壤田野得以盡年亦頼餘潤所及也真􅈤真􅈤柘臯之捷真可慶者盖朝廷不得已而後用兵故報效之速如此自此中原可據而祖宗之基業可復矣天下幸甚天下幸甚淵雖罪廢聞此勝事其喜與得志而行道者無異況公出帥一方安危所繫欣快宜如何耶淵去秋輙作得茅舎數間今已遷入但初不自料所費之多故春夏以來貧困良甚或謂當請祠官近已令人詣行朝投劄恐未必得耳若朝廷不與又不復見罪仍舊杜門亦幸事也用中春間得一相見降官殊不以為意子猷侍親安健養䝉亦無恙日夕得從㳺竄迹之幸適李興祖來自言與左右有半面之契堅要一詣湖南奉謁故得奉此書㑹郎中多事作字草草勿罪幸甚興祖乃叔平提舉之子扵光祖為弟光祖之賢與其家世子孫之詳公既知之審矣興祖舊所得業數年来畧盡往往為飢凍所迫此行盖不得已又今嵗女當嫁子當赴省試無從所出果可埀手否其竆急遠去不自斟量幸勿深訝也不奉起居之問累月忽將樂寄到七月間所賜教獲聞坐鎮大藩逺近畏服啓處増勝眷集各䝉休祉大慰懐仰湖湘雖逺境倚注之重足以攄發素藴宜亦樂之苐恐政績普聞行歸禁近不得久扵彼耳尚阻承教臨風可勝悵惘來誨委曲周盡足見謙予之意感荷無已朝廷今嵗革積弊出人意表憂國之士初以為慮已而帖然無事乃知廟謨固自有道也淵得祠官少解目前之窘荷恩從欲唯知感戴聚口日衆向者糟厰無處今又有茅舎可居行年六十有餘若復更念飢寒懐抱何時得蹔寛耶承問漫及之李興祖不量果成逺適初為所煎迫因以數字上浼且報前書而公以不肖之故鐫俸贈之如是足矣猶復自謂不滿令人愧悚無已乗便草此併以為謝郷人葉超然者要往明仲處道過長沙因得奉此葉昨為䖍州外縣尉無辜為孫帥所削今合得參部貧甚無以為資故明仲以故舊許其來欲擘晝權攝處之然近見報此公意欲閒去切恐又失指準其為人自信太過過彼如己乏絶若幸有所驅䇿使之乗檄詣永以養其真率尤荷郷里之義也至游聞二十八日長行亦有人來此相問未果附之書以葉尉相先後行耳至游可謂得所矣為之慶慰不已子猷侍老親閒居甚安與養䝉間得㑹晤用中亦頻通音好光祖循義行即相見矣恐尊悉答李光祖昨專人回承報教不數日黄侁歸復辱誨翰伏審近日動履之詳感慰無喻知難而未能必退固仁人君子之心也然已不待謀之人而已疾辭矣豈其素定扵胸中者以退為真也耶三復髙詞但増嘆服前者似續門户之疑以公往者屢曽為親應舉恐有所迫耳若髙尚其事善始而能終之此固朋友之所願也今之所處實無不盡自兹益茂先業恢舊家之風昭龜山之訓庶其在此其為門户計逺矣尚阻奉承臨風増想䝉諭去年辱慰問已拜領即日具報當無不逹自爾至今盖又一年始奉誨音固不能不以為怪前此曽扵安止書中略及傾渇之意不知遂聞扵左右也悚惕悚惕吾軰平生共學朋友間最為相知又聮親契情義特厚相濡以沫固未足為逹若曰以道相忘則或未能故為别既久不得來托時扵仰徳之際不能無憾也僕年將六十餘日㡬何公亦不得為少自今日日相從猶恐不及既未能爾而書問頓踈動隔年嵗其果以江湖相值為偶然耶然則平生所以相期者後日何可望乎安止書云想公亦久無光澤之便附書此言殊有味然僕自恕之詞以謂竆愁憔悴多難之人又貧不能自遣人則以此言舎其迹而取其心可也公扵此亦有所不暇乎因理前話輒復縷縷可付一笑也集道姻事以僕首議故相關白仍令自今徑以書逹兩家之情俾公無與甚荷愛念然僕前嵗因在烏洲室中夜寒附火陪公欵語公因言進祖長女及嫁未有親情如將樂兩士一廖一陳似可託者至游在傍云廖已問何人婚矣僕素與子通厚因作將樂書遂及之且慶集道雖少年鰥居已為公所知是時集道方居母憂意恐服闋若令姪未許人或可問也不謂子通聞之大喜即徑求龜山老人書請扵思祖而思祖與公共議許之逮信来臨安則已下定禮矣然則發此議者果誰先耶且既許之必有以取之取之者有在則其他可畧責以盡禮彼或難従又可强耶龜山父子以為其家處之既安扵我何執安之一字似有來處若不悔前議則以此恕之可也南容雖賢然孔子所以妻之者所取扵彼甚薄故足以為萬世法勢利不足道學問又是無竆之事愈難望人其家有老者徇其意似不為過也如何如何淵久不作書上問獲罪左右多矣謂遂䝉棄外今兹復收八月初間所惠翰甚荷照察且審孝履支持為慰然踈慢之咎若何可文愧恐愧恐春間所喻崇安相見陳進盖嘗言之甚欲一欵然始謀不來已而住家數月或謂其豈無説故勉作此行到劒建間少留已大熱聞光祖憔悴之甚不欲坐屈義當往慰而暑塗已難濡遲故作浦城省程之計實乖素心亦不謂吾友急扵邂逅欲以見教也慙恨慙恨淵五月十九日到臨安是日連接公兩書因循無便附報然雅意已黙喻矣尋被臺察之除辭不獲從進退失措厚顔扵此無以自觧益以賔客書問之煩日不遑給故至六月盡間因循義遣人至泰寧及邵武許守處遂令帶咨去盖略答前書不知如何不達益重其罪也平生相知不我責萬一遂見疑扵相忘亦自取耳夫復何言前書見容有不同若曰經綸君子屯極而亨則不敢承也今臺屬不容言事衮衮簿書胥吏之役日復一日非不欲去顧未有間耳中司舊友固相知心若欲超邁前昔聳瞻聴不但茍來無咎而已之語折來書此是前軰如何様人方付以此話也淵之無状不足望吾友所素知者縦使中志合言從扵我何所取乎已矣無復平生之意矣唯能身以去而已此所以有愧光祖久之不敢有所請也淵臺已四月餘日日益多事㡬無頃刻之暇以連三月宿故得盡答親知之書不然此書又遷延矣尚稽晤言臨紙増仰七姨孺人萬福令似承務得書尚未及報因此致意賢女想日可喜孫子安否許守有書往來否是嘗出入龜山門下者恐或識之故及自餘唯冀節哀省慮以為後學模楷他無足言不宣昨日齋宫中已作書欲出來附便未果今晚以雨作客少遂檢尋得舊所惠書有合報者故再此上聞所喻頼先疇可以少粥用給喪費豈非以不肖扵此有所怪而反之乎然毁産以具葬古人亦不許也不得為過論奠儀誠失禮蓋所謂直情徑行者得罪宜矣杜延年事忘其所始言公以為中前日所疑惜乎語緒未終也士為知己者死又曰士信扵知己極荷見教然在不肖分上却無許多侈説但從之以圖一己之私反之以合衆論之公皆未暇耳自古相知無如鮑叔之扵管仲然管仲所以報之者初不以死唯豫子狂生假智伯以欺世盗名司馬子長多愛又從而張大其事顧所從者智伯耳何足取哉今天下一家四海一君為臣而事君義不可逃而亦有去就或知而薦之扵君用與不用則去就在我矣其知在彼其用在此各不相渉也若乃用之扵君而得盡其道以是報君扵知己其有遺乎故凡私扵己者不知事君者也不知事君而能報知己者未之有也且世之所謂善醫者為其能識病也膏肓之疾而以為微痾其扵識病如何哉今謂其人有起死之手而恐其誤施於砭劑則已正名其不能起死矣又謂視為㣲痾猶靳妙方毋乃故相假借而為之詞乎然不肖則以為病者未嘗汲汲扵治也雖有玅方必欲登門造席數其将亡之證而强授之不為人操戈而逐者鮮矣故病者未嘗見用也而公以為己用醫者未嘗施藥也而公以為誤施此所以不得不疑也孔子曰先行其言而後從之此光祖提以教不肖者前日之書意畧盡矣歸去來兮亦當有説也孟子曰迎之致敬以有禮言将行其言也則就之禮貌未衰言弗行也則去之其次雖未行其言也迎之致敬以有禮則就之禮貌衰則去之今吾未嘗言難責其行言不行而去誠亦未晩不審左右以為如何淵非好辯者以光祖責之以不見答故亦不得已耳應之叔始欲去為貧故也自遷郎及檢詳其俸尤厚而所職者有司之事力可自辦故留家無置錐之地而有七十嵗之老母若必求外補須待逺闕何以為菽水之奉乎故如應之留不肖不以為過敕局改秩辭亦得不辭亦得夫何可以不辭盖召為刪定其遇我止扵如此我又於為刪定無愧則凡扵格法所當受者宜皆不必辭也光祖以為然否夫事不難無以見君子然又戒扵不行其所無事唯千萬亮之幸甚自成才歸郷辱所寄書䝉許垂訪亦月半後可至敝里日夕望車馬之至故不復為作書以報逮七月盡間得安止來問方知尊候嘗不快以是遷延即欲專人詗動止偶為事奪未果忽拜誨翰之辱具審所苦己遂平復上下俱康健大慰飢渴牾見雖尚悠悠且喜彼此閒居無恙後㑹可冀也幸甚幸甚承示易傳參同契俾衰晩空踈之人得以展玩聞所未聞仰佩不倦之誨其意良厚何以克當銘感銘感但來教以所著述取正扵淵且曰龜山云亡吾道凋喪學者鮮知利善之分其責在不肖則此言過矣龜山之扵二程先生相去一間耳而明道之扵孟子未知所先後也二程扵孟子盖聞而知之者龜山扵明道又見而知之龜山不可及矣而其所以垂世傳逺者猶未能無憾況學扵龜山者初無所見聞偶為吾友所知便欲享尩人以壯者之食而强之負重其果足以勝其任乎就正之喻雖出謙誨不敢承也如光祖之學凡出扵龜山之門者未見其比至扵足目俱到當扵古人中求之識者皆以為然非特不肖私意也儻有所述自以為得雖聖人復起不易吾矣將誰使正之但其書未出辱在朋友者幸先寓目焉有疑而未達者許其問而不拒可也如是則願聞咳唾之音豈獨不肖一人而已乎文字浩博縦使累日披閲猶未能徧而來介趣歸輒欲留之几案晨夕玩味俟有疑焉詳具問目并所示回納或前此晤見有期躳自扣請幸弗訝草草上復也見謂不欲流落别處已悉雅意餘惟為道厚自保練又内柬易傳序并發明易更三聖成書之由極詳明反復繹味不忘賛嘆易傳諸卦留來使一日兩夜亦畧渉獵大率皆可傳間有不能無疑者聞見不同也如乾坤兩卦所釋凡十八條淵所疑者往往過半若論天德鬼神潛龍之憂樂以天下與夫直方大與孟子之論氣不同餘慶餘殃為本不應有謂辨之不早不曰由不早辨皆不肖所疑也剛健中正純粹精也上一句自是四字下句續上意也乾卦如大象下初觧爻辭五句又觧或躍在淵兩句與繼剛健中正純粹精而下三句句法皆然或者命是為乾之七徳盖不識句讀而妄有穿鑿者也又何足辨至扵言乾始能以美利利天下只作一句不知誰作兩句讀來如淵之意此猶未是斷句直至不言所利作一句乃達繫辭之義耳此等觧盖不足以見扵書公以謂淵只論一板不同已有不可勝言者逺書其可遽以紙筆盡耶切幸亮察八月間承惠教輒因回介具報當已達左右如論易處語言踈率不見訝否范蜀公與司馬温公議論往復至五七反猶各守所見不變當年簡牘具在若尚氣者之為而二公情義金石膠漆也今之學者往往隨俗上下相師以諂一有可否便成芥蔕前軰風流盡矣可駭亦可嘆也只如吾軰中近年每以書問踈闊為非然翰墨往來亦止扵敘寒温而已過不自知學無所進職此之由古人以文㑹友以友輔仁似不如此唯吾光祖不以世俗待我有書見及未嘗不以規誨為先此意厚矣敢不奉承此所以不揆淺陋凡有所疑必欲就正也不審光祖能洞察其肺肝否前書是非不敢執正欲發公玅論萬一不惜見教莫大之幸也與鄧端友通判中冬凝寒伏惟尊候萬福嚴作德及張彦時來俱辱誨翰亦既馳報又䝉趙巡檢所示來問得知比日啓處之詳尤以慰釋政譽籍籍已傳千里之外矣為上者得所助在下者有所頼今之監郡千百無一也度牒不許抑配金隨所出産弟之不拘元降數却易辦又得如吾友者奉行吾閩無慮矣淵久在臺中無補比䝉恩除因乞外補有㫖不允即今供職衰晚叨冒唯劇愧懼耳尚阻承晤惟冀為民保練嚴作德薦削猶未足廖丈言扵鄭使既許之矣聞公與陳漕稍密可為一言否如作徳臨政百事過人但一味孤寒使人難著力耳雖然不可不留意也少綝在松谿古錐放光所謂本分衲子可喜可喜獲賊即斷其臂以送獄只此一事亦自過人近年以來為守令者多務招安盖茍求無事以自便耳刀鋸斧鑕本是除惡之物今為惡者執此以害善良莫為之禁而反命之官何以示勸懲耶故中司扵建寧之事嘗極論之恨未盡行耳恐或以松谿事為疑畧為觧之仍致意少綝經年不得書良以為念也適此賔客擾擾撥冗作此言不能盡今嵗春事甚早三月未破百卉索然貧居多故暮境寡徒先自倦游而風雨連緜只在睡中度日不知端友盛年監郡為况果如何官事無竆亦復妨人作樂否傾渴之極恨不得朝夕從㳺也所示新茗曽經具眼人拈出終是不同屢與佳客烹試但知感激而已見諭使之鑒别本不能辨又不敢相諛盖嘗卜之子猷以為製造甚精若非常品然受湯無力香不逺而味短豈是今嵗所得止如此或用處多均分不能廣耶子猷亦以為然且云前日答書稱好而已若以實告恐絶再來之路也僕謂不然萬一左右以此相嘗再來知易與佳品其肻輕出乎聊因致謝少敘一時往復之語想見讀至此掀髯大笑不自已也夢授舎弟曽發建安否畧無秏豈俟踏青後方歸耶後園景物已不堪舉眼矣無由承欵臨風悵然唯冀惠序保重不宣秋暑可畏承惠書伏審廬居摧苦孝履僅支又聞精竆佛妙深入不二法門遂至冤親平等可謂頓進欽仰欽仰病軀仍舊舊學盡廢辱發其緒餘指示心要尤副所望見喻撥置家事静以處之百病自除以謂從上祖師只是勸人休歇此語尤為徑捷但有少疑更欲就正不能自已不肖愚鈍不盡了釋氏之書㝷常扵儒教中只將文王日昃不皇暇食與舜恭己正南面而已二事一處看了又嘗剽聞祖師垂訓有一日不作一日不食之語不審是已休歇者猶如此唯復未休歇前亦如此也豐干對人問只以隨時二字真得休歇之意不知此是著衣喫飯外事耶為復只在著衣喫飯間耶伏冀髙明詳以見曉淵既多病又為家事所牽一聞休歇之語欣然如有所得公已發端更願不惜諄諄庶㡬頺齡或有所省也近復藥覺與初夏差異稍可出入首當造謁未間更乞節哀自重不宣與魏邦達侍郎不奉廬側之問久矣非以衮衮多事遂望傾仰實慮哀痛摧苦之念未觧倦於應接不欲以竿牘末禮上勤省覽而沈倩之來過辱記憶反䝉賜誨雖幸聞動静足以自慰然愧懼深矣不審終恕其無他否向來一幅之諭敢不聞命繼自今有便頻問起居也下情恐悚言不能喻淵中夏之下浣既至臨安便䝉枉教委曲周旋至扵累紙感慰之甚不可為言而便人一去絶跡以是不獲上報重煩下詢益仞眷意之勤尤覺踈慢無所逃罪也族弟與沈親詣見皆䝉展轉存問顧淵何者敢辱愛念如此知幸知幸臺中無補久不能去已累知人之明似聞朝廷未許乞外殊未知所處也不知何以教之傾渴傾渴伏聞襄事既畢種植松檟之暇不以毁瘠形見為孝則後來追報人所仰望古人既葬讀祭禮豈以家廟祭祀猶有終身之慕耶移孝為忠故是一事方當遵飬之時豈忘他日經濟之業願公勉進𬞞食以禮自克上副宸眷下慰士夫之祝區區誠懇非以私也昨沈倩經由所寓幸獲參承及歸得聞動静之詳已足深慰况復出示台翰所以眷存撫奄之意良厚遷貶之中誰復有此顧唯以善養人無間踈逺自是長者常事然如不肖何以當之感刻感刻沈倩頗能道見念之語尤不皇安藏之肺腑非他日面承莫能謝也頃者往來江閩之間失扵一見區區歸依之誠莫獲傾倒至今猶以為恨每與子猷話及名徳之重未嘗不欽仰也唯公議論之實著聞海内縉紳所共稱賛而積年退處未遂施設雖賢者顯晦無適不安其如人望何天其或者必有以發之正恐常情未察耳跂而望之以日為年非私情爾也淵今春偶遇避冦去家百里外寓居古寺中凡半年其地卑濕為甚因得足疾困臥累月至今猶未却藥中間碎累畨病有喪亡者以此憂撓人事殆廢故雖如左右之側亦不暇尋便致問也不審見察否淵年將七十縦有餘日其何能久所以未能乞骸者以家貧累重菽絮不給也向䝉朝廷畀以奉祠之祿今冬當滿便可掛冠矣恐欲知邇來惡況不覺覼縷幸恕喋喋也與胡康侯侍讀龜山先生云亡後學無所依仰海内知識所同傷悼況如不肖骨肉之親承奉之義追念平昔教誨撫育之意苦痛摧割情當如何末由敘訴先辱誨問伏讀悲感無以為喻仰惟給事道義之契天下共聞契濶積年遽聞此訃諒深哀痛淵前年了亡室葬事後便至寕化娶沈氏女子以歸忽忽歳盡至去年眷始得一至將樂日與梁兼濟李光祖叅隨老人杖履劇飲連夕畧無倦色至扵文字未暇詳及偶以用中迫行而别亦欲夏初再來為久住計無何到家為足疾所苦未果如約繼聞其不快亦謂尋常無病行當勿藥何意强健如許兩月之間便隔生死苦痛苦痛嗟乎豈世復有此老者乎良可為天下慟矣伏紙流涕言不能盡淵䝉喻編次龜山著述文字不可有遺此固在下懐但冦盜以來不免散失已囑昭祖安止􅊧求十得六七矣候成集當錄呈左右論語義比壬子年所見本又改動前十篇及三經義辨皆有手藁又有易義三十餘卦并日錄辨數十段文義燦然久已無復増損所可深恨者未成全書耳至如中庸解及所為詩用鄒徳久寫者與晚年刪正雜文浄藁讀之皆無筆誤去處此已可傳無疑唯明道伊川語錄意欲修之未暇亦以不肖有室家之禍歸葬沙縣久不得往侍先生之側遂無人催趣成就此重可痛也三經義辨已校對定増入正經全文及王氏義成十巻已進去久矣尚未有報不知諸公又如何處置也此事吾道所係非人力所可必想給事扵此亦未能忘懐也無由承教筆墨莫究所欲陳者感泣之餘甚愧草草耳䝉不鄙屬以徐尉已即日奉來書於丞相矣此公學有從來志行甚篤雖微公言為上者有不知乎龜山棄斯世復二年矣追念平昔但深悲痛聖主崇伊洛之學甚至士大夫争先淬厲志扵利祿而已或者不知又從而吹揚之邪説横議充塞道路吾道何其不幸邪方此之時徳人云亡無所付託而至言精義隠而未著先生長者能不為天下動心否恐因造經義言可以上通聊為分别之庶㡬迴狂瀾扵既倒也如何如何論語義比舊加文焉以無人錄呈今如來誨寫子貢問夫子為衛君一段及學而首章已改正者去如易義詩巻亦未暇錄也義辨向伯海已令人寫去比之進本所無者三十段恐尊悉李光祖近得刪定官近來此相㑹月餘而去學問智識真有以過人漫及之頃者諫省既論伊川之學不可以訓後又有以李處廉為言者亦行下云是吕書之文亦不易發也如聞今日縉紳間有得扵伊川者深若淺上皆已知之憮然之詔特迫扵尚同之論耳左右被召盖斷自嚴衷所以金字從内出也舊例宫觀兼侍讀乃前兩府復用之漸聖意可知矣辭劄温柔敦厚之氣溢扵文詞展期之請終必見許但未起發間催趣不已不知更用入文字否相去差逺無由面叩切幸詳以見諭明仲舎人近寄及春秋傳印本雕造極精甚荷逺意之勤近者事閒因得反覆詳觀雖不足以窺涯涘然斯文所託不出此書矣衰晚得以坐參幸甚三經義辨未有㫖頒行而用中以公使錢刋本恐不主伊川之學者復動其喙其亦可已耶頃得子發内翰書以送秘府為是先是有詔奬諭指揮又寂然紛紛之論至今未静但未果抗章耳道之難明良可慮也世事儘悠悠廟堂要静以處之盖懲前日之失恐須得真賢為衆所服議論方定耳再與龜山先生諫議淵再覆比來不審寓居維揚如何想君臣道合志意可伸然丈人今日之責實重中興之功海内朝夕以冀不知有誰相助可以成此盜賊充斥中原已為夷狄所據退而保東南此孫仲謀之所甚難至扵躳擐甲胄與武夫悍卒為伍百戰然後能守者也當時人物如周瑜軰盖百世之士若其他智勇紛出莫可悉數非如今日養交持祿怯懦畏死之流然尚惴惴自保不敢北窺曹氏圖所以一之者何則勢不便也今夷狄之禍强扵曹氏而廟堂之上藐然無䇿天下之士鉗口結舌不敢奮身昌言出力排難以徇國家之急方是之時雖有伊傅而任之不專何益扵亂由是言之丈人今日之責雖欲辭以不能不可避也如聞王公已過八座恐除中憲果爾去計不可緩也若由是遂登二府恐益負人望矣不肖至親且受教門下若曰規利而求進則不出此言唯深察之幸甚黙堂先生文集巻第十七
