  - {type: variant, offset: 0, length: 4920, content: 序自孟子沒道學失傳異端競起淺聞多岐莫適所從不求其本而從事扵末六經載籍為之晦蝕學術頗僻汨䘮良性不知夫聖人之所以為學徒相率為口耳誦數之餘夸多鬪靡以文辭相矜漢唐以來以儒名家傑立而不世出者有矣然論性有以為善惡混有別而為三品者故論篤者莫之與也夫性萬物之一源非有我之私得也性而不知其離道而違仁也遠矣宋興河南二程夫子受學扵濓溪周茂叔先生講明道學究聖賢之藴彂千載不傳之妙學者趨之如水赴壑時唯龜山楊先生覩奥入室尊所聞而行所知盡得其傳焉眀道徳之歸以覺斯人以善天下然是道也不絶如綫則有陳公知黙以剛眀果毅之資得師友源流之正自其少也親炙了翁而翁器之謂能任重而致遠及其後見龜山先生師事執經不憚寒暑其始遺之以書致篤信好學之義與孳孳為善之説及夫伊尹之所覺周公之所思孔子之所貫顔子之所樂而質諸龜山自是服勤三紀漸摩道徳之埸眀致知格物之理究竆六經考其至當之歸其著述㣲詞奥義竆幽探賾使斯文之不墜為世模楷豈區區漢唐之士以多文自富務為詞章以驚眩末俗所可比儗哉故平居履踐立朝進退莫不以是無慙古人之大節果以是垂後而名世不幸遭擯斥扵時宰不大施扵用而齎志以沒學者至今悲之余昔從公受業左右幾二十年嘗以存誠齋銘示諸學者謂萬物皆備扵我非自外得反求諸身而已反身而至扵誠則合内外同物我無兮扵天人且成已乃所以成物學者有進扵斯則何患不造古人之域余服膺高堅因得其遺文五百一十四篇釐為二十二卷序而刊之廣諸同志苟有志扵學者探索而求之則源流固有在矣公諱淵字知黙榜所居之室曰黙堂故後學以黙堂先生稱焉其立朝節㮣則有行狀在可考而知也紹興十七年三月日門人沈度序予來毗陵之數月欲扵事外隂求是邦之良士未暇也一日有秀才陳生簵者來謁予貌甚野氣甚静予固異之坐之而叩其挾則吃吃言伊川之學予益怪焉盖是學也今之大夫乆矣其諱談也不唯大夫也今之士亦然而生獨不然其不可怪也乎問之盖黙堂先生陳公之子也然則其不諱談也又奚怪焉盖昔者道學之正統八傳而至孔子若顔子曽子則見而傳之若子思孟子則聞而傳之統之至扵孟子也其前無絶其後無嗣嗣千有餘歲之絶者不在伊川乎其學以天理為宗以致知為力以仁為寤以敬為守以誠為歸曠乎聖門之孔邇忽乎斯道之來前也一時之士從之學者豈少也得之者謝氏而止耳㳺氏而止耳楊氏而止耳黙堂先生楊氏之髙弟也且親焉吾聞其人矣吾仰其風矣未見其書也問諸簵則有文集若干卷就求而觀之其詞質而逹其意坦而遠其氣暢而幽至扵立朝廷當言責正君心排權臣蹇蹇不折也是豈今之所謂文哉盖道學之充乎其中而溢乎其外形乎其躳而聲乎其言者歟既歸其書扵簵而簵請序扵予予謝曰先生此書豈以序之作不作而為傳不傳哉序或不可以廢也亦必其人而後可也如予者豈所謂其人乎然士之騖扵人也至扵今亦極矣文彌工道彌邈極甚必反其不待於先生此書乎序此書予不知其可也一言以驗學者予不知其不可也先生諱淵字幾叟嘗為正言終官宗正少卿南約人了翁之猶子云淳熈戊戌十月日誠齋野客廬陵楊萬里序黙堂先生文集目錄門人沈度編第一卷詩延平江上呈呉國華先生玉山驛見周東老題詩和之立我軒和人獨酌二絶鄰有張生者病革勢不可救忽夢醫人鄧舜臣言服萬病九如説服之遂安感而作詩崇安分水嶺離𬗋溪驛鉛山信州禪月院晚眺舟中初晴登睦州環峰亭泊姑蘇憑滙亭候同行不至次韻李仲虎召伯相遇重陽後送謹常兄之符離九月二十二日秋舉失利出門用中相餞夜歩河上留別錢塘遇廖次山以詩見贈次韻次韻欲㳺西湖阻雨蕭山覺苑寺雪後杜門錢清待湖錢清過堰蕭山雪中寄季脩過鑑湖季脩欲之仰山預作詩送之病減枕上五首季脩有詩求公晦顔公書元次山碑銘既而公晦和成使病者亦賦之季脩舍舟趨諸暨謁劉元成獨泛錢清江有懐其人聞許景受上書被召二首聞公晦叔往㢘州以詩送之觀獵登奔牛堰山亭第二卷詩謁滿處冲歸以詩贈之處冲見和復次韻二首處冲又和頗及佛理亦次韻答之處冲為棲神導氣之術每曉起得意成詩前後四首次其韻秋夕七夕三首七夕閨意戲范濟美三首九日登莊樓二首次韻范濟美秋雨感懐代句龍君輔上潼川令同魏季脩雪中閒步二首次韻俞徳翁述懐二首寄内春雪歲暮述懐寄安常兄三月十一日欲往荆南景徳寺睡起呈曹令徳令徳送余都門外眷眷惜別余恨不欵作詩寄之同楊遵道出京本欲作詩而吟咏乆廢恐取道襄陽弔古遺迹遵道有作不能多繼也光以詩謝之十五日過許夜雨暴作眀日行四十里宿于潁橋又眀日晴書事汝州道中呈遵道承遵道和又用前韻書懐春晚書事楊花二首木香花二首自入襄城即有山水之興路中稍有賡唱因呈遵道和遵道楊花漫興第三卷詩登峴山二首晚行懐鄧南夫思安常兄春晚入荆州早行京師相善者鄉友四人各賦一篇以見所慕適正載徳如愚令徳到荆州寄用中用中既和成以示山口唐藴眀藴眀亦和再用前韻呈二公容齋書事二首和向和卿嘗茶寄謝用中得用中書有禮人不答之悔作詩觧之送遵道陳漕生辰席提舉生辰入荆州學四絶句呈昭祖金鑾兩絶次韻楊丈夜寒直舍春日偶題次韻張從道三首石首道中自建寕泛江至石首月夜江行次韻從道夜宿推院送昭遠兼寄昭祖諸友寄内第四卷詩奉酬楊逹甫見贈小軒觀月呈興宗