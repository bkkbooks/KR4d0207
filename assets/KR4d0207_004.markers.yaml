  - {type: variant, offset: 2283, length: 1, content: 先, WYG: 集巻四欽定四庫全書黙堂集巻五宋陳淵撰看論語四首明明孔聖能毋四的的曾參所貴三一部魯論開聖域古人無死要重參天道文章豈兩岐雷聲淵黙本同時如何子貢能言者説與無言更有疑陋巷從容一事無不因鄰鬬出吾廬簞瓢豈是忘憂物自是從容樂有餘直從堯舜以中傳又到尼山續斷絃看取子思親的處始知論語自無偏夢得亭上雷霆巻地灘聲急旌斾揺空樹影寒千古西山留爽氣雨餘容我倚欄看留别鄧南夫四首平}
  - {type: page-break, offset: 2283, content: '', id: KR4d0207_WYG_005-1a, image: WYG1139/WYG1139-0322c.png}
  - {type: page-break, offset: 2283, content: '', id: KR4d0207_WYG_005-1b, image: WYG1139/WYG1139-0322d.png}
  - {type: variant, offset: 2285, length: 0, content: '', WYG: 交友各飄蓬只有丸丸雪後松萬里歸來還徃絶獨君時許略從容昻昻勁氣初無作蕩蕩竒胸久息機容我醉時開讜論一軒明月夜忘歸有子才如汗血駒新門髙大可容車故應袖手藏深渺憐我氷霜涉畏途比余於玉有竒}
  - {type: page-break, offset: 2285, content: '', id: KR4d0207_WYG_005-2a, image: WYG1139/WYG1139-0323a.png}
  - {type: variant, offset: 2286, length: 4, content: 集卷第四, WYG: 一落泥塗十二春慚愧深知同鮑叔尚言荆璞定逢人十二年前南夫有玉説一篇送予入太學其文甚美今子被貢適三上故有是句越州道中雜詩十三首心息久相依息調心自住忽焉不自知根塵失所寓向來尚有錐今我已忘兔似入無功鄉不由嵇阮路暴氣燎原火淺量盈澮水不見楊關西此生真已矣誰言佩豭由不作緼袍耻至道儻有聞客塵如脱屣世儒讀論語未脱小兒氣豈悟無絃琴中藏千古意顔淵黙然處曾子亦心醉處處儻逢渠字字皆有味人心有黙契晤語不在多一笑離凡情萬象皆含和孰是忘言人聽此無聲歌有懐閲古堂夢中時一過閲古堂在蕭山縣宅浮雲作秋陰細雨如朝霧放形山水間意適無艱步忽遇古招提空翠森囘互倚杖聽泉鳴悠然不能去天姥寺小舟適久雨疎篷常自蔽形留一席間心與天地際逝者不可作遺編等蟬蜕一念無古今千載若符契胸中有佳處妙意不期㑹弄筆作五言心手無内外千古陶淵明秀句含天籟偶然游其藩遂爾厭彫繪淵明已黄壤詩語餘竒趣我行田野間舉目輒相遇誰云古人逺正是無來去展巻味其言即今果何處老耼言道德頗復求自已但於閤闢機未免容或使列莊猶反約申韓遂殊軌所差適毫釐奚翅繆千里揚雄窺聖域何啻越距楚斷然著成書凖易與論語古來文字學似此奚足數誰謂千秋人斯言果輕許}
