  - {type: indent, offset: 6729, content: 　　　　, id: KR4d0207_krp_013-bkkind31}
  - {type: variant, offset: 6729, length: 1050, content: 正月十七日上殿劄子臣既言和與戰二議而一事不可徧執惟所施之宜而已又以謂天下有必勝之勢亦有必敗之理我與敵人之所共用者若其必勝之勢在我而必敗之理在彼則在我者不可以不用雖未能用亦不必過爲之慮知此則和與戰之議可決矣何以言之昔者三國之際魏最强吳次之蜀又次之方孫權劉備無恙時以曹操之姦雄溉平中原僣亂因其餘勇以却烏孫鮮卑一弱子之力耳而不能并吳蜀而有之則以吳蜀之險可恃故也故吳蜀利扵守魏利扵戰魏雖能戰而吳蜀必不可入吳蜀併力以攻魏則魏可亡魏與吳蜀合而為一則内陵外侮皆不足憂矣唯其各守其所久之而不能合雖合而無以守之此其所以有而不能久也今我據有吳蜀以為根本虜雖强大終莫能侵又益我以河南陜右六十州之地盖三國之所雖合者此雖大帝三王之天下絶長補短未能遠過顧吾所以主張和維持之者如何耳故用此以戰則戰無不克用此以和則和無不成此所謂有必勝之勢也自古彊盛無過扵秦既已蠶食六國遂并天下莫與為敵矣然夷狄種性仁義不施而暴虐是用故傳之二世而亡今虜邈在萬里之外豺狼狐兔之與居非能為秦也而以小加大志得氣滿貪黷無厭方且骨肉之間自相屠戮心腹之内日以離間專為淫侈以夸其所有之富旁附之國至有不忍其虐逃而遠之者察其所為必不能久此所謂有必敗之理也用我之所必勝以當彼之所必敗可以有為而我方約和不欲言戰惴惴然唯恐虜之復來此虜所以得而輕我也且我之所以不欲言戰者豈非以往日維揚之遷徙浙東之奔播有不可以不戒乎此又過慮也胡不觀今日之勢與靖康以後為如何今日之勢方興也靖康以後之勢已壊也此豈可同年而語哉盖自宣和以來朝廷所以待金人者有得有失其失在扵靖康之前而不在扵建炎之後不可不辨也靖康以前敗􅉀扵契丹貪得扵燕雲賊來不拒賊去不追其失已不足咎矣建炎以後不守南都避而之維揚不守維揚避而之臨安又之㑹稽四眀如太王之扵狄人盖有不得已而然者非失計也其後復歸臨安彼固以我為怯無足憚者故我得以收人心彊國勢選将治兵嚴為之備所以屢戰屢勝十年無患此非其得耶觀虜之意既得中原豈不欲謀吳而據蜀兼有四海之利乎然每舉輒敗知我之有備也必将待時而發則雖名得中原其實不可保矣與其既得而不能保孰若棄而不守猶足以緩我而市恩乎此虜所以廢劉豫而退保河南之意也而我之所有如此猶且以往日之禍為戒亦已過矣臣甞逰荆州見荆人所以事闗羽者家置一祠雖父子兄弟室中之語度非羽之所欲則必相戒以勿言唯恐羽之知之也夫羽之死已數百年其不能定以害人也審矣而荆人畏之如此以其餘威在人上下相傳有以誑惑其心耳今金人去中國限以北虜水慄陸讋不知經幾聚落然後能復至燕雲也不為之備而徒畏之豈知所先務乎且虜所謂生女真之兵者自南而北所存無幾所可致者諸蕃烏合之醜類耳散而復, WYG: 黙堂}
