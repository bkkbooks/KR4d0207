  - {type: variant, offset: 7780, length: 256, content: 其勢實難集而使之遠來必不能久縱使駐足扵燕雲之境而垂涎扵雍梁之地亦必有豫未敢輕入盖進則有山寨必叛之虞退則有契丹修怨之慮不顧而越河亦虜之所忌也又況河南之民既歸而安必以死守虜雖善戰恐亦未必得志耳臣故曰用我之所必勝當彼之所必敗可以有為不當以前事為戒而和與戰之事可決而無疑者為是故也臣本書生扵用兵之事實不能曉至扵天下之理盖嘗得之扵經術矣意之所見不敢緘塞若和未可變戰亦當備則臣所言未必全無補也臣願陛下察今日勝敗之由與在我者可以有為在彼者可以無戒雖未絶和以戰為主如陛下所以諭臣者此計一定萬世無患矣臣不勝區區之忠惟陛下財擇正月二, WYG: 巻}
