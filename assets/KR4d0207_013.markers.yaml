  - {type: variant, offset: 1723, length: 296, content: 劄子赴召與執政劄子淵往者蒙恩賜對旋復被罪朝廷憫其無他特與洗滌更縁薦引置之樞府編摩之地遲暮踈拙懼不能當尋請嶽祠庶幾亟獲㣲禄可以自活自承改命以來忽已兩考方幸投跡丘壑少酬素志今兹又蒙收召顧職分則不敢違禮而飾詞念庸妄則難以冒榮而茍進彷徨失據驚悸成疾乆之不免扶持就道冀逭有司慢令之誅而已無何纔至闕下重蒙睿㫖再令登對揣已無堪益増愧恐恭惟廟堂諸公以堯舜之道輔佐聖主固将盡攬天下英才同徳一心共濟囏運海内遺逸之士誰不歸心如淵等軰鳬雁飛集初無損益伏望啓迪之暇略賜開陳使不肖者姑以奉祠之禄待罪山林終此一任因之自免以老就閒如是則是非昭融取舎公當非惟少弭朝廷一時過聽之譏亦所以興起天下彈冠願仕之志淵雖與鹿豕為羣其幸多矣, WYG: ''}
