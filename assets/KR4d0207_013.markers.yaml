  - {type: variant, offset: 8038, length: 343, content: 日上殿劄子臣衰晚不才誤蒙陛下寘之諫省凡有所陳必賜開納在臣微分可謂千載一時而自到省以來臣所不散不言者往往多是細故雖蒙施行可以自幸而亦可以為媿以是朝夕皇懼木知所以上副陛下容諫之意者幾欲乞賜罷黜未敢遽發近因藍公佐歸自金國而同時正使王倫輒為金人所留又聞金人盡誅往日主議之人且悔前約以此重有邀索國事之大無過扵此扵是輒以和戰二議不可偏執之說仰慁宸嚴冀以少塞臣責荷陛下過聴臣計且語臣曰今日之和非惟不可偏執自當以戰為主意欲積財練兵選将帥固要害過為之備以待不虞可和則和可戰則戰此宗社之福天下萬世之幸也臣當時不能自已雖已畧涷曲折多是承意稱賛退而自省有未盡者将復進其瞽言未果而數日以來不聞廣行咨訪但見已命之使又有升黜将趣其行莫測所謂臣固不可中輟必盡言之惟陛下矜其狂愚而加察焉臣聞衆論未孚必稽其實是非混淆當俟其, WYG: 欽}
