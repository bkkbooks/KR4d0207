  - {type: variant, offset: 0, length: 447, content: 黙堂先生文集巻第十三奏狀辭免舉賢良状右脩職郎改差監潭州南嶽廟陳淵准尚書省紹興七年六月一日劄子左朝散郎充徽猷閣待制提舉江州太平觀胡安國奏承潭州公文准禮部牒三省樞宻同奉手詔中外侍從之臣各舉能直言極諫之士一人者臣伏見右脩職郎權江西按撫制置大使司主管機宜文字陳淵深究先聖之㣲言能談當世之要務通達國體曉知政經若獲造廷俾攄所藴必有忠讜上副詳延伏候敕㫖五月二十八日三省同奉聖㫖劄與胡安國依紹興元年九月十一日已降指揮具陳淵詞業繳進劄付淵須至申聞者右淵竊以賢良方正能直言極諌之舉起扵漢之孝文盛扵武宣逮其衰世猶不敢廢故得人之盛至今稱之唐因其制進士之外設為制舉以待非常之才一時名臣多此途出至扵本朝尤重其選既舉之以侍從之公又稽之以平昔之業必也行藝適稱然後試之以六論詞學俱優然後考之以廷對盖每發必中始獲與選斯亦可謂難矣自非深竆經史百氏之書博考傳記諸儒之說通達國體眀習世務必不能仰副朝廷招徠之意如淵學問荒踈志業無取至扵文墨尤不足觀豈可茍冒榮名自取黜辱所有繳進詞業指揮不敢承命謹具状申尚書省伏乞照㑹施行謹状紹興七年七月日具位, WYG: ''}
