  - {type: variant, offset: 8556, length: 985, content: 之有從違歳幣之有多寡又在夫可許與不可許之間斟酌而予奪之尤所當慎也盖誓書之未行必待歲幣之有定而歳幣之數寡則可從多則難繼彼方挾彊以凌我求之者多而與之者寡必不諧矣且為後日之計又不可多然則使其可遽遣而莫之議乎臣觀祖宗之待契丹可謂過扵厚矣然景徳所賜朝廷本有過許曹利用損之止扵三十萬慶曆所賜朝廷又有過許富弼損之止扵三十萬方是之時金帛之直每一疋兩不過千錢省陌總而計之為省錢五十萬緍而已人猶以為多也今疋之直不下十倍而兩之直三倍有餘矣如聞虜人欲援舊例此乃祖宗續增之數其可盡許乎又況必不止此而奉使之人又未必有如利用與弼者若一一如其所請而不與之較後悔無及矣且獨不見宣和靖康間趙良嗣李悦李鄴之所許乎𥘉欲靖難不復深慮其後虜人得以藉口遂致今日難弭之禍徒以使之不得其人故也使之不可遽遣亦可見扵此矣且使之不可遽遣而亦不可以不遣遣之則必有所許亦必有所不許臣既陳之扵前矣若遂遣之亦誠有可議者以臣愚見許之多固不若許之寡也盖虜之所求無厭以其本無意扵和也洗已見其觧和之兆乎今吾固有所不許則已咈其欲矣就其可許者而許者十七八而不許者十二三可謂許之者多而不許者寡矣使其有意扵和則可不然許之多者不足以得其喜而許之寡者適足以彂其怒多固不喜寡亦必怒皆不可以得其和則與其多許而失和不若寡許而失和之為愈也何則多與無益寡與無損故也盖和戰兩途彼之意常欲戰不得已而後為和我之意常欲和不得已而後有戰戰非我之意和亦非彼之意不能以相易也何以知其然以往者京城浙東之變知之也方虜之犯京城必邀二聖以往凡皇族之在城中無一人得脱者及來浙東逼逐衛兵遠建海涯幾及屬車之塵此其意豈欲復存我宋萬世之祀哉頼皇天悔禍宗廟社稷之靈與海内愛戴之心共惟陛下以臨九有十年之間國勢已立以守則固以戰則勝故虜亦不得已而約和耳然其不欲存我之迹固在彼非本石亦將懼我必欲滅之之謀矣緃陛下以天地之度愛惜生靈㫁無復讐之心彼其能自安乎彼不能以自安其能終容我乎然則和之必變可立而待矣或者必欲多與之幣以幸其乆而無變無是道也故臣願陛下以和為息戰之權以戰為守和之備惜財以厚民吝予以存信不計目前之利務為長久之䇿臨遣使臣訓之以不欺之誠示之以一定之議俾毋輕許以誤大計則雖蠻貊之邦無足憂矣然後遴擇謀臣精練戰士多積穀帛以備糗糧之用固封守以保安業之民觀釁而動動不失時則以和以戰惟我所欲耳古語有之無待其不來恃吾有以待之如是則金人之彊將無所施其扵厚幣以求􅉀不亦遠乎臣至愚甚陋自以天下至計莫尚扵此敢布腹心伏候採擇默, WYG: 黙}
