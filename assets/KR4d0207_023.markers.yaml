  - {type: variant, offset: 242, length: 7, content: 珍藏東郡楊紹和, WYG: 徒恱其名其誠安在誠是為己偽是為人己未十一月十七日夜夢邵康節論數手持一巻紙縱横界如棊局其上有}
  - {type: variant, offset: 250, length: 4, content: 彥合藏書, WYG: 不依窠眼翻巻}
  - {type: variant, offset: 255, length: 7, content: 印彥合珍存諸印, WYG: 示余云天地之數不可干他陽生自至余甞論命以謂上聖至於下愚莫不有分分既定矣不能乗之以往而欲致力於其間非贅則􅃜故人為非命也孟子曰莫之致而至者命也周公告君奭曰在亶乗兹大命所以處之其說盡矣由是言之數既已定又豈可干乎待其自至可也世之不}
  - {type: page-break, offset: 255, content: '', id: KR4d0207_WYG_022-23a, image: WYG1139/WYG1139-0540c.png}
  - {type: variant, offset: 263, length: 4, content: 是海源閣, WYG: 命者謂人力可以必為縱其欲利之心無所不至而終無所成者多矣或者推之荒忽一切不為怠惰委靡使天之所賦莫或助之其亦自暴自棄而已二者胥失也}
