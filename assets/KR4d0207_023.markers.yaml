  - {type: variant, offset: 201, length: 1, content: 德, WYG: 徳}
  - {type: variant, offset: 205, length: 2, content: 及第, WYG: 建功右楚詞}
  - {type: variant, offset: 208, length: 0, content: '', WYG: 巻峽江蕭茂徳得之叔祖了翁之家葢翁之所甞讀而以善本校定者塗竄注改皆其親筆觀其心畫想見其為人則其遺風餘烈或得於此此所以為可寶也茂徳翁之孫壻也始予見其初昏於南康恨未之欵後八年訪余於永豐之官舍攷其學問以窺其志之所存葢足以知翁之㣲而能推大其所未究者已而出此書相示感余疇昔至於流涕太息則其寶是物也豈徒然而已哉建炎}
  - {type: page-break, offset: 208, content: '', id: KR4d0207_WYG_022-14a, image: WYG1139/WYG1139-0536a.png}
