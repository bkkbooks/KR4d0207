  - {type: variant, offset: 169, length: 3, content: 文共三, WYG: 也死於瘴癘死也死於囹圄亦死也死於刀鋸亦死也吾今一視之俱無所擇又曰吾平生學佛唯於死生之際了然無怖汝等既知此理亦須處之有素若處之無素驟入苦趣無安樂法子路死於衛難不㤀結纓其安而樂之如此處之有素故耳翁在宣和間雖獲沒於牖下平生經涉殆遍危險而不以為怨世徒悲其憂患難堪而不知其志之先定葢如此觀所書佛語皆欲於苦趣中習行安樂法者後有子孫當識此意也姪孫淵謹書題了齋所書鄧功曹事鄧功曹諱某南劒沙縣人也南縣未郡時功曹為延平鎮吏民有被誣法當死功曹直其寃民徳之願割家貲之半鉅萬為報功曹卻焉所親强之受功曹有恐殃及子孫之語至今鄉人猶能誦之又甞赴官江州未至次於徳安縣㑹曹翰屠江州縣吏例以功曹繫獄功曹憂悸黙禱時天旱獲雨雪之應已而杻械自脱甞於所供觀音地藏畫像親記其事甚詳其五世孫轂得之鄉僧乆寶藏之政和七年春叔祖右司客居益浦轂叙述本末寓書叔祖求證其事獲書如此功曹不朽之託其在兹乎明年}
