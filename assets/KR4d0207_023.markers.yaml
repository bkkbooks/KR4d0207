  - {type: variant, offset: 233, length: 0, content: '', WYG: 於先儒先儒亦}
  - {type: variant, offset: 234, length: 2, content: 東郡, WYG: 害乎曰先儒只是訓詁而已不以已意附㑹正經於道術初無損益也只如荆公引擅生殺之謂王能利害之謂王此申商韓非之所為豈是先王之道而彼不悟反以證經曰此自荀子之說何為不善曰若論道則荀卿容有不知者其說亦何足取荀卿之門出李斯斯之術卒以亂秦源流有所自矣然則書言惟辟作福惟辟作威非耶余曰今人勸人主攬權多用此説而不知聖人之言意有所主其下文云臣無有作福作威玉食臣之有作福作威玉食其害於而家凶於而國葢曰威福之作唯人主當耳人臣如此必致凶害所以戒也豈生殺由我之謂哉曰用人惟已之義又如何曰用人惟已見賢焉然後用之不以左右大夫國人之譽而用人也人主深居九重人之賢否何自而知之必有以聞於我者其用不用則在我矣是之謂用人惟已如今之特㫖識者不以為然豈有有司定罪不至於此而人主固欲重行此何理哉故凡人主欲攬權柄者必為臣下所奪矣趙韓王再相太宗既罷對於便殿太宗問人主如何得威柄在已對曰若事事付之有司則威柄在已若事事要出於已則威柄歸宰相矣天下以為名言或曰普自以不復用故言於太宗不然亦普之所秘也曽天㳺云人須是躬行說得不濟事余曰此極是然不獨行之艱知之亦難只為不知知豈不能行曰人非下愚誰不知者只為不能行若日中見溝塹終不到陷在其中唯夜間則不可知余曰只為日中見得分明且非獨夜間如盲人雖日中亦有時乎為溝塹所陷不見故也此所以貴乎知知之則能行之矣吕居仁云曽問}
  - {type: page-break, offset: 234, content: '', id: KR4d0207_WYG_022-21a, image: WYG1139/WYG1139-0539c.png}
  - {type: page-break, offset: 234, content: '', id: KR4d0207_WYG_022-21b, image: WYG1139/WYG1139-0539d.png}
  - {type: page-break, offset: 234, content: '', id: KR4d0207_WYG_022-22a, image: WYG1139/WYG1139-0540a.png}
  - {type: variant, offset: 237, length: 4, content: 氏宋存書, WYG: 丈舍生受生事楊丈答云俟他日面見說子細後來楊丈有事至今不得其說如何余曰來無所從去無所止不知捨是何人受是何人曽天㳺云古之學者為已今之學者為人所謂為已盡其在我者而已此甚分明不知為人如何說又謂子韶云為人乃求人之知恐不然予曰為人如有人則作無人則輟之類是也為已何干人事此聖人發明古今學者之所以不同大率後世作事都是為人如五霸假仁義以尊周}
  - {type: page-break, offset: 237, content: '', id: KR4d0207_WYG_022-22b, image: WYG1139/WYG1139-0540b.png}
