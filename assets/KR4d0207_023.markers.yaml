  - {type: line-break, offset: 0, content: '', id: KR4d0207_SBCK_023-1a01}
  - {type: variant, offset: 0, length: 1, content: 跋, WYG: 撰天貺節青詞代郡守伏以天心昭格曽遺祕密之文神跡難窮獨記流傳之日二陰在序六筴開蓂適佳節之膺期欵真庭而薦潔法筵祗設遥瞻北極之尊聖夀無疆冀比南山之固無任懇禱之至代高文思祈福醮詞能覆以生者天之道欲安而夀者人之情雖至徳無私本不偏於所施然愚衷有禱自難己於過求仰凟蒼穹俯陳丹懇伏念臣某蚤縁勲閥濫服官箴竊禄逾涯積辜招釁神祗雖未詰責衰晚寧不震驚葢以叢百口於一門寄餘生於逺地既乏陰功之襲慶但憑真宰之埀休是用肅具法筵潛迎帝馭輸肺肝而謝過薦蘋藻以昭忠如作善必可降祥則好徳終期錫福伏願少假甄陶之力俾同草木之春殄灾沴於無形保康寧於卒嵗代髙左藏郡君醮詞臣竊聞造化無私生成不已雖隂陽有數降年黙定於菌椿然禍福無門應物自同於影響願懴可追之悔庶來畢至之祥伏願臣妾汙辱㣲賤凢庸陋質蘋􅇨致㓗初無承祖之能箕帚執勤未盡事人之義業縁火熾罪障塵䝉宜取戾於鬼神當不容於覆幬一身孱弱百病侵凌緜緜幾及於膏肓奄奄僅存於喘息卜有再三之凟醫無十一之功留連日深控告無所是用祈哀洪造備物真詞少輸螻蟻之誠冀延犬馬之齒且有生草木尚䝉雨露之涵濡而乆蟄龍虵亦賴雷霆之震奮况臣禀氣為物最靈宜推妙化之毫芒庶假餘生之晷刻至誠所感本無間於幽遐大徳曰生亦豈遺於㣲賤代人祈雨文}
  - {type: page-break, offset: 0, content: '', id: KR4d0207_WYG_022-1b, image: WYG1139/WYG1139-0529d.png}
  - {type: page-break, offset: 0, content: '', id: KR4d0207_WYG_022-2a, image: WYG1139/WYG1139-0530a.png}
  - {type: page-break, offset: 0, content: '', id: KR4d0207_WYG_022-2b, image: WYG1139/WYG1139-0530b.png}
