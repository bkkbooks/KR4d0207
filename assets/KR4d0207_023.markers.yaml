  - {type: line-break, offset: 217, content: '', id: KR4d0207_SBCK_023-1a11}
  - {type: variant, offset: 219, length: 2, content: 亦闕, WYG: 右筆供養發願文乃了翁謫官合浦過長沙時為興化平禪師作也翁甞寫華嚴經盡八十巻不錯一字或以問之曰方吾落筆時一㸃一畫心無不至焉故能如此夫心與筆相應而筆與經黙㑹則華嚴樓閣之内種種所有莫不呈露於目前矣以是求佛雖不出几硯之内曷甞不與善財同叅乎宜其語言之妙如佛所説使後之以毛錐子隨喜佛事者誦其文可依之而入也璨公方寫是經謹書以為贈紹興八年三月二十三日姪孫淵書襍説十三叚仁人心也人皆有是心}
  - {type: page-break, offset: 219, content: '', id: KR4d0207_WYG_022-14b, image: WYG1139/WYG1139-0536b.png}
  - {type: variant, offset: 223, length: 1, content: 載, WYG: 能至於仁者失其本心故也故曰學問之道無他求其放心而已矣知所求}
  - {type: variant, offset: 225, length: 1, content: 尤, WYG: 得其心得其心斯得仁矣寂然不動感而後應其應也因物而已初無一毫之私也無私故能合并以為公公則仁}
  - {type: page-break, offset: 225, content: '', id: KR4d0207_WYG_022-15a, image: WYG1139/WYG1139-0536c.png}
  - {type: variant, offset: 227, length: 0, content: '', WYG: 其中矣孟子又曰三子者不同道其趣一也一者何也曰仁也君子亦仁而已矣何必同故商之三仁同謂之仁者亦以得其本心而已不然一於私而已}
  - {type: variant, offset: 228, length: 0, content: '', WYG: 之謂失其}
  - {type: variant, offset: 229, length: 0, content: '', WYG: 心人臣之事君義所當然而其志或不同上焉者為道術其次為功名义其次為爵禄而已茍志在爵禄而已固不足道若未能舍爵禄而喜功名葢數千百人而不一遇也至於資功名以行道術又其卓然不羣希世間出者耳故人主用人不可不察也夫惟知爵禄之士為可輕則必知道術之美為可重與之重則信之篤信之篤則言聽計從而治效見矣雖然君臣以義合者也必欲重與之篤信之相期於臯䕫稷契之間適然相值亦何從而察之耶唯其學同然後有道術者得行其志其志同然後立功名者得盡其術故志同而學不同者人或得而間之學同而志不同者始雖或離而終必合葢湯之於伊尹桓公之於管仲皆學焉而後臣之此其所以始終如一而天}
  - {type: page-break, offset: 229, content: '', id: KR4d0207_WYG_022-15b, image: WYG1139/WYG1139-0536d.png}
  - {type: page-break, offset: 229, content: '', id: KR4d0207_WYG_022-16a, image: WYG1139/WYG1139-0537a.png}
  - {type: variant, offset: 230, length: 0, content: '', WYG: 國家可得而理也古者君臣之際如石投水何有不合若乃以水投石而冀其同心同徳以濟世務是猶相索於形骸之内而望其精神之黙契何可得耶為善無求名黙而脩之不求人之知可也為惡無近刑惡其可為乎為是説者葢不知人性本善而未甞有惡也孟子之言性善葢本於孔子所謂一隂一陽之謂道繼之者善成之者性之説故性之本善而已矣離乎善斯入於惡矣君子所不可及者其唯人之所不可見乎此為善之誠也何貴於近名乎若夫為惡而不恃人之知且以不近於刑為貴此姦人之所為也又可進耶莊周之學出於老氏老氏同善惡而以歙張强弱為㣲明之術且曰國之利器不可以示人故莊周見而恱之因發此論揚雄遂以善惡混為人之性至言人偽特係乎作輟之間而已其説葢有取於老氏言道徳之意此為不知善惡之所以分也孟子教人為善而去利為利未必皆惡然志在於利而不明乎義此惡所由起也故曰欲知舜與跖之分無他利與善之間也又對梁惠王曰何必曰利又語宋牼曰先生以利説秦楚之王使三軍之士樂罷而恱於利終至父子兄弟懷利以相接以亡其國其惡利如此葢以惡之所由起不可不禁耳然則孟子所謂性善之説實本於孔子夫豈不察而王氏乃曰揚子之言性兼性之不正者言之也葢有取於善惡混之説也其曰義者陽也利者隂也隂當隱匿陽當宣著利非不可為也特不當宣著為利之實而已此不知利之為害將使善惡兩行如莊周之所為也其言民可使由之不可使知之義實出於孔子而非孔子之本意葢其源流如此故其為天下假借六藝之言變亂事實傅㑹先王之法隂奪民財雖能茍安於目前而後用其術者卒至大亂抑有由矣孟子曰誠身有道不明乎善不誠其身矣又曰人無有不善夫善固未易擇也吾故非莊周而是孟子反之於正以明王氏之不知道云五霸假之也夫假之者外也聖人亦許其假乎曰此罪五霸之辭也非許之也孟子曰五霸三王之罪人也又曰春秋無義戰而春秋之事則齊桓晉文也其不許明矣然則其説云何曰所謂乆假而不歸者不歸於帝王之誠也烏知其非有則以五霸終不知其非已有也不知其非已有也者以竊其名樂其利不由乎中而為之也故曰五霸假之也罪五霸之辭也若夫堯舜性之也此由仁義行得之自然而然也湯武身之也此行仁義有心於為之也性之為自誠而明不勉而中不思而得身之為自明而誠勉而後中思而後得誠無淺深皆由中而出也既謂之假則亦偽而已誠與偽相去逺}
  - {type: page-break, offset: 230, content: '', id: KR4d0207_WYG_022-16b, image: WYG1139/WYG1139-0537b.png}
