  - {type: line-break, offset: 25, content: '', id: KR4d0207_SBCK_023-1a03}
  - {type: variant, offset: 34, length: 1, content: 士, WYG: 名山勢接高穹千里仰煙雲之覆根盤厚載萬家依松檜之隂醴泉發藥}
  - {type: variant, offset: 36, length: 1, content: 胡, WYG: 觸痾甘雨應期而蘇旱有求皆應無感不通豈衆岫之所尊故英靈之特異頃縁野燒延及精廬煨燼之餘荆榛弗剪欲資檀施力助營脩我室已}
  - {type: variant, offset: 38, length: 28, content: 國薦除御史官至宗正少卿嘗牓其室曰默堂門人沈度爲編次其詩文, WYG: 當念真山之暴露衆縁易辦願推豐嵗之贏餘共結勝}
