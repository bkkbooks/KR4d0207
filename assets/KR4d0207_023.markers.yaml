  - {type: variant, offset: 232, length: 0, content: '', WYG: 五霸之所以分也或曰古之人脩其天爵而人爵從之從之為言無所要而自至也與要之者異矣曰脩天爵以俟人爵猶未能㤀乎人爵也然則如之何曰從之者任其自爾之謂也在我者徒知脩天爵而已人爵何有焉從之字與從其白於外也之從同孟子之稱栁下惠曰油油然與之偕而不自失焉唯不自失此下惠所以為介直道而事人三黜於士師而不去推而之於三公一也夫如是其和足稱也子思曰仁者人也親親為大義者宜也尊賢為大而孟子則曰仁之實事親是也義之實從兄是也或以義為尊賢或以義為從兄何以不同曰子思之言自家以及國孟子之言脩身以及家此其所以異也夫義因仁而廣之唯所施之宜而已施之於家由事親别而為從兄宜也施之於國由親親别而為尊賢亦宜也合而為仁離而為義無二道也以其言脩身以及家故終之以樂斯二者以其言齊家以及國故始之以為政在人不使不仁者加乎其身特惡不仁者之事也若夫好仁則為已有矣愛之能勿勞乎忠焉能勿誨乎何也勞者撫人以恩為上之道也誨者教人以善為師之道也非其所當勞而勞之非其所得誨而誨之則人斯不服矣愛而不已則疑於勞忠而不已則疑於誨為愛為忠而入於勞與誨者君子之所當戒然受其勞與誨亦宜察也樓仲輝云從來解書義誰解得好余曰若論注解莫無出荆公由漢以來專門之學各有所長唯荆公取其所長絢發於文字之間故荆公為最仲輝云穿鑿奈何余曰穿鑿固荆公之過然荆公之所以失不在注解在乎道術之不正遂生穿鑿穿鑿之害小道術之害大仲輝曰荆公之說}
  - {type: page-break, offset: 232, content: '', id: KR4d0207_WYG_022-19a, image: WYG1139/WYG1139-0538c.png}
