  - {type: variant, offset: 74, length: 84, content: 錄解題載淵集卷數與此本合宋史藝文志則稱二十六卷詞三卷此本有詩無詞宋志所載蓋别本也此本首葉有影寫崑山徐氏傳是樓所藏宋槧本一行知從舊本傳錄卷二十二第十葉因原本字跡糢糊故脫去, WYG: ''}
