  - {type: line-break, offset: 1, content: '', id: KR4d0207_SBCK_023-1a02}
  - {type: variant, offset: 2, length: 3, content: 默堂先, WYG: 伏以佛以方便誓度衆}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 人之歸依如仰慈父不有難名之神力寜伸莫訴之勤誠恭惟佛牙舍利具本凈明得常堅固真精所寓葢有感而必通變化無方亦何求而弗獲今兹亢陽為害早稻將枯犇告已勤殆徧山川之祀懇祈雖切未舒溝壑之憂是用逺欵名藍恭迎真馭冀埀仁於焦巷稍借助於明靈沛為三日之霖大布一方之澤吏則不徳敢冀矜憐民也何辜在所深憫尚期皇覺俯遂羣心代人又疏右伏以承流宣化愧吏責之難逃捍患禦灾幸神功之可賴頃縁夏旱恐害秋成輒露誠衷仰祈靈貺雨應期而屢降惠猶狹而未周靡不有初既甞䝉於霑潤益觀其後庶無吝於滂沱恭惟禾山靈牙舎利南安定應大師妙質常存逈超今古化身普現寜限邇遐與天地以同根通隂陽而無間沛為甘澤何勞指顧之餘化作豐年特在須臾之頃敢布無厭之請願埀不倦之仁代人又疏右伏以常暘為害嘉澤愆期夏田既以索然晚稻又將稿矣倘縁饑饉遂致流離若無山林嘯呼之虞必有溝壑填委之患靜言撫字良積驚憂莫知所為焉能勿禱昔在煙岡之野俗傳玉女之祠仙聖下臨年榖常熟仰祈餘潤徧及一同諒㣲噀火之勞立致夢魚之應人䝉其利益願賣劍而買牛家有餘財當見乞漿而得酒恩埀不報徳播無窮代趙令永豐祈雨}
  - {type: page-break, offset: 6, content: '', id: KR4d0207_WYG_022-3a, image: WYG1139/WYG1139-0530c.png}
  - {type: page-break, offset: 6, content: '', id: KR4d0207_WYG_022-3b, image: WYG1139/WYG1139-0530d.png}
  - {type: page-break, offset: 6, content: '', id: KR4d0207_WYG_022-4a, image: WYG1139/WYG1139-0531a.png}
  - {type: variant, offset: 7, length: 1, content: 集, WYG: 造物無情神司其柄孰是弗求唯誠之聽往者積雨平地可泳過足而止不為民病曽未踰月早田已盛炎威赫然遽為旱證神始休之今豈爾吝甘澤乆愆咎在疵政謹欵靈祠為民請命咳唾風雲沛然響應匪我敢私百里之慶代人謝雨文春生秋成物無以歸其徳瓦飄舟觸人不得以為仇茍恩怨之心不存則施報之禮亦已念昔焚空之虐天豈不忍於今盈澮之祥佛亦何有唯是艱難而後得至於滂沛而有餘頓回萬畝之埀枯大慰三農之渇仰雖無功者聖人之事然易感者常俗之情既沐殊休敢忘恭謝郊後祭神文上即位}
  - {type: page-break, offset: 7, content: '', id: KR4d0207_WYG_022-4b, image: WYG1139/WYG1139-0531b.png}
  - {type: page-break, offset: 7, content: '', id: KR4d0207_WYG_022-5a, image: WYG1139/WYG1139-0531c.png}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 有六年海内乂安民物康阜乃於冬至之日祭天圜丘肆赦天下盛禮告成幽明莫不受賜睠神之休不㤀秩祀具有彛憲敢怠奉承惟至治馨香蘋􅇨可薦酒殽菲薄庶鑒其誠皇帝登寶位後祭神文比奉赦書以今皇帝踐阼俾郡縣之吏各祭其地之神某實攝兹邑職在欽承恭惟}
  - {type: page-break, offset: 10, content: '', id: KR4d0207_WYG_022-5b, image: WYG1139/WYG1139-0531d.png}
  - {type: variant, offset: 11, length: 9, content: 卷宋陳淵撰淵字知默, WYG: 聖相授曠古絶今無與倫擬固將同享無疆之夀樂此太平與天無極歡呼抃蹈海内所同神司其幽宜介以福古人有言無徳不報上之所命禮意甚渥神其歆之永豐消災道塲疏文右竊以天道無常惟徳斯輔神功至敏無感不酬茍警懼之或形亦祈禳之可稱屬者妖星流布衆目驚疑亘若長虹激如飛電雖災祥在徳未明所召之因然禍福無門敢廢不虞之戒是用恭憑凈侣同演祕文大啟法筵潜迎真馭力叙積憂之懇少明謝過之誠庶倚伏之未彰或吉凶之中變為民請命非一己之敢私自天降康冀萬生之永保幼山脩造疏文化身普現咸推及物之仁神跡難名多在逺人之域惟幼峰之勝境乃}
  - {type: page-break, offset: 11, content: '', id: KR4d0207_WYG_022-6a, image: WYG1139/WYG1139-0532a.png}
  - {type: page-break, offset: 11, content: '', id: KR4d0207_WYG_022-6b, image: WYG1139/WYG1139-0532b.png}
  - {type: variant, offset: 21, length: 12, content: 縣人紹興七年詔舉直言敢諫, WYG: 邑}
  - {type: 'kr:newline', offset: 25, content: '

