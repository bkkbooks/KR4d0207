  - {type: variant, offset: 8943, length: 0, content: '', WYG: 欽定四庫全書黙堂集巻十三宋陳淵撰辭免舉賢良状右脩職郎改差監潭州南嶽廟陳淵准尚書省紹興七年六月一日劄子左朝散郎充徽猷閣待制提舉江州太平觀胡安國奏承潭州公文准禮部牒三省樞宻同奉手詔中外侍從之臣各舉能直言極諫之士一人者臣伏見右脩職郎權江西按撫制置大使司主管機宜文字陳淵深究先聖之㣲言能談當世之要務通達國體曉知政經若獲造廷俾攄所藴必有忠讜上副訪延伏候勅㫖五月二十八日三省同奉聖㫖劄與胡安國依紹興元年九月十一日已降指揮具陳淵詞業繳進劄付淵須至申聞者右淵竊以賢良方正能直言極諌之舉起於漢之孝文盛於武宣逮其衰世猶不敢廢故得人之盛至今稱之唐因其制進士之外設為制舉以待非常之才一時名臣多此塗出至於本朝尤重其選既舉之以侍從之公又稽之以平昔之業必也行藝適稱然後試之以六論詞學俱優然後考之以廷對葢每發必中始獲與選斯亦可謂難矣自非深窮經史百氏之書博考傳記諸儒之說通達國體明習世務必不能仰副朝廷招徠之意如淵學問荒疎志業無取至於文墨尤不足觀豈可茍冐榮名自取黜辱所有繳進詞業指揮不敢承命謹具状申尚書省伏乞照㑹施行謹状紹興七年七月日具位赴召與執政劄子淵徃者蒙㤙賜對旋復被罪朝廷憫其無他特與洗滌更縁薦引置之樞府編摩之地遲暮疎拙懼不能當尋請嶽祠庻幾亟獲㣲禄可以自活自承改命以來忽已兩考方幸投迹丘壑少酧素志今兹又蒙収召顧職分則不敢違禮而飾辭念庸妄則難以冐榮而茍進徬徨失據驚悸成疾乆之不免扶持就道冀逭有司慢令之誅而已無何纔至闕下重蒙睿㫖再令登對揣已無堪益増愧恐恭惟廟堂諸公以堯舜之道輔佐聖主固将盡攬天下英才同徳一心共濟艱運海内遺逸之士誰不歸心如淵等輩鳬鴈飛集初無損益伏望啓迪之暇略賜開陳使不肖者姑以奉祠之禄待罪山林終此一任因之自免以老就閒如是則是非昭融取舎公當非唯少弭朝廷一時過聽之譏亦所以興起天下彈冠願仕之志淵雖與鹿豕為群其幸多矣}
