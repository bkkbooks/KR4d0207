  - {type: variant, offset: 2006, length: 0, content: '', WYG: 注蟲魚平生頗負連鰲手老大猶隨荐鶚書此去果符叢桂兆敢求椽筆掲吾閭鄉人羅公脩撰未}
  - {type: variant, offset: 2007, length: 1, content: 九, WYG: 時其父夢有授之詩云吾閭仙桂作叢榮紫陌先登歴幾春昨夜月娥親付與黄金榜上第三人是年羅公雖中第不如所夢次舉叔祖諫議應焉名次既不差而所謂仙桂作叢者謂祖與兄常占甲科也後令尹王公盡換邑中坊額或欲與諫議書齋巷口置坊名為叢桂坊門已立而王公去不果名已而為火所燬今巷陌故存凡卜居於此者如曹公樞宻族兄大夫家兄少卿皆相繼登科之人蓋不獨諫議一齋而已而某之陋舍幸厠其間鄉鄰欲再建坊門取此名掲之久矣誠若有待輒恃知遇先此上干尊聽故於和詩末章及之幸恕狂率也}
