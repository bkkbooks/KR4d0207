  - {type: variant, offset: 2003, length: 2, content: 文集, WYG: 五栁廬久貧應似我多病或如渠客少門常寂身閒日自舒窺園知鮮暇安得摻君裾艱難思健士誰復數寒儒老去懐三徑歸来就一區春情縈夢草晚步及栖烏不愧王摩詰新詩有畫圖次韻延年弟相慶逐客身無事乗閒葺敝廬堂成因有室水到自成渠地迥千巖秀春迴一氣舒幸為時所棄容我懶簮裾經年侍清宴飽食愧侏儒脱迹鴛鴻路忘懐草木區朝簷㸔鬬雀晚檻引飢烏已覺蓬蒿適誰能九萬圖次韻宗仁弟相慶吾閩山水國幽絶勝衡廬隱几雲生席開軒栁映渠連枝均魯衞異説屏荆舒此外無它慕何門可曳裾侵疆猶未復世不乏真儒肯使金湯地長為榛莽區頽齡真病鶴急警任飛烏縱有藏身處偷安豈逺圖次韻沈公雅相慶度沈子膏粱胄從余一草廬幾年同寂寞此日更勤渠師範宗韓孟源流接誼舒艱難思報國猶未厠朝裾尚書足勲業振迹自窮儒清徳逾三世忠名滿八區詩才推道藴𤣥㫖賴童烏豈厭隆中卧慙無八陣圖代朝宗弟和餞行二首席門誰復顧寒儒深愧頻迂長者車更為穆生時設醴應憐馮子食無魚諸生久被絃歌化盛禮誰將簡册書從此邑人蒙勸奬定知容駟有髙閭少年經業富三餘肯羡相如駟馬車要向青雲開羽翼豈辭黄}
