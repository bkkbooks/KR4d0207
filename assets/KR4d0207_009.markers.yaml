  - {type: variant, offset: 2001, length: 0, content: '', WYG: 集巻九欽定四庫全書黙堂集巻十宋陳淵撰參謀得告暫歸留别同舍次韻青蒿何敢附蒼官要以陳根託嵗寒萬事忘情知我拙一牕容膝許同歡也知堅卧元非病况是無心可得安歸去儻餘飢溺念豈能無意復纓冠次韻茂通喜雨師行初不犯秋毫坐縛兇渠泚與滔和氣自應迴嵗旱豐年當復騐秋髙横流是處通飛鷁歸佩何時得孟勞要廣江南千里潤須令天下入甄陶送張巨山著作使閩分韻得我字嵲道山仙者居是中乃置我白前英俊前糠粃出揚簸同寮事闊畧未忍棄衰惰日聞所不聞更欲學其可張侯廊廟器文字粲藻火一班見餘論已足踐青瑣欣然取使節去我何其果無乃萬斛舟未授濟川柁相攜湖上别酒盡重城鎖分離情已重去住計誰左從來洞庭野乘鴈不加夥何日西江潮送我東歸舸石夫人挽詞好客陶家舊多才謝女風一窺知帝輔三徙得儒宫遺子經猶在知人鑒已空里閭推逹識愛壻有乗騘送黄平國倅邵武雪到蓬山尚破裘倦聴餘子説封侯松楸更作連宵夢桂玉寧堪卒嵗留衣繡故應人所羡題輿仍為國分憂艱難兀坐添華髪亦欲如公可得不答呉濟仲見寄季子觀周樂妙意傳青簡諸孫拾其遺頗具前人眼新詩如珠璧字字無可㨂故應意有餘不但音睍睆念昔我方狂意輕三子撰自聞歌白雪欲和色先赧中間各流落念子忘寢饌阻尋千里盟未卜一笑莞書来得佳句竒字富瑟僴推先情已厚感舊涕應澘周宣致中興土宇日益昄膚使盡蘇張九合寧須轏兵車也天才必有用造物豈徒産椽筆儻容揮斗印定當綰既去却須来毋絶漢中棧次韻鄧天啓賀茅舍新成二首長者一牀室}
