  - {type: variant, offset: 2108, length: 0, content: '', WYG: 趙州不出三門淨名堅卧一榻我来堂下便迴此間有問有荅西堂偶爾頭痛首座從来脚跛堂頭更自黙黙客来一場􅀈㦬和璨老示雙井茶紙被簡板三偈雙井江南妙品不減建溪月團但使睡魔不作何須歸去蓬山江靜微波皺縠庭空落絮鋪茵正是鄰牀作夢直須欵欵反身縱使前詞洗盡不妨後信重通㑹取曹溪一滴語言文字皆空次韻蕭茂徳未能仰首試鳴號且復塵埃奈此勞健筆凌雲誰誤許扁舟乘雪興何髙餘生敢歎鬚如㦸薄俗終防笑有刀留滯周南何足數人間如我九牛毛黙堂集巻十欽定四庫全書黙堂集巻十一宋陳淵撰}
