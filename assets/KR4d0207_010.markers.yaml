  - {type: line-break, offset: 0, content: '', id: KR4d0207_SBCK_010-1a01}
  - {type: variant, offset: 0, length: 1236, content: 黙堂先生文集巻第十詩參謀得暫假歸留别同舍次韻青蒿何敢附蒼官要以陳根託歲寒萬事忘情知我拙一窗容膝許同歡也知堅臥元非病況是無心可得安歸去儻餘饑溺念豈能無意復纓冠次韻茂通喜雨師行初不犯秋毫坐縛兇渠泚與滔和氣自應迴歲旱豐年當復驗秋髙横流是處通飛鷁歸佩何時脱孟勞要廣江南千里潤須令天下入甄陶送張巨山著作使閩分韻得我字嵲道山仙者居是中乃置我白前英俊前糠粃出揚簸同寮事闊畧未忍棄衰惰日聞所不聞更欲學其可張侯廊廟器文字粲藻火一斑見餘論已足踐青瑣欣然取使節去我何其果無乃萬斛舟未授濟川柁相攜湖上别酒盡重城鎖分離情已重去住計誰左從來洞庭野乘雁不加夥何日西江潮送我東歸舸石夫人挽詞好客陶家舊多才謝女風一窺知帝輔三徙得儒宫遺子經猶在知人鑒已空里閭推逹識愛壻有乗驄送黄平國倅邵武雪到蓬山尚破裘倦聴餘子説封侯松楸更作連宵夢桂玉寧堪卒歲留衣繡故應人所羡題輿仍為國分憂艱難兀坐添華髪亦欲如公可得否答呉濟仲見寄季子觀周樂妙意傳青簡諸孫拾其遺破具前人眼新詩如珠璧字字無可㨂故應意有餘不但音睍睆念昔我方壯意輕三子撰自聞歌白雪欲和色先赧中間各流落念子忘寢饌阻尋千里盟未卜一笑莞書來得佳句竒字富瑟僴推先情已厚感舊涕應潸周宣致中興土宇日益昄膚使盡蘇張九合寧須轏也折兵車天才必有用造物豈徒産椽筆儻容揮斗印定當綰既去却須来毋絶漢中棧次韻鄧天啓賀茅舍新成二首長者一牀室先生五柳廬乆貧應似我多病或如渠客少門常寂身閒日自舒窺園知鮮暇安得摻君裾艱難思健士誰復數寒儒老去懐三徑歸來就一區春情縈夢艸晚步及栖烏不愧王摩詰新詩有畫圖次韻延年弟相慶逐客身無事乗閒葺敝廬堂成因有室水到自成渠地迥千巖秀春迴一氣舒幸為時所棄容我懶簮裾經年待清宴飽食愧侏儒脱跡鵷鴻路忘懐草木區朝簷看鬬雀晚檻引飢烏已覺蓬蒿適誰能九萬圖次韻宗仁弟相慶吾閩山水國幽絶勝衡廬隱几雲生席開軒柳映渠連枝均魯衞異説屏荆舒此外無他慕何門可曳裾侵疆猶未復世不乏真儒肻使金湯地長為豺虎區頽齡真病鶴急警任飛烏縱有藏身處偷安豈逺圖次韻沈公雅相慶度沈子膏粱胄從余一艸廬幾年同寂寞此日更勤渠師範宗韓孟源流接誼舒艱難思報國猶未厠朝裾尚書足勛業振跡自竆儒清徳逾三世忠名滿八區詩才推道韞玄㫖頼童烏豈厭隆中臥慙無八陣圖代朝宗弟和餞行二首鄉人羅公修撰未第時其父夢有授之詩云吾閭仙桂作􅓜榮紫陌先登歴幾春昨夜月娥親付與黄金㮄上第三人是年羅公雖中第不如所夢次舉叔祖諫議應焉名次既不差而所謂仙桂作􅓜者謂祖與兄嘗占甲科也後令尹王公盡換邑中坊額或欲與諫議書齋巷口置坊名為􅓜桂坊門已立而王公去不果名已而為火所燬今巷陌故存凡卜居扵此者如曹公樞宻族兄大夫家兄少卿皆相繼登科之人盖不獨諫議一齋而已而某之陋舍幸厠其間鄉鄰欲再建坊門取此名掲之乆矣誠若有待輒恃知遇先此上干尊聽故于和詩末章及之幸恕狂率也席門誰復顧寒儒深愧頻迂長者車更為穆生時設醴應憐馮子食無魚諸生乆被絃歌化盛禮誰將簡册書從此邑人蒙勸奬定知容駟有髙閭少年經業富三餘肻羡相如駟馬車要向青雲開羽翼豈辭黄巻註蟲魚平生頗負連鼇手老大猶隨薦鶚書此去果符􅓜桂兆敢求椽筆掲吾閭, WYG: ''}
