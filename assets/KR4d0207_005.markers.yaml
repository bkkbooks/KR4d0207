  - {type: variant, offset: 0, length: 510, content: 黙堂先生文集卷第五詩看論語四首明明孔聖能毋四的的曾參所貴三一部魯論開聖域古人無死要重參天道文章豈兩岐雷聲淵黙本同時如何子貢能言者説與無言更有疑陋巷從容一事無不因鄰鬬出吾廬簞瓢豈是忘憂物自是從容樂有餘直從堯舜以中傳又到東丘續㫁絃看取子思親的處始知論語自無偏夢得亭上雷霆卷地灘聲急旌斾揺空樹影寒千古西山留爽氣雨餘容我倚欄看留別鄧南夫四首平生交友各飄蓬只有丸丸雪後松萬里歸來還往絶獨君時許略從容昻昻勁氣初無作蕩蕩竒胸乆息機容我醉時開讜論一軒眀月夜忘歸有子才如汗血駒新門髙大可容車故應袖手藏深渺怜我氷霜涉畏途比余扵玉有竒文一落泥塗十二春慚愧深知同鮑叔尚言荆璞定逢人其文甚美今余被貢適三上故有是句折十二年前南夫有玉説一篇送子入太學越州道中雜詩十三首心息久相依息調心自住忽焉不自知根塵失所寓向來尚有錐今我已忘兔似入無功鄉不由嵇阮路暴氣燎原火淺量盈澮水不見楊闗西此生真已矣誰言佩豭由不作緼袍恥至道儻有聞客塵如脱屣世儒讀論語未脱小兒氣豈悟無絃琴中藏千古意顔淵黙然處曾子亦心醉處處儻逢渠字字皆有味人心有黙契晤語不在多一笑離凡情萬象皆含和孰是忘言人聽此無聲歌有懐閲古堂夢中時一過蕭山縣宅折閲古堂在浮雲作秋隂細雨如朝霧放形山水間意適無艱步忽遇, WYG: ''}
