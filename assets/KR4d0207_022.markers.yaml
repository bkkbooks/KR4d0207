  - {type: variant, offset: 0, length: 6770, content: 黙堂先生文集巻第二十二雜文天貺節青詞代郡守伏以天心昭格曽遺祕密之文神迹難竆獨記流傳之日二陰在序六筴開蓂適嘉節之膺期欵眞庭而薦潔法筵祗設遥瞻北極之尊聖夀無疆冀比南山之固無任懇禱之至代高文思祈福醮詞能覆以生者天之道欲安而夀者人之情雖至徳無私本不偏於所施然愚衷有禱自難己於過求仰瀆蒼穹俯陳丹懇伏念臣某蚤縁勲閥濫服官箴竊禄逾涯積辜招釁神祗雖未詰責衰晚寧不震驚盖以叢百口於一門寄餘生於逺地既乏陰功之襲慶但憑真宰之埀休是用肅具法筵潛迎帝馭輸肺肝而謝過薦蘋藻以昭忠如作善必可降祥則好徳終期錫福伏願少假甄陶之力俾同艸木之春殄灾沴於無形保康寧於卒嵗代髙左藏郡君醮詞臣妾聞造化無私生成不已雖隂陽有數降年黙定於菌椿然禍福無門應物自同於影響願懴可追之悔庶來畢至之祥伏願臣妾汙辱㣲軀凡庸陋質蘋蘩致潔初無承祖之能箕帚執勤未盡人事之義業縁火熾罪障塵䝉宜取戾於鬼神當不容於覆燾一身孱弱百病侵陵緜緜幾及於膏肓奄奄僅存於喘息卜有再三之瀆醫無十一之功留連日深控告無所是用祈哀洪造備物真詞少輸螻蟻之誠冀延犬馬之齒且有生艸木尚䝉雨露之涵濡而乆蟄龍虵亦頼雷霆之震奮况臣禀氣為物最靈宜推妙化之毫芒庶假餘生之晷刻至誠所感本無間於幽遐大徳曰生亦豈遺於㣲賤代人祈雨文右伏以佛以方便誓度衆生人之歸依如仰慈父不有難名之神力寜伸莫訴之勤誠恭惟佛牙舍利具本凈明得常堅固真精所寓盖有感而必通變化無方亦何求而弗獲今兹亢陽為害早稻將枯奔告已勤殆徧山川之祀懇祈雖切未舒溝壑之憂是用逺欵名藍恭迎真馭冀埀仁於焦卷稍借助於明靈霈為三日之霖大布一方之澤吏則不徳敢冀矜憐民也何辜在所深憫尚期皇覺俯遂羣心代人又䟽右伏以承流宣化愧吏責之難逃捍患禦灾幸神功之可頼頃縁夏旱恐害秋成輒露精衷仰祈靈貺雨應期而屢降惠猶狹而未周靡不有初既甞䝉於霑潤益觀其後庶無吝於滂沱恭惟禾山靈牙舎利南安定應大師妙質常存迥超今古化身普現寜限邇遐與天地以同根通隂陽而無間沛為甘澤何勞指顧之餘化作豐年特在須臾之頃敢布無厭之請願埀不倦之仁代人又䟽右伏以常暘為害嘉澤愆期夏田既已索然晚稻又將槁矣倘縁饑饉遂致流離若無山林嘯呼之虞必有溝壑填委之患靜言撫字良積驚憂莫知所為焉能勿禱昔在煙岡之野俗傳玉女之祠仙聖下臨年榖常熟仰祈餘潤徧及一同諒㣲噀火之勞立致夢魚之應人䝉其利益願賣劒而買牛家有餘財當見乞漿而得酒恩埀不報徳播無竆永豐祈雨文造物無情神司其柄孰是弗求唯誠之聴往者積雨平地可泳過足而止不為民病曽未踰月早田已盛炎威赫然遽為旱證神始休之今豈爾吝甘澤乆愆咎在疵政謹欵靈祠為民請命咳唾風雲沛然響應匪我敢私百里之慶代人謝雨文佛牙舍利春生秋成物無以歸其徳瓦飄舟觸人不得以為仇茍恩怨之心不存則施報之禮亦已念昔焚空之虐天豈不忍於今盈澮之祥佛亦何有唯是艱難而後得至於滂沛而有餘頓回萬畆之埀枯大慰三農之渇仰雖無功者聖人之事然易感者常俗之情既沐殊休敢忘恭謝郊後祭神文上即位二十有六年海内乂安民物康阜乃於冬至之日祀天圓丘肆赦天下盛禮告成幽明莫不受賜睠神之休不忘秩祀具有彝憲敢怠奉承惟至治馨香蘋藻可薦酒殽菲薄庶鑒其誠皇帝登寶位後祭神文比奉赦書以今皇帝踐祚俾郡縣之吏各祭其地之神某實攝兹邑職在欽承恭惟二聖相授曠古絶今無與倫擬固將同享無疆之夀樂此太平與天無極歡呼抃蹈海内所同神司其幽宜介以福古人有言無徳不報上之所命禮意甚渥神其歆之永豐消灾道塲䟽文右竊以天道無常惟徳斯輔神功至敏無感不酬茍警懼之或形亦祈禳之可弭屬者妖星流布衆目驚疑亘若長虹激如飛電雖灾祥在徳未明所召之因然禍福無門敢廢不虞之戒是用恭憑浄侣同演祕文大啓法筵潜迎真馭力敘積憂之懇少明謝過之誠庶倚伏之未彰或吉凶之中變為民請命非一己之敢私自天降康冀萬生之永保幼山修造䟽文化身普現咸推及物之仁神迹難名多在遠人之域惟幼峰之勝境乃沙邑之名山勢接高穹千里仰烟雲之覆根盤厚載萬家依松檜之隂醴泉彂藥以觸痾甘雨應期而蘇旱有求皆應無感不通豈衆岫之所尊故英靈之特異頃縁野燒延及精廬煨燼之餘荆榛弗翦欲資檀施力助營修我室已安當念真仙之暴露衆縁易辦願推豐嵗之贏餘共結勝因聿來多福書楊補之所藏了齋及道鄉帖了齋剛正而不容姦道鄉清介而不受汙觀其字想見其為人凛然皆見於心畫之間矣方二蔡無恙時士之欲謀其身而免於咎者必先瑕疵此兩人乃能得志是時公論不行於朝廷之上而此兩人者竄逐流落皇皇無歸以至於死然兩人者身可廢家可破而天下謂之鄒陳則自始迄今無異辭也此豈口舌之所能得哉其必有感人心者矣此簡作於異鄉竆阨之中語言翰墨初不經意而能乆存者豈非為無求於世者得之獨取其人而不以時為輕重耶建炎二年七月十一日陳淵書題富鄭公河北安邊䇿富鄭公安邊十三䇿得之玉山尉喻子才子才盖龜山門人有意兹世者傳書甚多異日當盡就借録焉紹興六年二月十日舟次胡頭書偶言人之言人是非初非有嫌怨也出於偶然而其人亦無意屬垣也忽焉已至若偵伺者驗之多矣此何謂也或曰人與人同㳺乎一氣或逺或近雖離而未甞不合也故相違隔世或見於夢所居異室願言則嚏而世之言它心通者坐於奥穾之間而千里之外輒能知之此戒慎乎其所不睹恐懼乎其所不聞所以為中庸慎獨之學也子思曰道不可須臾離也可離非道也而龜山之言曰譬之天地四方離東則之西離南則之北若夫無所往而非道則欲離將焉之乎夫惟不可離是以未甞不合雖然如是其説猶未離思慮之内必有非思慮而得之者吾將聞焉則未之見也中庸觧義天命之謂性言性莫非天也率性之謂道言道莫非性也修道之謂教言教莫非道也離而為三則曰性曰道曰教合而為一則亦天而已以率性為道道之在人者也以修道為教因其在人者還以治之也循天下固然之理莫之舍焉又勿助也夫是之為率立之以中過不及者有以裁之夫是之謂修率性所以成已也修道所以成物也成已仁也成物知也性之徳也故學中庸者其要在於知性知性則知天矣率性而修道所以事天也終至於賛天地之化育與天地參此其本與知逺之近必正其本知風之自必謹其始知㣲之顯必慎其小夫如是故可與入徳徳者得其在我者而已論子重昔子重簡師以伐吳無故而喪楚之良君子以為所獲不如所亡故子重病之遇心疾而卒嗟乎子重之死以其所亡之多也其所亡之多以其初不計所獲也夫不計所獲而易於出師則其得心疾也乆矣豈必喪良而後見乎形盡於喪良之後心於出師之前故子重之死原其受病非一日之積也後之用人如求其成功觀其本心如何耳無為事敗然後論其致病之由則善矣論用兵用兵而至於多殺豈君子之所欲哉然較一時之勝負繫國安危則亦有不得已而至於多殺者君子為之為國計也徳宗欲取石堡城王忠嗣以謂非二萬人不可逗撓不進以此得罪方唐之盛安危之機似不在此然忠嗣終不以二萬人之命易一時之功者重於殺人故也又豈以得罪為悔哉孟子曰争地以戰殺人盈野争城以戰殺人盈城此所謂率土地而食人肉罪不容於死夫孟子之所罪者王忠嗣之所畏也而忠嗣反不免於徳宗之貶何哉當是之時權其輕重者無如孟子之賢耳輗軏大車恃牛而行而輗所以駕牛者也小車恃馬而行而軏所以駕馬者也無輗則不可以駕牛無軏則不可以駕馬輗軏不具車雖欲行其可得乎故曰自古皆有死民無信不立為是故也書唐子西集後今人得蜀人唐子西詩文二百餘篇於吳少綝反覆玩味不能釋手真佳作也余觀近世文人其議論精深雅有前軰風流的然可施於用如此公殆無而僅有也惜其不年齎恨以沒可為太息壬寅六月七日書倦㳺雜録後此書記胥魁之賣女羣吏之偕逃辨誣也表何仙之腐敗于師之醜穢闢邪也慢行之踰垣跣足之規利誅奸也予於是見斯人之不可惑矣戯述如是不無小補豈獨賢於已乎靖康元年十一月二十日螺川書室書題了齋所書觧禪偈後了齋謂佛為覺謂禪為定人人皆可學而至如使足目俱到便登聖地至於不歴階級如吾儒所謂由之而行非行之者盖未之甞言以待學者自得焉故甞愛司馬温公觧禪偈其意猶此其書以與人不知凡幾本而李興祖得之字畫尤妙愛其字而求其意兩公之心可見矣子思子之言曰或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉强而行之及其成功一也粗妙兩融心迹一致雖聖人復起不易其言矣彼以舍迹而論心棄粗而逐妙然後為得道非正論也紹聖二年正月二十五日姪孫淵書題了齋所書佛語巻後了翁謫去合浦以書告淵曰天下之死一也死於瘴癘死也死於囹圄亦死也死於刀鋸亦死也吾今一視之俱無所擇又曰吾平生學佛唯於死生之際了然無怖汝等既知此理亦須處之有素若處之無素驟入苦趣無安樂法子路死於衛難不忘結纓其安而樂之如此處之有素故耳翁在宣和間雖獲沒於牖下平生經涉殆遍危險而不以為怨世徒悲其憂患難堪而不知其志之先定盖如此觀所書佛語皆欲於苦趣中習行安樂法者後有子孫當識此意也姪孫淵謹書題了齋所書鄧功曹事鄧功曹諱某南劍沙縣人也南縣未郡時功曹為延平鎮吏民有被誣法當死功曹直其冤民徳之願割家貲之半鉅萬為報功曹卻焉所親强之受功曹有恐殃及子孫之語至今鄉人猶能誦之又甞赴官江州未至次於徳安縣㑹曹翰屠江州縣吏例以功曹繫獄功曹憂悸黙禱時天旱獲雨雪之應已而杻械自脱甞於所供觀音地藏畫像親記其事甚詳其五世孫轂得之鄉僧乆寶藏之政和七年春叔祖右司客居溢浦轂敘述本末寓書叔祖求證其事獲書如此功曹不朽之託其在兹乎明年十一月陳淵題書蕭茂徳楚詞後建功右楚詞十巻峽江蕭茂徳得之叔祖了翁之家盖翁之所甞讀而以善本校定者塗竄注改皆其親筆觀其心畫想見其為人則其遺風餘烈或得於此此所以為可寶也茂徳翁之孫壻也始予見其初昏於南康恨未之欵後八年訪余於永豐之官舍考其學問以窺其志之所存盖足以知翁之㣲而能推大其所未究者已而出此書相示感念疇昔至於流涕太息則其寶是物也豈徒然而已哉建炎二年六月二十日姪孫陳淵書書楊補之所藏了齋書佛語糢糊惜無從抄補折以下二頁係宋本已書了齋筆供養彂願文右筆供養發願文乃了翁謫官合浦過長沙時為興化平禪師作也翁甞寫華嚴經盡八十巻不錯一字或以問之曰方吾落筆時一㸃一畫心無不至焉故能如此夫心與筆相應而筆與經黙㑹則華嚴樓閣之内種種所有莫不呈露於目前矣以是求佛雖不出几硯之間曷甞不與善財同叅乎宜其語言之妙如佛所説使後之以毛錐子隨喜佛事者誦其文可依之而入也璨公方寫是經謹書以為贈紹興八年三月二十三日姪孫淵書雜説仁人心也人皆有是心而不能至於仁者失其本心故也故曰學問之道無他求其放心而已矣知所求則得其心得其心斯得仁矣寂然不動感而後應其應也因物而已初無一毫之私也無私故能合并以為公公則仁在其中矣孟子又曰三子者不同道其趨一也一者何也曰仁也君子亦仁而已矣何必同故商之三仁同謂之仁者亦以得其本心而已不然一於私而已此之謂失其本心人臣之事君義所當然而其志或不同上焉者為道術其次為功名又其次為爵禄而已茍志在爵禄而已固不足道若未能舍爵禄而喜功名盖數千百人而不一遇也至於資功名以行道術又其卓然不群希世間出者耳故人主用人不可不察也夫惟知爵禄之士為可輕則必知道術之美為可重與之重則信之篤信之篤則言聴計從而治效見矣雖然君臣以義合者也必欲重與之篤信之相期於臯䕫稷契之間適然相值亦何從而察之耶唯其學同然後有道術者得行其志其志同然後立功名者得盡其術故志同而學不同者人或得而間之學同而志不同者始雖或離而終必合盖湯之於伊尹威公之於管仲皆學焉而後臣之此其所以終始如一而天下國家可得而理也古者君臣之際如石投水何有不合若乃以水投石而冀其同心同徳以濟世務是猶相索於形骸之内而望其精神之黙契何可得耶為善無近名黙而修之不求人之知可也為惡無近刑惡其可為乎為是説者盖不知人性本善而未甞有惡也孟子之言性善盖本於孔子所謂一隂一陽之謂道繼之者善成之者性之説故性之本善而已矣離乎善斯入於惡矣君子所不可及者其惟人之所不可見乎此為善之誠也何貴於近名乎若夫為惡而不恃人之知且以不近於刑為貴此奸人之所為也又可進耶莊周之學出於老氏老氏同善惡而以翕張彊弱為㣲明之術且曰國之利器不可以示人故莊周見而恱之因彂此論楊雄遂以善惡混為人之性至言人偽特係乎作輟之間而已其説盖有取於老氏言道徳之意此為不知善惡之所以分也孟子教人為善而去利為利未必皆惡然志在於利而不明乎義此惡所由起也故曰欲知舜與跖之分無他利與善之間也又對梁惠王曰何必曰利又語宋牼曰先生以利説秦楚之王使三軍之士樂罷而悦於利終至父子兄弟懷利以相接以亡其國其惡利如此盖以惡之所由起不可不禁耳然則孟子所謂性善之説實本於孔子夫豈不察而王氏乃曰楊子之言性兼性之不正者言之也盖有取於善惡混之説也其曰義者陽也利者隂也隂當隱匿陽當宣著利非不可為也特不當宣著為利之實而已此不知利之為害將使善惡兩行如莊周之所謂也其言民可使由之不可使知之之義實出於孔子而非孔子之本意盖其源流如此故其為天下假借六藝之言變亂事實傅㑹先王之法隂奪民財雖能茍安於目前而後用其術者卒至大亂抑有由矣孟子曰誠身有道不明乎善不誠其身矣又曰人不可以為善善固未易擇也吾故非莊周而是孟子反之於正以明王氏之不知道云五霸假之也夫假之者外也聖人亦許其假乎曰此罪五霸之辭也非許之也孟子曰五霸三王之罪人也又曰春秋無義戰而春秋之事則齊威晉文也其不許眀矣然則其説云何曰所謂乆假而不歸者不歸於帝王之誠也烏知其非有則以五霸終不知其非已有也不知其非已有也者以竊其名樂其利不由乎中而為之也故曰五霸假之也罪五霸之辭也若夫堯舜性之也此由仁義行得之自然而然也湯武身之也此行仁義有心於為之也性之為自誠而眀不勉而中不思而得身之為自眀而誠勉而後中思而後得誠無淺深皆由中而出也既謂之假則亦偽而已誠與偽相去逺矣此五霸之所以分也或曰古之人修其天爵而人爵從之從之為言無所要而自至也與要之者異矣曰修天爵以俟人爵猶未能忘乎人爵也然則如之何曰從之者任其自爾之謂也在我者徒知修天爵而已人爵何有焉從之字與從其白於外也之從同孟子之稱柳下惠曰油油然與之偕而不自失焉唯不自失此下惠所以為介直道而事人三黜於士師而不去推而之於三公一也夫如是其和足稱也子思曰仁者人也親親為大義者宜也尊賢為大而孟子則曰仁之實事親是也義之實從兄是也或以義為尊賢或以義為從兄何以不同曰子思之言自家以及國孟子之言修身以及家此其所以異也夫義因仁而廣之唯所施之宜而已施之於家由事親别而為從兄宜也施之於國由親親别而為尊賢亦宜也合而為仁離而為義無二道也以言修身以及家故終之以樂斯二者以其言齊家以及國故始之以為政在人不使不仁者加乎其身特惡不仁者之事也若夫好仁則為已有矣愛之能勿勞乎忠焉能勿誨乎何也勞者撫人以恩為上之道也誨者教人以善為師之道也非其所當勞而勞之非其所得誨而誨之則人斯不服矣愛而不已則疑於勞忠而不已則疑於誨為愛為忠而入於勞與誨者君子之所當戒然受其勞與誨亦宜察也樓仲輝云從來觧書義誰觧得好余曰若論注觧莫無出荆公由漢以來專門之學各有所長唯荆公取其所長絢彂於文字之間故荆公為最仲輝云穿鑿奈何余曰穿鑿固荆公之過然荆公之所以失不在注觧在乎道術之不正遂生穿鑿穿鑿之害小道術之害大仲輝曰荆公之說本於先儒先儒亦有害乎曰先儒只是訓詁而已不以已意附㑹正經於道術初無損益也只如荆公引擅生殺之謂王能利害之謂王此申商韓非之所為豈是先王之道而彼不悟反以證經曰此自荀子之說何為不善曰若論道則荀卿容有不知者其説亦何足取荀卿之門出李斯斯之術卒以亂秦源流有所自矣然則書言惟辟作福惟辟作威非耶余曰今人勸人主攬權多用此説而不知聖人之言意有所主其下文云臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國盖曰威福之作唯人主當爾人臣如此必致凶害所以戒也豈生殺由我之謂哉曰用人惟已之義又如何曰用人惟已見賢焉然後用之不以左右大夫國人之譽而用人也人主深居九重人之賢否何自而知之必有以聞於我者其用不用則在我矣是之謂用人惟已如今之特㫖識者不以為然豈有有司定罪不至於此而人主固欲重行此何理哉故凡人主欲攬權柄者必為臣下所奪矣趙韓王再相太宗既罷對於便殿太宗問人主如何得威柄在已對曰若事事付之有司則威柄在已若事事要出於已則威柄歸宰相矣天下以為名言或曰普自以不復用故言於太宗不然亦普之所祕也曽天㳺云人須是躳行說得不濟事余曰此極是然不獨行之艱知之亦難只為不知知豈不能行曰人非下愚誰不知者只為不能行若日中見溝塹終不到陷在其中唯夜間則不可知余曰只為日中見得分明且非獨夜間如盲人雖日中亦有時乎為溝塹所陷不見故也此所以貴乎知知之則能行之矣吕居仁云曽問楊丈舍生受生事楊丈答書云俟他日面見說子細後來楊丈有事至今不得其說如何余曰來無所從去無所止不知舍是何人受是何物曽天㳺云古之學者為已今之學者為人所謂為已盡其在我者而已此甚分眀不知為人如何說又謂子韶云為人乃求人之知恐不然余曰為人如有人則作無人則輟之類是也為已何千人事此聖人發眀古今學者之所以不同大率後世作事都是為人如五霸假仁義以尊周室徒説其名其誠安在誠是為己偽是為人己未十一月十七日夜夢邵康節論數手持一巻紙縱横界如棊局其上有字不依窠眼翻巻之示余云天地之數不可干他陽生自至余甞論命以謂上聖至於下愚莫不有分分既定矣不能乗之以往而欲致力於其間非贅則虧故人為非命也孟子曰莫之致而至者命也周公告君奭曰在亶乗兹大命所以處之其說盡矣由是言之數既已定又豈可干乎待其自至可也世之不知命者謂人力可以必為縱其欲利之心無所不至而終無所成者多矣或者推之荒忽一切不為怠惰委靡使天之所賦莫或助之其亦自暴自棄而已二者胥失也故命於人無不定聖人安之君子信之至於下愚則役於隂陽而不自知矣黙堂先生文集巻第二十二, WYG: ''}
