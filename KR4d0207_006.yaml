front:
  text: 默堂先生文集卷第六
  hash: sha256:84129e962b072c3389aa528351e573dd54800a10fdcca9ac6101f1974ca49c2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_006-1a}
body:
  text: 詩閩縣令陳夢兆魚樂軒有樂寧勿憂無憂乃至樂觀身見物理魚樂豈豫各萬生擾為病安靜即艮藥何以適其情已定要無虐江湖與此池等是泉未涸周旅苟得所是處覺寬綽君看瀕海民兹物困剽掠縱橫墮鈎網瑣細入杯杓誰云滄溟廣遊泳渺無託乃知尺澤間所樂逾縱壑我家一畝宫隙地不容鑿未能禁數罟念爾每懷怍陳公吏之師養善息羣惡愛民以及魚退念此盤礴魚亦喜公來出沒供笑謔當年濠上遊天籟紛酬酢昭琴既不鼓應問兩俱錯賢哉鄭國僑一物心無著但信悠然語未悟已投鑊懸知此魚烹不羡波間躍誰當較異同我亦無今昨午睡懷安縣風篁亭旌旗蔽野階除寂環佩鳴空枕簟涼夢斷鈞天知是想一溝泉落樂聲長次韻鄧志宏送張思道遊福唐紛紛涴耳俱宜洗坐遣髙人厭丘里迅流早自促行舟更有西風滿江葦當年筆陳掃千軍今日流輩推能文英詞谹辨灑醉墨倐忽百變春空雲人間萬事秋毫細軒冕儻來誰著意身隨去棹落波間興逐冥鴻渺天際三山便到蓬萊宫卸帆海嶼窺魚龍夜涼橫笛㺯明月萬頃琉璃秋色中自京回次韻鄧志宏見贈妙齡才思湧如泉末技文章不自賢餘子豈知多問寡老生端許一當千淹留莫止為山簣收拾終同至海川雲路筆間天尺五會令雞犬亦能仙翁承事挽詞五首徐行直視日如愚律己齊家盡可書九十一年由砥道肻令荆棘敝衣裾不將堯舜等瞿曇簡語寧同賣菜添惆悵老成無復見一時流俗正清談意深曉堯舜之道則佛在其中矣折公言簡而意足語人曰吾不知佛竊苦語熏心不易忘它時聞教我為詳須知令尹多仁術實自嚴君有義方霜髯碧眼照華燈夾道遊人避履聲曾是元宵隨步月西風何忍見銘旌至今人追思之折是年公上元出逰樓閣溪山兩鬬雄中橫千丈未雩龍當時令尹兒啼處依舊東流繞七峰泊舟延平二絶野梅飄盡喜春歸又見溪桃片片飛醉臥暖風呼不醒亂紅無數點人衣星河不動水東流夜影搖空逼釣舟夢破滄浪歌在耳欲尋溪友向煙洲寓漳南淨衆寺三月晦信步到庵亭曠望久之聊寄所感意行不知遠倚杖囂埃外南州風物繁此地溪山會俯窺城市喧蟻垤幾成壞只爾可忘情未用旋吾斾過永春劇頭鋪見壁間石刻臨漳王漕詩輒題數句壁間得微詞語盡意有餘模傳豈真知無乃勢所驅從來碧紗籠不護寒士書焉知題柱生終無駟馬車粉板會當洗援毫聊自娛從人分輕重削迹今何如次韻德純通判賀用中生子暴客年來不過門羡君三秀各生春懸弧適在龍溪側履迹知從劍水濱魯國考祥欣得鯉杜陵占夢信為麟問名更取詩翁語盛事流傳西鬬新取絶筆之義故云折德純欲名之為麟奴次韻李伯紀舍人招飲胸中造物可與友筆下騷人真是奴共傳排佛似遷愈獨喜賦梅追隱逋盤空未念鴟腐鼠在野寧無駒束芻時時造席聞妙語謬辱知己非夷吾再和李伯紀舍人韻時來將相寧有種衛青故是民家奴懸鶉未用嘆嵗惡闊網近喜除官逋蠲逋負折詔書近本無得喪任失馬但有言説皆陳芻從公一飲百壺盡醉倒不知誰謂吾和李舍人留題泛碧齋山腳回環插遠潯碧琉璃上玉為岑共憐采鷁風前試正值滄波雨後深應為蓴鱸輕去國遂令胡越盡同心濟川此去為舟楫也念江湖有陸沈陪知縣夜飲泛碧齋再用前韻暑雨初收水拍潯溪光南北影千岑移舟為愛玻璃闊放盞那知琥珀深緩帶小風來水面倚欄涼月轉天心酒酣更駐凌波襪直待銀河夜色沈鉛山道中小休秋陽如獵火四顧不可避肩輿得微隂休此僕夫瘁我生道途間嵗月七之四山林固清遠及物乃初意黃雲堆隴畝早稻一尺穗所欣居者樂未敢嘆勞勩詔書寬逋負豪吏不少置民窮戒勿擾天下適無事贈別楊至遊三首醉鄉佳處許誰臨幸有匏尊可共斟要試從前寬窄量但知空盞莫辭深和平簡易是吾師自有家風更問誰不是妙年狂氣歇可能從我獨無疑貪嗔癡盡即如如究竟心源一法無應悟濓溪真古佛始知伊洛是醇儒次韻李伯紀舍人食了齋所寄石芝有感石芝附石元無根有名不載農黃文絳囊遠致自東海謫仙為向詩中論談餘得味仍遭苦未辨終甘莫輕吐此言要自顯真心不比繁詞較鍾乳太丘晚交誰獨深梁溪心如百鍊金只應異代友元禮許國有盟今更尋雙魚萬里將芹子妙意難名聊寄耳餘甘橄欖正須渠它日忠信今悟矣而微苦久方發甘知此味者鮮矣宜以為獻也折了齋書與舍人云石芝東州物也初食淡然已書室獨坐春入庭柯寸寸藍風簷孤坐怯輕衫青天白日從來好柏樹桃花子細參自浦城放船下建安寄龎幾先扁舟西下趂殘陽目斷雲邉歸雁行短棹莫辭風浪惡人間平地有羊腸茆柴也解發清狂仰看雲天盡十觴白首歲寒猶道路自憐無意避風霜奉陪婺州守南樓宴集溪山自昔東陽勝賔客偏于北海多四座英標真倚玉一時雄辨劇懸河淹留慚應三刀夢豈弟仍傳五袴歌更避正堂延蓋老待將清靜繼蕭何曹相國尊蓋公事云折公待龜山異甚故用奉陪龜山先生觀修城西山渺渺送斜陽往事回頭一夢長萬里喜霑新雨露百年重拓舊金湯杵聲撼野雷初動鍤柄揮風蟻自行尊俎折衝今可恃補牢端為念亡羊次韻鄧志宏和吏部謝公鐵字韻詩二首結交自惜羞餘耳直要人情淡如水晏嬰鮑叔久已亡嗟我欲從誰氏子大栟筆陳掃千人詩成不顧俗士瞋長歌欲奪謫仙氣短韻更逼宣城真城謂謝吏部也折謫仙謂李舍人宣爾來念我知交絶託以不能資老拙自笑今年錐也無何須更覔針頭鐵愁霖十日槎生耳寒氣薄人如著水坐對毗耶數卷書未厭銅爐燒柏子區區我亦可憐人只有無求人不瞋雖無名字振京國不屈未應慚子真凍琴壁間絃自絶袖手深藏鳩更拙本無流水遣誰知此去從人譏嚼鐵再和鄧志宏韻二首石馬祠門餘隻耳夢魂先過瞿塘水人間得喪豈偶然可笑紛紛夸奪子文章自古多窮人妙奪造化天應嗔謾言勤苦得富貴見彈求梟何日真張羅門巷行人絶嵗晏誰憐生事拙窮通有數勿復言已辦此心堅似鐵先友遺書猶在耳念之清淚如鉛水可憐萬事已忘情獨嘗託我芝蘭子阿戎文采映前人脫略不顧妻孥瞋却能飲我瞑眩藥知我老大言尤真利欲昏人須猛絶妙年母謂吾謀拙古來解使玉如泥劒鋩除是錕鋙鐵廖成伯奉議生辰曾聽尊前世綵歌喜聞煙袖舞婆娑祖諌議有小詞云綵折用中建堂名世綵叔煙熏舞袖故云折衣長久五世祥名駒汗血得夷路老柏凌霜只舊柯桃李盛時隨地有芝蘭生處近人多春風二月年年事莫問靈椿嵗幾何交溪靜安院見許尉題壁次韻柱頥修劍上凌煙自古功名亦偶然鍾鼎山林俱不惡一瓢吾欲盡餘年默堂先生文集卷第六
