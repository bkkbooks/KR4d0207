front:
  text: 默堂先生文集卷第十
  hash: sha256:bc1729c4675076258d46ea72e119b3b5586560936986dc6cef392e64778ce76c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_010-1a}
body:
  text: 詩參謀得暫假歸留别同舍次韻青蒿何敢附蒼官要以陳根託歲寒萬事忘情知我拙一窗容膝許同歡也知堅臥元非病況是無心可得安歸去儻餘飢溺念豈能無意復纓冠次韻茂通喜雨師行初不犯秋毫坐縛凶渠泚與滔和氣自應回歲旱豐年當復驗秋髙橫流是處通飛鷁歸佩何時脫孟勞要廣江南千里潤須令天下入甄陶送張巨山著作使閩分韻得我字嵲道山仙者居是中乃置我白前英俊前粳粃出揚簸同寮事闊略未忍棄衰惰日聞所不聞更欲學其可張侯廊廟器文字粲藻火一斑見餘論已足踐青瑣欣然取使節去我何其果無乃萬斛舟未授濟川柁相攜湖上别酒盡重城鎖分離情已重去住計誰左從來洞庭野乘雁不加夥何日西江潮送我東歸舸石夫人挽詞好客陶家舊多才謝女風一窺知帝輔三徙得儒宫遺子經猶在知人鑒已空里閭推逹識愛壻有乘驄送黃平國倅邵武雪到蓬山尚破裘倦聽餘子説封侯松楸更作連宵夢桂玉寧堪卒歲留衣繡故應人所羡題輿仍為國分憂艱難兀坐添華髮亦欲如公可得否答吳濟仲見寄季子觀周樂妙意傳青簡諸孫拾其遺破具前人眼新詩如珠璧字字無可㨂故應意有餘不但音睍睆念昔我方壯意輕三子撰自聞歌白雪欲和色先赧中間各流落念子忘寢饌阻尋千里盟未卜一笑莞書來得佳句竒字富瑟僴推先情已厚感舊涕應潸周宣致中興土宇日益昄膚使盡蘇張九合寧須轏也折兵車天才必有用造物豈徒産椽筆儻容揮斗印定當綰既去却須來毋絶漢中棧次韻鄧天啓賀茅舍新成二首長者一牀室先生五柳廬久貧應似我多病或如渠客少門常寂身間日自舒窺園知鮮暇安得摻君裾艱難思健士誰復數寒儒老去懷三徑歸來就一區春情縈夢草晚步及栖烏不愧王摩詰新詩有畫圖次韻延年弟相慶逐客身無事乘間葺敝廬堂成因有室水到自成渠地迥千巖秀春回一氣舒幸為時所棄容我懶簮裾經年待清宴飽食愧侏儒脫迹鵷鴻路忘懷草木區朝簷看鬬雀晚檻引飢烏已覺蓬蒿適誰能九萬圖次韻宗仁弟相慶吾閩山水國幽絶勝衡廬隱几雲生席開軒柳映渠連枝均魯衛異説屏荆舒此外無他慕何門可曳裾侵疆猶未復世不乏真儒肻使金湯地長為豺虎區頽齡真病鶴急警任飛烏縱有藏身處偷安豈逺圖次韻沈公雅相慶度沈子膏粱胄從余一草廬幾年同寂寞此日更勤渠師範宗韓孟源流接誼舒艱難思報國猶未厠朝裾尚書足勛業振迹自窮儒清德逾三世忠名滿八區詩才推道韞玄旨賴童烏豈厭隆中臥慙無八陳圖代朝宗弟和餞行二首鄉人羅公修撰未第時其父夢有授之詩云吾閭仙桂作􅓜榮紫陌先登歷幾春昨夜月娥親付與黃金榜上第三人是年羅公雖中第不如所夢次舉叔祖諫議應焉名次既不差而所謂仙桂作􅓜者謂祖與兄嘗占甲科也後令尹王公盡換邑中坊額或欲與諫議書齋巷口置坊名為􅓜桂坊門已立而王公去不果名已而為火所燬今巷陌故存凡卜居于此者如曹公樞密族兄大夫家兄少卿皆相繼登科之人蓋不獨諫議一齋而已而某之陋舍幸厠其間鄉鄰欲再建坊門取此名揭之久矣誠若有待輒恃知遇先此上干尊聽故于和詩末章及之幸恕狂率也席門誰復顧寒儒深愧頻迂長者車更為穆生時設醴應憐馮子食無魚諸生久被絃歌化盛禮誰將簡册書從此邑人蒙勸奬定知容駟有髙閭少年經業富三餘肻羡相如駟馬車要向青雲開羽翼豈辭黃卷注蟲魚平生頗負連鼇手老大猶隨薦鶚書此去果符􅓜桂兆敢求椽筆揭吾閭興國璨老往漳州二偈送之江梅又趂一陽回身在旃檀林下來行到漳南香未歇百花聞此一時開浮雲出岫本無心桔橰俯仰人所引一大藏教留後人看與不看渠自省鄧端友臨要閣五首昔年曾到十三樓一日西湖十頃秋寒碧軒中最宜暑只緣修竹近清流樓之一絶似此景故云折寒碧軒乃西湖上十三間十里煙波竹外溪隔溪青嶂繞窗扉詩人不見東坡老直節空餘一尺圍修竹一尺圍也折東坡詩所謂窗前誰家多竹門可欵臨要閣前沙岸傍謾道薰風能解愠正應蒼玉自生涼繁枝蓋地欲成幄傑幹凌空不礙簷為語韓公莫除好此間風月豈須添添風月應除數百竿折退之竹洞詩云若要甘苦原從舌上知竹間風味與誰期萬竿可斬從人説一榻乘涼要自嬉端友和臨要閣詩再次韻五首茅齋西望水邊樓亦復開軒對奕秋欲效子猷偏種竹竹前那得一溪流乘興誰當訪剡溪竹間應復掩雙扉也知劇暑攻人急正賴青奴一解圍午窗清夢接羲皇茗碗無多置我傍此味若令兒輩覺人間容有竹風涼宿靄初收一卷簾萬山騰沓擁飛簷靜看野色連蒼竹便覺間中氣味添不將朝服換斑衣正以親年慰所期却恐英名喧衆口未容萊子作兒嬉送朝宗弟赴試南宫霜餘賓雁日南征念子衝寒去我閩應向月娥占昨夢欲攀仙桂赴新春平生學海真無底晚節詞鋒更有神要路爭先吾老矣可無髙論躡平津慶鄧德逹得子海中仙果真難得天上麒麟必異才速客未為湯餅供薦觴須俟鯉魚來書心畫詩書法從中得難將筆下尋欲知神合處始悟畫由心篆隸秦非古真行晉迄今竒蹤存翰墨妙意本胸襟雄健猊翻石騫騰鳥出林古人求筆正八法響隨音題興國寺碧落軒北山其下僧伽塔影落軒前草樹間誰向月明看白牯靜中相對兩俱間休論暮四同朝四且説前三與後三造物戲人無足較老禪深處要重參端友以桂漿兩樽見惠賦詩六首白衣挈榼踵吾門頗説雙泉更有兄洗盞為君開醉色不知人世有王閎秋水無聲㵼玉觥鏡奩初啓淨無塵未將滋味誇殊勝已覺風神最惱人濁者為賢聖是清古人無復論甘辛因觀表裏如氷玉始信荀揚未盡醇鼠竊跳梁十里間數杯中夜得安眠千艘雷動人方擾一榻山頺我自仙餉我兩樽才斗許客來索飲不論升明朝此物豈易得縱有市酤寧獨醒投轄誰云有祖風啜醨難與貴人同竹林若許供雞黍助我醇醪幸少豐代陳應之作淑德初無玷髙情更出塵擇鄰思教子剪髮為延賔裁鑒推前識提攜即偉人東牀他日選烏府號忠臣謁璨老病未能起留二偈示之
