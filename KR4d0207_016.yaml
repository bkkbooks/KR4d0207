body:
  text: 書答翁子静論陶淵眀所論王摩詰責淵眀非是精當頃聞之蘇黄門稱淵眀欲仕則仕不以求人為嫌欲己則已不以去人為髙飢則叩門以求食飽則雞黍以延客古今賢之貴其真也若此語深得淵眀之心矣今公所謂真者無乃㡬是乎雖然此語可謂得淵眀之心而不可謂義之盡也淵眀以小人鄙督郵而不肻以己下之非孟子所謂隘乎仕為令尹乃曰徒為五斗米而已以此為可欲而就以此為可輕而去此何義哉誠如此是廢規矩準繩而任吾意耳孔子曰和順于道徳而理于義又曰行義以達其道淵眀至處或㡬扵道矣扵義則未也舎義而言道自聖學不傳之後其弊至今尚在則佛之徒是已淵眀何㡬乎盖孟子之言氣以為配義與道若曰配義而已則扵體有不完配道而已則扵用有不濟彼舎義而言道則是有體而無用也而可乎體用兼眀此古人所以動静一如而聖學所以為無弊也今言淵眀氣象雖萬鍾不可留數頃公田其能挽住耶是則然矣然不顧萬鍾一也至扵孟子則去其君必有謂焉何哉徒得其義而已此不可不辨也君子扵其言無所茍而已矣愛其人當學其為人淵眀固賢扵晉宋之人逺矣扵此竊有疑焉過承語及不敢自黙恐或未然更願埀教上皇帝代院粹孟作臣生長東南以儒為業間嘗學兵自太公司馬孫吳之書擊刺行陣坐作進退之法與夫歴代謀臣猛將竒正相生虚實相形合散無常變化莫測戰勝攻取謹守豫備之術以至隂陽卜筮天星地志占謝厭禳異端曲學之説凡支離而不合交路而難通者實無所不觀亦無所不知盖自堯舜夏商周秦漢以来迄扵五代之間所以得失成敗治亂安危之跡如春秋史籍之所著見者以臣所知揆之如辨白黒如數一二如駕輕車馳駟馬而行扵四通五達之衢唯意所適無不快者又嘗以謂古今殊時利害相絶故當世之務尤不可不講扵是本之天時驗以物理辨風氣之所宜察南北之異習相山川之險易稽人情之思斁較天性之能不别民力之勇怯究習俗之向背度夷狄之従違如是者盖有年反而自觀亦以觀世胸中之所既得者了無可疑矣而未有能彂之者方少年時志氣激昻過自標置誠有所負而臣所居邈在閩海之陬爰自勝衣以至今日游泳太平和氣之中耳不聞鉦鼔之聲目不覩旌旗之色雖欲自効其道無由是以泯黙退處自同寒蟬若有所待不自知其愚不肖不足以為當世用也去年以臣老親之命俾臣求試禮部謂縱罷斥例當得官臣以家貧急扵禄飬間關逺来至㑹稽遇故人為守將留臣踰月是時睦冦方跳梁扵山谷之間或謂不旬日當就擒戮實無足慮臣獨言甕牖繩樞之子一旦猖獗聚徒萬計安得不慮或者笑之臣已而以心語口曰是難與他人計者當囊書北去言之君父庶㡬萬有一達焉其遇不遇雖死無悔及臣来京師試扵禮部不偶幸與廷對復處下列又自以謂古者功名之士必其資可以富貴今臣命竆如此借使其術不踈亦必無補扵事以是亟欲南歸又念臣親年八十臣今既歸勢不可逺去膝下遂將老死巖穴而平生所志終不能少攄一二以報陛下天地覆育之恩顧欲與麋鹿相為春秋草木同歸扵盡何果扵自棄之甚也扵是洗心易慮追書曩時所自得者為兵説十篇雖詞意儇淺計策無取引脰長命自其真性非自欺以欺陛下者比也敢獻之闕下惟陛下留神而幸察焉臣聞趙括讀其父書至其論兵雖奢不能以口舌難也然無救扵長平之敗孫臏吳起各有著述考其所言臏尤精密而屢有敵國之辱由是觀之言之不足信也固矣故霍去病曰顧方畧何如耳不至學古兵法夫言之而善如二子者尚不足信况如臣十篇之説言不能達其心文不能究其言亦何足道又况草竊未誅上自朝廷下至布衣韋帶之士竒謀碩畫日陳扵黼座之側盖必有瑰偉絶特之論過如臣萬萬者方斯時也持其狂瞽欲以上動冕旒之聴臣固知其難矣雖然漢之所以定三秦擒項羽者韓信之䇿也蜀之所以制孫權取劉璋者諸葛孔明之䇿也是皆立談之頃遂定大計卒如其説使言皆不足信又焉有此夫言豈可以一㮣論哉惟真知兵者為能言唯善聴言者為能用耳今臣區區之忠欲以自見非適為利文雖不工志或可取陛下幸聴臣言以為不欺置之用兵之地使臣有所依附時出智畧以禆主帥或能為陛下安反側之心收散亡之卒使逆賊腹心内潰黨援外離割裂糜潰卒扵無以自植臣扵是盖不能無分毫之助矣干冒雷霆罪當萬死謹繕寫兵説十篇并書一通投進臣不勝俯伏戰懼待命之至代人上杭州守某不肖往嵗備員屬吏得以瞻望風采日聞謦欬之音竊謂凡人之所能者閣下皆能之至扵閣下之所能者人未必能也以是進而踧踖聴命則不敢阿諛以求附退而奔走服役則不敢矯激以為髙異同之論無以彂其愚可否之獻無以賈其直衮衮稠人廣衆之中眇然若無見也盖嘗黙窺盛徳之一二私切志之以謂他日幸而有所施設以所嘗聞推之扵是庶㡬有以乗時而御變又念流落蹇滯之跡年將五十顧亦何求扵世借使不能自已其誰實與之去年秋求試漕臺偶為有司所錄意造物者稍復見憐俾更仕籍已而又為禮部所黜自惟薄命何敢怨尤而飢凍迫之不免從宦今得官江西將就食扵竆僻寂寥之境日逺君子恐遂為庸人之歸因循以老顧平生所以向風願學之意思欲一備掃除之役而不可得者有如不言終扵委棄閣下亦何従而察其心乎此某所以不避飾説之嫌歴陳仰慕之萬一也某聞之天下之事無甚難非其人則難亦無甚易得其人則易難易不在夫事而在夫人之得失此為天下得人古人所以汲汲而不敢後也閣下所臨錢唐為東南一都㑹素號繁劇難治比年兵火之餘比之他郡其害為甚盖其他仍錢氏割據之舊繼以本朝鉅公偉人之遺烈民生其間不見兵革戰鬬之苦者二百餘年異時堂皇之廣可容千人而門闈之制甲扵淮浙與夫浮圖仙聖之宫富人大家之室樓觀倚空金碧照映與江山雄傑之氣相稱一旦燔燬僅存州宅繼復被灾曩所謂宏麗壯觀之處十失八九此其害所以特甚而治之所以益難也自衆人觀之方財殫力屈之際欲復其故積以二十年之功猶懼不完今閣下来此曽未再秋而荆榛瓦礫之墟化為重簷廣厦之䕃丹漆雕繪爛然溢目至扵増城浚池益侈其舊而上下帖然不以為病此其計果安出乎而閣下動容嬉笑無以異扵平居無事之日所以㳺刃餘地其必有道矣然則人之所難者誠閣下所易也方閣下之司漕計也公私之用裕然有餘人以為善扵理財及其為中執法也上不畏雷霆之威下不顧權貴之勢人以為長扵論事自兹出守建安寛而不弛猛而不殘以寡取為富民之要以不擾為安民之本惠澤甚博既久而人益思之逮移錢唐其事業章著暴白卓犖瓌竒盖又如此昔汲長孺在朝淮南憚而寢謀雖以人主之尊不冠不敢見也故其忠誠義氣形扵出使則有發倉之仁顯扵治郡則有清静之政然積薪之論或譏其褊豈其學有所未至與今閣下有彊眀英偉之資愛民利物之志而輔之以精深博辨之學故随其所歴率能有濟方古名世之士猶將躐而先之則其胷中所藴豈淺之為丈夫者所能測哉然某嘗謂古之所謂智者審度以趨扵是而已而所謂才者剸裁以適其宜而已乃若才智過人而氣或不足亦不能行則氣也者才智之所待以有成者也盖天地之氣其稟之扵人與形俱生與神同運充乎四體而不見其畛而人之在天地一氣之内猶魚之泳扵水也夫能内外合一同然無間則體之充者固已塞乎天地之間矣以是行乎萬物之表富貴不能淫威武不能屈儀秦不能逞其辭賁育不能奮其勇雷厲風飛而莫測其迹山藏海納而莫見其礙故語其剛大無以尚之此天下之士所以俯伏聴従而莫能與之抗也故某論閣下之徳所以獨立不懾者惟其氣之剛大而已才與智盖其細者爾則向之所謂能人之所不能者其非有得扵此乎某之仰慕誠在扵此夫以某之不肖非敢自謂粗能識閣下之所存也然凡今出扵閣下之門而閣下借之齒牙之論剪拂而成就之者盖亦未必皆能識之而某也獨以奥泄塵冗不獲自躍扵鑪錘之末則今日之言其可已耶惟閣下留意而誨察之豈勝幸甚干冒台嚴伏増惴悚見余縣丞代人某聞之人㳺乎隂陽之一氣猶木之浮扵海風波之中偶然相值蓋萬有一焉不可必也已遇而復睽後將冀其復合是則難矣以閣下之聰眀器識出乎天性翺翔學校曽未數年遂掇髙第而又生長扵公卿達官之家其氣勢之盛足以吹嘘枯槁轉為陽春稍借攀援則亦鳴珮曳履扵朝廷之上矣顧乃徘徊迂左屈為縣佐辱臨敝邑此固不得而得者而某也衣食扵奔走留連他方久而忘返今兹不幸遽攖大故杜門假息喘喘扵苫塊之間偶未即死適當閣下来暮之日躳竊餘庇亦所不自期也夫以閣下好賢樂善之誠心與某向風懐德之勤意俱不期至此若扵此時猶以喪服自拘不復仰干將命以道其區區之心一旦閣下驟被識擢且去為教導之官遂梯貴近而某以孤苦摧毀奄然就木是終不獲親聞咳唾之餘論矣比之浮木幸㑹扵今日又將趑趄不進是果何時而復合乎此某所以不知容貌之不足以動人而以不腆之辭墨衣扶杖布願見之心扵下執事也閣下其察之進退唯命答陳了翁右司淵扵易書嘗習讀其句讀而已比連辱兩書皆以所得易之精微見教自量不肖何足以當此意反覆玩味且幸且慚所論自賁至頥凡八卦發一義例引而同之使參差不齊者如魚貫栁又以孔子之教人曽參之不忽孟子之存養舜之孜孜為善與夫大學致知格物之意參錯其間事理互融義語俱妙而始終連絡曲當人心乃知古之作書者非獨措意圓備其造語立言亦無不該徧也此可以傳不朽矣而以淵之初學特辱教之淵安能受之而不慚乎當更熟讀而精思之恐日後扵此能有所進也存其心養其性使所居不狭以達夫大者之大至扵蕪梗廓然不為吾礙進而得所止矣而又自視欿然不有其大勞謙以終之然後不為小人之歸淵既粗聞其㮣矣若乃學易之道以維為要體之扵身其維安在生生之謂易豈續維絶之道乎又恐諸行無常事屬生滅有生有滅不可以言易矣夫維絶而復續可也然而曰固我之維又曰舎我之舟何也舎舟而不易維可乎所謂物不格則易而無體易而無體則不足以見易如是則易未嘗無體也而孔子曰神無方易無體何也豈此所謂體者無體之體乎孟子曰必有事焉格物而物格之謂也以是為易信乎其有體矣而今之為易者離人而言易故常措易扵無用之地是以涉有者滯色而入無者墮空而易之道喪矣然則舜與曽參之所有事者彼何足以知之向非左右以髙眀之學廓古人所未彂其孰能至此賁所謂柔来而文剛者以剛為體而柔以文之也故亨分剛上而文柔者以柔為體而剛以文之也故小利有攸往皆天文也其亨者以剛勝其小利有攸往者以柔勝而已夫柔不可以偏勝也舎車而徒以有趾也寧徒而弗乗顧吾之義而已自彊之道也而賁之所以亨者以剛勝也故賁其趾為賁之初焉未之能行唯恐有聞其行者自行也尚何待乎至扵白賁則見素抱璞無所事乎外之文也故憂患不能入焉是以無咎而志得志得不在外故也然既謂之白而曰無色者豈以白可以受采而本無定色耶四教之所以先聖人施教扵人也故宜先易而後難力行之所後教人以為巳之學也故宜先内而後外此其所以不同也凡此雖不敢不對而亦不敢以為然者也其疑者求解其是者求證如斯而已前書所謂震奮受震而非能自震者也抑管中窺豹時見一班耳安能聞聞扵未聲之前思修扵既聞之後乎所寄語錄序已領浄土觀音二記扵似祖處見之用意精深皆非淺陋者所能究測也如有石本乞賜兩本為重答廖用中正言承示邪説辨一篇誠哉是言也特䝉埀誨至感至感不肖亦嘗如此作文數篇其大㮣以謂今日之禍起扵王氏王氏之學不熄則祖宗之治不復祖宗之治不復則中興之功不成中興之功不成則被髮左袵之嘆近在朝夕矣夫王氏所謂道上不畏天下不恤民訕薄宗廟輕侮老成以異端為正道以公論為流俗尚功利之臣開邉鄙之隙長奔競之風啓欺蔽之漸影傳蔓滋以至今日遂使忠臣義士放逐而不伸姦朋逆黨猖狂而莫禁㓂賊侵侮二聖播越祖宗百數十年之基業一旦㡬覆考其根芽所自證據甚眀非特空言盖存實迹若非條析而縷數之如前所陳以示天下期扵掃除絶滅而後已則祖宗所以用人制法理財治兵安養百姓而綏服四夷之意何自而眀而天下士大夫承陋守固之俗亦何自而知之乎夫士大夫天子所與共理者也扵是有所不知而猶安扵故習則所望以致中興者誰耶如是則外侮復至而中原將為夷狄之區矣此非難知之事也何則王氏之學既已膠固入人心髓不可解矣而世無大人先生以道自任開迪而訓誘之又無縉紳大臣以天下後世為心排斥而禁止之其人往往随時所尚以徼利達口談祖宗之美而實倍先聖之道者充塞海内恬無忌憚間又以邪説自文其誤以謂輕死節而外美名吾慮不如莊周重一身而忘天下吾慮不如楊朱同善惡滅禮樂吾慮不如老聃樂閒曠避世患吾慮不如佛之徒凡此皆彂扵王氏而成扵偷安徇利之俗故天下靡靡日入扵衰薄亂亡而不悟此而不變今日之禍使誰救乎而祖宗已壊之基業將何以致中興乎盖禍本起扵王氏而今之士大夫皆其末流所教養而成就者也以禍易禍其為不可亦眀矣故王氏之學其本不去去而又不能絶天下不可為也且申韓之術其流至扵秦項之亂天下之民死者十八九以其無以熄之耳今王氏之學所以致禍幸未至此又幸有知其為邪説者不圖所以熄之吾方為吾之説彼亦將為彼之説幸其自敗而自止耳萬一不敗又自以為是也吾恐聖人所以禁暴而止亂必不如是不果矣孟子曰吾為此懼閑先聖之道距楊墨放淫辭使邪説者不得作方孟子之在下使之不得作者有以辨之也幸而在上為楊墨者不從則如之何其亦用辨乎其將誅而絶之乎故曰能言距楊墨者聖人之徒也或距之以言或距之以刑其道一而已矣吾將為聖人之徒其敢緘黙而無説乎畧陳所志非公無以彂不肖之狂言與龜山先生楊諫議淵上覆上嗣位之初遽有兵革之事賴聖德已孚人心歸順醜類竆􅕚即日奔潰乃宗廟社稷之靈天下之福也然前日頓革積敝多出扵太上之設後来雖有㫖凡擾民害物之事一切除去令官司悉意奉行敢有茍簡滅裂者寘之重典而監司守令尚懐猶豫申請待報遂使澤不下究為害豈細謂宜條舉縷析眀示本意繼以升黜則人知所向不敢沮格矣如郡邑之有守令雖不能盡知其賢否至扵諸路監司豈不易察間有貪暴不法愚暗無識狃扵舊習未遽悛革之人尚容居職雖名盡復祖宗法度誰為行之大抵今日之事如救焚拯溺勢不可緩一失機㑹後將費力諸公議論既一上復見信正當此時不可憚煩要須一一為上深言之且多方汲引趣死不顧利害之人使之各出其力共致太平庶㡬無悔若乃意指未定賞罰不眀内外百官疑扵趨赴日復一日不見成效後之視今亦恐無以異扵今之視昔也比者頗聞四方俊彦稍復召用為之竊喜然類皆厭聞熟識之士深恐眀目達聰尚或未廣夫求賢之路不廣則所取以充位者必多舊人舊人衆多其間嘗歴要官者寧無懼罪幸變之意以夫懼罪幸變之人雜然並進操兩可之説挾嫉害之情萬一見聴大事去矣此不可不早計而熟慮也昔元符之末一時忠義之士往往集扵京師弊源不除禍根猶在而臺諫議論唯務平静自以謂大中至正之道無易扵此至有先朝老成剛毅素著者不復收召而異時罪首遺患後来者更見尊異識者寒心而諸公莫悟其非也未㡬小人得志幽黨成市牢不可破盖自辛巳迄扵乙巳二十有五年間蠧國害民之政相仍無間太上雖灼見其事屢詔更革然卒不勝小人之衆乍變乍復遂至開邉隙来冦盜㡬亂天下不有堯舜則祖宗基業何術可保今也天幸攘刼之餘帖然無虞小人之罪既得而天下所謂賢者又已進用不扵是時招致俊良期扵無遺芟夷奸佞期扵絶跡乃復因循果何所待耶如聞渠魁尚未伏誅逺方不得其實借使果不赦亦當播告海内使人人無疑然後可以責之自盡以奉其上也眀道先生云變化人材易作成人材難盖作成之道非一朝夕乃若變化之則在朝廷之上示之以趨向而已如漢唐之初用以致治者皆異代所棄之人也豈必先有儲蓄然後可用哉今天下已仕之人或無令名而亦未有惡聲者莫不欲洗心向道乗時有為若朝廷之意堅確不移人人可使為善而成功矣亦在兼收博取不求其備而已諫省久不除人丈人居是官天下所共嘆仰以為得人愚者一得之慮儻或可取幸委曲留意也始欲致書李左丞陳數事方其驟貴又且有功其勢懸絶恐言之無益又嘗論郡邑之敝為二十篇欲進扵上亦未敢所懐鬱鬱不展因奉起居之問輒及一二不揆不揆淵再拜覆行在雖去廬陵不逺然此地迂僻絶無所聞邸報動經數月不到不審淮南賊盜已平百姓安堵否詔音寛大而實惠不及民此弊根源深逺未能遽革若朝廷號令議之既審然後發庶㡬必行則不至失信信則民知所趨赴矣郡邑之官絶少陶汰頃者臨軒遣使俾察吏之㢘汙勤惰若務為姑息縦舎太甚則此行果何為耶祖宗之法民聞其將復未嘗得利而已喜不自勝所以安反側息鬬訟絶覬覦鎮逺服盖已有其效然小吏懐疑貳而不舉長吏樂因循而不察督責之政不施扵其間欺蔽沮隔甚扵前日只如止科率平税賦正官名募民兵此數事州縣今如何奉行監司郡守曽遵朝廷之意否他處不可得知江西一路則親見聞也無名之取以備緩急加耗之征未減常嵗冗員雖去而案籍仍舊游手蠧財而教閲無法朝廷之意非不美也而千里之外亦已如此欲使實惠及民不亦難乎夫號令不行徒為文具則朝廷不尊而紀綱日以不振民猶飢之待食旱之望雨而積日繼月曽無毫髪之利以慰其心欲民心之不離不可得矣夫民心宗社之根本也今天下有叛兵無叛民則民心信若可結矣若必守祖宗之法而以愛民之意行之不為虚文專求實效則民將相率同歸膠固而不釋矣中興之功豈不可濟乎不然西北卒未可復東南又無以守之積薪之下其火已燃而暴風不已天下之勢安危之機判矣謂宜精求博訪有用之才凡有意扵斯民而通知祖宗致治之意者俾當監司郡守之選計東南所用之員畧更置之去者不必深究其罪來者責其見效嵗月之間稍有可觀則黜陟勸沮之政加焉其誰敢不勉若乃邑之有令其數實繁不能徧察儻監司郡守真得其人間有可委以除授移易者聴其擇才不拘以法則貪汙殘刻頑鈍疲輭之人將無所容而積弊之害民者庶乎其可革矣其畧如此其詳不待多言也且行祖宗之法在得人而人材之乏莫甚扵今日為上者常患乏材又不思所以收拾儲養激厲而旌勸之往者無及又將因之顧何以善其後乎此甚可慮也夫東南之勢如孫權之扵吳劉備之扵蜀觀當日所用之人所行之事與今果如何然僅足以解紛排難而不能合天下為一由是知漢光武之再造為甚難而唐肅宗雖能削平僭亂使眀皇復歸京師而不能使後世子孫以天下之勢取河北此亦不足怪也如救焚如拯溺奮不顧身猶懼不濟而朝廷大臣方且持祿保位朋黨比周以蔽君子玩㓂啟侮莫此為甚此而可忍其如宗廟社稷何其如二聖何計已在思慮之内何待晚進之言但因論東南今日之弊不覺縷縷及此幸勿以僭易為罪也答陸伯任伏承示責己論一篇良有開彂中庸之書世之儒者近始知讀之然知其味者尚鮮不謂乃得吾友發揮而躳履之何此道之幸也子思曰射有似乎君子失諸正鵠反求諸其身求仁而已唯仁之求何暇責人乎然公所論固佳以鄙意觀之又似有未盡者如曰世有反此者終身用之而不自反是惡夫責人者之言也故為未盡也孔子論仁曰好仁者無以尚之惡不仁者其為仁矣不使不仁者加乎其身夫不使不仁者加乎其身第能使在我者無不仁而已若夫好仁則己至扵仁矣譬如磨鏡垢盡眀見已見其明垢復何在故惡不仁者去垢之説也好仁者其鏡之已眀者與此好仁與惡不仁者之所以異也故求仁而至扵好則責己之道庶乎其能盡哉孔子曰君子之道四丘未能一焉顔子有若無實若虚犯而不校其始也責已而已其終也至扵無己可責矣然文詞牽迫非可以一言而足又或相待以明自有抑揚非見理者之病偶縁無事故相指㸃要以来佳論耳儻因寄聲更告詳見教也與翁士特學士淵輒以所見上浼聰聴東南在今日盖天下根本之地異時苛撓之政未能盡革財殫力屈不可再擾比者經制司不得已調發民兵所給錢榖皆出扵官郡縣所有粗可支吾民未加賦也已而經遍行剗刷毫髪不可輒用漕司又以募兵之餘封樁之外復督随軍財物萬數不免取之百姓嵗饑民貧所在草竊不禁重以科須萬一有意外之警何以處之今仁聖在上人心悦服必無可畏然北宼未寧逺方疑駭亦似不可不過計也又閩中召募膽勇經由江西者六千餘人本以赴闕指揮徑往似聞未有所屬若畿甸清野則至者無歸此軰稍稍恣横久之糧盡計竆其將奈何惟天下大勢非小已所當僭論然如士特在經制幕中實任足食足兵之責亦宜反復熟慮也淵不勝私憂之甚惟勿罪率易為幸淵昨者不量因論東南在今日乃根本之地而財力俱困復調兵督糧未已極為可慮未䝉見答教其不逮豈忽之耶為復令已行不可改耶今固無及矣然亡羊補牢亦當為後来計更冀留念也適有一事不敢不言亦公所宜聞者江西十城豫章為㑹府其次䖍與吉為大郡二郡守人提千餘卒合安撫司所領兵同赴京師之急安撫統一路自當亟去若䖍守雖去而憲臺在焉緩急猶有所賴唯吉守不宜輕動彼迫扵勤王之詔未皇熟慮老拙盖嘗為陳利害又不䝉見聽今既去行即到闕矣然自古姦宄竊彂本無常形方時凋弊尤不可忽郡有守人所信服所以弭患扵未然今綿地千里邈在一隅旁無彊援遺而他之萬一有警誰任其責方公豈弟慈祥克勤細務吏不能容其姦人甚安之數月間發兵召募至扵再三更辦随軍之物所費動以萬計府庫空乏而民不以為病斯亦可見其措置有方矣乃過扵畏慎勉為此行征車一動攘刼四起雖旋擒獲終掃不盡非直鄙人以為深憂也夫以千百新收之卒進無所屬欲以何為若随大軍或有毫髪之助盖必有能其事者而非儒生之所可辦也今舎其所宜守彊其所難堪非徒無益其害甚大謂宜俟其既至麾下即可以領兵付之健者速遣還任責以守郡之效庶㡬一方赤子有所依附豈非使司所樂為乎儻可以瞽言聞之中丞否此事盖東南大利害東南之扵天下猶四體之一耳一體受病餘體不得寧矣今江西諸處關報盜賊唯䖍吉諸邑為甚念之寒心伏幸埀聴恕其僭易之罪淵不勝懇到之至與廖用中中丞淵再拜伏承以先丈朝請墓表見屬俾得序次其實豈勝榮幸竊惟老成前軰潛德隠行未易窺測宜得當世大手筆妙扵語言名高而位重者發揮晦㣲庶以取信天下昭示後世顧如不肖疵賤無聞詞意淺陋實無足取雖公愛予之厚出扵誠意其何以當重念不肖昔年數侍先丈燕閒備聞誨飭又嘗扵公粗得其平昔所志所為之一二盖不可謂不知者而公又忘其奥渫卑冗眷然不置過以相託其敢以為辭但恨文字暗弱不能形容盛美萬一而衰退埋沒仰累下取之意雖勉彊紬繹粗能成篇輒塵視聴其如愧懼若何可言謹具錄如右伏俟裁擇淵再拜自得北来之報惋恨憤嘆㡬廢眠食至今每上心輒忽忽如不欲生賴今上入繼大統宗社再安天下幸甚重念祖宗百數十年基緒巍巍如此乃生無一人奮不顧身以徇國家之難者遂使二聖播越皇族波迸拱手不救嗚呼何其痛哉何其痛哉淵人微跡賤無足比數懐不能已尚爾無以為情况如吾兄嘗被兩朝拔擢方以家禍坐苫廬中萬里聞之痛當如何近者諸賢皆召以此中絶不得邸報不知施設復如何似聞伯紀入覲議以大駕還東都建康之遷復不果誠爾南北未分中興之功當可期也不知彼中所聞又如何何由晤見以盡鬱鬱之懐臨紙悵惘曷已淵再拜前書敘説先丈得病以至臨終及公所以安厝始終孝養甚詳讀之令人愴然不得釋者久之然人子之心何有竆已既襄大事又當念所以追報當如何耳慎勿過摧毀也又知贖得溪邉族人舊居葺治既畢老人得易簣扵此想亦以為喜也不飲食七八日精神不昏但氣漸微即奄然而逝此所謂順其道得正命而終者盖積行之報亦平生無外慕他營之驗也正叔先生臨去如此佛之徒至扵坐忘立脱亦以無怛化而已初不殊也墓誌如此做不知可用否恐意或未以為然未敢書去此等文字手生又不喜循常轍發明已所知者慮與公意不同然力盡北矣果以為可刻則讀書去未晚也又郡中事多必一兩日方書得了而来人久候不遑故且令攜藁上呈耳後便告及其詳或改亦無吝示喻又不暇往復則陳子通亦自能書如篆額既煩子通并書丹亦佳名姓不必假他逹官恐與求銘意不同如何如何埋銘見貺甚荷然少商量謝氏盖祔也謂葬扵其宅則以謝氏爲主矣季子之墓孔子書之不名著也今不名以子不可名其父也然則自爲誌非也以辛丙記向面出扵近世隂陽家古無是然謂向辛則據乙可知矣葬以丙午嵗十二月甲申如是焉書之可也而又繼以卒哭之眀日何也豈欲以卒哭推知其歿之月日乎古者既葬而虞遂祔廟然後卒哭然則未葬不廢哭也所謂卒哭之眀日葬其言似不順矣今世俗以百日過爲卒哭亦起扵大夫士庶人三月而葬之禮顧後世隂陽家之説行士大夫葬期鮮有在百日之内者故以百日爲斷非古道也此其可以爲據而又以爲節且以表見其歿之月日耶石已埋則無及矣或未埋請改鐫之如何墓表前題竊以謂當去服色而加致仕二字所作人姓名當附其末唯今天子及上字全行提起餘如國字召字之類只空一二字遇言公者勿提此古法也世俗尊所作文之人扵前凡遇稱亡者輒空字不可效此屢經持論謾及之恐可助思慮也碑字如苦要不肖寫急遣人来喻亦不争三四十日幸悉之與李叔易學士淵再拜自別後未嘗通起居之問非直寡便實無可言今兹不能無言倘辱不鄙豈勝幸甚了齋之得罪斥逐以至扵死天下共知其寃至其心所規為䝉患難而不變者自吾軰之外誰復知之知而不與之眀與不知何以異頃不肖如南康時右丞嘗與之書見屬傳去已而了齋有數百言復之中述三人皆嘗居相位者此其知右丞之必至此位以有為無疑也其逺取狄梁公又有深意今右丞輔聖主朝萬國呼吸之間掃平驕虜再安宗社遂居柄任則了齋先見之眀亦驗矣前語云云非付囑乎然則欲以眀之實在右丞不可已也了齋諫省論事天下所共聞今皆時過之語唯王氏日錄一事則其始終所留意者盖自紹聖以来天下忠言嘉謨皆坐以謗訕宗廟之罪而其所謂謗訕者特其用意與王氏不同而已非有異扵神祖也若日錄之書詆誣譏玩上陵宗廟見者切齒而昔之用事者反遵其言追議刑賞故了齋以死眀之其自言由熙寧以来至今紛紛不已者其禍皆出扵此書此書不復施行則祖宗之法可以漸復不然亂亡之不暇䘏其暇計一身之危辱哉其著四眀尊堯集所以痛絶王氏中間有㫖取索或惡其言之深已謫其人又禁其傳播以是留藁扵不肖之姪孫今尚在也朝廷若以為其人忠誠義節所宜尊奬則凡有舌者皆可辨白如曰天下之禍舉在此書不可不毀毁之所以除後来無竆之患則尊堯之意其可沒而不聞乎比覩詔音盡復祖宗法度贈溫公以太師之官祖宗俱可法則熙豐之緒不必偏執温公既無過則王氏之意不當獨取然此其大目也若乃條分而件析之又在委曲講眀不應茍求無事而已往者元符之末諸公皆顧惜事體争持大中之説謂此可以靖國弊本不除禍根未翦不一二年間小人得志天下遂被其害如是者二十有餘年春初冦難若非堯舜在上民心歸往則祖宗基業何術可保不待逺引異時亂亡之證兹可以監矣惟天下之事吾發之吾能收之然後可以傳之久逺而無弊或乃容而勿問忽而不察亦恐千丈之堤蟻穴可潰事過而語雖悔無及矣了齋嘗有一詩相送今謾錄去觀此則知淵之言亦不可已也果䝉埀聴乞扵暇日説似右丞以不肖意爲望更有臆説具扵龜山書别紙如見安止令取一觀或可采亦幸告右丞也不揆不揆仲輔季言知己赴官久矣想常得書他日聞公得北州幕官待二年闕而去嵗北州不可往故疑公決在京師或有書幸付安止寄来慰此傾想與向伯共侍郎淵再拜前年秋忽承泰寧葉龍圖送示所頒省劄又領胡給事父子及范節推書道台意相與之厚必欲寘之賔幕使以時速来且喜且懼若無所容尋即奔走承命㑹至江閩接境有自衡州安仁来者云所在擾攘前塗已不可去且湖外尤甚而向公已辭新除不果赴踰嶺而南矣扵是遂反將樂居無何將樂順昌兩邑羣盜相繼而起蜂屯蟻雜動以萬計汀邵去路不復可通展轉賊巢朝夕惴恐不免乗流東下避地福唐盖自去年中春至八月末始獲歸見龜山驅馳水陸疾病因之嵗且盡菽絮不給或謂前所差違年又公已改命鄂渚則辟吏當随府罷㑹廖用中由省曹遷右史以其般家人速不肖叅部方此月十四日離家行三程而湖東所遣人追至伏奉十一月八日手誨敦諭勤懇實出望外非獨義當改轅其扵私計尤便前此僦僕賃馬已作赴行在計更有一二事當至浙中又問之徃来者謂湖東雖已平帖而由贑入桂陽自永新趨荼陵皆取途江西汀邵間道尚阻未可遽前復成留滯想望籌帷恨無羽翼耳重念淵衰遲疵賤人所鄙薄雖飢凍迫之終不忍抗容飾詞乞憐扵當世君子借齒牙之餘論以活其身用是遭世艱難其困益甚正爾自棄不知公何従知之又辱憐而收之情久而無倦禮過而益勤顧惟何人敢違執事者之意耶而人事參差有適然者正可嘆亦可笑也然不肖此行初為參選而往今不復爾則淛間般旋當亦不久度不過一月必由衢信以歸問道稍通或不過家徑趨幕下春夏之交決見公扵湖湘之上矣又未知以此得罪左右否康侯書云自公再来湖東孔彦舟既為馬友所敗逾洞庭走荆江而東馬友亦聴帥司節制而曹成李宏者衆至數十萬又皆稟約束吳錫復肻就招更能出力掃平李冬至之亂生擒其衆盖不計數積嵗流毒一旦廓然無事自非雄畧邁倫慮無遺䇿誰克有此公之勲烈扵是無前比矣誠然有志之士孰不願出門下而不肖首被賞拔寧不知幸固將激昻衰懦少伸末路之感以報國士之遇而躊躇稽滯豈其情哉伏惟寛眀必有以照察之也然近者妻弟自㑹稽回頗能道行朝事又得用中書云聖徳日躋二相同心其進退人材往往合扵公論康侯既有西掖之除朝廷累遣趣之旦夕俟其至將遂大用不容退處又有言公扵上者謂宜在廟堂之上而公近者觧紛排難其所成就卓卓如此恐與康侯皆不得久扵外矣正恐竆命所招僕去而公已来如相避也儻縁天幸得遂其私心豈勝至願又不敢以一已之私妨四海之待膏澤者伏紙敘情徒自不皇寧耳梁溪兄弟書謹已遣去必無遺墜龜山别時甚安有書附来介自致政以来亦頗有論譔幸其益健了所著述也子發久聞而未之識未遑裁書第増傾向九卒有不至者竆冬逺来路迂費倍勞苦之甚秖重不肖之罪其還畧有以助之若由䖍吉而去則薪粲之價稍平庶㡬可疾到也不勝覼縷殊覺僭易又旅次不復具外啓併望原恕幸甚淵再拜淵受深知扵門下者十年獨恨未嘗㳟識瞻慕盛徳無以自釋今兹誤䝉收召獲造行朝方有承顔之幸曽未旬浃遽違教席平生所懐未及傾盡乃復隔濶殊劇悵仰不審比日履兹乍寒啓處何似伏惟豈弟宜民百福順集益祈調䕶寢興上副倚注下慰輿望淵不勝區區之情平江之政未三數月上下稱頌以為前後鮮儷豈非道之以徳故其效速耶幸竊聞之賛嘆無已嵗復大稔想見千里之内人人飽食安居黠吏不能擾也論者多謂老成不應逺去禁掖久處外服然股肱郡得人則近壮朝廷逺推徳意艱難之際所補亦不淺意公以道事君必無彼此之間苐恐聖眷素隆不容委蛇扵外也佇聞環召以慰公議淵曩者仰禄嶽祠遽奉詔㫖不敢不来既至重叠被恩皆過其分又不獲辭避衰晚迂踈以榮為懼雖復黽勉就職實不皇安每念竆薄之甚動輒顛躓已分退藏丘壑終身不厭何意朽株尚汙繩墨無乃吹嘘過當造物者重違執事之意致此叨冒耶所恨地寒人微意廣年邁未知所以為報下情懐感而已筆墨所陳莫謝萬一黙堂先生文集巻第十六
