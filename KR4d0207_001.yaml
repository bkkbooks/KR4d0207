front:
  text: 黙堂先生文集卷第一
  hash: sha256:40e272a222a16eb6c69d5413660a6ec6d4da41b2caf6aa8cec7119fdad32fd42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0207_SBCK_001-1a}
body:
  text: 門人沈度編詩延平江上呈呉國華先生青山如偉人可望不可制屹然瞰碧流龍翔虎豹視春風何時來草木舞深翠禽鳥暖相依飛鳴得真意誰言静無作坐致無邉利願言斬茆茨結室傍薈蔚且要觀此身功業亦細事玉山驛見周東老題詩和之塵勞千種秖紛紛之子歸來始一春掉舌不知何處去又還攜劍出南閩立我軒其書院折鄧南夫名是身猶逆旅真吾所寄耳若人問真吾本空何可擬立我物必隨我應為物使捐物更求我是以物為已文章鏡面塵富貴路傍屣胡為認而有展轉迷不已此迷自何得定以有我起逹人齊萬變視彼猶視此隤然天地間形槁心如水獨有長存者萬刼不能死夷齊與盗跖趣操定誰美是非儻難分物我那相訿君懐經濟心題牓故云爾我乏異俗才詩言亦其理和人獨酌二絶共矜春色盡銜盃文字紅裙各有儕何似西園閒處士一盃花下畏人來休論身外千端事且醉花前一榻風舉盞但能邀皓月隔籬何必喚鄰翁鄰有張生者病革勢不可救忽夢醫人鄧舜臣言服萬病圓如説服之遂安感而作詩醫王脱超如蜕蟬幻身變滅成飛烟百年薪盡火猶傳直驅神馬竆青天自從和扁不少延冀北萬疋今蕭然挾方儲藥人摩肩閒花野卉紛爭妍昨夢宵蝶正蹁蹮忽忽神遇髙人前舊交量見意終圓相顧眼笑如忘年因言癘疫興哀憐語我妙藥醒沈緜唯有岐婆世所賢此物病極猶能痊覺來攬衣視星躔明月墮落遥山巔挑燈草簡便求旃十粒入手收淮蠙平明攻疾才下咽頓活始信真天全先生愛習不忍捐尚念故國多凡縁秖應造物相留連閔此衆萬刼火煎故令丹成猶未仙妙畀神力司隂權世間愚術謀相先不計性命徒論錢誰能如公心不偏此詩義直何當宣付與末俗懲輕悁崇安分水嶺已見江南艸木菲筍輿愁下亂山圍但将雙淚憑西注寄語江神穩送歸離紫溪驛小風吹面雨㢘纎輕薄衣裳懶更添一線離情裁不㫁暮雲将過粵山尖鉛山欲留無計去還悲漸逺閩山物象非家在天南今北首忍看歸鳥背人飛信州禪月院晚眺一覺華胥日又曛晚來愁緒亂紛紛角聲對起重城近吹動靈山萬疊雲舟中初晴碧玉空江漾曉暉水光浮簟影交飛酒昏頭重慵扶起臥看蛟龍上客衣登睦州環峯亭月照空山杜宇啼喚歸漁艇夜天低那堪又是雙溪水獨上危樓十二梯泊姑蘇憑滙亭候同行不至扁舟繫岸五六日草屨遶亭千百迴欲行無計住不可夣想萬亊心如摧燕雀飛鳴意自適翩翩簷外相往來乃知荆棘殊不惡培風萬里真勞哉次韻李仲虎召伯相遇區區千里為浮名小隱終慚鄭子真雙闕幾時瞻北極萬山無處望南閩尊前壯士今如夢胯下真王跡已塵共俯淮流追往事玉蟾依舊水鱗鱗噲韓信廟折此地有樊重陽後送謹常兄之符離鎖外分攜處離觴話逺途黄花看不足寒雁去何孤農圃非吾業衣冠本世儒應當御名行止無使世氛汙九月二十二日秋舉失利出門用中相餞夜步河上留別太平今日古無鄰觸目郊原事事新年少自應迷鼓吹野人終是厭塵埃忘懐處世思同俗有事闗心不為身藥石有能醫乆痼此生寧復怨垂綸錢塘過廖次山以詩見贈次韻往來江海兩年餘自怪鄉音已變呉樽酒每思難㑹面客鄉何意復趨隅雨寒君未瞻天竺水涸吾妨適鏡湖幸此徘徊緩分袂笑談猶得對氷壺適越水淺未能去因此遂折次山有意逰湖阻雨僕将塘相㑹折得乆于錢次韻欲㳺西湖阻雨去年賞西湖薄暑攀躋難同逰幸勝士酒沃衣巾斑今嵗來錢塘臘雨扁舟寒友朋適四集局蹙樊籠間此生分林泉造物猶余慳未為登嶽禱且作訪戴還無私本天理敢怨隂雲頑向來旱蝗惡征賦亦未寛寧令風作雪要看麥堆山蕭山覺苑寺雪後杜門雪融簷溜如秋霖古寺掩闗無足音詩書廢放道眼浄鐘鼓杳隔禪房深老僧勸坐媒以火茶鼎静聽蒼蠅吟胸中激梗造澄澈一念不作千憂沈浮生半日未易得邂逅勝境聊安心明日孤帆落何許嵗晚濁醪誰共斟錢清待潮江潮來去自有時扁舟閣淺心如飛岸容霜竹青照眼春信雪梅香撲衣天寒鄞江道路阻嵗晏錢清風俗非故園回首二千里落日看盡行雲歸錢清過堰小風吹樹寒流止始覺西江潮正起須㬰倒卷縠紋來已沒岸痕猶未已江流自下河自髙逆上更堪行罔水九牛回首竹索細十丈沙泥拒舟底舟師絶呌鼙鼓喧觀者騈肩汗如洗未經破碎亦偶然得造漣漪真幸爾世間何事非人力計乆終須倚天理他年我欲治河源要使黄流貫清泚蕭山雪中寄季脩南雪一尺餘兹事豈常有直恐春氣融不忍加以帚我友隔十里無人共觴酒披衣坐短蓬吟苦千呵手疾風穿簾幙隂霧低牎牖思君欲乗興奈此衣見肘吾生為已踈未即學耕耦要令天下肥自以一身後三登今告祥此意亦云偶端能歌豐年擊壤和田叟過鑑湖稽山霸業已蕪沒賀老鑑湖今幾時當年乞得亦清絶不道後日知誰尸人生底物乃吾有謬辱君賜寧非癡逰人依舊逐勝賞歌舞自昔皆塵泥荷枯葦折洲渚出深處不變清琉璃汪汪萬頃撓不濁坐令我憶牛醫兒季脩欲之仰山預作詩送之飄零今日海東偏見子奔馳不自憐洛社求師霜入屨仰山尋隱艸連天白雲南望家雖近璧水東來計已然頼有從前息心地不令塵土化流年病減枕上五首堦草無期日自生獨餘貧病破元正春風一種生生意誰道年來也世情飄零古寺倚江邉髙臥春風百病纒造化小兒真戲我不令歌酒趂新年多情春夢草生池起欲尋芳力尚疲未觧維摩無一語故應習氣欲題詩塵埃子石蒙蛛網殘落霜毫暗蘚紋未把語言為戲劇新年不作送窮文三釡承親計已踈萬鍾行道竟何如安貧未赴闍黎飯信命寧裁宰相書八上宰相書折退之年二十季脩有詩求公晦顔公書元次山碑銘既而公晦和成使病者亦賦之英雄仙去形骸薧空有遺銘臥荒艸誰将後事付平原石刻長隨天不老古來筆法多神逸㫁碣塵埃誰復掃顧無清議藹人間末伎縱工何足道往年好古搜竒蹟百過曾看爭坐藁直詞無復假軍容僣逆知公能辨早教兒秖欲傳家法揮金可笑歐陽媪豈知名義重丘山遺屨終令魯人寳此碑文墨兩竒偉千載漫郎猶有考當時談笑傲豺狼首領不求明哲保至今心畫落銀鈎逸若驊騮初脱皁先生年來好收書兼愛此翁忠有餘豈惟筆力求深造定要聲名不減渠季脩舍舟趨諸暨謁劉元成獨泛錢清江有懐其人人遠牛羊暮春深草樹滋野橋低映水溪岸曲縈籬風雨江湖思乾坤杖屨疑論心竟誰是短棹欲何之聞許景受上書被召二首九萬須憑負翼風男兒端不爲貧竆當時三顧應虚出畢竟論功要有終男兒出處欲如神莫謾将身過許人今日萬人看中鵠挾弓持矢且逡巡聞公晦叔往亷州以詩送之謫亷折時了翁宗之瀟灑玉為顔叔夜麤踈萬事寛天與海邉嘗瘴癘意令他日慣艱難功名自古誰能必忠孝于今衆所觀志士殺身當不顧小人懐土但求安觀獵蒼鷹黄犬五花驄木落風髙箭上弓三穴若能捜狡兔九天方可下㝠鴻登奔牛堰山亭桑隂濃處已深春小市喧呼迥不聞誰與山頭共逰戲静看禽鳥鬬紛紛黙堂先生文集卷第一
