body:
  text: 跋右默堂先生文集二十二卷宋陳淵撰淵字知默沙縣人紹興七年詔舉直言敢諫之士以胡安國薦除御史官至宗正少卿嘗榜其室曰默堂門人沈度為編次其詩文因以名其集直齊書録解題載淵集卷數與此本合宋史藝文志則稱二十六卷詞三卷此本有詩無詞宋志所載蓋别本也此本首葉有影寫崑山徐氏傳是樓所藏宋槧本一行知從舊本傳録卷二十二第十葉因原本字跡糢糊故脫去楊補之所藏了齊書佛語一文共三十七行檢四庫全書所録鮑士恭家進呈本亦闕然庫本并第九葉書蕭茂德楚詞後及第十二葉書了齊筆供養發願文亦闕而不載則尤在此本下矣此本有東郡楊氏宋存書室珍藏東郡楊紹和字彥合藏書之印彥合珍存諸印知是海源閣故物繭紙精寫乃康乾間人手跡彌可珍也海寧趙萬里
