body:
  text: 奏狀辭免舉賢良狀右修職郎改差監潭州南嶽廟陳淵准尚書省紹興七年六月一日劄子左朝散郎充徽猷閣待制提舉江州太平觀胡安國奏承潭州公文准禮部牒三省樞密同奉手詔中外侍從之臣各舉能直言極諫之士一人者臣伏見右修職郎權江西按撫制置大使司主管機宜文字陳淵深究先聖之微言能談當世之要務通達國體曉知政經若獲造廷俾攄所藴必有忠讜上副詳延伏候敕㫖五月二十八日三省同奉聖㫖劄與胡安國依紹興元年九月十一日已降指揮具陳淵詞業繳進劄付淵須至申聞者右淵竊以賢良方正能直言極諌之舉起于漢之孝文盛于武宣逮其衰世猶不敢廢故得人之盛至今稱之唐因其制進士之外設為制舉以待非常之才一時名臣多此途出至于本朝尤重其選既舉之以侍從之公又稽之以平昔之業必也行藝適稱然後試之以六論詞學俱優然後考之以廷對蓋每發必中始獲與選斯亦可謂難矣自非深窮經史百氏之書博考傳記諸儒之說通達國體眀習世務必不能仰副朝廷招徠之意如淵學問荒踈志業無取至于文墨尤不足觀豈可茍冒榮名自取黜辱所有繳進詞業指揮不敢承命謹具狀申尚書省伏乞照㑹施行謹狀紹興七年七月日具位辭免監察御史奏狀左承事郎守祕書丞臣陳淵右臣今月某日准尚書省劄子四月十八日三省同奉聖㫖除臣監察御史者臣聞命震驚罔知所措伏念臣困而後學老不適時頃緣貧病過竊奉祠之祿退安林藪已為僥幸重蒙恩召賜對改秩且復置之書府尤非其分今在官未及一年告假殆居其半瘝曠之罪日俟汰斥而乃更冒臺察之除雖由親擢其敢奉承臣仰惟國家自祖宗以來崇奬紀綱之地信用其言故凡居憲府者不論髙下必以守道不回忠信可考之人為之所以止邪于未萌而消患于無形者用此道也顧臣何人乃獲兹寵況臣祖父名監與今所除銜上一字聲韻雖殊而字畫無别稱用之際情所未安欲望收回成命改授能臣上以遵纍朝任擇之意下以弭賤臣濫得之譏臣不勝區區之願謹録奏聞伏候敕㫖辭免右正言奏狀左承事郎守監察御史臣陳淵右臣今月二十八日准尚書省劄子十月二十七日三省同奉聖㫖除臣右正言者臣聞命震驚罔知所措伏念臣一介賤士百無所長陛下拔自逺方置之要職久稽報效未即棄捐臣非不欲傾竭肺肝仰酬知遇而年衰氣索鞭䇿不前復此超除義實難處況諌省久虛之職乃朝廷不次之遷豈惟公論之所不容亦恐後來無以塞責伏望聖慈收回成命以待異材改除臣一在外合入差遣少安愚分謹録奏聞伏候敕㫖再辭免奏狀右臣近具奏辭免除臣右正言恩命准尚書省劄子奉聖㫖不允臣以非才義難祗受須至再有陳請伏念臣頃以貧窶之故仰祿嶽祠未及終任特䝉收召臣名在仕版不敢違命比至闕下薦被誤恩一年之間已遷臺屬皆非臣所宜得者辭不獲從亦既就列臣惟近制察官唯以分糾六曹稽違為職翻校簿書僅同胥史非若前代用人必有回天之力動搖山嶽之勢然後可以辦也故如臣輩衰遲踈繆之甚茍安分守亦可勉彊然進非其序固已大愧物論未皇自劾遽又超遷況諫省之官自昔難得其人若非望實兼隆豈宜輕授而又中興之初陛下與一時名臣共圖雋功克昌大業雖深謀逺慮必出宸斷而拾遺補闕亦賴正人顧臣何者敢冒兹責此所以聞命驚憂無所容措懼必得罪而不敢以亟遷為榮也伏望聖慈察臣誠懇實非飾辭特賜檢㑹前奏如臣所乞以允公議臣不勝祈天俟命之至伏候敕㫖辭免祕書少監劄子左承事郎守右正言陳淵准尚書省劄子節文二月八月三省同奉聖㫖陳淵除祕書少監兼崇政殿說書進講左氏傳淵衰晚不才昨䝉誤恩擢置諌省淵智識淺短議論濶踈曽無毫髮上副聖主求諫之意朝夕憂懼無所容措方俟譴逐又辱超除惟祕省越分之遷經筵非常之選如淵何者敢當此寵況淵祖父名監與今來官稱正應回避所有上件恩命不敢祗受欲乞特賜敷奏收還成命改除淵一在外合入差遣以安愚分再辭崇政殿說書奏狀左承事郎新除宗正少卿兼崇政殿說書臣陳淵右臣近䝉聖恩除臣祕書少監兼崇政殿說書進講左氏傳緣臣祖父名監已具申尚書省乞賜敷奏改除臣一在外差遣再蒙聖恩除臣宗正少卿其崇政殿說書進講左氏傳之命尚仍其舊臣義當辭免不敢輒避煩瀆重干聖聽臣聞春秋之有三傳所見不同互有得失故自漢以來如歆向父子猶不能無異同之論以陛下聖學髙眀尤深于春秋其于左氏傳亦宜有所去取以通經㫖如臣淺陋無識顧何足以上當勸講之職所有除命未敢祗受伏望聖慈特賜收還以安愚分伏候敕㫖貼黃臣初除祕書少監兼崇政殿說書祕書少監于近降指揮不合辭免緣臣祖父名監于法當避已具申尚書省乞賜敷奏除臣一在外差遣伏䝉聖恩改除臣宗正少卿臣已祗受訖所有崇政殿說書例許辭免在臣分義不敢但已遂至上瀆天聽臣不勝皇懼戰栗之至劄子赴召與執政劄子淵往者蒙恩賜對旋復被罪朝廷憫其無他特與洗滌更緣薦引置之樞府編摩之地遲暮踈拙懼不能當尋請嶽祠庶幾亟獲微祿可以自活自承改命以來忽已兩考方幸投跡丘壑少酬素志今兹又蒙收召顧職分則不敢違禮而飾詞念庸妄則難以冒榮而茍進倣徨失據驚悸成疾久之不免扶持就道冀逭有司慢令之誅而已無何才至闕下重蒙睿㫖再令登對揣已無堪益增愧恐恭惟廟堂諸公以堯舜之道輔佐聖主固將盡攬天下英才同德一心共濟囏運海內遺逸之士誰不歸心如淵等輩鳬雁飛集初無損益伏望啓迪之暇略賜開陳使不肖者姑以奉祠之祿待罪山林終此一任因之自免以老就閒如是則是非昭融取舍公當非惟少弭朝廷一時過聽之譏亦所以興起天下彈冠願仕之志淵雖與鹿豕為羣其幸多矣壬子八月十八日上殿劄子臣嘗謂僣竊未平則二聖之歸無期夷狄之禍不解南北分裂生靈塗炭此固不可一日而寧居也然而欲平僭竊而內有盜賊為之梗則盜賊未除僭竊亦不可得而平矣牽制踰淮之師涵養逆冦之勢因循不振職此之由故為今日之計莫若先除盜賊俟其不能為患然後北向以定中原跨河越岱而并居之乘機應變坐制黠虜宜無不如意者昔劉先主之入蜀也欲資其富饒以爭天下其先定之計固將滅魏并吳而存漢然孟獲未降諸葛孔眀不敢越險而東出則以掣肘者在其後故爾故其討獲也七擒而七縱之力屈而不誅其人勢敗而不絶其欲竄之山谷乃所以安之獲安而蜀人安矣蜀人安然後孔眀得以十倍曹丕之才併力而擊魏魏亡吳服而漢不得不興此其志也惜乎謀已定而數竒師未捷而身殞然其所建立已足以取信于後世矣今江湖荆楚閩廣之冦蓋非止一孟獲而已而其所過殘滅井邑為墟暴虐之甚又非獲比則為民除害誠有不可緩者而陛下連歲出師必遣宰執又副之以大將芟夷招納舉無遺算其所以度內外之勢審先後之序固不待臣之言矣然臣以謂討之之難不若安之之難蓋自宣和以來監司守令不得其人掊克相師繼以殘忍民無所赴訴棄鋤耰而帶刀劍者幾年于兹矣今旌麾所臨次第平定而郡縣牧民之官又不加擇凶渠雖殱禍根未絶萬一舊弊繁興逆意復萌雖欲人人誅之不可得矣臣故曰討之之難漢宣帝謂龔遂曰選任賢良固將安之故臣願陛下及其初定任擇忠信之使分按諸路諭以重民之意委以刺舉之權俾奸貪不法之吏不容于時而公正廉勤之人得以自效然後拔其殊尤聞之朝廷以為郡縣之長則逺方受賜鰥寡孤獨宜無不得其所矣此安之之道也必欲濟師舊邦以慰簞食壺漿之民而盡復祖宗之境土須吾民之安然後擁衆橫行以圖決勝似或未晚傳曰欲速則不達又曰必有忍其乃有濟區區之忠唯陛下察之臣聞古之為臣者有稟令無議令故令出于上下知奉承之而已此法之所以行而事之所以立也往者靖康之初淵聖皇帝以兼容之度博訪羣言俱收而並用之甚盛德也而忠邪雜糅是非不公故每下一令上自禁從下至百執事之臣與夫布衣韋帶之士必群起而交攻之或已發而中廢或盛行而遽改或姑存之終至于委靡不振而後已以故一事無成拱手以待禍其為弊至今尚在也此而不革無以立政故臣不避僭越之誅為陛下極諫之夫議政之地昔時士大夫屏息而過之如恐犯分及其後風俗一變乃始有竊議其非者又其後公肆詆訐無所忌憚則今日之弊是也亷陛不分莫此為甚朝廷之勢安得而尊朝廷不尊則國威不立國威不立而欲以指麾顧盻定天下之大議臣固知其難矣傳曰下輕其上爵賤人圖柄臣則國家搖動而人不靜矣此古今通患也今天下之事宰相行之臺諫言之若是亦足矣臺諫耳目有所不及則詢之侍從侍從思慮有所未至則求之百執事其有遺䇿乎而又下取布衣韋帶之士俾道聽塗說之流得以肆其不根之論臣恐徒為紛紛無益于治雖然人主之德莫大乎聽納如陛下之舍己從人不間貴賤雖堯舜亦不過此臣子所宜將順者也而臣私憂過計更為此言者非固欲棄愚者一得之慮也以謂布衣韋帶之議資之以廣聰眀則可也若創法立度而惟此曹之徇適足以自眩而已自古造事者謀之以同斷之以獨故總覽兼聽之誠常施之于未決之前而是非可否之私不容于已定之後為是故也故臣愚願陛下自今凡有大事議之而後行已行而議者勿聽毋使眀謨坐困曲說則天下幸甚紹興九年十一月上殿劄子臣聞孔子之言智仁勇曰知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣夫自修身治人以至為天下國家莫不以此故子思子曰智仁勇三者天下之達德也所以行之者一也無所不達而行之以一則于斯三者莫知所先後矣臣至愚甚陋陛下不知其不才處之諫省若將責以言者臣井蛙之知誠不足以測知滄溟之大亦何所逺然臣嘗讀中庸之書竊窺三者之㫖求所以合乎聖德者以謂陛下仁智則有餘矣而獨于勇未嘗加意焉此臣所以不能無疑也何以眀之陛下無所不知而能行其所無事智之至也無所不愛而能克己以消兵仁之至也乃若抑畏太甚而示人以弱則靳于勇矣夫勇非撫劒疾視曰彼烏敢當我之謂也如天之行健終古不息如水之攻堅疆莫之能先操至權以默運斡萬化于不測夫是之謂真勇神器待之而後安四海依之以為命其又可略耶昔者以大事小莫若湯之于葛文王之于昆夷以小事大莫若太王之于獯鬻勾踐之于吳孟子蓋嘗以是為仁且智矣彼其處心積慮豈有異于陛下乎如太王勾踐固不足為陛下道至于湯文之事乃陛下之所安行者然以臣觀之湯事葛文王事昆夷雖曰無所不至及其十一征而無敵于天下命將帥遣戍役以守衛中國亦何有于葛與昆夷哉故忘己以樂天者雖聖人之事而用兵以保民者亦王者之所不得已焉此湯之勇所以表正萬邦文王之勇所以一怒而安天下之民也由是言之湯之于葛文王之于昆夷方其事之也勇已行乎其中矣苐不露其威而已今陛下之于鄰國將不露其威乎亦將信之而不以為備乎此臣所以通夕不寐求其說而不可得也或曰小役大弱役彊天也順天者存吾何容心哉臣則以謂欲知天道視民之去就而已民心歸之天其有不從乎湯以七十里文王以百里其彊大不足言矣而孔子以湯武之事為順乎天而應乎人得民故也得民斯得天矣曷不觀今日河南陜右之民乎已叛者欲歸方叛者隨悔此豈人力之所能致哉天實使之也然則或以不校為順天或以征誅為順天其義一也陛下孝弟之至通于神眀凡遐方異類不可以言化而理諭者固將有以感之也則兩宫之還宜有近日未還之間隱忍以致愛親之誠既還之後釋憾以睦鄰國之好此固陛下已定之意其誰曰不然然臣之所言蓋非謂今日之所當行也以謂天下之大宗廟社稷之重祖宗開創之至勤纍世扶守之不易適當小雅盡廢之後而陛下承之其可不為後來慮乎天命靡常事變難測以天下之力過為之備以待不虞非失計也記曰凡事豫則立不豫則廢故臣願陛下稍收異議以來天下敢言之士毋或輕棄厚積錢穀以為他日糗糧之用毋或妄費密飭諸將練兵秣馬毋得輕動失信亦毋恃其不來以豫立事而養之以勇庶幾萬世根本于我乎定則天下幸甚臣聞儉非聖人之中制而孔子對林放之問則曰禮與其奢也寧儉豈以儉為禮之本故與蓋常人之情由儉入奢易由奢入儉難故當用儉之時不可不慎不慎而無以約之則末流之弊將至于不可勝救矣臣觀自昔創業之主皆有儉德蓋其興于閭閻熟知民間之疾苦稼穡之艱難故愛惜天物有不期然而然者禹之治水八年于外三過其門而不入逮地平天成之後乃作禹貢既第田以制賦又因民之所願而取其有餘其微及于漆枲絺紵羽毛齒革與夫魚鹽橘柚之可于口菁茅簵楛之適于用皆在所取蓋亦莫非民力之所得者方禹櫛風沐雨手胼足胝之時親見百姓之勞苦已而安享其奉固宜有所不忍也故禹菲飲食惡衣服卑宫室孔子美之以為無間豈所謂愛惜天物有不期然而然者歟至于守成之君往往不然輕費妄用卒以召亂求如漢之孝文蓋亦千一耳今陛下所乘之勢如孝文而天性似之所歷之艱險如禹又不待學而後至其于儉德天下户知之矣而臣强聒猶欲有所獻者書之稱禹曰克勤于邦克儉于家或曰儉可以施于家而已是大不然國之本在家而儉固將施之于國也孝文惜百金之費而制度不立終愧前古使其儉于一已又能推而廣之如彼其質雖二帝三王之功可跂而及矣可勝惜哉比年以來陛下恩惠太泛賞給太厚匪頒賜與之費幾于無節此固陛下甚盛德事然府庫空虛而發之不已財賦匱竭而取之益詳陵寢未成郊祀不逺內有諸將之饋外有鄰境之好所用既衆而所入實寡此臣所甚懼也周官唯王及后世子不㑹說者曰不得以有司之法治之誠然是周公作法開後世人主侈用之端也而可乎臣謂周之冢宰以九式均節財用有司雖不㑹冢宰得以式而論之矣若事事如式雖不㑹猶㑹也故臣願陛下自今凡有錫賚法之所無而于例有疑者或輕重非倫或多寡不類事下三省則三省得以共議事下户部則户部得以執奏出納之吝有司得以獻其疑可否之宜臺諫得以論其失凡所經由不許承誤陛下聞其言又從而嘉納之一有失當即行改正則前日之弊庶幾可息矣上以省費用之煩下以絶僥幸之求無善于此臣不勝過計惟陛下財擇紹興十年正月上殿劄子臣伏見藍公佐歸自異域王倫獨留金人過有需索且求盟書此其意非淺淺者而朝廷視以為常不謀于衆萬一應之差若毫釐則安危之機于此判矣前計已得要在終之而已而終之之說必有變通臣為言官寂無所聞而又不能廣陛下之聰明不幾于失職乎臣惟古者國有大疑謀之于心又謀之于卿士庶人欲其同也同而行之則無悔矣今縱未能謀及庶人為卿士者獨不可一詢之乎自風俗之壞士大夫往往于廷諍而怯于公言故朝廷有事彼此相視不吐一辭事成則曰我固知其如此蓋不必言事敗則曰我豈不欲言顧言之未必見聽爾是以上下相戒以言為出位以不言為守職今若出自聖意必使之言則人無以為辭矣且朝廷設官有言責者彼自不得不言至于侍從之臣以論思獻納為職蓋陛下腹心之任也德盛位尊實上所親擢而深知之者豈可有事而不與之議乎願詔宰相遍召從官示之以其事使之各盡其說毋有所隱庶幾所同者衆則國論自定萬一從官又有異見不欲宣言于衆實封上聞取自聖斷然後行之則上下不惑而萬世可遵矣臣不勝區區之忠惟陛下裁擇臣聞朝廷自藍公佐既歸之後嘗有大議而諫官不得與聞比者外間訩訩一日百變雖有所聞亦復不知其實尸厥官罔聞知臣不敢逃罪輒進瞽言惟陛下留神而幸察焉臣聞和戰有二議其實一事然自靖康以來朝廷上下公卿大夫之間以和為是者必以戰為非以戰為可者必以和為否二者各執所見不能合而為一此聽其說者所以久而益惑也夫和與戰初不在我也彼倡而我應之爾應之者其可豫為一定之論乎方我之欲和也而彼欲戰戰固不可已也則和之說廢矣逮我之欲戰也而彼欲和和固不可已也則戰之說廢矣故和之與戰二議而一事不可不察也曷不以前日之所嘗行與其所已驗者而觀之則其議決矣方胡騎之長驅東南也所過殘滅不遺餘力當是時果可以求和乎其後淮上之師屢出屢勝國勢已安則戰之效也戰未必不如和于此可見矣劉豫數敗彼知我之不可圖也間以使來歸其侵疆而許我以和當是時果可以請戰乎已而不遺一鏃奄有河南陜右之地十分天下而復其九則和之效也和未必不如戰于此又可見矣夫事之已驗如此而議和者不言戰議戰者不言和亦已過矣然則和之與戰唯所施之宜而已其又可執耶今者虜人留王倫為質要我以歲幣迫我以誓書趣我以來使臣固不知其詳然以臣觀之其皆未可遽許乎何以言之歲幣必薄然後可繼而彼之所須者太厚誓書必實然後可信而彼之所約者太過使人有辭然後可遣而彼之所期者太速許之則終必失信不許猶冀其見察也或曰彼將不和則如之何曰吾方待命未嘗求絶彼何不和之有假使不和我有辭矣辭順而彼不聽是其本無意于和也今雖僞以為和後亦將變矣變之遲速亦何擇焉且和終不可恃也和變而為戰則往年淮上之師是也豈皆為彼所敗乎其倡在彼其應在我臣故曰和之與戰唯所施之宜而已孟子曰未聞以千里畏人者也況今日之地十有千里者乎臣僣議國事罪當萬死然臣所言天下之公論非臣私言也臣已有奏劄乞令從官㑹議今先為此言以進其聽而從之罪而誅之臣不敢有所擇也臣不勝皇懼戰之至正月十五日進入劄子臣近以朝廷議欲遣人再使金國曾具奏劄乞詔宰臣遍召從官示之以其事使之各盡其說庶幾所同者衆則國論自定如從官或有異見不欲宣言于衆俾實封上聞取自聖斷至今纍日未蒙施行豈聖意自有所在而非臣下之可與乎無乃紛紛之論可厭而朝廷大臣以謂不足恤乎古者國有大疑謀及卿士似不如此臣之所言未可已也臣聞以天下為天下則身佚而功倍以一已為天下則力勞而效淺蓋天下者民心之所在也民之所欲天必從之湯以七十里而興商文王以百里而興周其後世子孫更數百年而不絶者得民心而已民與之則天與之矣雖然民則衆矣欲知其心何自而察之乎察其所服從者斯可矣百官者民之所服從也百官亦多矣欲知其心何自而察之乎察其所仰望者斯可矣朝廷侍從之臣百官之所仰望也異時宰執由此其選蓋人物之傑然者也國有大事過而徇之天下之心于此可考矣故多不患于難諧寡不溺于偏見亦何憚而不使之議乎夫以朝廷侍從之臣而不使之參議國之大事則陛下之所取謀者二三大臣而已萬一二三大臣不能無蔽陛下必從其說將誰使正之艱難以來十有五年于兹矣陛下焦心勞思不皇暇食以至今日幸而國勢已立夷狄有所畏憚海內跂踵以俟中興正須博採兼聽唯是之從布宣德意曲順民心而廟堂之上容有祕而不示者豈啓迪聖主以天下為天下之道乎幸聽臣言詔令從官都堂㑹議必有至當之論以助陛下矣古人有言曰所言公公言之所言私王者無私私則有偏公則無執有偏則民易以怨無執則衆莫不從上下內外莫不從之天下可運于掌矣惟陛下毋以臣言為不足聽而忽于用衆則天下幸甚正月十七日上殿劄子臣既言和與戰二議而一事不可遍執惟所施之宜而已又以謂天下有必勝之勢亦有必敗之理我與敵人之所共用者若其必勝之勢在我而必敗之理在彼則在我者不可以不用雖未能用亦不必過為之慮知此則和與戰之議可決矣何以言之昔者三國之際魏最强吳次之蜀又次之方孫權劉備無恙時以曹操之姦雄溉平中原僣亂因其餘勇以却烏孫鮮卑一弱子之力耳而不能并吳蜀而有之則以吳蜀之險可恃故也故吳蜀利于守魏利于戰魏雖能戰而吳蜀必不可入吳蜀併力以攻魏則魏可亡魏與吳蜀合而為一則內陵外侮皆不足憂矣唯其各守其所久之而不能合雖合而無以守之此其所以有而不能久也今我據有吳蜀以為根本虜雖强大終莫能侵又益我以河南陜右六十州之地蓋三國之所雖合者此雖大帝三王之天下絶長補短未能遠過顧吾所以主張和維持之者如何耳故用此以戰則戰無不克用此以和則和無不成此所謂有必勝之勢也自古彊盛無過于秦既已蠶食六國遂并天下莫與為敵矣然夷狄種性仁義不施而暴虐是用故傳之二世而亡今虜邈在萬里之外豺狼狐兔之與居非能為秦也而以小加大志得氣滿貪黷無厭方且骨肉之間自相屠戮心腹之內日以離間專為淫侈以夸其所有之富旁附之國至有不忍其虐逃而遠之者察其所為必不能久此所謂有必敗之理也用我之所必勝以當彼之所必敗可以有為而我方約和不欲言戰惴惴然唯恐虜之復來此虜所以得而輕我也且我之所以不欲言戰者豈非以往日維揚之遷徙浙東之奔播有不可以不戒乎此又過慮也胡不觀今日之勢與靖康以後為如何今日之勢方興也靖康以後之勢已壞也此豈可同年而語哉蓋自宣和以來朝廷所以待金人者有得有失其失在于靖康之前而不在于建炎之後不可不辨也靖康以前敗􅉀于契丹貪得于燕雲賊來不拒賊去不追其失已不足咎矣建炎以後不守南都避而之維揚不守維揚避而之臨安又之㑹稽四眀如太王之于狄人蓋有不得已而然者非失計也其後復歸臨安彼固以我為怯無足憚者故我得以收人心彊國勢選將治兵嚴為之備所以屢戰屢勝十年無患此非其得耶觀虜之意既得中原豈不欲謀吳而據蜀兼有四海之利乎然每舉輒敗知我之有備也必將待時而發則雖名得中原其實不可保矣與其既得而不能保孰若棄而不守猶足以緩我而市恩乎此虜所以廢劉豫而退保河南之意也而我之所有如此猶且以往日之禍為戒亦已過矣臣嘗逰荆州見荆人所以事關羽者家置一祠雖父子兄弟室中之語度非羽之所欲則必相戒以勿言唯恐羽之知之也夫羽之死已數百年其不能定以害人也審矣而荆人畏之如此以其餘威在人上下相傳有以誑惑其心耳今金人去中國限以北虜水栗陸讋不知經幾聚落然後能復至燕雲也不為之備而徒畏之豈知所先務乎且虜所謂生女真之兵者自南而北所存無幾所可致者諸蕃烏合之醜類耳散而復集其勢實難集而使之遠來必不能久縱使駐足于燕雲之境而垂涎于雍梁之地亦必有豫未敢輕入蓋進則有山寨必叛之虞退則有契丹修怨之慮不顧而越河亦虜之所忌也又況河南之民既歸而安必以死守虜雖善戰恐亦未必得志耳臣故曰用我之所必勝當彼之所必敗可以有為不當以前事為戒而和與戰之事可決而無疑者為是故也臣本書生于用兵之事實不能曉至于天下之理蓋嘗得之于經術矣意之所見不敢緘塞若和未可變戰亦當備則臣所言未必全無補也臣願陛下察今日勝敗之由與在我者可以有為在彼者可以無戒雖未絶和以戰為主如陛下所以諭臣者此計一定萬世無患矣臣不勝區區之忠惟陛下財擇正月二十三日上殿劄子臣衰晚不才誤蒙陛下置之諫省凡有所陳必賜開納在臣微分可謂千載一時而自到省以來臣所不散不言者往往多是細故雖蒙施行可以自幸而亦可以為愧以是朝夕皇懼木知所以上副陛下容諫之意者幾欲乞賜罷黜未敢遽發近因藍公佐歸自金國而同時正使王倫輒為金人所留又聞金人盡誅往日主議之人且悔前約以此重有邀索國事之大無過于此于是輒以和戰二議不可偏執之說仰慁宸嚴冀以少塞臣責荷陛下過聽臣計且語臣曰今日之和非惟不可偏執自當以戰為主意欲積財練兵選將帥固要害過為之備以待不虞可和則和可戰則戰此宗社之福天下萬世之幸也臣當時不能自已雖已略涷曲折多是承意稱贊退而自省有未盡者將復進其瞽言未果而數日以來不聞廣行咨訪但見已命之使又有升黜將趣其行莫測所謂臣固不可中輟必盡言之惟陛下矜其狂愚而加察焉臣聞衆論未孚必稽其實是非混淆當俟其定語雍容則易從詞迫切則難聽臣既已知之矣而今日之事臣必欲亟效其區區者以謂事機之彂近在朝夕不容有所待故也且陛下既知今日之和自當以戰為主則和之不可堅守而戰之不可不備也審矣今乃急于遣使而不及其他此臣所以疑也且使之所以不可不遣者以虜之不能無求而我亦不得不許也雖不得不許而亦有不可許者如取河北之民則失人心用彼之正朔而亂國政若此類者誠不可許朝廷亦捋不許之矣至于誓書之有從違歲幣之有多寡又在夫可許與不可許之間斟酌而豫奪之尤所當慎也蓋誓書之未行必待歲幣之有定而歲幣之數寡則可從多則難繼彼方挾彊以凌我求之者多而與之者寡必不諧矣且為後日之計又不可多然則使其可遽遣而莫之議乎臣觀祖宗之待契丹可謂過于厚矣然景德所賜朝廷本有過許曹利用損之止于三十萬慶曆所賜朝廷又有過許富弼損之止于三十萬方是之時金帛之直每一匹兩不過千錢省陌總而計之為省錢五十萬緍而已人猶以為多也今匹之直不下十倍而兩之直三倍有餘矣如聞虜人欲援舊例此乃祖宗續增之數其可盡許乎又況必不止此而奉使之人又未必有如利用與弼者若一一如其所請而不與之較後悔無及矣且獨不見宣和靖康間趙良嗣李悅李鄴之所許乎𥘉欲靖難不復深慮其後虜人得以藉口遂致今日難弭之禍徒以使之不得其人故也使之不可遽遣亦可見于此矣且使之不可遽遣而亦不可以不遣遣之則必有所許亦必有所不許臣既陳之于前矣若遂遣之亦誠有可議者以臣愚見許之多固不若許之寡也蓋虜之所求無厭以其本無意于和也洗已見其解和之兆乎今吾固有所不許則已咈其欲矣就其可許者而許者十七八而不許者十二三可謂許之者多而不許者寡矣使其有意于和則可不然許之多者不足以得其喜而許之寡者適足以彂其怒多固不喜寡亦必怒皆不可以得其和則與其多許而失和不若寡許而失和之為愈也何則多與無益寡與無損故也蓋和戰兩途彼之意常欲戰不得已而後為和我之意常欲和不得已而後有戰戰非我之意和亦非彼之意不能以相易也何以知其然以往者京城浙東之變知之也方虜之犯京城必邀二聖以往凡皇族之在城中無一人得脫者及來浙東逼逐衛兵遠建海涯幾及屬車之塵此其意豈欲復存我宋萬世之祀哉賴皇天悔禍宗廟社稷之靈與海內愛戴之心共惟陛下以臨九有十年之間國勢已立以守則固以戰則勝故虜亦不得已而約和耳然其不欲存我之迹固在彼非本石亦將懼我必欲滅之之謀矣緃陛下以天地之度愛惜生靈斷無復讐之心彼其能自安乎彼不能以自安其能終容我乎然則和之必變可立而待矣或者必欲多與之幣以幸其久而無變無是道也故臣願陛下以和為息戰之權以戰為守和之備惜財以厚民吝豫以存信不計目前之利務為長久之䇿臨遣使臣訓之以不欺之誠示之以一定之議俾毋輕許以誤大計則雖蠻貊之邦無足憂矣然後遴擇謀臣精練戰士多積穀帛以備糗糧之用固封守以保安業之民觀釁而動動不失時則以和以戰惟我所欲耳古語有之無待其不來恃吾有以待之如是則金人之彊將無所施其于厚幣以求􅉀不亦遠乎臣至愚甚陋自以天下至計莫尚于此敢布腹心伏候採擇默堂先生文集卷第十三
