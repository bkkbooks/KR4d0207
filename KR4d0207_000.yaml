body:
  text: 門人沈度編第一卷詩延平江上呈吳國華先生玉山驛見周東老題詩和之立我軒和人獨酌二絶鄰有張生者病革勢不可救忽夢醫人鄧舜臣言服萬病九如説服之遂安感而作詩崇安分水嶺離𬗋溪驛鉛山信州禪月院晚眺舟中初晴登睦州環峰亭泊姑蘇憑滙亭候同行不至次韻李仲虎召伯相遇重陽後送謹常兄之符離九月二十二日秋舉失利出門用中相餞夜步河上留別錢塘遇廖次山以詩見贈次韻次韻欲遊西湖阻雨蕭山覺苑寺雪後杜門錢清待湖錢清過堰蕭山雪中寄季修過鑑湖季修欲之仰山預作詩送之病減枕上五首季修有詩求公晦顔公書元次山碑銘既而公晦和成使病者亦賦之季修舍舟趨諸暨謁劉元成獨泛錢清江有懷其人聞許景受上書被召二首聞公晦叔往廉州以詩送之觀獵登奔牛堰山亭第二卷詩謁滿處沖歸以詩贈之處沖見和復次韻二首處沖又和頗及佛理亦次韻答之處沖為棲神導氣之術每曉起得意成詩前後四首次其韻秋夕七夕三首七夕閨意戲范濟美三首九日登莊樓二首次韻范濟美秋雨感懷代句龍君輔上潼川令同魏季修雪中間步二首次韻俞德翁述懷二首寄內春雪歲暮述懷寄安常兄三月十一日欲往荆南景德寺睡起呈曹令德令德送余都門外眷眷惜別余恨不欵作詩寄之同楊遵道出京本欲作詩而吟咏久廢恐取道襄陽弔古遺迹遵道有作不能多繼也光以詩謝之十五日過許夜雨暴作眀日行四十里宿于潁橋又眀日晴書事汝州道中呈遵道承遵道和又用前韻書懷春晚書事楊花二首木香花二首自入襄城即有山水之興路中稍有賡唱因呈遵道和遵道楊花漫興第三卷詩登峴山二首晚行懷鄧南夫思安常兄春晚入荆州早行京師相善者鄉友四人各賦一篇以見所慕適正載德如愚令德到荆州寄用中用中既和成以示山口唐藴眀藴眀亦和再用前韻呈二公容齋書事二首和向和卿嘗茶寄謝用中得用中書有禮人不答之悔作詩解之送遵道陳漕生辰席提舉生辰入荆州學四絶句呈昭祖金鑾兩絶次韻楊丈夜寒直舍春日偶題次韻張從道三首石首道中自建寧泛江至石首月夜江行次韻從道夜宿推院送昭遠兼寄昭祖諸友寄內第四卷詩奉酬楊逹甫見贈小軒觀月呈興宗叔流長亭再用送昭遠詩韻寄昭遠昆仲小軒間題二首約令德郊行二首酬晏伯達錢塘書懷二首錢塘學中寄伯思六言五首雪中入國門寄令德三首下汴過淮登召伯斗野亭過浦城贈王令長源二首題緑波亭還舍鄧元孚待制挽詞四首與楊如愚四首存誠齋夏日呈龜山先生二首答朱晉老見責不赴會逹觀軒宿仙霞聖仙寺呈伯思子靜二首通州夏雨延平林力道閣上觀水二首兩浙周提刑生日第五卷詩看論語四首夢得亭上留別鄧南夫四首越州道中雜詩十三首和如愚思劎溪馮元用九日約白雲寺登髙以追昔年都城望津之會偶以事不往蒙示長篇次韻次韻酬鄧天啓次韻邦美叔和天啓見寄三月二日泛舟下延平晚泊西芹次韻令德答天啓復次韻答令德見和來詩及維摩默然之意用令德韻題嚴陵祠跋子靜所藏魯直書樂天八字偈題公敘舫齋和羅仲素寄子靜長篇和子靜三絶亭竹二首漁父一首舟中誦子靜江上之作為和二絶第六卷詩閩縣令陳夢兆魚樂軒午睡懷安縣風篁亭次韻鄧志宏送張思道遊福唐自京回次韻鄧志宏見贈翁承事挽詞五首泊舟延平二絶寓漳南淨衆寺三月晦信步到菴亭曠望久之聊寄所感過永春劇頭鋪見壁間石刻臨漳王漕詩輒題數句次韻德純通判賀用中生子次韻李伯紀舍人招飲再和李伯紀舍人韻和李舍人留題泛碧齋陪知縣夜飲泛碧齋再用前韻鉛山道中小休贈別楊至遊三首次韻李伯紀舍人食了齋所寄石芝有感書室獨坐自浦城放船下建安寄龎幾先奉陪婺州守南樓宴集奉陪龜山先生觀修城次韻鄧志宏和吏部謝公鐵字韻詩二首再和鄧志宏韻二首廖成伯奉議生辰交溪靜安院見許尉題壁次韻第七卷詩用中示以字瑞既書其事又賦詩一首字瑞竒特再用前韻提舉生辰俞憲生辰耿憲生辰鄭漕生辰二首唐大夫生辰次韻運使龍圖寵示道中夜行之什次韻子靜黃兵部生辰四首遁齋有感戲題延平閣上謁羅養蒙辱示長篇次韻小詩七首寄養蒙兼呈景駮玩月三絶句寄幾先道出南浦見蕭子莊十首過江郎巖下少駐感而有作第八卷詩三衢道中感懷寄龎幾先二月五日入都􅈦久坐候山甫不至􅈦前桃花一夜風雨落盡感事寫懷曉登嚴陵釣臺和安止所留詩再用前韻過崇仁莫宿山寺書事自梅花村回道中書壁四首邑中諸公見和再用前韻被檄下鄉督稅作釋負夏日雨後戲書與張司録奉和司録道中二首山行偶成和司録行縣道中偶風雨有感之作六首饒州張宏中挽詞二首次韻李聳卿次韻李聳卿和太守禱雨有應二首歸自郡城見道中山礬盛開香嚴寺洗足山寺早梅二首又題山寺二首即席和焦貫道趙元述慶得子次韻和周唐獻郎中登普光寺閣第九卷詩寄曹載德諫議二首茂實被檄權永新以詩寄之次韻李光祖南山四偈次韻光祖避地眉溪十絶眉溪與光祖共談得四絶句交溪庵中因檢藥囊偶成次韻陸時可歲暮感懷又和時可再和時可二首又用元韻呈時可次韻光祖間居感懷初到臨安二首錢塘江次韻王長源飲垂絲海棠花下鄧季眀挽詞三首省題筆諫詩和參謀至日喜雪三首和參謀參議尋春次韻吳參議病中懷歸因以自見次韻安茂通同薛參議上已日唱和三月二十日逰東山參議不至有詩次韻第十卷詩參謀得告暫歸留別同舍次韻次韻茂通喜雨送張巨山著作使閩分韻得我字石夫人挽詞送黃平國倅邵武答吳濟仲見寄次韻鄧天啓賀茅舍新成二首次韻延年弟相慶次韻宗仁弟相慶次韻沈公雅相慶代朝宗弟和餞行二首興國璨老往漳州二偈送之鄧端友臨要閣五首端友和臨要閣詩再次韻五首送朝宗弟赴試南宫慶鄧德達得子書心畫詩題興國寺碧落軒端友以桂漿兩樽見惠賦詩六首代陳應之作謁璨老病未能起留二偈示之和璨老示雙井茶紙被簡板三偈次韻蕭茂德第十一卷啓賀張左丞遷中書賀王右丞遷左丞賀李內翰遷右丞又賀張中書又賀王左丞又賀李右丞賀楊廉訪轉官賀俞提刑賜帶賀張市舶再任賀張侍郎知福州賀耿提刑賜帶又賀張市舶再任賀胡帥到洪州賀許左丞謝辛帥回南劒通判回廖提點代鄧彥通及第謝陳逹野運使代彥通謝陸徽猷舉狀代趙令賀吉州楊龍圖荆南府謝解福建鎖試謝解代龜山謝許侍郎謝太守舉狀迎賀吉州楊龍圖回南劒太守回郡縣諸官除察院回外官又回曽提刑除正言回楊通判答蘭溪宰回黃知縣除宗正少卿謝胡運使賀年賀嚴州通判冬至謝州縣官賀冬第十二卷表代漕使謝轉副使代黃兵部謝賜曆日代漕使貢金器代常平賀表代耿提刑賀天寧節代廖用中謝除本路提刑代廖用中謝除吏部侍郎兼侍讀代廖用中謝除給事代廖用中尚書遺表代龜山先生楊侍郎遺表謝宫祠表再謝宫祠表代宰相辭免兼修國史表代宰相謝除兼修國史表劄子十二月上殿論放稅奏狀論莫將除徽猷閣待制論宰執不和論鄭億年除資政代江西帥李丞相薦蕭茂德第十三卷奏狀辭免舉賢良辭免監察御史辭免右正言再辭免辭免祕書少監再辭崇政殿説書劄子赴召與執政壬子八月十八日上殿紹興九年十一月上殿紹興十年正月上殿正月十五進入正月十七日上殿正月二十三日上殿第十四卷劄子與李泰發尚書薦詹力行與李丞相論王權等家屬論考實論用宗子論除盜賊論時事十一衛兵薄斂用老成用有德核實聖學求諫閩冦用兵必先修政事學者以孔孟為師仁政得民心論心過經筵進故事進寫龜山先生論語解第十五卷書上楊判官代人上梅節推代喬卿上陳令上謝簿論盜代安常上福州吳倅代陳元禮上王提舉代張積中上陳大年答廖用中與遊定夫先生答陳了翁答晦之叔答羅仲素上鄒侍郎第十六卷書答翁子靜論陶淵眀上皇帝代人上杭州守見余縣丞答陳了翁右司答廖用中正言與龜山先生楊諫議答陸伯任與翁士特學士與廖用中中丞與李叔易學士與向伯共侍郎第十七卷書與胡康侯侍讀答胡寧和仲郎中又論龜山墓志中事差市易務事始末攻王氏一章行狀不載墓志載之三經義辨止載朱公有益學者之詞代龜山與南劒張守答廖用中侍郎與梁兼濟提刑答李光祖與鄧端友通判與魏邦達侍郎又與胡康侯侍讀再與龜山先生楊諫議第十八卷書與鄒德久郎中再與向伯共侍郎與李丞相與許少伊左丞與何伯夀中丞與李先之祭酒與胡少汲尚書與李濟之察院與鄒至文答朱喬年吏部與曹仲素通判與莊參謀與王直閣與胡處晦學士與張如瑩侍郎與王帥與張給事子猷與王長源通判與陳子通與胡眀仲侍郎建昌寄邵武徐守再與翁士特學士第十九卷書上都督張丞相答張子猷給事與曹載德諫議答鄧天啓與李深道知府代人上王帥答邦美叔答鄧志宏正言與奉議叔論墨縗答羅仲素與李叔易學士與季深與胡幾仲與黃用和宗博答曹公訓答范益謙郎中與吕居仁舍人與范致聞安撫與黃運使與十弟答汪端中與將樂王宰與鄭彥繼與李外甥答蕭茂德與李子家與鄭致遠知縣與顔岹縣丞與孫次卿學士與鄧德裕刪定鄧家回定潤叟入聘為族姪求婚代回胡給事定代沈家下定謝鄧氏問姪女婚聖節致語口號第二十卷雜文存誠齊銘容齋記介堂記邵武軍光澤縣學記甘露寺題名記定交篇跋定交篇後講論語序鄧德恭字序無諍道人辨代廷試䇿䇿問三首解論語十二假裴老真贊寄椰子樣茶羅與光祖頌留龍居士試建茶既去輒分送弄頌寄之得老龍見和復呈題仙霞嶺上菴中示仲思鄒昭州盡像贊楊補之真贊轎版銘第二十一卷雜文陳伯瑜宣義行狀廖成伯朝請墓表祭叔祖右司祭李先之祭酒祭龜山先生祭胡寶學祭廖尚書祭鄧南夫代翁子靜祭奉議叔祖代郡守祭衢州高龍圖代郡守祭江給事母夫人又代漕使又代龎幾先運幹祭廖成伯代楊文祭翁子靜祭表弟余君祭楊遵道代龜山先生祭葉朝請祭翁評事祭先兄祭翁甥代龜山先生祭陸太孺人祭公敘十叔第二十二卷雜文天貺節青詞代高文思祈福醮詞代高左藏郡君醮詞代人祈雨文代人又疏又代人永豐祈雨文代人謝雨文郊後祭神文皇帝登寶位後祭神文永豐消災道埸疏文幼山修造疏文雜説書楊輔之所藏了齋及道鄉帖題富鄭公河北安邊䇿偶言中庸解義論子重論用兵輄軏書唐子西集後書倦遊雜録後題了齋所書解禪偈後題了齋所書佛語卷後題了齋所書鄧功曹事書蕭茂德楚詞後書楊輔之所藏了齋書佛語題陸仲思寫中庸後題龜山易義稿書臨江守琳長老所得了齋帖書了齋筆供養彂願文又雜説十四段默堂先生文集目録
